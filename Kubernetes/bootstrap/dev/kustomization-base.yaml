apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flux-system

resources:
  - namespace.yaml
  - git-repository.yaml
  - kustomization-dev.yaml

secretGenerator:
  - name: flux-ssh
    files:
      - id_ed25519=./ssh-secrets/id_ed25519
    options:
      disableNameSuffixHash: true
