apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/helm-repositories.yaml
  - ../../base/cilium
  - ../../base/cert-manager
  - ../../base/nginx-ingress
  - ../../base/external-dns
  - ../../base/external-secrets
  - ../../base/vault-auth
  - ../../base/istio
  - ../../base/network-policies
patches:
  - patch: |-
      - op: replace
        path: /spec/values/controller/replicaCount
        value: 2
    target:
      kind: HelmRelease
      name: ingress-nginx
