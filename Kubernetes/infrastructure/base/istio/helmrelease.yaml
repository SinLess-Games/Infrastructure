---
# Istio Base (CRDs)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 30m
  chart:
    spec:
      chart: base
      version: "1.24.*"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    defaultRevision: default
---
# Istiod control plane
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 30m
  dependsOn:
    - name: istio-base
      namespace: istio-system
  chart:
    spec:
      chart: istiod
      version: "1.24.*"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    meshConfig:
      accessLogFile: /dev/stdout
      enableTracing: true
    pilot:
      replicaCount: 1
---
# East-west gateway for multicluster
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-eastwestgateway
  namespace: istio-system
spec:
  interval: 30m
  dependsOn:
    - name: istiod
      namespace: istio-system
  chart:
    spec:
      chart: gateway
      version: "1.24.*"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    name: istio-eastwestgateway
    labels:
      istio: eastwestgateway
      app: istio-eastwestgateway
      topology.istio.io/network: "network1"
    service:
      type: LoadBalancer
      ports:
        - name: status-port
          port: 15021
          targetPort: 15021
        - name: tls
          port: 15443
          targetPort: 15443
        - name: tls-istiod
          port: 15012
          targetPort: 15012
        - name: tls-webhook
          port: 15017
          targetPort: 15017
