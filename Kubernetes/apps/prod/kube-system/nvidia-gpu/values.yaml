# Kubernetes/apps/prod/kube-system/nvidia-gpu/values.yaml

driver:
  enabled: false

toolkit:
  enabled: true
  env:
    - name: CONTAINERD_CONFIG
      value: /var/lib/rancher/rke2/agent/etc/containerd/config.toml.tmpl
    - name: CONTAINERD_SOCKET
      value: /run/k3s/containerd/containerd.sock
    - name: CONTAINERD_RUNTIME_CLASS
      value: nvidia
    - name: CONTAINERD_SET_AS_DEFAULT
      value: "false"

operator:
  defaultRuntime: containerd

dcgmExporter:
  enabled: true
  serviceMonitor:
    enabled: true

nfd:
  enabled: true

node-feature-discovery:
  enableNodeFeatureApi: true

gfd:
  enabled: true

devicePlugin:
  enabled: true
  config:
    create: false

migManager:
  enabled: false

sandboxDevicePlugin:
  enabled: false

vfioManager:
  enabled: false

vgpuDeviceManager:
  enabled: false