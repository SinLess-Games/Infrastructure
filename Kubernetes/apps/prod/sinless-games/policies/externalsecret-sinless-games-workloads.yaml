# Kubernetes/apps/prod/sinless-games/policies/externalsecret-sinless-games-workloads.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sinless-games-workload-secrets
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: sinless-games-workload-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/secret-source: vault
    security.sinlessgames.io/secret-sync: external-secrets
  annotations:
    security.sinlessgames.io/purpose: "Sync workload runtime secrets from Vault into the sinless-games namespace."
    security.sinlessgames.io/contains-secrets: "true"
    security.sinlessgames.io/do-not-commit-secret-values: "true"
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend

  target:
    name: sinless-games-workload-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: sinless-games-workload-secrets
          app.kubernetes.io/component: secrets
          app.kubernetes.io/part-of: sinless-games-platform
          app.kubernetes.io/managed-by: external-secrets
          security.sinlessgames.io/secret-source: vault
        annotations:
          security.sinlessgames.io/purpose: "Generated by External Secrets Operator from Vault."
          security.sinlessgames.io/rotation-required: "true"

  data:
    - secretKey: n8n_basic_auth_password
      remoteRef:
        key: kubernetes/production/integrations
        property: n8n_basic_auth_password

    - secretKey: n8n_encryption_key
      remoteRef:
        key: kubernetes/production/workloads
        property: n8n_encryption_key
