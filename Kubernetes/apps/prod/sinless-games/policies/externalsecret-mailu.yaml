# Kubernetes/apps/prod/sinless-games/policies/externalsecret-mailu.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mailu-secrets
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: mailu
    app.kubernetes.io/component: mail-secrets
    app.kubernetes.io/part-of: mailu
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/secret-source: vault
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: mailu-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: mailu
          app.kubernetes.io/component: mail-secrets
          app.kubernetes.io/part-of: mailu
          security.sinlessgames.io/managed-by: external-secrets
  data:
    - secretKey: secret-key
      remoteRef:
        key: kubernetes/production/integrations
        property: mailu_secret_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mailu-initial-account
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: mailu
    app.kubernetes.io/component: mail-admin
    app.kubernetes.io/part-of: mailu
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/secret-source: vault
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: mailu-initial-account
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: mailu
          app.kubernetes.io/component: mail-admin
          app.kubernetes.io/part-of: mailu
          security.sinlessgames.io/managed-by: external-secrets
  data:
    - secretKey: password
      remoteRef:
        key: kubernetes/production/integrations
        property: mailu_initial_account_password
