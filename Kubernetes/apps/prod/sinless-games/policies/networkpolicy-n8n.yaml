# Kubernetes/apps/prod/sinless-games/policies/networkpolicy-n8n.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: n8n-allow-required-traffic
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/policy: network
    security.sinlessgames.io/egress: restricted
    security.sinlessgames.io/ingress: istio-gateway-only
  annotations:
    security.sinlessgames.io/purpose: "Allow only required ingress and egress for n8n."
    security.sinlessgames.io/public-ingress: "false"
    security.sinlessgames.io/internet-egress: "limited-http-https"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/instance: n8n
      app.kubernetes.io/component: automation

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow only the Istio ingress gateway to reach n8n.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              istio: ingress
      ports:
        - protocol: TCP
          port: 5678

  egress:
    # Allow DNS to CoreDNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Optional DNS service IP fallback.
    # Your cluster appears to use 10.43.0.10 for kube-dns.
    - to:
        - ipBlock:
            cidr: 10.43.0.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow Istio sidecar to talk to istiod for xDS and cert rotation.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012

    # Allow n8n workflows to call external HTTPS APIs/webhooks.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

    # Optional. Keep only if your workflows must call plain HTTP endpoints.
    # Prefer removing this once all workflow targets use HTTPS.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80