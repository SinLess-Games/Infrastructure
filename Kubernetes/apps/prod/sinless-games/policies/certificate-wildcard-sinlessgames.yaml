# Kubernetes/apps/prod/sinless-games/policies/certificate-wildcard-sinlessgames.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-sinlessgames-com
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: wildcard-sinlessgames-com
    app.kubernetes.io/component: tls-certificate
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
spec:
  secretName: wildcard-sinlessgames-com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-cloudflare
  dnsNames:
    - sinlessgames.com
    - "*.sinlessgames.com"
