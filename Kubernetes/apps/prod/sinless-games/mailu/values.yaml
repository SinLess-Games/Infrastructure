# Kubernetes/apps/prod/sinless-games/mailu/values.yaml

domain: sinlessgames.com

hostnames:
  - mail.sinlessgames.com

timezone: America/Boise
clusterDomain: cluster.local
subnet: 10.42.0.0/16

# Do not put the secret key directly in values.yaml.
# Secret must contain:
#   secret-key: <rotated-random-value>
existingSecret: mailu-secrets

initialAccount:
  enabled: true
  username: tpierce
  domain: sinlessgames.com

  # Do not put the password directly in values.yaml.
  # Secret must contain:
  #   password: <rotated-random-password>
  existingSecret: mailu-initial-account
  existingSecretPasswordKey: password

  # Safer than constantly resetting the account on each Helm sync.
  mode: ifmissing

postmaster: postmaster
recipientDelimiter: "+"

credentialRounds: 12
sessionCookieSecure: true
sessionTimeout: 3600
permanentSessionLifetime: 604800

limits:
  messageSizeLimitInMegabytes: 50
  authRatelimit:
    ip: 30/hour
    ipv4Mask: 24
    ipv6Mask: 56
    user: 50/day
    exemptionLength: 86400
    exemption: ""
  messageRatelimit:
    value: 100/day
    exemption: ""

persistence:
  single_pvc: true
  size: 50Gi
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce

networkPolicy:
  enabled: true
  ingressController:
    namespace: istio-system
    podSelector: |
      matchLabels:
        istio: ingress
  monitoring:
    namespace: monitoring
    podSelector: |
      matchLabels:
        app.kubernetes.io/name: prometheus

ingress:
  enabled: true
  ingressClassName: istio
  tls: true
  selfSigned: false

  # Prefer a real cert-manager/Cloudflare-issued TLS secret.
  # This should match the cert secret used for mail.sinlessgames.com.
  existingSecret: wildcard-sinlessgames-com

  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Platform
    gethomepage.dev/name: Mailu
    gethomepage.dev/icon: mailu.png
    gethomepage.dev/description: Mail admin"
    gethomepage.dev/href: https://mail.sinlessgames.com

    security.sinlessgames.io/exposure: public
    security.sinlessgames.io/ingress: istio
    security.sinlessgames.io/backend-mtls: istio-strict

  realIpHeader: X-Forwarded-For
  realIpFrom: ""

roundcube:
  enabled: false

webmail:
  enabled: false

front:
  kind: Deployment
  replicaCount: 1

  # Front is the public mail edge. Pin it to the node that owns the mail IP.
  nodeSelector:
    kubernetes.io/hostname: rke2-prod-wk-02

  updateStrategy:
    type: Recreate

  hostPort:
    enabled: true

  externalService:
    enabled: false

  podLabels:
    security.sinlessgames.io/exposure: public-mail-edge
    security.sinlessgames.io/hostport-required: "true"

  podAnnotations:
    sidecar.istio.io/inject: "false"
    security.sinlessgames.io/istio-sidecar: "disabled-mail-edge"
    security.sinlessgames.io/reason: "Public SMTP/IMAP/Submission protocols must preserve client IP and are not mesh-mTLS protocols."

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE

  terminationGracePeriodSeconds: 30

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

admin:
  nodeSelector:
    kubernetes.io/hostname: rke2-prod-wk-02

  updateStrategy:
    type: Recreate

  podAnnotations:
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/rewriteAppHTTPProbers: "true"
    security.sinlessgames.io/mtls: istio-strict

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE

  startupProbe:
    enabled: true
    failureThreshold: 30
    initialDelaySeconds: 10
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5

  livenessProbe:
    enabled: true
    failureThreshold: 6
    initialDelaySeconds: 90
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 5

  readinessProbe:
    enabled: true
    failureThreshold: 12
    initialDelaySeconds: 30
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

postfix:
  nodeSelector:
    kubernetes.io/hostname: rke2-prod-wk-02

  updateStrategy:
    type: Recreate

  podAnnotations:
    sidecar.istio.io/inject: "false"
    security.sinlessgames.io/istio-sidecar: "disabled-mail-internal"

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

