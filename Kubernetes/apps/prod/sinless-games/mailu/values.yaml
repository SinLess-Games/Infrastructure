  podAnnotations:
    sidecar.istio.io/inject: "false"
    security.sinlessgames.io/istio-sidecar: "disabled-mail-internal"

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
