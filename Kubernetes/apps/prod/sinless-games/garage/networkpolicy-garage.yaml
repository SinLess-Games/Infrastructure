apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: garage-allow-required-traffic
  namespace: sinless-games
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: garage
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sinless-games
      ports:
        - protocol: TCP
          port: 3900
        - protocol: TCP
          port: 3901
        - protocol: TCP
          port: 3903
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 3900
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: security
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: helix-ai
      ports:
        - protocol: TCP
          port: 3900
        - protocol: TCP
          port: 3903
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
