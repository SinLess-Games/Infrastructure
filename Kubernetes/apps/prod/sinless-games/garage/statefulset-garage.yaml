# Kubernetes/apps/prod/sinless-games/garage/statefulset-garage.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: object-storage
    app.kubernetes.io/part-of: sinless-games-platform
    security.sinlessgames.io/policy: hardened
spec:
  serviceName: garage-headless
  replicas: 1
  revisionHistoryLimit: 2

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

  selector:
    matchLabels:
      app.kubernetes.io/name: garage

  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
        app.kubernetes.io/component: object-storage
        app.kubernetes.io/part-of: sinless-games-platform
        security.sinlessgames.io/zone: storage
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: garage
      automountServiceAccountToken: false

      terminationGracePeriodSeconds: 60

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: render-garage-config
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              cat <<EOF >/config/garage.toml
              metadata_dir = "/var/lib/garage/meta"
              data_dir = "/var/lib/garage/data"
              db_engine = "lmdb"
              metadata_auto_snapshot_interval = "6h"
              replication_factor = 1
              compression_level = 2
              rpc_bind_addr = "[::]:3901"
              rpc_public_addr = "${POD_IP}:3901"
              rpc_secret = "${GARAGE_RPC_SECRET}"

              [s3_api]
              s3_region = "us-east-1"
              api_bind_addr = "[::]:3900"
              root_domain = ".s3.sinlessgames.com"

              [admin]
              api_bind_addr = "[::]:3903"
              admin_token = "${GARAGE_ADMIN_TOKEN}"
              metrics_token = "${GARAGE_METRICS_TOKEN}"
              EOF

          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: garage_rpc_secret

            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: garage_admin_token

            - name: GARAGE_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: garage_metrics_token

          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: garage-config
              mountPath: /config

      containers:
        - name: garage
          image: dxflrs/garage:v2.2.0
          imagePullPolicy: IfNotPresent
          command:
            - /garage
          args:
            - server

          env:
            - name: GARAGE_CONFIG_FILE
              value: /config/garage.toml

          ports:
            - name: http-s3
              containerPort: 3900
              protocol: TCP

            - name: tcp-rpc
              containerPort: 3901
              protocol: TCP

            - name: http-admin
              containerPort: 3903
              protocol: TCP

          startupProbe:
            tcpSocket:
              port: http-s3
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 2

          readinessProbe:
            tcpSocket:
              port: http-s3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: http-s3
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 1Gi

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: garage-meta
              mountPath: /var/lib/garage/meta

            - name: garage-data
              mountPath: /var/lib/garage/data

            - name: garage-config
              mountPath: /config
              readOnly: true

      volumes:
        - name: garage-config
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: garage-meta
        labels:
          app.kubernetes.io/name: garage
          app.kubernetes.io/component: metadata
          app.kubernetes.io/part-of: garage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-garage
        resources:
          requests:
            storage: 10Gi

    - metadata:
        name: garage-data
        labels:
          app.kubernetes.io/name: garage
          app.kubernetes.io/component: data
          app.kubernetes.io/part-of: garage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-garage
        resources:
          requests:
            storage: 50Gi