# Kubernetes/apps/prod/sinless-games/garage/deployment-garage-webui.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-webui
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: garage-webui
    app.kubernetes.io/component: object-storage-admin-ui
    app.kubernetes.io/part-of: sinless-games-platform
    security.sinlessgames.io/policy: hardened
spec:
  replicas: 1
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: garage-webui

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-webui
        app.kubernetes.io/component: object-storage-admin-ui
        app.kubernetes.io/part-of: sinless-games-platform
        security.sinlessgames.io/zone: admin-ui
      annotations:
        # Keep disabled unless Garage itself is also mesh-ready.
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: garage-webui
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: garage-webui
          image: khairul169/garage-webui:1.1.0
          imagePullPolicy: IfNotPresent

          env:
            - name: BASE_PATH
              value: /ui

            - name: API_BASE_URL
              value: http://garage-admin.sinless-games.svc.cluster.local:3903

            - name: API_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: garage_admin_token

            - name: S3_ENDPOINT_URL
              value: http://garage-s3.sinless-games.svc.cluster.local:3900

            - name: S3_REGION
              value: us-east-1

            - name: AUTH_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: garage_ui_auth_bcrypt

          ports:
            - name: http
              containerPort: 3909
              protocol: TCP

          startupProbe:
            httpGet:
              path: /ui/
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18

          readinessProbe:
            httpGet:
              path: /ui/
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /ui/
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}