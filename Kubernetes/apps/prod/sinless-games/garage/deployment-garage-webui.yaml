apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-webui
  namespace: sinless-games
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: garage-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-webui
        app.kubernetes.io/part-of: sinless-games-platform
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: garage-webui
          image: khairul169/garage-webui:1.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: BASE_PATH
              value: /ui
            - name: API_BASE_URL
              value: http://garage-admin.sinless-games.svc.cluster.local:3903
            - name: API_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: garage_admin_token
            - name: S3_ENDPOINT_URL
              value: http://garage-s3.sinless-games.svc.cluster.local:3900
            - name: S3_REGION
              value: us-east-1
            - name: AUTH_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: garage_ui_auth_bcrypt
          ports:
            - name: http
              containerPort: 3909
          readinessProbe:
            httpGet:
              path: /ui/
              port: 3909
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ui/
              port: 3909
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
