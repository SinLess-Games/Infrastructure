# Kubernetes/apps/prod/sinless-games/garage/serviceaccount-garage-bootstrap.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage-bootstrap
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: garage-bootstrap
    app.kubernetes.io/component: service-account
    app.kubernetes.io/part-of: garage
    security.sinlessgames.io/rbac: scoped-exec
automountServiceAccountToken: true