# Kubernetes/apps/prod/sinless-games/garage/networkpolicy-garage-ui.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: garage-ui-allow-ingress
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: garage-webui
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: garage
    security.sinlessgames.io/policy: restricted-ingress-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: garage-webui

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Istio ingress gateway -> Garage WebUI
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 3909

    # Same-namespace access for service checks/debug pods if needed.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sinless-games
      ports:
        - protocol: TCP
          port: 3909

  egress:
    # Garage admin API.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sinless-games
          podSelector:
            matchLabels:
              app.kubernetes.io/name: garage
      ports:
        - protocol: TCP
          port: 3903

    # Garage S3 API.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sinless-games
          podSelector:
            matchLabels:
              app.kubernetes.io/name: garage
      ports:
        - protocol: TCP
          port: 3900

    # DNS to kube-dns/CoreDNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # DNS directly to kube-dns service IP.
    - to:
        - ipBlock:
            cidr: 10.43.0.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53