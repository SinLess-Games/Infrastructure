# Kubernetes/apps/prod/sinless-games/homepage/serviceaccount-homepage.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: homepage
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/automount-service-account-token: "false"
    security.sinlessgames.io/rbac-scope: readonly
  annotations:
    security.sinlessgames.io/purpose: "ServiceAccount used by the Homepage dashboard."
    security.sinlessgames.io/least-privilege: "true"
    security.sinlessgames.io/write-access: "false"
    security.sinlessgames.io/cluster-admin: "false"
    security.sinlessgames.io/token-projection-required: "true"
automountServiceAccountToken: false