# Kubernetes/apps/prod/sinless-games/homepage/destinationrule-homepage.yaml
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: homepage
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/instance: homepage
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/mtls: istio-strict
  annotations:
    security.sinlessgames.io/purpose: "Require Istio mutual TLS for traffic to the Homepage service."
spec:
  host: homepage.sinless-games.svc.cluster.local
  exportTo:
    - "."
    - "istio-system"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL