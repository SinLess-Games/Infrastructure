apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: sinless-games
  annotations:
    kubernetes.io/ingress.class: istio
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Platform
    gethomepage.dev/name: Homepage
    gethomepage.dev/icon: homepage.png
    gethomepage.dev/description: Platform dashboard
    gethomepage.dev/href: https://homepage.sinlessgames.com
spec:
  ingressClassName: istio
  rules:
    - host: homepage.sinlessgames.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 3000
