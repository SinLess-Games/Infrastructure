# Kubernetes/apps/prod/sinless-games/namespace/limitrange.yaml
apiVersion: v1
kind: LimitRange
metadata:
  name: sinless-games-limit-range
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: sinless-games-limit-range
    app.kubernetes.io/component: namespace-guardrails
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/policy: limit-range
    security.sinlessgames.io/environment: prod
  annotations:
    security.sinlessgames.io/purpose: "Default and bounded compute/storage limits for production workloads."
    security.sinlessgames.io/reason: "Prevent unbounded containers and PVCs from being admitted into the namespace."
spec:
  limits:
    # Container-level defaults and bounds.
    # These make ResourceQuota usable even when a manifest forgets requests/limits.
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 128Mi
      default:
        cpu: 250m
        memory: 512Mi
        ephemeral-storage: 1Gi
      min:
        cpu: 10m
        memory: 32Mi
        ephemeral-storage: 32Mi
      max:
        cpu: "4"
        memory: 8Gi
        ephemeral-storage: 8Gi
      maxLimitRequestRatio:
        cpu: "10"
        memory: "4"
        ephemeral-storage: "8"

    # Pod-level ceiling.
    # Keeps one pod from consuming the whole namespace quota.
    - type: Pod
      max:
        cpu: "8"
        memory: 16Gi
        ephemeral-storage: 16Gi
      min:
        cpu: 10m
        memory: 32Mi
        ephemeral-storage: 32Mi

    # PVC bounds.
    # Longhorn-backed workloads should request storage intentionally.
    - type: PersistentVolumeClaim
      min:
        storage: 1Gi
      max:
        storage: 250Gi