opencost:
  prometheus:
    internal:
      namespaceName: monitoring
      serviceName: kube-prometheus-stack-prometheus
      port: 9090
  exporter:
    defaultClusterId: rke2-prod
    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 10Gi
  metrics:
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  ui:
    enabled: true
