apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: sinless-games
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app: n8n
    spec:
      enableServiceLinks: false
      dnsPolicy: ClusterFirst
      dnsConfig:
        searches:
          - sinless-games.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "1"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:1.77.3
          env:
            - name: N8N_HOST
              value: n8n.sinlessgames.com
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_EDITOR_BASE_URL
              value: https://n8n.sinlessgames.com
            - name: WEBHOOK_URL
              value: https://n8n.sinlessgames.com/
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "true"
            - name: N8N_BASIC_AUTH_USER
              value: admin
            - name: N8N_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sinless-games-workload-secrets
                  key: n8n_basic_auth_password
          ports:
            - containerPort: 5678
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: sinless-games
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: sinless-games
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Automation
    gethomepage.dev/name: n8n
    gethomepage.dev/icon: si-n8n
    gethomepage.dev/description: Workflow automation
    gethomepage.dev/href: https://n8n.sinlessgames.com
spec:
  selector:
    app: n8n
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: n8n
  namespace: sinless-games
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: n8n
