apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencost
  namespace: sinless-games
  annotations:
    kubernetes.io/ingress.class: istio
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Platform
    gethomepage.dev/name: OpenCost
    gethomepage.dev/icon: opencost.png
    gethomepage.dev/description: Cluster cost and usage visibility
    gethomepage.dev/href: https://opencost.sinlessgames.com
spec:
  ingressClassName: istio
  rules:
    - host: opencost.sinlessgames.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opencost
                port:
                  number: 9090
