# Kubernetes/apps/prod/sinless-games/mesh/destinationrule-platform-uis.yaml
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: rancher-mtls
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: rancher
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/mtls: istio-strict
    security.sinlessgames.io/plaintext-allowed: "false"
spec:
  host: rancher.sinless-games.svc.cluster.local
  exportTo:
    - "."
    - "istio-system"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
