# Kubernetes/apps/prod/sinless-games/mailu/destinationrule-mailu-front-exception.yaml
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: mailu-front-mesh-exception
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: mailu
    app.kubernetes.io/component: front
    app.kubernetes.io/part-of: mailu
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/mtls: exception
    security.sinlessgames.io/plaintext-allowed: "true"
  annotations:
    security.sinlessgames.io/purpose: "Documented exception for Mailu front when Istio sidecar injection is disabled for public mail protocols."
    security.sinlessgames.io/reason: "Mailu front handles public SMTP/IMAP/submission traffic and may need to preserve non-mesh protocol behavior."
    security.sinlessgames.io/required-controls: "Restrict with NetworkPolicy, host firewall rules, public TLS, and narrow Gateway routing."
spec:
  host: mailu-front.sinless-games.svc.cluster.local
  exportTo:
    - "."
    - "istio-system"
  trafficPolicy:
    tls:
      mode: DISABLE