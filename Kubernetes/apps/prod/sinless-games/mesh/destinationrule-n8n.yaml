# Kubernetes/apps/prod/sinless-games/mesh/destinationrule-n8n.yaml
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: n8n-mtls
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n
    app.kubernetes.io/component: automation
    app.kubernetes.io/part-of: sinless-games-platform
    app.kubernetes.io/managed-by: gitops
    security.sinlessgames.io/mtls: istio-strict
    security.sinlessgames.io/plaintext-allowed: "false"
  annotations:
    security.sinlessgames.io/purpose: "Require Istio mutual TLS for clients connecting to the n8n service."
spec:
  host: n8n.sinless-games.svc.cluster.local

  # Needed if n8n is exposed through the shared Istio gateway.
  exportTo:
    - "."
    - "istio-system"

  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL