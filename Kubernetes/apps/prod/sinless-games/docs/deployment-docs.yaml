# Kubernetes/apps/prod/sinless-games/docs/deployment-docs.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: sinless-games
  labels:
    app.kubernetes.io/name: docs
    app.kubernetes.io/component: documentation
    app.kubernetes.io/part-of: sinless-games-platform
    security.sinlessgames.io/policy: hardened
spec:
  replicas: 2
  revisionHistoryLimit: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: docs

  template:
    metadata:
      labels:
        app.kubernetes.io/name: docs
        app.kubernetes.io/component: documentation
        app.kubernetes.io/part-of: sinless-games-platform
        security.sinlessgames.io/zone: public-web
    spec:
      serviceAccountName: docs
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: docs
                topologyKey: kubernetes.io/hostname

      containers:
        - name: docs
          image: ghcr.io/SinLess-Games/infrastructure-docs:main
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL