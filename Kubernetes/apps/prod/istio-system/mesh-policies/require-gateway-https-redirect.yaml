# Kubernetes/apps/prod/istio-system/mesh-policies/require-gateway-https-redirect.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-istio-gateway-https-redirect
  labels:
    app.kubernetes.io/name: require-istio-gateway-https-redirect
    app.kubernetes.io/component: admission-policy
    app.kubernetes.io/part-of: istio
    security.sinlessgames.io/policy: gateway-https-redirect
  annotations:
    policies.kyverno.io/title: Require HTTPS Redirect on Istio Gateways
    policies.kyverno.io/category: Istio Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Gateway
    policies.kyverno.io/description: >-
      Requires all HTTP servers on Istio Gateway resources to redirect traffic to HTTPS.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: http-servers-must-redirect-to-https
      match:
        any:
          - resources:
              kinds:
                - Gateway.networking.istio.io
      validate:
        message: "Istio Gateway HTTP servers must set tls.httpsRedirect=true."
        foreach:
          - list: "request.object.spec.servers[?port.protocol == 'HTTP']"
            deny:
              conditions:
                any:
                  - key: "{{ element.tls.httpsRedirect || false }}"
                    operator: NotEquals
                    value: true