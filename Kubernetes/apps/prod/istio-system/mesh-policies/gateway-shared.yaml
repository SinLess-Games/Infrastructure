apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: shared-edge
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        name: https
        number: 443
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: wildcard-sinlessgames-com
      hosts:
        - "*.sinlessgames.com"
        - "*.helixaibot.com"
