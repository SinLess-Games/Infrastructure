provider: cloudflare
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: platform-integrations
        key: external_dns_api_token
policy: sync
registry: txt
txtOwnerId: rke2-prod
domainFilters:
  - sinlessgames.com
  - helixaibot.com
sources:
  - crd
  - service
  - istio-gateway
  - istio-virtualservice
extraArgs:
  - --cloudflare-dns-records-per-page=5000
  - --cloudflare-proxied
serviceMonitor:
  enabled: true
