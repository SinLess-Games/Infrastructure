apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-integrations
  namespace: networking
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: platform-integrations
  data:
    - secretKey: cloudflare_api_token
      remoteRef:
        key: kubernetes/production/integrations
        property: cloudflare_api_token
    - secretKey: external_dns_api_token
      remoteRef:
        key: kubernetes/production/integrations
        property: external_dns_api_token
    - secretKey: cloudflared_tunnel_token
      remoteRef:
        key: kubernetes/production/integrations
        property: cloudflared_tunnel_token
