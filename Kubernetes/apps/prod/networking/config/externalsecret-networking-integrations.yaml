# Kubernetes/apps/prod/networking/config/externalsecret-networking-integrations.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-integrations
  namespace: networking
  labels:
    app.kubernetes.io/name: platform-integrations
    app.kubernetes.io/component: integration-credentials
    app.kubernetes.io/part-of: networking
    security.sinlessgames.io/secret-source: vault
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend

  target:
    name: platform-integrations
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: platform-integrations
          app.kubernetes.io/component: integration-credentials
          app.kubernetes.io/part-of: networking
          security.sinlessgames.io/managed-by: external-secrets

  data:
    - secretKey: cloudflare_api_token
      remoteRef:
        key: cloudflare/api
        property: edit_tunnels

    - secretKey: external_dns_api_token
      remoteRef:
        key: cloudflare/api
        property: edit_all_zones_dns

    - secretKey: account_id
      remoteRef:
        key: cloudflare/api
        property: account_id