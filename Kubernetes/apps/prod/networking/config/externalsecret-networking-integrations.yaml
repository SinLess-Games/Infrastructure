apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-integrations
  namespace: networking
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: platform-integrations
    creationPolicy: Owner
  data:
    - secretKey: cloudflare_api_token
      remoteRef:
        key: cloudflare/api
        property: edit_tunnels
    - secretKey: external_dns_api_token
      remoteRef:
        key: cloudflare/api
        property: edit_all_zones_dns
    - secretKey: account_id
      remoteRef:
        key: cloudflare/api
        property: account_id
