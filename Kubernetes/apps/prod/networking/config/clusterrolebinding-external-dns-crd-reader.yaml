# Kubernetes/apps/prod/networking/config/rbac-external-dns-crd-reader.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-crd-reader
  labels:
    app.kubernetes.io/name: external-dns-crd-reader
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: external-dns
    security.sinlessgames.io/rbac-scope: dnsendpoint-crd
rules:
  - apiGroups:
      - externaldns.k8s.io
    resources:
      - dnsendpoints
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - externaldns.k8s.io
    resources:
      - dnsendpoints/status
    verbs:
      - get
      - patch
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-crd-reader
  labels:
    app.kubernetes.io/name: external-dns-crd-reader
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: external-dns
    security.sinlessgames.io/rbac-scope: dnsendpoint-crd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns-crd-reader
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: networking