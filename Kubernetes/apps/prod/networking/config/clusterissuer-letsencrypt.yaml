# Kubernetes/apps/prod/networking/config/clusterissuer-letsencrypt.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
  labels:
    app.kubernetes.io/name: letsencrypt-cloudflare
    app.kubernetes.io/component: cluster-issuer
    app.kubernetes.io/part-of: cert-manager
    security.sinlessgames.io/issuer: letsencrypt
spec:
  acme:
    email: ops@sinlessgames.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key

    solvers:
      - selector:
          dnsZones:
            - sinlessgames.com
            - helixaibot.com
        dns01:
          cloudflare:
            apiTokenSecretRef:
              name: platform-integrations
              key: cloudflare_api_token