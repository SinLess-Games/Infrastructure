# Kubernetes/apps/prod/networking/cloudflared/externalsecret-cloudflared-tunnels.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-sinlessgames
  namespace: networking
  labels:
    app.kubernetes.io/name: cloudflared-sinlessgames
    app.kubernetes.io/component: tunnel-credentials
    app.kubernetes.io/part-of: edge-access
    security.sinlessgames.io/secret-source: vault
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend

  target:
    name: cloudflared-sinlessgames
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: cloudflared-sinlessgames
          app.kubernetes.io/component: tunnel-credentials
          app.kubernetes.io/part-of: edge-access
          security.sinlessgames.io/managed-by: external-secrets

  data:
    - secretKey: tunnel_id
      remoteRef:
        key: cloudflare/tunnel/sinlessgames
        property: tunnel_id

    - secretKey: tunnel_token
      remoteRef:
        key: cloudflare/tunnel/sinlessgames
        property: tunnel_token

    - secretKey: zone_id
      remoteRef:
        key: cloudflare/tunnel/sinlessgames
        property: zone_id

