# Kubernetes/apps/prod/networking/cloudflared/service-cloudflared-helix.yaml
apiVersion: v1
kind: Service
metadata:
  name: cloudflared-helix
  namespace: networking
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: helix
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: edge-access
    security.sinlessgames.io/exposure: cluster-internal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: helix
  ports:
    - name: metrics
      port: 2000
      targetPort: metrics
      protocol: TCP
      appProtocol: http