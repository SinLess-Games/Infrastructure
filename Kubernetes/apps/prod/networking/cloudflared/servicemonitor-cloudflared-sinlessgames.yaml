# Kubernetes/apps/prod/networking/cloudflared/servicemonitor-cloudflared-sinlessgames.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudflared-sinlessgames
  namespace: networking
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/instance: sinlessgames
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: edge-access
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/instance: sinlessgames
  namespaceSelector:
    matchNames:
      - networking
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: false
      