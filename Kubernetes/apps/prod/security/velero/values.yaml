credentials:
  useSecret: true
  existingSecret: velero-s3-credentials
upgradeCRDs: false
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: k8s-prod-velero
      config:
        region: us-east-1
        s3ForcePathStyle: "true"
        s3Url: http://garage-s3.sinless-games.svc.cluster.local:3900
  volumeSnapshotLocation:
    - name: default
      provider: aws
deployNodeAgent: true
schedules:
  daily:
    disabled: false
    schedule: "0 2 * * *"
    template:
      ttl: 168h
