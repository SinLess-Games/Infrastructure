# Kubernetes/apps/prod/security/namespace/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    kubernetes.io/metadata.name: security

    # Keep security tooling out of the mesh by default.
    istio-injection: disabled

    # Pod Security Admission
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest

    # Allow hardened Prometheus selectors to scrape ServiceMonitors/rules here.
    monitoring.sinlessgames.io/scrape: "true"
    monitoring.sinlessgames.io/rules: "true"

    # Environment / ownership
    topology.kubernetes.io/environment: prod
    app.kubernetes.io/name: security
    app.kubernetes.io/component: security-platform
    app.kubernetes.io/part-of: platform
    security.sinlessgames.io/zone: security-control-plane