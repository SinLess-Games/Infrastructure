# Kubernetes/apps/prod/security/wazuh/values.yaml

image:
  repository: wazuh/wazuh-agent
  tag: "4.14.5"
  pullPolicy: IfNotPresent

daemonset:
  enabled: true

serviceAccount:
  create: true
  name: wazuh-agent
  automountServiceAccountToken: false

wazuh:
  manager:
    host: 10.10.10.21
    protocol: tcp
    port: 1514
    registrationHost: 10.10.10.21
    registrationPort: 1515

  agent:
    group: Production,Kubernetes
    namePrefix: rke2-prod
    stateHostPath: /var/lib/wazuh-agent

env:
  - name: WAZUH_MANAGER
    value: "10.10.10.21"
  - name: WAZUH_MANAGER_PORT
    value: "1514"
  - name: WAZUH_PROTOCOL
    value: "tcp"
  - name: WAZUH_REGISTRATION_SERVER
    value: "10.10.10.21"
  - name: WAZUH_REGISTRATION_PORT
    value: "1515"
  - name: WAZUH_AGENT_GROUP
    value: "Production,Kubernetes"
  - name: WAZUH_AGENT_NAME_PREFIX
    value: "rke2-prod"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

securityContext:
  privileged: false
  allowPrivilegeEscalation: true
  readOnlyRootFilesystem: false
  runAsUser: 0
  capabilities:
    drop:
      - ALL
    add:
      - SETGID
      - SETUID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
  seccompProfile:
    type: RuntimeDefault

tolerations:
  - operator: Exists

nodeSelector: {}

hostPID: true
hostNetwork: false
hostIPC: false

hostPathMounts:
  enabled: true
  mounts:
    - name: host-var-log
      hostPath: /var/log
      mountPath: /host/var/log
      type: Directory
      readOnly: true

    - name: host-etc
      hostPath: /etc
      mountPath: /host/etc
      type: Directory
      readOnly: true

    - name: host-usr-bin
      hostPath: /usr/bin
      mountPath: /host/usr/bin
      type: Directory
      readOnly: true

    - name: host-proc
      hostPath: /proc
      mountPath: /host/proc
      type: Directory
      readOnly: true

    - name: host-var-lib-rancher-rke2
      hostPath: /var/lib/rancher/rke2
      mountPath: /host/var/lib/rancher/rke2
      type: DirectoryOrCreate
      readOnly: true

persistence:
  enabled: false

hostPathState:
  enabled: true
  path: /var/lib/wazuh-agent

serviceMonitor:
  enabled: false
