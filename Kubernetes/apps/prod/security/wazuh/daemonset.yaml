# Kubernetes/apps/prod/security/wazuh/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wazuh-agent
  namespace: security
  labels:
    app.kubernetes.io/name: wazuh-agent
    app.kubernetes.io/component: node-security-agent
    app.kubernetes.io/part-of: wazuh
    security.sinlessgames.io/zone: node-security
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wazuh-agent

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app.kubernetes.io/name: wazuh-agent
        app.kubernetes.io/component: node-security-agent
        app.kubernetes.io/part-of: wazuh
        security.sinlessgames.io/zone: node-security
    spec:
      serviceAccountName: wazuh-agent
      automountServiceAccountToken: false

      hostPID: true
      hostNetwork: false
      hostIPC: false

      nodeSelector:
        security.sinlessgames.com/wazuh-agent: "enabled"

      tolerations:
        - operator: Exists

      containers:
        - name: wazuh-agent
          image: wazuh/wazuh-agent:4.9.0
          imagePullPolicy: IfNotPresent

          env:
            - name: WAZUH_MANAGER
              value: "10.10.10.21"
            - name: WAZUH_MANAGER_PORT
              value: "1514"
            - name: WAZUH_PROTOCOL
              value: "tcp"
            - name: WAZUH_REGISTRATION_SERVER
              value: "10.10.10.21"
            - name: WAZUH_REGISTRATION_PORT
              value: "1515"
            - name: WAZUH_AGENT_GROUP
              value: "kubernetes-prod"
            - name: WAZUH_REGISTRATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-agent-enrollment
                  key: enrollment_password

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi

          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: host-var-log
              mountPath: /host/var/log
              readOnly: true

            - name: host-etc-os-release
              mountPath: /host/etc/os-release
              readOnly: true

            - name: host-etc-hostname
              mountPath: /host/etc/hostname
              readOnly: true

            - name: host-etc-machine-id
              mountPath: /host/etc/machine-id
              readOnly: true

            - name: wazuh-agent-state
              mountPath: /var/ossec

      volumes:
        - name: host-var-log
          hostPath:
            path: /var/log
            type: Directory

        - name: host-etc-os-release
          hostPath:
            path: /etc/os-release
            type: File

        - name: host-etc-hostname
          hostPath:
            path: /etc/hostname
            type: File

        - name: host-etc-machine-id
          hostPath:
            path: /etc/machine-id
            type: File

        - name: wazuh-agent-state
          hostPath:
            path: /var/lib/wazuh-agent
            type: DirectoryOrCreate