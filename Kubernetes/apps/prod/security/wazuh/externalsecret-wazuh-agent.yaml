# Kubernetes/apps/prod/security/wazuh/externalsecret-wazuh-agent.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-agent-enrollment
  namespace: security
  labels:
    app.kubernetes.io/name: wazuh-agent-enrollment
    app.kubernetes.io/component: agent-credentials
    app.kubernetes.io/part-of: wazuh
    security.sinlessgames.io/secret-source: vault
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend

  target:
    name: wazuh-agent-enrollment
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: wazuh-agent-enrollment
          app.kubernetes.io/component: agent-credentials
          app.kubernetes.io/part-of: wazuh
          security.sinlessgames.io/managed-by: external-secrets
      data:
        authd.pass: "{{ .enrollmentPassword }}"
        enrollment_password: "{{ .enrollmentPassword }}"

  data:
    - secretKey: enrollmentPassword
      remoteRef:
        key: kubernetes/production/integrations
        property: vault_wazuh_agent_enrollment_password