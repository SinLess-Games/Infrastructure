apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-probes
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Liveness and readiness probes are required for all containers.
        pattern:
          spec:
            containers:
              - livenessProbe: "?*"
                readinessProbe: "?*"
