# Kubernetes/apps/prod/security/policies/clusterpolicy-require-probes.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
  labels:
    app.kubernetes.io/name: require-probes
    app.kubernetes.io/component: admission-policy
    app.kubernetes.io/part-of: kyverno
    security.sinlessgames.io/policy: workload-health
  annotations:
    policies.kyverno.io/title: Require Container Probes
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires application containers to define at least one health probe:
      livenessProbe, readinessProbe, or startupProbe.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: containers-must-have-health-probe
      match:
        any:
          - resources:
              kinds:
                - Pod

      preconditions:
        all:
          - key: "{{ request.operation || 'BACKGROUND' }}"
            operator: AnyIn
            value:
              - CREATE
              - UPDATE
              - BACKGROUND

      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - networking
                - monitoring
                - istio-system
                - security
                - gitops

          - resources:
              kinds:
                - Pod
              names:
                - n8n*
              namespaces:
                - sinless-games

          - resources:
              kinds:
                - Pod
              namespaces:
                - gitops
              selector:
                matchLabels:
                  app.kubernetes.io/name: actions-runner-controller

      validate:
        message: "Containers must define at least one of livenessProbe, readinessProbe, or startupProbe."
        foreach:
          - list: "request.object.spec.containers[]"
            deny:
              conditions:
                all:
                  - key: livenessProbe
                    operator: AllNotIn
                    value: "{{ element.keys(@)[] }}"
                  - key: readinessProbe
                    operator: AllNotIn
                    value: "{{ element.keys(@)[] }}"
                  - key: startupProbe
                    operator: AllNotIn
                    value: "{{ element.keys(@)[] }}"