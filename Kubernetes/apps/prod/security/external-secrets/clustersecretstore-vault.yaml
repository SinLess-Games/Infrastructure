apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://10.10.10.180:8200
      caProvider:
        type: ConfigMap
        name: vault-ca
        namespace: security
        key: ca.crt
      path: secrets
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-production
          serviceAccountRef:
            name: external-secrets
            namespace: security
