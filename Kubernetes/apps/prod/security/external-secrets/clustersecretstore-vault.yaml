apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://vault.local.sinlessgames.com:8200
      path: secrets
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-production
          serviceAccountRef:
            name: external-secrets
            namespace: security
