apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-integrations
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: platform-integrations
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: kubernetes/production/integrations
