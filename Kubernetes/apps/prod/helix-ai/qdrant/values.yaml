replicaCount: 3

persistence:
  accessModes:
    - ReadWriteOnce
  size: 100Gi
  storageClassName: longhorn

snapshotPersistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 100Gi
  storageClassName: longhorn

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 8Gi

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 2000
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true

podSecurityContext:
  fsGroup: 3000
  fsGroupChangePolicy: Always

updateVolumeFsOwnership: true

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - qdrant
            - key: app.kubernetes.io/instance
              operator: In
              values:
                - qdrant
        topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: qdrant

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

config:
  cluster:
    enabled: true

metrics:
  serviceMonitor:
    enabled: true
    scrapeInterval: 30s
    scrapeTimeout: 10s

apiKey:
  valueFrom:
    secretKeyRef:
      name: qdrant-auth
      key: api-key

readOnlyApiKey:
  valueFrom:
    secretKeyRef:
      name: qdrant-auth
      key: read-only-api-key