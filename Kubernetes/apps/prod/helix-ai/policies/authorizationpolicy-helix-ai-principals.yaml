apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: helix-api-allow-principals
  namespace: helix-ai
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: helix-api
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account
              - cluster.local/ns/helix-ai/sa/helix-api-client
      to:
        - operation:
            ports: ["8080"]
            methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
            paths:
              - /api/*
              - /healthz
              - /readyz
    - from:
        - source:
            principals:
              - cluster.local/ns/monitoring/sa/prometheus
      to:
        - operation:
            ports: ["8080"]
            methods: ["GET"]
            paths:
              - /metrics