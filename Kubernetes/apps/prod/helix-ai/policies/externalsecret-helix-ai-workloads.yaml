apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: helix-ai-workload-secrets
  namespace: helix-ai
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: helix-ai-workload-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: helix-ai
  data:
    - secretKey: redis_password
      remoteRef:
        key: kubernetes/production/workloads
        property: redis_password