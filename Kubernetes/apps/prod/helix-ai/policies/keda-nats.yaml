apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: helix-ai-nats-worker
  namespace: helix-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helix-ai-nats-worker

  pollingInterval: 15
  minReplicaCount: 2
  maxReplicaCount: 20

  fallback:
    failureThreshold: 3
    replicas: 3
    behavior: static

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60

  triggers:
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: "nats.helix-ai.svc.cluster.local:8222"
        account: "$G"
        stream: "HELIX_EVENTS"
        consumer: "helix-ai-workers"
        lagThreshold: "100"
        activationLagThreshold: "10"
        useHttps: "false"