architecture: replication
auth:
  enabled: true
  existingSecret: platform-integrations
  existingSecretPasswordKey: redis_password
master:
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
replica:
  replicaCount: 3
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
sentinel:
  enabled: true
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
useExternalDNS:
  enabled: true
      
