architecture: replication
auth:
  enabled: true
  existingSecret: platform-integrations
  existingSecretPasswordKey: redis_password
master:
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
replica:
  replicaCount: 2
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
sentinel:
  enabled: true
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
