apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: grafana-admin
    template:
      data:
        admin-user: admin
        grafana_admin_password: "{{ .grafana_admin_password }}"
        postgres_grafana_password: "{{ .postgres_grafana_password }}"
        discord_alert_webhook_url: "{{ .discord_alert_webhook_url }}"
  data:
    - secretKey: grafana_admin_password
      remoteRef:
        key: kubernetes/production/integrations
        property: grafana_admin_password
    - secretKey: postgres_grafana_password
      remoteRef:
        key: kubernetes/production/integrations
        property: postgres_grafana_password
    - secretKey: discord_alert_webhook_url
      remoteRef:
        key: kubernetes/production/integrations
        property: discord_alert_webhook_url
