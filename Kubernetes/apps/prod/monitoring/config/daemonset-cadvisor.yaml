# Kubernetes/apps/prod/monitoring/config/daemonset-cadvisor.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/component: node-metrics
    app.kubernetes.io/part-of: monitoring
    security.sinlessgames.io/policy: hardened
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cadvisor
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadvisor
        app.kubernetes.io/component: node-metrics
        app.kubernetes.io/part-of: monitoring
        security.sinlessgames.io/zone: node-observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      automountServiceAccountToken: false
      priorityClassName: system-node-critical
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst

      tolerations:
        - operator: Exists

      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.52.1
          imagePullPolicy: IfNotPresent
          args:
            - --housekeeping_interval=30s
            - --max_housekeeping_interval=35s
            - --event_storage_event_limit=default=0
            - --event_storage_age_limit=default=0
            - --store_container_labels=false
            - --docker_only=false
            - --containerd=/run/k3s/containerd/containerd.sock
            - --allow_dynamic_housekeeping=true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            privileged: false
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: run
              mountPath: /run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: containerd
              mountPath: /var/lib/rancher/rke2/agent/containerd
              readOnly: true
            - name: disk
              mountPath: /dev/disk
              readOnly: true
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true

      volumes:
        - name: rootfs
          hostPath:
            path: /
            type: Directory
        - name: run
          hostPath:
            path: /run
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: containerd
          hostPath:
            path: /var/lib/rancher/rke2/agent/containerd
            type: DirectoryOrCreate
        - name: disk
          hostPath:
            path: /dev/disk
            type: Directory
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory