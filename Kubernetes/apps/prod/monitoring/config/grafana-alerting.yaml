apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
data:
  contactpoints.yaml: |
    apiVersion: 1

    contactPoints:
      - orgId: 1
        name: platform-discord
        receivers:
          - uid: platform-discord
            type: discord
            settings:
              title: '{{ template "default.title" . }}'
              message: '{{ template "default.message" . }}'
              url: $DISCORD_WEBHOOK_URL
  
  policies.yaml: |
    apiVersion: 1

    policies:
      - orgId: 1
        receiver: platform-discord
        group_by:
          - alertname
          - namespace
