# Kubernetes/apps/prod/monitoring/config/grafana-alerting.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-alerting
    app.kubernetes.io/component: alerting-provisioning
    app.kubernetes.io/part-of: grafana
    security.sinlessgames.io/policy: managed-alerting
data:
  contactpoints.yaml: |
    apiVersion: 1

    contactPoints:
      - orgId: 1
        name: platform-discord
        receivers:
          - uid: platform-discord
            type: discord
            settings:
              url: ${DISCORD_WEBHOOK_URL}
              title: '{{ template "default.title" . }}'
              message: '{{ template "default.message" . }}'
            disableResolveMessage: false

  policies.yaml: |
    apiVersion: 1

    policies:
      - orgId: 1
        receiver: platform-discord
        group_by:
          - grafana_folder
          - alertname
          - namespace
          - severity
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h