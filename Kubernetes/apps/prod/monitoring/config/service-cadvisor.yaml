# Kubernetes/apps/prod/monitoring/config/service-cadvisor.yaml
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cadvisor
    app.kubernetes.io/component: node-metrics
    app.kubernetes.io/part-of: monitoring
    security.sinlessgames.io/exposure: cluster-internal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cadvisor
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
      appProtocol: http