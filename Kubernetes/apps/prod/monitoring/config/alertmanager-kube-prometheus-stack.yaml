# Kubernetes/apps/prod/monitoring/config/alertmanager-kube-prometheus-stack.yaml
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: kube-prometheus-stack-alertmanager
  namespace: monitoring
  labels:
    app: kube-prometheus-stack-alertmanager
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: kube-prometheus-stack
    release: kube-prometheus-stack
    security.sinlessgames.io/policy: hardened
spec:
  replicas: 2
  serviceAccountName: kube-prometheus-stack-alertmanager
  configSecret: alertmanager-kube-prometheus-stack-alertmanager

  nodeSelector:
    sinlessgames.com/role: worker

  podMetadata:
    labels:
      app.kubernetes.io/name: alertmanager
      app.kubernetes.io/component: alert-routing
      app.kubernetes.io/part-of: kube-prometheus-stack
      security.sinlessgames.io/zone: monitoring

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 2000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  listenLocal: false

  retention: 120h

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi