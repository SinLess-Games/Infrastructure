# Kubernetes/apps/prod/monitoring/config/servicemonitor-otel-collector.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: telemetry-ingestion
    app.kubernetes.io/part-of: monitoring
    release: kube-prometheus-stack
    security.sinlessgames.io/exposure: cluster-internal
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector

  namespaceSelector:
    matchNames:
      - monitoring

  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: false
      scheme: http