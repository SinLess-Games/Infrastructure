apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: observability-object-storage
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: observability-object-storage
  dataFrom:
    - extract:
        key: kubernetes/production/integrations
