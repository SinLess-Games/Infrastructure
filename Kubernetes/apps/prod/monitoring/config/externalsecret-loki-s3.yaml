apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-s3-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: loki-s3-credentials
  data:
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: kubernetes/production/integrations
        property: garage_s3_endpoint_internal
    - secretKey: S3_REGION
      remoteRef:
        key: kubernetes/production/integrations
        property: s3_region
    - secretKey: S3_INSECURE
      remoteRef:
        key: kubernetes/production/integrations
        property: s3_force_path_style
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: kubernetes/production/integrations
        property: loki_s3_access_key_id
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: kubernetes/production/integrations
        property: loki_s3_secret_access_key
