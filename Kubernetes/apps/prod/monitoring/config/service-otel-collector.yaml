# Kubernetes/apps/prod/monitoring/config/service-otel-collector.yaml
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: telemetry-ingestion
    app.kubernetes.io/part-of: monitoring
    security.sinlessgames.io/exposure: cluster-internal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
      appProtocol: grpc

    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
      appProtocol: http

    - name: metrics
      port: 8888
      targetPort: metrics
      protocol: TCP
      appProtocol: http