# Kubernetes/apps/prod/monitoring/config/destinationrule-observability.yaml
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: grafana-mtls
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-mtls
    app.kubernetes.io/component: istio-traffic-policy
    app.kubernetes.io/part-of: monitoring
    security.sinlessgames.io/mtls: strict
spec:
  host: grafana.monitoring.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
