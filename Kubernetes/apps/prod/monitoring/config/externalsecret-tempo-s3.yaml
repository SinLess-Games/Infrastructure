# Kubernetes/apps/prod/monitoring/config/externalsecret-tempo-s3.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tempo-s3-credentials
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tempo-s3-credentials
    app.kubernetes.io/component: object-storage-credentials
    app.kubernetes.io/part-of: tempo
    security.sinlessgames.io/secret-source: vault
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend

  target:
    name: tempo-s3-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: tempo-s3-credentials
          app.kubernetes.io/component: object-storage-credentials
          app.kubernetes.io/part-of: tempo
          security.sinlessgames.io/managed-by: external-secrets

  data:
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: kubernetes/production/integrations
        property: garage_s3_endpoint_internal

    - secretKey: S3_REGION
      remoteRef:
        key: kubernetes/production/integrations
        property: s3_region

    - secretKey: S3_FORCE_PATH_STYLE
      remoteRef:
        key: kubernetes/production/integrations
        property: s3_force_path_style

    - secretKey: S3_INSECURE
      remoteRef:
        key: kubernetes/production/integrations
        property: s3_insecure

    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: kubernetes/production/integrations
        property: tempo_s3_access_key_id

    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: kubernetes/production/integrations
        property: tempo_s3_secret_access_key