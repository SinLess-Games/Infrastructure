          "datasource": {
            "type": "grafana",
            "uid": "-- Grafana --"
          },
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "content": "# Observability Hub\n\nUse this dashboard as the landing page for the production monitoring stack.\n\n- Metrics: `Mimir` and `Prometheus`\n- Logs: `Loki`\n- Traces: `Tempo`\n- Profiles: `Pyroscope`\n- Service mesh topology: [Kiali](https://kiali.sinlessgames.com/kiali)\n\nPrimary routes:\n\n- [Grafana Explore](/explore)\n- [Kiali](https://kiali.sinlessgames.com/kiali)\n- [Loki datasource](/explore?left=%5B%22now-1h%22,%22now%22,%22loki%22,%7B%7D%5D)\n- [Tempo search](/explore?left=%5B%22now-1h%22,%22now%22,%22tempo%22,%7B%7D%5D)",
            "mode": "markdown"
          },
          "pluginVersion": "11.4.0",
          "title": "Entry Points",
          "type": "text"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 6
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count(kube_node_info)",
              "refId": "A"
            }
          ],
          "title": "Total Nodes",
          "type": "stat"
        },
