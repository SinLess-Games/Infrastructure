# Kubernetes/apps/prod/monitoring/grafana/values.yaml

admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

plugins:
  - blackcowmoo-googleanalytics-datasource
  - grafana-googlesheets-datasource
  - marcusolsson-calendar-panel

deploymentStrategy:
  type: RollingUpdate

replicas: 2

persistence:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Loki
        orgId: 1
      - name: Tempo
        orgId: 1
      - name: Pyroscope
        orgId: 1
      - name: Mimir
        orgId: 1
      - name: Alertmanager
        orgId: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST
          manageAlerts: true
          timeInterval: 30s

      - name: Loki
        uid: loki
        type: loki
        url: http://loki-read.monitoring.svc.cluster.local:3100
        access: proxy
        editable: false
        jsonData:
          maxLines: 1000
          derivedFields:
            - name: TraceID
              matcherRegex: '"traceid":"([a-fA-F0-9]+)"'
              datasourceUid: tempo
              url: '$${__value.raw}'

      - name: Tempo
        uid: tempo
        type: tempo
        url: http://tempo-query-frontend.monitoring.svc.cluster.local:3100
        access: proxy
        editable: false
        jsonData:
          serviceMap:
            datasourceUid: mimir
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            filterByTraceID: true
          tracesToMetrics:
            datasourceUid: mimir
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
          tracesToProfiles:
            datasourceUid: pyroscope
            profileTypeId: process_cpu:cpu:nanoseconds:cpu:nanoseconds
          search:
            hide: false
          nodeGraph:
            enabled: true

      - name: Pyroscope
        uid: pyroscope
        type: grafana-pyroscope-datasource
        url: http://pyroscope.monitoring.svc.cluster.local:4040
        access: proxy
        editable: false

      - name: Mimir
        uid: mimir
        type: prometheus
        url: http://mimir-nginx.monitoring.svc.cluster.local/prometheus
        access: proxy
        editable: false
        jsonData:
          httpMethod: POST
          manageAlerts: false
          timeInterval: 30s
          exemplarTraceIdDestinations:
            - datasourceUid: tempo
              name: trace_id

      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
        access: proxy
        editable: false
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: true

env:
  GF_SERVER_ROOT_URL: https://grafana.sinlessgames.com
  GF_SERVER_DOMAIN: grafana.sinlessgames.com
  GF_SERVER_SERVE_FROM_SUB_PATH: "false"

  GF_DATABASE_TYPE: postgres
  GF_DATABASE_HOST: 10.10.40.50:5432
  GF_DATABASE_NAME: grafana
  GF_DATABASE_USER: grafana
  GF_DATABASE_SSL_MODE: require

  GF_ANALYTICS_REPORTING_ENABLED: "false"
  GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
  GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"

  GF_SECURITY_COOKIE_SECURE: "true"
  GF_SECURITY_COOKIE_SAMESITE: strict
  GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
  GF_SECURITY_STRICT_TRANSPORT_SECURITY_MAX_AGE_SECONDS: "31536000"
  GF_SECURITY_CONTENT_TYPE_PROTECTION: "true"
  GF_SECURITY_X_CONTENT_TYPE_OPTIONS: nosniff
  GF_SECURITY_X_XSS_PROTECTION: "true"

  GF_USERS_VIEWERS_CAN_EDIT: "false"
  GF_USERS_ALLOW_SIGN_UP: "false"
  GF_AUTH_ANONYMOUS_ENABLED: "false"

  GF_PANELS_DISABLE_SANITIZE_HTML: "false"

envValueFrom:
  GF_DATABASE_PASSWORD:
    secretKeyRef:
      name: grafana-admin
      key: postgres_grafana_password
  DISCORD_WEBHOOK_URL:
    secretKeyRef:
      name: grafana-admin
      key: discord_alert_webhook_url

extraConfigmapMounts:
  - name: grafana-nsswitch
    configMap: grafana-nsswitch
    mountPath: /etc/nsswitch.conf
    subPath: nsswitch.conf
    readOnly: true

  - name: grafana-alerting
    configMap: grafana-alerting
    mountPath: /etc/grafana/provisioning/alerting
    readOnly: true

grafana.ini:
  users:
    viewers_can_edit: false
    allow_sign_up: false

  auth.anonymous:
    enabled: false

  panels:
    disable_sanitize_html: false

  security:
    cookie_secure: true
    cookie_samesite: strict
    strict_transport_security: true
    strict_transport_security_max_age_seconds: 31536000
    content_type_protection: true
    x_content_type_options: nosniff
    x_xss_protection: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: sidecarProvider
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /dashboards
          foldersFromFilesStructure: true

sidecar:
  dashboards:
    enabled: true
    searchNamespace: monitoring
    label: grafana_dashboard
    labelValue: "1"
    folder: /dashboards
    folderAnnotation: grafana_folder
    provider:
      name: sidecarProvider
      orgid: 1
      folder: ""
      disableDelete: false
      allowUiUpdates: false
      foldersFromFilesStructure: true

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack

serviceAccount:
  create: true
  name: grafana
  automountServiceAccountToken: false

automountServiceAccountToken: false

podLabels:
  app.kubernetes.io/name: grafana
  app.kubernetes.io/component: dashboard
  app.kubernetes.io/part-of: monitoring
  security.sinlessgames.io/zone: monitoring

securityContext:
  runAsNonRoot: true
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi