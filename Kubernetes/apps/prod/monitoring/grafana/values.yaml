admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: grafana_admin_password
plugins:
  - blackcowmoo-googleanalytics-datasource
  - grafana-googlesheets-datasource
  - marcusolsson-calendar-panel
  - chaosmeshorg-chaos-mesh-grafana
  - grafana-gcp-status-datasource
  - grafana-github-datasource
  - grafana-advisor-app
  - grafana-assistant-app
  - grafana-metricsdrilldown-app
  - grafana-pyroscope-app
  - grafana-exploretraces-app
  - grafana-llm-app
  - geeks-r-us-mqtt-panel
  - grafana-sentry-datasource
persistence:
  enabled: true
  storageClassName: longhorn
  size: 20Gi
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        jsonData:
          httpMethod: POST
          manageAlerts: false
      - name: Loki
        uid: loki
        type: loki
        url: http://loki-gateway.monitoring.svc.cluster.local
        access: proxy
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"traceid":"([a-fA-F0-9]+)"'
              datasourceUid: tempo
              url: '$${__value.raw}'
      - name: Tempo
        uid: tempo
        type: tempo
        url: http://tempo-query-frontend.monitoring.svc.cluster.local:3100
        access: proxy
        jsonData:
          serviceMap:
            datasourceUid: mimir
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            filterByTraceID: true
          tracesToMetrics:
            datasourceUid: mimir
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
          tracesToProfiles:
            datasourceUid: pyroscope
            profileTypeId: process_cpu:cpu:nanoseconds:cpu:nanoseconds
          search:
            hide: false
          nodeGraph:
            enabled: true
      - name: Pyroscope
        uid: pyroscope
        type: grafana-pyroscope-datasource
        url: http://pyroscope.monitoring.svc.cluster.local:4040
        access: proxy
      - name: Mimir
        uid: mimir
        type: prometheus
        url: http://mimir-nginx.monitoring.svc.cluster.local/prometheus
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST
          manageAlerts: false
          exemplarTraceIdDestinations:
            - datasourceUid: tempo
              name: trace_id
      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
        access: proxy
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: true
env:
  GF_SERVER_ROOT_URL: https://grafana.sinlessgames.com
extraConfigmapMounts:
  - name: grafana-nsswitch
    configMap: grafana-nsswitch
    mountPath: /etc/nsswitch.conf
    subPath: nsswitch.conf
    readOnly: true
grafana.ini:
  users:
    viewers_can_edit: false
  panels:
    disable_sanitize_html: true
sidecar:
  dashboards:
    enabled: true
    searchNamespace: monitoring
    label: grafana_dashboard
    provider:
      name: sidecarProvider
      folder: Platform
      orgid: 1
      disableDelete: false
      allowUiUpdates: false
serviceMonitor:
  enabled: true
