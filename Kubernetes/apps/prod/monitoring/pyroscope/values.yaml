pyroscope:
  storage:
    backend: s3
    s3:
      bucket_name: k8s-prod-pyroscope
      endpoint: ${S3_ENDPOINT}
      access_key_id: ${S3_ACCESS_KEY_ID}
      secret_access_key: ${S3_SECRET_ACCESS_KEY}
components:
  querier:
    replicaCount: 2
  ingester:
    replicaCount: 3
serviceMonitor:
  enabled: true
