pyroscope:
  extraArgs:
    log.level: debug
    config.expand-env: "true"
  extraEnvFrom:
    - secretRef:
        name: pyroscope-s3-credentials
  structuredConfig:
    storage:
      backend: s3
      s3:
        bucket_name: k8s-prod-pyroscope
        endpoint: ${S3_ENDPOINT}
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
        insecure: true
components:
  querier:
    replicaCount: 2
  ingester:
    replicaCount: 3
serviceMonitor:
  enabled: true
