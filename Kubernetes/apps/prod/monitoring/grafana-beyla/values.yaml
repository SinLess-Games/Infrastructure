config:
  data:
    beyla-config.yml: |
      discovery:
        services:
          - namespace: helix-ai
          - namespace: sinless-games
      otel_metrics_export:
        endpoint: http://otel-collector.monitoring.svc.cluster.local:4318
      otel_traces_export:
        endpoint: http://otel-collector.monitoring.svc.cluster.local:4318
daemonset:
  enabled: true
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
serviceMonitor:
  enabled: true
