# Kubernetes/apps/prod/monitoring/mimir/values.yaml

global:
  extraEnvFrom:
    - secretRef:
        name: mimir-s3-credentials

minio:
  enabled: false

mimir:
  structuredConfig:
    multitenancy_enabled: false

    limits:
      max_global_series_per_user: 500000
      ingestion_rate: 100000
      ingestion_burst_size: 200000

    common:
      storage:
        backend: s3
        s3:
          endpoint: ${S3_ENDPOINT}
          region: ${S3_REGION}
          bucket_name: k8s-prod-mimir
          access_key_id: ${S3_ACCESS_KEY_ID}
          secret_access_key: ${S3_SECRET_ACCESS_KEY}
          insecure: true
          bucket_lookup_type: path

    blocks_storage:
      backend: s3
      storage_prefix: blocks
      bucket_store:
        sync_dir: /data/tsdb-sync
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION}
        bucket_name: k8s-prod-mimir
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
        insecure: true
        bucket_lookup_type: path
      tsdb:
        dir: /data/tsdb

    alertmanager_storage:
      backend: s3
      storage_prefix: alertmanager
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION}
        bucket_name: k8s-prod-mimir
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
        insecure: true
        bucket_lookup_type: path

    ruler_storage:
      backend: s3
      storage_prefix: ruler
      s3:
        endpoint: ${S3_ENDPOINT}
        region: ${S3_REGION}
        bucket_name: k8s-prod-mimir
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
        insecure: true
        bucket_lookup_type: path

nginx:
  nginxConfig:
    resolver: 10.43.0.10

gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingester:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

distributor:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

querier:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

query_frontend:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

store_gateway:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    storageClass: longhorn
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

ruler:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

alertmanager:
  enabled: false

metaMonitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
