mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: ${S3_ENDPOINT}
          region: ${S3_REGION}
          bucket_name: k8s-prod-mimir
          access_key_id: ${S3_ACCESS_KEY_ID}
          secret_access_key: ${S3_SECRET_ACCESS_KEY}
gateway:
  enabled: true
ingester:
  replicas: 3
store_gateway:
  replicas: 3
ruler:
  enabled: true
metaMonitoring:
  serviceMonitor:
    enabled: true
