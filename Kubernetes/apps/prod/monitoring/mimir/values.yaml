mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: garage-s3.sinless-games.svc.cluster.local:3900
          region: us-east-1
          bucket_name: k8s-prod-mimir
          access_key_id: ${S3_ACCESS_KEY_ID}
          secret_access_key: ${S3_SECRET_ACCESS_KEY}
          insecure: true
    blocks_storage:
      backend: s3
      storage_prefix: blocks
      bucket_store:
        sync_dir: /data/tsdb-sync
      s3:
        endpoint: garage-s3.sinless-games.svc.cluster.local:3900
        region: us-east-1
        bucket_name: k8s-prod-mimir
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
        insecure: true
      tsdb:
        dir: /data/tsdb
    alertmanager_storage:
      backend: s3
      storage_prefix: alertmanager
      s3:
        endpoint: garage-s3.sinless-games.svc.cluster.local:3900
        region: us-east-1
        bucket_name: k8s-prod-mimir
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
        insecure: true
    ruler_storage:
      backend: s3
      storage_prefix: ruler
      s3:
        endpoint: garage-s3.sinless-games.svc.cluster.local:3900
        region: us-east-1
        bucket_name: k8s-prod-mimir
        access_key_id: ${S3_ACCESS_KEY_ID}
        secret_access_key: ${S3_SECRET_ACCESS_KEY}
        insecure: true
global:
  extraEnvFrom:
    - secretRef:
        name: mimir-s3-credentials
minio:
  enabled: false
nginx:
  nginxConfig:
    resolver: 10.43.0.10
gateway:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
ingester:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
distributor:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
querier:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
query_frontend:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
store_gateway:
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
compactor:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
ruler:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
metaMonitoring:
  serviceMonitor:
    enabled: true
