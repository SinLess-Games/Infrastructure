# Kubernetes/apps/prod/monitoring/loki/values.yaml

deploymentMode: SimpleScalable

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 2

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: k8s-prod-loki
      ruler: k8s-prod-loki
      admin: k8s-prod-loki
    s3:
      endpoint: ${S3_ENDPOINT}
      region: ${S3_REGION}
      accessKeyId: ${S3_ACCESS_KEY_ID}
      secretAccessKey: ${S3_SECRET_ACCESS_KEY}
      s3forcepathstyle: true
      insecure: false

singleBinary:
  replicas: 0

write:
  replicas: 2
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

read:
  replicas: 2
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

backend:
  replicas: 2
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

gateway:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  nginxConfig:
    resolver: 10.43.0.10

monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

chunksCache:
  enabled: false

resultsCache:
  enabled: false

test:
  enabled: false