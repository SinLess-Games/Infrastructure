loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  storage:
    type: s3
    bucketNames:
      chunks: k8s-prod-loki
      ruler: k8s-prod-loki
      admin: k8s-prod-loki
    s3:
      endpoint: ${S3_ENDPOINT}
      region: ${S3_REGION}
      accessKeyId: ${S3_ACCESS_KEY_ID}
      secretAccessKey: ${S3_SECRET_ACCESS_KEY}
singleBinary:
  replicas: 0
write:
  replicas: 3
read:
  replicas: 2
backend:
  replicas: 2
monitoring:
  serviceMonitor:
    enabled: true
