loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: k8s-prod-loki
      ruler: k8s-prod-loki
      admin: k8s-prod-loki
    s3:
      endpoint: garage-s3.sinless-games.svc.cluster.local:3900
      region: us-east-1
      accessKeyId: ${S3_ACCESS_KEY_ID}
      secretAccessKey: ${S3_SECRET_ACCESS_KEY}
singleBinary:
  replicas: 0
write:
  replicas: 3
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
read:
  replicas: 2
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
backend:
  replicas: 2
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
gateway:
  nginxConfig:
    resolver: 10.43.0.10
monitoring:
  serviceMonitor:
    enabled: true
