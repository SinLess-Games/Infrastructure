# Kubernetes/apps/prod/monitoring/namespace/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    kubernetes.io/metadata.name: monitoring

    # Istio sidecar injection for observability services.
    istio-injection: enabled

    # Pod Security Admission
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest

    # Allow hardened Prometheus selectors to discover monitors/rules here.
    monitoring.sinlessgames.io/scrape: "true"
    monitoring.sinlessgames.io/rules: "true"

    # Environment / ownership
    topology.kubernetes.io/environment: prod
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: platform
    security.sinlessgames.io/zone: observability