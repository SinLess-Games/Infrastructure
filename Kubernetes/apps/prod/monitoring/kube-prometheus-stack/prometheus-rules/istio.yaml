# Kubernetes/apps/prod/monitoring/kube-prometheus-stack/prometheus-rules/istio.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-istio
  namespace: monitoring
  labels:
    app.kubernetes.io/name: istio-rules
    app.kubernetes.io/component: prometheus-rules
    app.kubernetes.io/part-of: monitoring
    release: kube-prometheus-stack
    security.sinlessgames.io/policy: monitored
spec:
  groups:
    - name: istio.control-plane
      rules:
        - alert: IstioIngressGatewayAvailabilityDrop
          expr: |
            min without (instance, pod) (
              kube_deployment_status_replicas_available{
                namespace="istio-system",
                deployment=~"istio-ingressgateway|istio-ingress"
              }
            ) < 2
          for: 5m
          labels:
            severity: warning
            component: istio
          annotations:
            summary: "Istio ingress gateway availability is low"
            description: |
              Istio ingress gateway has only {{ $value }} available pod(s).

              Inbound traffic may be affected.

              Value: {{ $value }}

        - alert: IstioPilotHighPushErrorRate
          expr: |
            (
              sum(rate(pilot_xds_push_errors[5m]))
              /
              sum(rate(pilot_xds_pushes[5m]))
            ) * 100 > 5
            and
            sum(rate(pilot_xds_pushes[5m])) > 0
          for: 5m
          labels:
            severity: warning
            component: istiod
          annotations:
            summary: "Istio Pilot XDS push error rate is high"
            description: |
              Istio Pilot XDS push error rate is above 5%.

              Envoy sidecars may have stale or invalid configuration.

              Error percentage: {{ $value }}

        - alert: IstioPilotDuplicateEntry
          expr: sum(pilot_duplicate_envoy_clusters) > 0
          for: 5m
          labels:
            severity: critical
            component: istiod
          annotations:
            summary: "Istio Pilot has duplicate Envoy clusters"
            description: |
              Istio Pilot detected duplicate Envoy cluster entries.

              This usually points to misconfigured DestinationRules, ServiceEntries, or overlapping service definitions.

              Duplicate clusters: {{ $value }}

    - name: istio.traffic-errors
      rules:
        - alert: IstioHttp4xxErrorsHigh
          expr: |
            sum by (destination_workload_namespace, destination_canonical_service, response_code) (
              increase(istio_requests_total{
                reporter="destination",
                response_code=~"4.."
              }[15m])
            ) > 100
          for: 10m
          labels:
            severity: warning
            component: istio
          annotations:
            summary: "Istio 4xx errors are high for {{ $labels.destination_canonical_service }}"
            description: |
              Istio observed more than 100 HTTP 4xx responses in 15 minutes.

              Namespace: {{ $labels.destination_workload_namespace }}
              Service: {{ $labels.destination_canonical_service }}
              Response code: {{ $labels.response_code }}
              Count: {{ $value }}

        - alert: IstioHttp5xxErrorsHigh
          expr: |
            sum by (destination_workload_namespace, destination_canonical_service, response_code) (
              increase(istio_requests_total{
                reporter="destination",
                response_code=~"5.."
              }[5m])
            ) > 25
          for: 5m
          labels:
            severity: critical
            component: istio
          annotations:
            summary: "Istio 5xx errors are high for {{ $labels.destination_canonical_service }}"
            description: |
              Istio observed more than 25 HTTP 5xx responses in 5 minutes.

              Namespace: {{ $labels.destination_workload_namespace }}
              Service: {{ $labels.destination_canonical_service }}
              Response code: {{ $labels.response_code }}
              Count: {{ $value }}

        - alert: IstioHttp4xxAnd5xxErrorsHigh
          expr: |
            sum by (destination_workload_namespace, destination_canonical_service) (
              increase(istio_requests_total{
                reporter="destination",
                response_code=~"4..|5.."
              }[10m])
            ) > 150
          for: 10m
          labels:
            severity: warning
            component: istio
          annotations:
            summary: "Istio combined 4xx/5xx errors are high for {{ $labels.destination_canonical_service }}"
            description: |
              Istio observed more than 150 combined HTTP 4xx and 5xx responses in 10 minutes.

              Namespace: {{ $labels.destination_workload_namespace }}
              Service: {{ $labels.destination_canonical_service }}
              Combined error count: {{ $value }}

    - name: istio.latency
      rules:
        - alert: IstioAverageRequestLatencyHigh
          expr: |
            (
              sum by (destination_workload_namespace, destination_canonical_service) (
                rate(istio_request_duration_milliseconds_sum{reporter="destination"}[5m])
              )
              /
              sum by (destination_workload_namespace, destination_canonical_service) (
                rate(istio_request_duration_milliseconds_count{reporter="destination"}[5m])
              )
            ) > 500
          for: 10m
          labels:
            severity: warning
            component: istio
          annotations:
            summary: "Istio average request latency is high for {{ $labels.destination_canonical_service }}"
            description: |
              Istio average request latency is above 500ms.

              Namespace: {{ $labels.destination_workload_namespace }}
              Service: {{ $labels.destination_canonical_service }}
              Average latency ms: {{ $value }}

        - alert: IstioP99RequestLatencyHigh
          expr: |
            histogram_quantile(
              0.99,
              sum by (destination_workload_namespace, destination_canonical_service, le) (
                rate(istio_request_duration_milliseconds_bucket{reporter="destination"}[5m])
              )
            ) > 1000
          for: 10m
          labels:
            severity: warning
            component: istio
          annotations:
            summary: "Istio p99 request latency is high for {{ $labels.destination_canonical_service }}"
            description: |
              Istio p99 request latency is above 1000ms.

              Namespace: {{ $labels.destination_workload_namespace }}
              Service: {{ $labels.destination_canonical_service }}
              P99 latency ms: {{ $value }}

    - name: istio.mtls-security
      rules:
        - alert: IstioPlaintextTrafficDetected
          expr: |
            sum by (destination_workload_namespace, destination_canonical_service, connection_security_policy) (
              increase(istio_requests_total{
                reporter="destination",
                connection_security_policy!="mutual_tls"
              }[15m])
            ) > 0
          for: 10m
          labels:
            severity: critical
            component: istio
            security: mtls
          annotations:
            summary: "Istio plaintext or non-mTLS traffic detected"
            description: |
              Istio detected destination traffic that was not using mutual TLS.

              Namespace: {{ $labels.destination_workload_namespace }}
              Service: {{ $labels.destination_canonical_service }}
              Connection security policy: {{ $labels.connection_security_policy }}
              Request count: {{ $value }}

        - alert: IstioMutualTlsTrafficMissing
          expr: |
            sum by (destination_workload_namespace, destination_canonical_service) (
              increase(istio_requests_total{
                reporter="destination",
                connection_security_policy="mutual_tls"
              }[15m])
            ) == 0
            and
            sum by (destination_workload_namespace, destination_canonical_service) (
              increase(istio_requests_total{
                reporter="destination"
              }[15m])
            ) > 0
          for: 10m
          labels:
            severity: critical
            component: istio
            security: mtls
          annotations:
            summary: "Istio service has traffic but no mTLS traffic"
            description: |
              A service has destination traffic, but none of it is reported as mutual TLS.

              Namespace: {{ $labels.destination_workload_namespace }}
              Service: {{ $labels.destination_canonical_service }}

              This may indicate a sidecar injection issue, a DestinationRule exception, or traffic bypassing the mesh.

    - name: istio.request-volume
      rules:
        - alert: IstioHighTotalRequestRate
          expr: |
            sum(rate(istio_requests_total{reporter="destination"}[5m])) > 1000
          for: 10m
          labels:
            severity: info
            component: istio
          annotations:
            summary: "Istio total request rate is high"
            description: |
              Global service mesh request rate is above 1000 requests/second.

              Request rate: {{ $value }}