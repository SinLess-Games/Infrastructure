# Kubernetes/apps/prod/monitoring/kube-prometheus-stack/prometheus-rules/nats-exporter.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-nats-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: nats-exporter-rules
    app.kubernetes.io/component: prometheus-rules
    app.kubernetes.io/part-of: monitoring
    release: kube-prometheus-stack
    security.sinlessgames.io/policy: monitored
spec:
  groups:
    - name: nats.server-health
      rules:
        - alert: NatsServerDown
          expr: absent(up{job=~".*nats.*"} == 1)
          for: 5m
          labels:
            severity: critical
            component: nats
          annotations:
            summary: "NATS exporter target is absent"
            description: |
              Prometheus has not seen a healthy NATS target for more than 5 minutes.

              Check the NATS ServiceMonitor, exporter pod, service labels, and NATS server health.

        - alert: NatsHighCpuUsage
          expr: gnatsd_varz_cpu > 80
          for: 5m
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "NATS CPU usage is high: {{ $labels.instance }}"
            description: |
              NATS server CPU usage is above 80%.

              Instance: {{ $labels.instance }}
              CPU percentage: {{ $value }}

        - alert: NatsHighMemoryUsage
          expr: gnatsd_varz_mem > 512 * 1024 * 1024
          for: 5m
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "NATS memory usage is high: {{ $labels.instance }}"
            description: |
              NATS server memory usage is above 512Mi.

              Instance: {{ $labels.instance }}
              Memory bytes: {{ $value }}

        - alert: NatsSlowConsumers
          expr: increase(gnatsd_varz_slow_consumers[5m]) > 0
          for: 3m
          labels:
            severity: critical
            component: nats
          annotations:
            summary: "NATS slow consumers detected: {{ $labels.instance }}"
            description: |
              NATS has detected slow consumers.

              Instance: {{ $labels.instance }}
              Slow consumer events in window: {{ $value }}

        - alert: NatsHighRoutesCount
          expr: gnatsd_varz_routes > 10
          for: 5m
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "NATS route count is high: {{ $labels.instance }}"
            description: |
              NATS has more than 10 routes.

              Instance: {{ $labels.instance }}
              Route count: {{ $value }}

    - name: nats.connections
      rules:
        - alert: NatsHighNumberOfConnections
          expr: gnatsd_connz_num_connections > 1000
          for: 5m
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "NATS connection count is high: {{ $labels.instance }}"
            description: |
              NATS has more than 1000 active client connections.

              Instance: {{ $labels.instance }}
              Connections: {{ $value }}

        - alert: NatsHighNumberOfSubscriptions
          expr: gnatsd_varz_subscriptions > 1000
          for: 5m
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "NATS subscription count is high: {{ $labels.instance }}"
            description: |
              NATS has more than 1000 active subscriptions.

              Instance: {{ $labels.instance }}
              Subscriptions: {{ $value }}

        - alert: NatsHighPendingBytes
          expr: gnatsd_connz_pending_bytes > 1048576
          for: 5m
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "NATS pending bytes are high: {{ $labels.instance }}"
            description: |
              NATS has more than 1MiB of pending client bytes.

              Instance: {{ $labels.instance }}
              Pending bytes: {{ $value }}

    - name: nats.jetstream
      rules:
        - alert: NatsHighJetstreamStoreUsage
          expr: |
            (
              gnatsd_varz_jetstream_stats_storage
              /
              gnatsd_varz_jetstream_config_max_storage
            ) > 0.8
            and
            gnatsd_varz_jetstream_config_max_storage > 0
          for: 5m
          labels:
            severity: warning
            component: nats
            subsystem: jetstream
          annotations:
            summary: "NATS JetStream storage usage is high: {{ $labels.instance }}"
            description: |
              JetStream storage usage is above 80%.

              Instance: {{ $labels.instance }}
              Usage ratio: {{ $value }}

        - alert: NatsCriticalJetstreamStoreUsage
          expr: |
            (
              gnatsd_varz_jetstream_stats_storage
              /
              gnatsd_varz_jetstream_config_max_storage
            ) > 0.9
            and
            gnatsd_varz_jetstream_config_max_storage > 0
          for: 5m
          labels:
            severity: critical
            component: nats
            subsystem: jetstream
          annotations:
            summary: "NATS JetStream storage usage is critical: {{ $labels.instance }}"
            description: |
              JetStream storage usage is above 90%.

              Instance: {{ $labels.instance }}
              Usage ratio: {{ $value }}

        - alert: NatsHighJetstreamMemoryUsage
          expr: |
            (
              gnatsd_varz_jetstream_stats_memory
              /
              gnatsd_varz_jetstream_config_max_memory
            ) > 0.8
            and
            gnatsd_varz_jetstream_config_max_memory > 0
          for: 5m
          labels:
            severity: warning
            component: nats
            subsystem: jetstream
          annotations:
            summary: "NATS JetStream memory usage is high: {{ $labels.instance }}"
            description: |
              JetStream memory usage is above 80%.

              Instance: {{ $labels.instance }}
              Usage ratio: {{ $value }}

        - alert: NatsCriticalJetstreamMemoryUsage
          expr: |
            (
              gnatsd_varz_jetstream_stats_memory
              /
              gnatsd_varz_jetstream_config_max_memory
            ) > 0.9
            and
            gnatsd_varz_jetstream_config_max_memory > 0
          for: 5m
          labels:
            severity: critical
            component: nats
            subsystem: jetstream
          annotations:
            summary: "NATS JetStream memory usage is critical: {{ $labels.instance }}"
            description: |
              JetStream memory usage is above 90%.

              Instance: {{ $labels.instance }}
              Usage ratio: {{ $value }}

        - alert: NatsJetstreamApiErrors
          expr: increase(gnatsd_varz_jetstream_stats_api_errors[5m]) > 5
          for: 5m
          labels:
            severity: warning
            component: nats
            subsystem: jetstream
          annotations:
            summary: "NATS JetStream API errors are high: {{ $labels.instance }}"
            description: |
              NATS has seen more than 5 JetStream API errors in 5 minutes.

              Instance: {{ $labels.instance }}
              Error count: {{ $value }}

        - alert: NatsJetstreamAccountsHigh
          expr: sum(gnatsd_varz_jetstream_stats_accounts) > 100
          for: 5m
          labels:
            severity: warning
            component: nats
            subsystem: jetstream
          annotations:
            summary: "NATS JetStream account count is high"
            description: |
              JetStream has more than 100 active accounts.

              Account count: {{ $value }}