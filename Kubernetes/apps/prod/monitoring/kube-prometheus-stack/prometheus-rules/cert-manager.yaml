# Kubernetes/apps/prod/monitoring/kube-prometheus-stack/prometheus-rules/cert-manager.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-cert-manager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cert-manager-rules
    app.kubernetes.io/component: prometheus-rules
    app.kubernetes.io/part-of: monitoring
    release: kube-prometheus-stack
    security.sinlessgames.io/policy: monitored
spec:
  groups:
    - name: cert-manager.health
      rules:
        - alert: CertManagerAbsent
          expr: absent(up{job="cert-manager"} == 1)
          for: 10m
          labels:
            severity: critical
            component: cert-manager
          annotations:
            summary: "cert-manager is absent from Prometheus targets"
            description: |
              cert-manager has disappeared from Prometheus service discovery.

              New certificates may not be issued, and existing certificates may not renew until cert-manager is healthy again.

              Value: {{ $value }}

        - alert: CertManagerCertificateExpiringSoon
          expr: |
            avg by (exported_namespace, namespace, name) (
              certmanager_certificate_expiration_timestamp_seconds - time()
            ) < 21 * 24 * 3600
          for: 1h
          labels:
            severity: warning
            component: cert-manager
          annotations:
            summary: "Certificate is expiring soon: {{ $labels.name }}"
            description: |
              Certificate {{ $labels.name }} in namespace {{ $labels.exported_namespace }} expires in less than 21 days.

              Certificate namespace: {{ $labels.exported_namespace }}
              Metric namespace: {{ $labels.namespace }}
              Remaining seconds: {{ $value }}

        - alert: CertManagerCertificateExpiringVerySoon
          expr: |
            avg by (exported_namespace, namespace, name) (
              certmanager_certificate_expiration_timestamp_seconds - time()
            ) < 7 * 24 * 3600
          for: 30m
          labels:
            severity: critical
            component: cert-manager
          annotations:
            summary: "Certificate is expiring very soon: {{ $labels.name }}"
            description: |
              Certificate {{ $labels.name }} in namespace {{ $labels.exported_namespace }} expires in less than 7 days.

              Certificate namespace: {{ $labels.exported_namespace }}
              Metric namespace: {{ $labels.namespace }}
              Remaining seconds: {{ $value }}

        - alert: CertManagerCertificateNotReady
          expr: |
            max by (name, exported_namespace, namespace, condition) (
              certmanager_certificate_ready_status{condition!="True"} == 1
            )
          for: 10m
          labels:
            severity: critical
            component: cert-manager
          annotations:
            summary: "Certificate is not ready: {{ $labels.name }}"
            description: |
              Certificate {{ $labels.name }} in namespace {{ $labels.exported_namespace }} is not ready.

              Certificate namespace: {{ $labels.exported_namespace }}
              Metric namespace: {{ $labels.namespace }}
              Condition: {{ $labels.condition }}
              Value: {{ $value }}

        - alert: CertManagerHittingAcmeRateLimits
          expr: |
            sum by (host) (
              rate(certmanager_acme_client_request_count{status="429"}[5m])
            ) > 0
          for: 5m
          labels:
            severity: critical
            component: cert-manager
          annotations:
            summary: "cert-manager is hitting ACME rate limits"
            description: |
              cert-manager is being rate-limited by the ACME provider.

              Host: {{ $labels.host }}
              Certificate issuance and renewal may be blocked until the ACME provider rate limit resets.

              Value: {{ $value }}