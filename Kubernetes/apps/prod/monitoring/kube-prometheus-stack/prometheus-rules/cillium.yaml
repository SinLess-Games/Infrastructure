# Kubernetes/apps/prod/monitoring/kube-prometheus-stack/prometheus-rules/cilium.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-cilium
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cilium-rules
    app.kubernetes.io/component: prometheus-rules
    app.kubernetes.io/part-of: monitoring
    release: kube-prometheus-stack
    security.sinlessgames.io/policy: monitored
spec:
  groups:
    - name: cilium.agent-health
      rules:
        - alert: CiliumAgentUnreachableNodes
          expr: sum by (pod) (cilium_unreachable_nodes) > 0
          for: 15m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium agent has unreachable nodes: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} cannot reach {{ $value }} node(s).

              This may indicate node networking, routing, CNI, or host firewall issues.

              Value: {{ $value }}

        - alert: CiliumAgentUnreachableHealthEndpoints
          expr: sum by (pod) (cilium_unreachable_health_endpoints) > 0
          for: 15m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium agent has unreachable health endpoints: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} cannot reach {{ $value }} health endpoint(s).

              Node-to-node health probes are failing.

              Value: {{ $value }}

        - alert: CiliumAgentFailingControllers
          expr: sum by (pod) (cilium_controllers_failing) > 0
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium agent has failing controllers: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} has {{ $value }} failing controller(s).

              Check cilium-agent logs on the affected node.

              Value: {{ $value }}

        - alert: CiliumAgentEndpointInvalid
          expr: sum by (pod) (cilium_endpoint_state{endpoint_state="invalid"}) > 0
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium agent has invalid endpoints: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} has {{ $value }} endpoint(s) in invalid state.

              Pod networking or policy enforcement may be degraded.

              Value: {{ $value }}

        - alert: CiliumAgentEndpointRegenerationFailures
          expr: sum by (pod) (rate(cilium_endpoint_regenerations_total{outcome="fail"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium endpoint regeneration failures: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is failing to regenerate endpoints.

              Network policy enforcement may be stale or incomplete.

              Value: {{ $value }}

        - alert: CiliumAgentEndpointUpdateFailures
          expr: |
            sum by (pod, method, return_code) (
              rate(cilium_k8s_client_api_calls_total{
                method=~"PUT|POST|PATCH",
                endpoint="endpoint",
                return_code!~"2.."
              }[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium endpoint update API failures: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is failing Kubernetes endpoint update API calls.

              Method: {{ $labels.method }}
              Return code: {{ $labels.return_code }}
              Value: {{ $value }}

        - alert: CiliumAgentEndpointCreateFailures
          expr: |
            sum by (pod, api_call) (
              rate(cilium_api_limiter_processed_requests_total{
                api_call="endpoint-create",
                outcome="fail"
              }[1m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium endpoint create failures: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is failing CNI endpoint-create calls.

              New pods may fail to receive networking.

              API call: {{ $labels.api_call }}
              Value: {{ $value }}

    - name: cilium.datapath
      rules:
        - alert: CiliumAgentBpfMapOperationFailures
          expr: sum by (pod, map_name) (rate(cilium_bpf_map_ops_total{outcome="fail"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium BPF map operation failures: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} has eBPF map operation failures.

              Map: {{ $labels.map_name }}
              Value: {{ $value }}

        - alert: CiliumAgentBpfMapPressureHigh
          expr: cilium_bpf_map_pressure > 0.9
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium BPF map pressure high: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} has high eBPF map pressure.

              Map: {{ $labels.map_name }}
              Current pressure: {{ $value }}

        - alert: CiliumAgentConntrackTableFull
          expr: "sum by (pod) (rate(cilium_drop_count_total{reason='CT: Map insertion failed'}[5m])) > 0"
          for: 5m
          labels:
            severity: critical
            component: cilium
          annotations:
            summary: "Cilium conntrack table appears full: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is dropping packets because conntrack map insertion failed.

              Investigate connection churn, leaking clients, or CT map sizing.

              Value: {{ $value }}

        - alert: CiliumAgentConntrackGarbageCollectionFailures
          expr: sum by (pod) (rate(cilium_datapath_conntrack_gc_runs_total{status="uncompleted"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium conntrack garbage collection failures: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} has uncompleted conntrack garbage collection runs.

              Stale conntrack entries may accumulate.

              Value: {{ $value }}

        - alert: CiliumAgentNatMasqueradeFailures
          expr: sum by (pod) (rate(cilium_drop_count_total{reason="No mapping for NAT masquerade"}[1m])) > 0
          for: 5m
          labels:
            severity: critical
            component: cilium
          annotations:
            summary: "Cilium NAT masquerade failures: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is dropping packets due to missing NAT masquerade mappings.

              This may indicate NAT map pressure or datapath issues.

              Value: {{ $value }}

        - alert: CiliumAgentUnexpectedPacketDrops
          expr: sum by (pod, reason) (rate(cilium_drop_count_total{reason!="Policy denied"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium unexpected packet drops: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is dropping packets for a non-policy reason.

              Reason: {{ $labels.reason }}
              Value: {{ $value }}

        - alert: CiliumAgentPolicyDeniedTraffic
          expr: sum by (pod) (rate(cilium_drop_count_total{reason="Policy denied"}[5m])) > 1
          for: 10m
          labels:
            severity: info
            component: cilium
          annotations:
            summary: "Cilium policy denied traffic observed: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is dropping traffic due to policy denial.

              This may be expected in a strict network-policy environment. Investigate if unexpected.

              Value: {{ $value }}

    - name: cilium.policy
      rules:
        - alert: CiliumAgentPolicyMapPressureHigh
          expr: sum by (pod) (cilium_bpf_map_pressure{map_name=~"cilium_policy_.*"}) > 0.9
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium policy map pressure high: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} policy BPF map pressure is above 90%.

              New policy entries may fail to apply.

              Value: {{ $value }}

        - alert: CiliumAgentPolicyImportErrors
          expr: sum by (pod) (rate(cilium_policy_change_total{outcome="fail"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium policy import errors: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is failing to import policy changes.

              Policy enforcement may be incomplete.

              Value: {{ $value }}

        - alert: CiliumAgentPolicyImplementationDelay
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, pod) (
                rate(cilium_policy_implementation_delay_bucket[5m])
              )
            ) > 60
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium policy implementation delay high: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} has P99 policy implementation latency above 60 seconds.

              Endpoints may run with stale policies.

              Value: {{ $value }}

    - name: cilium.identity
      rules:
        - alert: CiliumNodeLocalIdentityAllocationHigh
          expr: (sum by (pod) (cilium_identity{type="node_local"}) / 65535) > 0.8
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium node-local identity allocation high: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} node-local identity allocation is above 80%.

              Value: {{ $value }}

        - alert: CiliumClusterIdentityAllocationHigh
          expr: (sum(cilium_identity{type="cluster_local"}) / 65280) > 0.8
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium cluster identity allocation high"
            description: |
              Cilium cluster-wide identity allocation is above 80%.

              Value: {{ $value }}

    - name: cilium.operator
      rules:
        - alert: CiliumOperatorIpamExhausted
          expr: sum(cilium_operator_ipam_ips{type="available"}) <= 0
          for: 5m
          labels:
            severity: critical
            component: cilium-operator
          annotations:
            summary: "Cilium operator has exhausted available IPAM IPs"
            description: |
              Cilium operator reports no available IPAM IPs.

              New pods may fail to receive networking.

              Value: {{ $value }}

        - alert: CiliumOperatorIpamLowAvailable
          expr: |
            (
              sum(cilium_operator_ipam_ips{type!="available"})
              /
              sum(cilium_operator_ipam_ips)
            ) > 0.9
            and
            sum(cilium_operator_ipam_ips) > 0
          for: 5m
          labels:
            severity: warning
            component: cilium-operator
          annotations:
            summary: "Cilium operator IPAM pool usage is high"
            description: |
              Cilium operator IPAM pool appears more than 90% utilized.

              Allocate more pod IP capacity before exhaustion.

              Value: {{ $value }}

        - alert: CiliumOperatorIpamInterfaceCreationFailures
          expr: sum(rate(cilium_operator_ipam_interface_creation_ops{status!="success"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            component: cilium-operator
          annotations:
            summary: "Cilium operator IPAM interface creation failures"
            description: |
              Cilium operator is failing to create IPAM interfaces.

              IP allocation may be impacted.

              Value: {{ $value }}

    - name: cilium.api
      rules:
        - alert: CiliumAgentApiErrors
          expr: |
            sum by (pod, return_code) (
              rate(cilium_agent_api_process_time_seconds_count{return_code=~"5.."}[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
            component: cilium
          annotations:
            summary: "Cilium agent API 5xx errors: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} API is returning 5xx errors.

              Return code: {{ $labels.return_code }}
              Value: {{ $value }}

        - alert: CiliumAgentKubernetesClientErrors
          expr: |
            sum by (pod, endpoint, return_code) (
              rate(cilium_k8s_client_api_calls_total{
                endpoint!="metrics",
                return_code!~"2.."
              }[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: info
            component: cilium
          annotations:
            summary: "Cilium Kubernetes API client errors: {{ $labels.pod }}"
            description: |
              Cilium agent {{ $labels.pod }} is receiving errors from the Kubernetes API.

              Endpoint: {{ $labels.endpoint }}
              Return code: {{ $labels.return_code }}
              Value: {{ $value }}