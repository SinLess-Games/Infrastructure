# Kubernetes/apps/prod/monitoring/kube-prometheus-stack/prometheus-rules/postgres-exporter.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-postgres-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: postgres-exporter-rules
    app.kubernetes.io/component: prometheus-rules
    app.kubernetes.io/part-of: monitoring
    release: kube-prometheus-stack
    security.sinlessgames.io/policy: monitored
spec:
  groups:
    - name: postgres.availability
      rules:
        - alert: PostgresqlDown
          expr: pg_up == 0
          for: 2m
          labels:
            severity: critical
            component: postgres
          annotations:
            summary: "PostgreSQL is down: {{ $labels.instance }}"
            description: |
              PostgreSQL exporter reports that the database is down.

              Instance: {{ $labels.instance }}
              Job: {{ $labels.job }}
              Value: {{ $value }}

        - alert: PostgresqlExporterError
          expr: pg_exporter_last_scrape_error > 0
          for: 5m
          labels:
            severity: warning
            component: postgres-exporter
          annotations:
            summary: "PostgreSQL exporter scrape error: {{ $labels.instance }}"
            description: |
              postgres_exporter is reporting scrape errors.

              This may indicate a broken custom query, missing permission, or PostgreSQL connectivity issue.

              Instance: {{ $labels.instance }}
              Value: {{ $value }}

        - alert: PostgresqlRecentlyRestarted
          expr: time() - pg_postmaster_start_time_seconds < 300
          for: 1m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL recently restarted: {{ $labels.instance }}"
            description: |
              PostgreSQL restarted within the last 5 minutes.

              Instance: {{ $labels.instance }}
              Value: {{ $value }}

    - name: postgres.connections
      rules:
        - alert: PostgresqlTooManyConnections
          expr: |
            sum by (instance, job, server) (pg_stat_activity_count)
            >
            min by (instance, job, server) (pg_settings_max_connections * 0.8)
          for: 5m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL connection usage is high: {{ $labels.instance }}"
            description: |
              PostgreSQL is using more than 80% of max_connections.

              Instance: {{ $labels.instance }}
              Server: {{ $labels.server }}
              Active connections: {{ $value }}

        - alert: PostgresqlConnectionsCritical
          expr: |
            sum by (instance, job, server) (pg_stat_activity_count)
            >
            min by (instance, job, server) (pg_settings_max_connections * 0.95)
          for: 2m
          labels:
            severity: critical
            component: postgres
          annotations:
            summary: "PostgreSQL connection usage is critical: {{ $labels.instance }}"
            description: |
              PostgreSQL is using more than 95% of max_connections.

              Instance: {{ $labels.instance }}
              Server: {{ $labels.server }}
              Active connections: {{ $value }}

        - alert: PostgresqlTooManyLocksAcquired
          expr: |
            (
              sum by (instance) (pg_locks_count)
              /
              (
                pg_settings_max_locks_per_transaction
                *
                pg_settings_max_connections
              )
            ) > 0.20
            and
            (
              pg_settings_max_locks_per_transaction
              *
              pg_settings_max_connections
            ) > 0
          for: 5m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL lock usage is high: {{ $labels.instance }}"
            description: |
              PostgreSQL lock usage is above 20% of the theoretical lock capacity.

              Instance: {{ $labels.instance }}
              Value: {{ $value }}

    - name: postgres.transactions
      rules:
        - alert: PostgresqlDeadlocksDetected
          expr: |
            increase(pg_stat_database_deadlocks{
              datname!~"template.*|postgres",
              datid!="0"
            }[5m]) > 0
          for: 5m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL deadlocks detected: {{ $labels.datname }}"
            description: |
              PostgreSQL has detected deadlocks.

              Database: {{ $labels.datname }}
              Instance: {{ $labels.instance }}
              Deadlocks in window: {{ $value }}

        - alert: PostgresqlHighRollbackRate
          expr: |
            (
              sum by (namespace, datname, instance) (
                rate(pg_stat_database_xact_rollback{
                  datname!~"template.*|postgres",
                  datid!="0"
                }[5m])
              )
              /
              (
                sum by (namespace, datname, instance) (
                  rate(pg_stat_database_xact_rollback{
                    datname!~"template.*|postgres",
                    datid!="0"
                  }[5m])
                )
                +
                sum by (namespace, datname, instance) (
                  rate(pg_stat_database_xact_commit{
                    datname!~"template.*|postgres",
                    datid!="0"
                  }[5m])
                )
              )
            ) > 0.05
            and
            (
              sum by (namespace, datname, instance) (
                rate(pg_stat_database_xact_rollback{
                  datname!~"template.*|postgres",
                  datid!="0"
                }[5m])
              )
              +
              sum by (namespace, datname, instance) (
                rate(pg_stat_database_xact_commit{
                  datname!~"template.*|postgres",
                  datid!="0"
                }[5m])
              )
            ) > 0
          for: 10m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL rollback rate is high: {{ $labels.datname }}"
            description: |
              More than 5% of PostgreSQL transactions are rolling back.

              Database: {{ $labels.datname }}
              Instance: {{ $labels.instance }}
              Rollback ratio: {{ $value }}

    - name: postgres.maintenance
      rules:
        - alert: PostgresqlTableNotAutoVacuumed
          expr: |
            (
              (
                pg_stat_user_tables_n_tup_del
                +
                pg_stat_user_tables_n_tup_upd
                +
                pg_stat_user_tables_n_tup_hot_upd
              ) > pg_settings_autovacuum_vacuum_threshold
            )
            and
            (
              time() - pg_stat_user_tables_last_autovacuum
            ) > 60 * 60 * 24 * 10
          for: 1h
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL table has not been autovacuumed: {{ $labels.relname }}"
            description: |
              Table {{ $labels.relname }} has not been autovacuumed for more than 10 days.

              Instance: {{ $labels.instance }}
              Database: {{ $labels.datname }}
              Table: {{ $labels.relname }}
              Value: {{ $value }}

        - alert: PostgresqlTableNotAutoAnalyzed
          expr: |
            (
              (
                pg_stat_user_tables_n_tup_del
                +
                pg_stat_user_tables_n_tup_upd
                +
                pg_stat_user_tables_n_tup_hot_upd
              ) > pg_settings_autovacuum_analyze_threshold
            )
            and
            (
              time() - pg_stat_user_tables_last_autoanalyze
            ) > 60 * 60 * 24 * 10
          for: 1h
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL table has not been autoanalyzed: {{ $labels.relname }}"
            description: |
              Table {{ $labels.relname }} has not been autoanalyzed for more than 10 days.

              Instance: {{ $labels.instance }}
              Database: {{ $labels.datname }}
              Table: {{ $labels.relname }}
              Value: {{ $value }}

        - alert: PostgresqlTooManyDeadTuples
          expr: |
            (
              pg_stat_user_tables_n_dead_tup
              /
              (
                pg_stat_user_tables_n_live_tup
                +
                pg_stat_user_tables_n_dead_tup
              )
            ) >= 0.20
            and
            pg_stat_user_tables_n_dead_tup > 10000
            and
            (
              pg_stat_user_tables_n_live_tup
              +
              pg_stat_user_tables_n_dead_tup
            ) > 0
          for: 15m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL table has too many dead tuples: {{ $labels.relname }}"
            description: |
              PostgreSQL table has a high dead tuple ratio.

              Instance: {{ $labels.instance }}
              Database: {{ $labels.datname }}
              Table: {{ $labels.relname }}
              Dead tuple ratio: {{ $value }}

    - name: postgres.replication
      rules:
        - alert: PostgresqlUnusedReplicationSlot
          expr: |
            pg_replication_slots_active == 0
            and
            pg_replication_is_replica == 0
          for: 30m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL unused replication slot: {{ $labels.slot_name }}"
            description: |
              PostgreSQL has an inactive replication slot.

              Instance: {{ $labels.instance }}
              Slot: {{ $labels.slot_name }}

              Inactive replication slots can retain WAL and eventually fill disk.

        - alert: PostgresqlReplicationLagHigh
          expr: pg_replication_lag_seconds > 30
          for: 5m
          labels:
            severity: warning
            component: postgres
          annotations:
            summary: "PostgreSQL replication lag is high: {{ $labels.instance }}"
            description: |
              PostgreSQL replication lag is above 30 seconds.

              Instance: {{ $labels.instance }}
              Replication lag seconds: {{ $value }}

        - alert: PostgresqlReplicationLagCritical
          expr: pg_replication_lag_seconds > 300
          for: 5m
          labels:
            severity: critical
            component: postgres
          annotations:
            summary: "PostgreSQL replication lag is critical: {{ $labels.instance }}"
            description: |
              PostgreSQL replication lag is above 5 minutes.

              Instance: {{ $labels.instance }}
              Replication lag seconds: {{ $value }}

    - name: postgres.configuration
      rules:
        - alert: PostgresqlConfigurationChanged
          expr: |
            {__name__=~"pg_settings_.*", __name__!="pg_settings_transaction_read_only"}
            != on (__name__, instance)
            {__name__=~"pg_settings_.*", __name__!="pg_settings_transaction_read_only"} offset 5m
          for: 5m
          labels:
            severity: info
            component: postgres
          annotations:
            summary: "PostgreSQL configuration changed: {{ $labels.instance }}"
            description: |
              PostgreSQL configuration changed within the last 5 minutes.

              Instance: {{ $labels.instance }}
              Setting metric: {{ $labels.__name__ }}
              Value: {{ $value }}