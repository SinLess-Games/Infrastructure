# Kubernetes/apps/prod/monitoring/kube-prometheus-stack/prometheus-rules/redis-exporter.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-redis-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redis-exporter-rules
    app.kubernetes.io/component: prometheus-rules
    app.kubernetes.io/part-of: monitoring
    release: kube-prometheus-stack
    security.sinlessgames.io/policy: monitored
spec:
  groups:
    - name: redis.availability
      rules:
        - alert: RedisDown
          expr: redis_up == 0
          for: 2m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis is down: {{ $labels.instance }}"
            description: |
              Redis exporter reports that the Redis instance is down.

              Instance: {{ $labels.instance }}
              Job: {{ $labels.job }}
              Value: {{ $value }}

    - name: redis.replication
      rules:
        - alert: RedisMissingMaster
          expr: (count(redis_instance_info{role="master"}) or vector(0)) < 1
          for: 2m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis has no master"
            description: |
              Redis has no node marked as master.

              This may indicate failover failure, Sentinel/cluster problems, or exporter visibility issues.

              Value: {{ $value }}

        - alert: RedisTooManyMasters
          expr: count(redis_instance_info{role="master"}) > 1
          for: 2m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis has too many masters"
            description: |
              Redis has more than one node marked as master.

              This may indicate split-brain, Sentinel problems, or a bad cluster state.

              Master count: {{ $value }}

        - alert: RedisDisconnectedReplicas
          expr: |
            count without (instance, job) (redis_connected_slaves)
            -
            sum without (instance, job) (redis_connected_slaves)
            -
            1 > 0
          for: 5m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis has disconnected replicas"
            description: |
              Redis is not replicating to all expected replicas.

              Check Redis replication status and network connectivity.

              Value: {{ $value }}

        - alert: RedisReplicationBroken
          expr: delta(redis_connected_slaves[5m]) < 0
          for: 5m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis lost a replica: {{ $labels.instance }}"
            description: |
              Redis connected replica count decreased.

              Instance: {{ $labels.instance }}
              Value: {{ $value }}

        - alert: RedisClusterFlapping
          expr: changes(redis_connected_slaves[5m]) > 2
          for: 5m
          labels:
            severity: warning
            component: redis
          annotations:
            summary: "Redis replica connections are flapping: {{ $labels.instance }}"
            description: |
              Redis replica connection count changed repeatedly.

              This may happen when replicas disconnect and reconnect.

              Instance: {{ $labels.instance }}
              Changes: {{ $value }}

    - name: redis.persistence
      rules:
        - alert: RedisMissingBackup
          expr: time() - redis_rdb_last_save_timestamp_seconds > 60 * 60 * 48
          for: 30m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis RDB backup is stale: {{ $labels.instance }}"
            description: |
              Redis has not completed an RDB save for more than 48 hours.

              Instance: {{ $labels.instance }}
              Seconds since last save: {{ $value }}

    - name: redis.resources
      rules:
        - alert: RedisOutOfSystemMemory
          expr: |
            (
              redis_memory_used_bytes
              /
              redis_total_system_memory_bytes
            ) * 100 > 90
            and
            redis_total_system_memory_bytes > 0
          for: 5m
          labels:
            severity: warning
            component: redis
          annotations:
            summary: "Redis system memory usage is high: {{ $labels.instance }}"
            description: |
              Redis is using more than 90% of system memory.

              This metric requires redis_exporter system metrics.

              Instance: {{ $labels.instance }}
              Memory percentage: {{ $value | printf "%.2f" }}

        - alert: RedisOutOfConfiguredMaxmemory
          expr: |
            (
              redis_memory_used_bytes
              /
              redis_memory_max_bytes
            ) * 100 > 90
            and on (instance)
            redis_memory_max_bytes > 0
          for: 5m
          labels:
            severity: warning
            component: redis
          annotations:
            summary: "Redis maxmemory usage is high: {{ $labels.instance }}"
            description: |
              Redis is using more than 90% of configured maxmemory.

              Instance: {{ $labels.instance }}
              Memory percentage: {{ $value | printf "%.2f" }}

        - alert: RedisConfiguredMaxmemoryCritical
          expr: |
            (
              redis_memory_used_bytes
              /
              redis_memory_max_bytes
            ) * 100 > 95
            and on (instance)
            redis_memory_max_bytes > 0
          for: 5m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis maxmemory usage is critical: {{ $labels.instance }}"
            description: |
              Redis is using more than 95% of configured maxmemory.

              Instance: {{ $labels.instance }}
              Memory percentage: {{ $value | printf "%.2f" }}

        - alert: RedisTooManyConnections
          expr: |
            (
              redis_connected_clients
              /
              redis_config_maxclients
            ) * 100 > 90
            and
            redis_config_maxclients > 0
          for: 5m
          labels:
            severity: warning
            component: redis
          annotations:
            summary: "Redis connection usage is high: {{ $labels.instance }}"
            description: |
              Redis is using more than 90% of configured maxclients.

              Instance: {{ $labels.instance }}
              Connection percentage: {{ $value | printf "%.2f" }}

        - alert: RedisConnectionsCritical
          expr: |
            (
              redis_connected_clients
              /
              redis_config_maxclients
            ) * 100 > 95
            and
            redis_config_maxclients > 0
          for: 2m
          labels:
            severity: critical
            component: redis
          annotations:
            summary: "Redis connection usage is critical: {{ $labels.instance }}"
            description: |
              Redis is using more than 95% of configured maxclients.

              Instance: {{ $labels.instance }}
              Connection percentage: {{ $value | printf "%.2f" }}

    - name: redis.errors
      rules:
        - alert: RedisRejectedConnections
          expr: increase(redis_rejected_connections_total[5m]) > 5
          for: 5m
          labels:
            severity: warning
            component: redis
          annotations:
            summary: "Redis rejected connections: {{ $labels.instance }}"
            description: |
              Redis rejected more than 5 connections in 5 minutes.

              Instance: {{ $labels.instance }}
              Rejected connection count: {{ $value }}