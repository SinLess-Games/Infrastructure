apiVersion: v1
kind: ResourceQuota
metadata:
  name: gitops-quota
  namespace: gitops
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi

    requests.storage: 100Gi
    longhorn.storageclass.storage.k8s.io/requests.storage: 100Gi

    persistentvolumeclaims: "10"
    pods: "100"

    services: "25"
    services.loadbalancers: "0"
    services.nodeports: "0"

    secrets: "150"
    configmaps: "150"

    "count/deployments.apps": "40"
    "count/statefulsets.apps": "20"
    "count/jobs.batch": "50"
    "count/cronjobs.batch": "20"