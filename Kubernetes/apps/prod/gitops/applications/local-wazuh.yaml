apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wazuh-local
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    platform.sinlessgames.io/depends-on: "external-secrets-config,security-policies"
spec:
  project: platform
  source:
    repoURL: https://github.com/SinLess-Games/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/security/wazuh
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
