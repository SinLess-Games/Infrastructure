apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prod-platform-helm
  namespace: gitops
spec:
  generators:
    - list:
        elements:
          - name: longhorn
            namespace: kube-system
            chartRepo: https://charts.longhorn.io
            chart: longhorn
            targetRevision: 1.7.2
            valuesPath: Kubernetes/apps/prod/kube-system/longhorn/values.yaml
            inlineValues: |
              preUpgradeChecker:
                jobEnabled: false
            syncWave: "-8"
          - name: keda
            namespace: kube-system
            chartRepo: https://kedacore.github.io/charts
            chart: keda
            targetRevision: 2.17.0
            valuesPath: Kubernetes/apps/prod/kube-system/keda/values.yaml
            inlineValues: ""
            syncWave: "-6"
          - name: karmada
            namespace: kube-system
            chartRepo: https://raw.githubusercontent.com/karmada-io/karmada/master/charts
            chart: karmada
            targetRevision: v1.15.2
            valuesPath: Kubernetes/apps/prod/kube-system/karmada/values.yaml
            inlineValues: ""
            syncWave: "-5"
          - name: istio-base
            namespace: istio-system
            chartRepo: https://istio-release.storage.googleapis.com/charts
            chart: base
            targetRevision: 1.24.2
            valuesPath: Kubernetes/apps/prod/istio-system/istio-base/values.yaml
            inlineValues: ""
            syncWave: "0"
          - name: istiod
            namespace: istio-system
            chartRepo: https://istio-release.storage.googleapis.com/charts
            chart: istiod
            targetRevision: 1.24.2
            valuesPath: Kubernetes/apps/prod/istio-system/istiod/values.yaml
            inlineValues: |
              autoscaleMin: 3
              autoscaleMax: 5
              replicaCount: 3
              global:
                proxy:
                  autoInject: enabled
              meshConfig:
                accessLogFile: /dev/stdout
                enablePrometheusMerge: true
              pilot:
                autoscaleEnabled: true
                env:
                  EXTERNAL_ISTIOD: "false"
            syncWave: "1"
          - name: istio-ingress
            namespace: istio-system
            chartRepo: https://istio-release.storage.googleapis.com/charts
            chart: gateway
            targetRevision: 1.24.2
            valuesPath: Kubernetes/apps/prod/istio-system/istio-ingress/values.yaml
            inlineValues: |
              service:
                type: LoadBalancer
                annotations:
                  metallb.universe.tf/address-pool: prod-services
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              autoscaling:
                enabled: true
                minReplicas: 2
                maxReplicas: 4
            syncWave: "2"
          - name: cert-manager
            namespace: networking
            chartRepo: https://charts.jetstack.io
            chart: cert-manager
            targetRevision: v1.16.2
            valuesPath: Kubernetes/apps/prod/networking/cert-manager/values.yaml
            inlineValues: ""
            syncWave: "3"
          - name: external-dns
            namespace: networking
            chartRepo: https://kubernetes-sigs.github.io/external-dns/
            chart: external-dns
            targetRevision: 1.15.0
            valuesPath: Kubernetes/apps/prod/networking/external-dns/values.yaml
            inlineValues: ""
            syncWave: "10"
          - name: kube-prometheus-stack
            namespace: monitoring
            chartRepo: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            targetRevision: 66.3.1
            valuesPath: Kubernetes/apps/prod/monitoring/kube-prometheus-stack/values.yaml
            inlineValues: ""
            syncWave: "6"
          - name: grafana-alloy
            namespace: monitoring
            chartRepo: https://grafana.github.io/helm-charts
            chart: alloy
            targetRevision: 0.10.1
            valuesPath: Kubernetes/apps/prod/monitoring/grafana-alloy/values.yaml
            inlineValues: ""
            syncWave: "7"
          - name: grafana-beyla
            namespace: monitoring
            chartRepo: https://grafana.github.io/helm-charts
            chart: beyla
            targetRevision: 1.16.0
            valuesPath: Kubernetes/apps/prod/monitoring/grafana-beyla/values.yaml
            inlineValues: ""
            syncWave: "7"
          - name: loki
            namespace: monitoring
            chartRepo: https://grafana.github.io/helm-charts
            chart: loki
            targetRevision: 6.24.0
            valuesPath: Kubernetes/apps/prod/monitoring/loki/values.yaml
            inlineValues: |
              loki:
                auth_enabled: false
                commonConfig:
                  replication_factor: 3
                schemaConfig:
                  configs:
                    - from: "2024-01-01"
                      store: tsdb
                      object_store: s3
                      schema: v13
                      index:
                        prefix: loki_index_
                        period: 24h
                storage:
                  type: s3
                  bucketNames:
                    chunks: k8s-prod-loki
                    ruler: k8s-prod-loki
                    admin: k8s-prod-loki
                  s3:
                    endpoint: garage-s3.sinless-games.svc.cluster.local:3900
                    region: us-east-1
                    accessKeyId: ${S3_ACCESS_KEY_ID}
                    secretAccessKey: ${S3_SECRET_ACCESS_KEY}
              singleBinary:
                replicas: 0
              write:
                replicas: 3
                extraArgs:
                  - -config.expand-env=true
                extraEnvFrom:
                  - secretRef:
                      name: loki-s3-credentials
              read:
                replicas: 2
                extraArgs:
                  - -config.expand-env=true
                extraEnvFrom:
                  - secretRef:
                      name: loki-s3-credentials
              backend:
                replicas: 2
                extraArgs:
                  - -config.expand-env=true
                extraEnvFrom:
                  - secretRef:
                      name: loki-s3-credentials
              monitoring:
                serviceMonitor:
                  enabled: true
            syncWave: "22"
          - name: mimir
            namespace: monitoring
            chartRepo: https://grafana.github.io/helm-charts
            chart: mimir-distributed
            targetRevision: 5.5.0
            valuesPath: Kubernetes/apps/prod/monitoring/mimir/values.yaml
            inlineValues: |
              mimir:
                structuredConfig:
                  common:
                    storage:
                      backend: s3
                      s3:
                        endpoint: garage-s3.sinless-games.svc.cluster.local:3900
                        region: us-east-1
                        bucket_name: k8s-prod-mimir
                        access_key_id: ${S3_ACCESS_KEY_ID}
                        secret_access_key: ${S3_SECRET_ACCESS_KEY}
                        insecure: true
                  blocks_storage:
                    backend: s3
                    storage_prefix: blocks
                    bucket_store:
                      sync_dir: /data/tsdb-sync
                    s3:
                      endpoint: garage-s3.sinless-games.svc.cluster.local:3900
                      region: us-east-1
                      bucket_name: k8s-prod-mimir
                      access_key_id: ${S3_ACCESS_KEY_ID}
                      secret_access_key: ${S3_SECRET_ACCESS_KEY}
                      insecure: true
                    tsdb:
                      dir: /data/tsdb
                  alertmanager_storage:
                    backend: s3
                    storage_prefix: alertmanager
                    s3:
                      endpoint: garage-s3.sinless-games.svc.cluster.local:3900
                      region: us-east-1
                      bucket_name: k8s-prod-mimir
                      access_key_id: ${S3_ACCESS_KEY_ID}
                      secret_access_key: ${S3_SECRET_ACCESS_KEY}
                      insecure: true
                  ruler_storage:
                    backend: s3
                    storage_prefix: ruler
                    s3:
                      endpoint: garage-s3.sinless-games.svc.cluster.local:3900
                      region: us-east-1
                      bucket_name: k8s-prod-mimir
                      access_key_id: ${S3_ACCESS_KEY_ID}
                      secret_access_key: ${S3_SECRET_ACCESS_KEY}
                      insecure: true
              global:
                extraEnvFrom:
                  - secretRef:
                      name: mimir-s3-credentials
              minio:
                enabled: false
              gateway:
                enabled: true
              ingester:
                replicas: 3
              store_gateway:
                replicas: 3
              ruler:
                enabled: true
              metaMonitoring:
                serviceMonitor:
                  enabled: true
            syncWave: "22"
          - name: tempo
            namespace: monitoring
            chartRepo: https://grafana.github.io/helm-charts
            chart: tempo-distributed
            targetRevision: 1.18.3
            valuesPath: Kubernetes/apps/prod/monitoring/tempo/values.yaml
            inlineValues: |
              storage:
                trace:
                  backend: s3
                  s3:
                    bucket: k8s-prod-tempo
                    endpoint: garage-s3.sinless-games.svc.cluster.local:3900
                    access_key: ${S3_ACCESS_KEY_ID}
                    secret_key: ${S3_SECRET_ACCESS_KEY}
                    insecure: true
              traces:
                otlp:
                  grpc:
                    enabled: true
                  http:
                    enabled: true
              metricsGenerator:
                enabled: true
                remoteWriteUrl: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
                extraEnvFrom:
                  - secretRef:
                      name: tempo-s3-credentials
                extraArgs:
                  - -config.expand-env=true
              compactor:
                extraEnvFrom:
                  - secretRef:
                      name: tempo-s3-credentials
                extraArgs:
                  - -config.expand-env=true
              distributor:
                extraEnvFrom:
                  - secretRef:
                      name: tempo-s3-credentials
                extraArgs:
                  - -config.expand-env=true
              ingester:
                extraEnvFrom:
                  - secretRef:
                      name: tempo-s3-credentials
                extraArgs:
                  - -config.expand-env=true
              querier:
                extraEnvFrom:
                  - secretRef:
                      name: tempo-s3-credentials
                extraArgs:
                  - -config.expand-env=true
              queryFrontend:
                extraEnvFrom:
                  - secretRef:
                      name: tempo-s3-credentials
                extraArgs:
                  - -config.expand-env=true
            syncWave: "22"
          - name: pyroscope
            namespace: monitoring
            chartRepo: https://grafana.github.io/helm-charts
            chart: pyroscope
            targetRevision: 1.12.0
            valuesPath: Kubernetes/apps/prod/monitoring/pyroscope/values.yaml
            inlineValues: ""
            syncWave: "22"
          - name: grafana
            namespace: monitoring
            chartRepo: https://grafana.github.io/helm-charts
            chart: grafana
            targetRevision: 8.8.2
            valuesPath: Kubernetes/apps/prod/monitoring/grafana/values.yaml
            inlineValues: |
              plugins:
                - blackcowmoo-googleanalytics-datasource
                - grafana-googlesheets-datasource
                - marcusolsson-calendar-panel
              deploymentStrategy:
                type: Recreate
              persistence:
                enabled: false
              env:
                GF_DATABASE_TYPE: postgres
                GF_DATABASE_HOST: 10.10.40.50:5432
                GF_DATABASE_NAME: grafana
                GF_DATABASE_USER: grafana
                GF_DATABASE_SSL_MODE: disable
              envValueFrom:
                GF_DATABASE_PASSWORD:
                  secretKeyRef:
                    name: grafana-admin
                    key: postgres_grafana_password
            syncWave: "23"
          - name: opentelemetry-operator
            namespace: monitoring
            chartRepo: https://open-telemetry.github.io/opentelemetry-helm-charts
            chart: opentelemetry-operator
            targetRevision: 0.74.2
            valuesPath: Kubernetes/apps/prod/monitoring/opentelemetry-operator/values.yaml
            inlineValues: |
              manager:
                serviceMonitor:
                  enabled: false
            syncWave: "23"
          - name: kiali
            namespace: monitoring
            chartRepo: https://kiali.org/helm-charts
            chart: kiali-server
            targetRevision: 2.24.0
            valuesPath: Kubernetes/apps/prod/monitoring/kiali/values.yaml
            inlineValues: ""
            syncWave: "24"
          - name: external-secrets
            namespace: security
            chartRepo: https://charts.external-secrets.io
            chart: external-secrets
            targetRevision: 0.10.5
            valuesPath: Kubernetes/apps/prod/security/external-secrets/values.yaml
            inlineValues: ""
            syncWave: "-5"
          - name: falco
            namespace: security
            chartRepo: https://falcosecurity.github.io/charts
            chart: falco
            targetRevision: 4.18.0
            valuesPath: Kubernetes/apps/prod/security/falco/values.yaml
            inlineValues: ""
            syncWave: "11"
          - name: velero
            namespace: security
            chartRepo: https://vmware-tanzu.github.io/helm-charts
            chart: velero
            targetRevision: 8.7.0
            valuesPath: Kubernetes/apps/prod/security/velero/values.yaml
            inlineValues: |
              upgradeCRDs: false
              initContainers:
                - name: velero-plugin-for-aws
                  image: velero/velero-plugin-for-aws:v1.11.0
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - mountPath: /target
                      name: plugins
            syncWave: "12"
          - name: argo-cd
            namespace: gitops
            chartRepo: https://argoproj.github.io/argo-helm
            chart: argo-cd
            targetRevision: 7.7.11
            valuesPath: Kubernetes/apps/prod/gitops/argo-cd/values.yaml
            inlineValues: |
              configs:
                params:
                  server.insecure: true
                secret:
                  argocdServerAdminPassword: '$2b$10$vJGbHySXxfGK96qjNX5aeO8GcoQm3Db.RAJs7yF3QgqoLqG4FuCMK'
            syncWave: "13"
          - name: argo-rollouts
            namespace: gitops
            chartRepo: https://argoproj.github.io/argo-helm
            chart: argo-rollouts
            targetRevision: 2.38.0
            valuesPath: Kubernetes/apps/prod/gitops/argo-rollouts/values.yaml
            inlineValues: ""
            syncWave: "14"
          - name: cockroachdb
            namespace: helix-ai
            chartRepo: https://charts.cockroachdb.com/
            chart: cockroachdb
            targetRevision: 14.0.6
            valuesPath: Kubernetes/apps/prod/helix-ai/cockroachdb/values.yaml
            inlineValues: ""
            syncWave: "18"
          - name: redis
            namespace: helix-ai
            chartRepo: https://charts.bitnami.com/bitnami
            chart: redis
            targetRevision: 20.11.3
            valuesPath: Kubernetes/apps/prod/helix-ai/redis/values.yaml
            inlineValues: ""
            syncWave: "18"
          - name: nats
            namespace: helix-ai
            chartRepo: https://nats-io.github.io/k8s/helm/charts/
            chart: nats
            targetRevision: 1.2.4
            valuesPath: Kubernetes/apps/prod/helix-ai/nats/values.yaml
            inlineValues: ""
            syncWave: "18"
          - name: qdrant
            namespace: helix-ai
            chartRepo: https://qdrant.github.io/qdrant-helm
            chart: qdrant
            targetRevision: 1.13.3
            valuesPath: Kubernetes/apps/prod/helix-ai/qdrant/values.yaml
            inlineValues: ""
            syncWave: "18"
          - name: rancher
            namespace: sinless-games
            chartRepo: https://releases.rancher.com/server-charts/stable
            chart: rancher
            targetRevision: 2.11.8
            valuesPath: Kubernetes/apps/prod/sinless-games/rancher/values.yaml
            inlineValues: ""
            syncWave: "18"
          - name: opencost
            namespace: sinless-games
            chartRepo: https://opencost.github.io/opencost-helm-chart
            chart: opencost
            targetRevision: 1.0.0
            valuesPath: Kubernetes/apps/prod/sinless-games/open-cost/values.yaml
            inlineValues: ""
            syncWave: "18"
          - name: mailu
            namespace: sinless-games
            chartRepo: https://mailu.github.io/helm-charts
            chart: mailu
            targetRevision: 2.6.1
            valuesPath: Kubernetes/apps/prod/sinless-games/mailu/values.yaml
            inlineValues: ""
            syncWave: "19"
  template:
    metadata:
      name: "{{name}}"
      namespace: gitops
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
    spec:
      project: platform
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jqPathExpressions:
            - '.webhooks[]?.clientConfig.caBundle'
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jqPathExpressions:
            - '.webhooks[]?.clientConfig.caBundle'
        - group: ""
          kind: Secret
          name: cilium-ca
          namespace: kube-system
          jqPathExpressions:
            - '.data'
        - group: ""
          kind: Secret
          name: hubble-relay-client-certs
          namespace: kube-system
          jqPathExpressions:
            - '.data'
        - group: ""
          kind: Secret
          name: hubble-server-certs
          namespace: kube-system
          jqPathExpressions:
            - '.data'
      sources:
        - repoURL: "{{chartRepo}}"
          chart: "{{chart}}"
          targetRevision: "{{targetRevision}}"
          helm:
            valueFiles:
              - "$values/{{valuesPath}}"
            values: |
              {{inlineValues}}
        - repoURL: https://github.com/Sinless777/Infrastructure.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
