apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sinless-games-mesh
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "17"
spec:
  project: platform
  source:
    repoURL: https://github.com/Sinless777/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/sinless-games/mesh
  destination:
    server: https://kubernetes.default.svc
    namespace: sinless-games
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
