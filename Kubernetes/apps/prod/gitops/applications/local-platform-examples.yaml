apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-platform-examples
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: platform
  source:
    repoURL: https://github.com/Sinless777/Infrastructure.git
    targetRevision: main
    path: Kubernetes/validation/prod/examples
  destination:
    server: https://kubernetes.default.svc
    namespace: helix-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
