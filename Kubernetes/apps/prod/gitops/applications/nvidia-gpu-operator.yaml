apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-gpu-operator
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
spec:
  project: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  sources:
    - repoURL: https://helm.ngc.nvidia.com/nvidia
      chart: gpu-operator
      targetRevision: 24.9.2
      helm:
        values: |
          driver:
            enabled: false
          toolkit:
            enabled: true
            env:
              - name: CONTAINERD_CONFIG
                value: /var/lib/rancher/rke2/agent/etc/containerd/config.toml
              - name: CONTAINERD_SOCKET
                value: /run/k3s/containerd/containerd.sock
              - name: RUNTIME_CONFIG
                value: /var/lib/rancher/rke2/agent/etc/containerd/config.toml
              - name: RUNTIME_SOCKET
                value: /run/k3s/containerd/containerd.sock
              - name: CONTAINERD_RUNTIME_CLASS
                value: nvidia
          dcgmExporter:
            serviceMonitor:
              enabled: true
          nfd:
            enabled: true
          node-feature-discovery:
            enableNodeFeatureApi: true
          gfd:
            enabled: true
          operator:
            defaultRuntime: containerd
          devicePlugin:
            config:
              create: false
          migManager:
            enabled: false
          sandboxDevicePlugin:
            enabled: false
          vfioManager:
            enabled: false
          vgpuDeviceManager:
            enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
