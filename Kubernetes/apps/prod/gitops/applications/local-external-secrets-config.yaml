apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
    platform.sinlessgames.io/depends-on: "external-secrets"
spec:
  project: platform
  source:
    repoURL: https://github.com/SinLess-Games/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/security/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
