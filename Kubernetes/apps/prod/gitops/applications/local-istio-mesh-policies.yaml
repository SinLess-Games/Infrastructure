apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-mesh-policies
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: platform
  source:
    repoURL: https://github.com/SinLess-Games/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/istio-system/mesh-policies
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true