apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-config
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: platform
  source:
    repoURL: https://github.com/SinLess-Games/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/monitoring/config
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
