apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-system-config
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    platform.sinlessgames.io/depends-on: "external-secrets-config,longhorn"
spec:
  project: platform
  source:
    repoURL: https://github.com/SinLess-Games/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/kube-system/config
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
