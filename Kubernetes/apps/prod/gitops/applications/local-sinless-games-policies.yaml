apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sinless-games-policies
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  project: platform
  source:
    repoURL: https://github.com/SinLess-Games/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/sinless-games/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: sinless-games
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
