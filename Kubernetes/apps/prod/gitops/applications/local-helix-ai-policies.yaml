apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helix-ai-policies
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  project: platform
  source:
    repoURL: https://github.com/SinLess-Games/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/helix-ai/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: helix-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true