crds:
  install: true
  keep: true

global:
  image:
    imagePullPolicy: IfNotPresent
  securityContext:
    runAsNonRoot: true
    runAsUser: 9731
    runAsGroup: 9731
    fsGroup: 9731
    seccompProfile:
      type: RuntimeDefault

controller:
  replicas: 2

  rbac:
    enabled: true
    namespaced: true
    managedNamespace: ""

  pdb:
    enabled: true
    minAvailable: 1

  revisionHistoryLimit: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      interval: 30s

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - argo-events

webhook:
  enabled: false