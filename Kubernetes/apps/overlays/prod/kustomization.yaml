apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/kube-prometheus-stack
  - ../../base/loki
  - ../../base/beyla
commonLabels:
  cluster: prod
patches:
  - patch: |-
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/retention
        value: 30d
    target:
      kind: HelmRelease
      name: kube-prometheus-stack
  - patch: |-
      - op: replace
        path: /spec/values/singleBinary/replicas
        value: 3
    target:
      kind: HelmRelease
      name: loki
