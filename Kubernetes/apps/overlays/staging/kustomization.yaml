apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/kube-prometheus-stack
  - ../../base/loki
  - ../../base/beyla
commonLabels:
  cluster: staging
patches:
  - patch: |-
      - op: replace
        path: /spec/values/prometheus/prometheusSpec/retention
        value: 7d
    target:
      kind: HelmRelease
      name: kube-prometheus-stack
