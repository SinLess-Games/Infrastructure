apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beyla
  namespace: beyla
spec:
  interval: 30m
  chart:
    spec:
      chart: beyla
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    beyla:
      config:
        data:
          BEYLA_NETWORK_METRICS: "true"
          BEYLA_METRICS_INTERVAL: "30s"
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/otlp"
    daemonset:
      hostPID: true
    podSpec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
