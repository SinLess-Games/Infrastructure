apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-platform-root
  namespace: gitops
spec:
  project: platform
  source:
    repoURL: https://github.com/Sinless777/Infrastructure.git
    targetRevision: main
    path: Kubernetes/apps/prod/gitops/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
