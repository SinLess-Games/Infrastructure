apiVersion: v1
kind: Pod
metadata:
  name: cuda-vectoradd
  namespace: helix-ai
spec:
  restartPolicy: Never
  nodeSelector:
    accelerator.nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  containers:
    - name: cuda-vectoradd
      image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0
      resources:
        limits:
          nvidia.com/gpu: 1
