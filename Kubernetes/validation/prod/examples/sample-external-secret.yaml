apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: helix-api-example
  namespace: helix-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: helix-api-example
  data:
    - secretKey: api-key
      remoteRef:
        key: kubernetes/production/workloads
        property: helix_api_key
