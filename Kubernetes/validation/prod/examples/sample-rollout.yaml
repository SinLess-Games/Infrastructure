apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: helix-edge-api
  namespace: helix-ai
spec:
  replicas: 4
  strategy:
    canary:
      canaryService: helix-edge-api-canary
      stableService: helix-edge-api-stable
      trafficRouting:
        istio:
          virtualService:
            name: helix-edge-api
            routes:
              - primary
      steps:
        - setWeight: 20
        - pause:
            duration: 2m
        - setWeight: 50
        - pause:
            duration: 5m
  selector:
    matchLabels:
      app: helix-edge-api
  template:
    metadata:
      labels:
        app: helix-edge-api
    spec:
      containers:
        - name: api
          image: ghcr.io/sinless777/helix-edge-api:stable
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: helix-edge-api-stable
  namespace: helix-ai
spec:
  selector:
    app: helix-edge-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: helix-edge-api-canary
  namespace: helix-ai
spec:
  selector:
    app: helix-edge-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: helix-edge-api
  namespace: helix-ai
spec:
  gateways:
    - istio-system/shared-edge
  hosts:
    - helix-api.helixaibot.com
  http:
    - name: primary
      route:
        - destination:
            host: helix-edge-api-stable
          weight: 100
        - destination:
            host: helix-edge-api-canary
          weight: 0
