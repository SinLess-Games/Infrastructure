---
# Example production environment Vault configuration with HA
# Location: Environments/Production/group_vars/vault/main.yaml

vault_version: "1.16.0"
vault_initialize: false  # Manual initialization in production

# 3-node Raft cluster
vault_cluster_nodes:
  - name: "vault-01"
    ip_address: "10.1.0.51"
    api_addr: "https://10.1.0.51:8200"
    raft_node_id: "vault-01"
  - name: "vault-02"
    ip_address: "10.1.0.52"
    api_addr: "https://10.1.0.52:8200"
    raft_node_id: "vault-02"
  - name: "vault-03"
    ip_address: "10.1.0.53"
    api_addr: "https://10.1.0.53:8200"
    raft_node_id: "vault-03"

vault_key_shares: 5
vault_key_threshold: 3

# HA with VIP
vault_ha_enabled: true
vault_keepalived_enabled: true
vault_haproxy_enabled: true
vault_keepalived_virtual_ip: "10.10.10.50"  # Services VLAN
vault_keepalived_interface: "ens0"
vault_keepalived_vrid: 51

# Priority assignments per node
vault_01_keepalived_priority: 100
vault_02_keepalived_priority: 90
vault_03_keepalived_priority: 80

# Production TLS
vault_skip_verify: false
vault_tls_disable: false
vault_log_level: "info"

# Audit logging enabled
vault_enable_audit_logging: true
vault_audit_log_file: "/var/log/vault/audit.log"

# Backup configuration
vault_backup_raft_snapshots: true
vault_backup_snapshots_dir: "/opt/vault/snapshots"
