---
# Kyverno Policies for Kubernetes Dev Cluster
# Apply security baseline: require labels, restrict privileged pods, etc.

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
spec:
  validationFailureAction: audit
  rules:
    - name: require-app-label
      match:
        resources:
          kinds:
            - Pod
      validate:
        message: "Pod must have app.kubernetes.io/name label"
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-privileged-containers
spec:
  validationFailureAction: audit
  rules:
    - name: deny-privileged
      match:
        resources:
          kinds:
            - Pod
      validate:
        message: "Privileged containers are not allowed"
        pattern:
          spec:
            containers:
              - securityContext:
                  privileged: false

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-host-path
spec:
  validationFailureAction: audit
  rules:
    - name: deny-hostPath-except-allowed
      match:
        resources:
          kinds:
            - Pod
      validate:
        message: "hostPath volumes are not allowed except for /var/log"
        pattern:
          spec:
            volumes:
              - =(name): "*"
                =(hostPath):
                  path: "/var/log*"
