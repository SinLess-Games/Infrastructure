all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    proxmox_cluster_name: Sinless-Games
    proxmox_cluster_network: 10.10.10.0/24
    proxmox_ceph_network: 10.20.20.0/24

proxmox:
  children:
    pve_nodes:
      hosts:
        pve-01:
          ansible_host: 10.10.10.15
        pve-02:
          ansible_host: 10.10.10.16
        pve-03:
          ansible_host: 10.10.10.17
        pve-04:
          ansible_host: 10.10.10.18
        pve-05:
          ansible_host: 10.10.10.19

    pve_bootstrap:
      hosts:
        pve-01:

    pve_cluster_members:
      hosts:
        pve-03:
        pve-04:
        pve-05:

    pve_ceph:
      hosts:
        pve-01:
        pve-04:
        pve-05:
