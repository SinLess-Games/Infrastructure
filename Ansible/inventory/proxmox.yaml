---
proxmox:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: /home/sinless777/Projects/Infrastructure/.outputs/ssh/root/id_ed25519
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o HostKeyAlgorithms=+ssh-rsa
      -o PubkeyAcceptedAlgorithms=+ssh-rsa
      -o CertificateFile=/home/sinless777/Projects/Infrastructure/.outputs/ssh/root/id_ed25519-cert.pub
      -o IdentitiesOnly=yes
    proxmox_cluster_name: Sinless-Games
    proxmox_cluster_network: 10.10.10.0/24
  children:
    pve_nodes:
      hosts:
        pve-01:
          ansible_host: 10.10.10.14
        # pve-02:
