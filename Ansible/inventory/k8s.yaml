---
# =============================================================================
# Kubernetes Cluster Inventory
# =============================================================================
# Purpose:
#   - Dev, Staging, and Production Kubernetes cluster hosts
#   - VLAN 30, 10.10.30.0/24
# =============================================================================

k8s:
  vars:
    ansible_user: sinless777
  children:
    k8s_dev:
      children:
        k8s_dev_control_plane:
          hosts:
            k8s-dev-cp-01:
              ansible_host: 10.10.30.10
        k8s_dev_workers:
          hosts:
            k8s-dev-worker-01:
              ansible_host: 10.10.30.11
            k8s-dev-worker-02:
              ansible_host: 10.10.30.12
    k8s_staging:
      children:
        k8s_staging_control_plane:
          hosts:
            k8s-stg-cp-01:
              ansible_host: 10.10.30.20
            k8s-stg-cp-02:
              ansible_host: 10.10.30.21
            k8s-stg-cp-03:
              ansible_host: 10.10.30.22
        k8s_staging_workers:
          hosts:
            k8s-stg-worker-01:
