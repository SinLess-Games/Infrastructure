[defaults]
# =============================================================================
# Core paths — aligned to repo structure
# =============================================================================

inventory = ./inventory

# Roles resolution order:
#   1) First-party repo roles
#   2) Vendored / galaxy-installed roles in repo
#   3) User/system fallback paths
roles_path = ./roles:./.collections/roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles

# Collections live under Ansible/.collections
collections_path = ./.collections/ansible_collections:~/.ansible/collections:/usr/share/ansible/collections

# Runtime state
local_tmp = ./.ansible/tmp
remote_tmp = ~/.ansible/tmp

# =============================================================================
# Execution behavior
# =============================================================================

interpreter_python = auto_silent
forks = 10
timeout = 120
gather_timeout = 120
pipelining = True

# Privilege escalation
become = True
become_method = sudo
become_ask_pass = False

# =============================================================================
# Output & UX
# =============================================================================

stdout_callback = yaml
bin_ansible_callbacks = True
display_skipped_hosts = False
display_args_to_stdout = False
nocows = 1
verbosity = 0

# =============================================================================
# Fact handling
# =============================================================================

gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./.ansible/facts
fact_caching_timeout = 86400

# =============================================================================
# SSH behavior
# =============================================================================

host_key_checking = False
retry_files_enabled = False

# =============================================================================
# Error handling & safety
# =============================================================================

error_on_undefined_vars = True
any_errors_fatal = True

# =============================================================================
# Deprecation & warnings
# =============================================================================

deprecation_warnings = False
command_warnings = False

[ssh_connection]
pipelining = True
scp_if_ssh = False
retries = 3
control_path_dir = ./.ansible/cp
# Allow password auth when a play/task is launched with --ask-pass while still
# preferring keys first for normal day-to-day runs. Also allow legacy RSA host
# keys because some Proxmox nodes still advertise ssh-rsa host keys.
ssh_args = -o ControlMaster=no -o ControlPersist=no -o PreferredAuthentications=publickey,password,keyboard-interactive -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa

[galaxy]
role_skeleton_ignore = tests,docs
