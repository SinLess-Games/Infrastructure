[defaults]
# =============================================================================
# Core paths — aligned to repo structure
# =============================================================================

# Inventory lives under Ansible/
inventory               = inventory

# Playbooks live under Ansible/playbooks
playbook_dir            = playbooks

# Roles resolution order (IMPORTANT):
#   1) Galaxy-installed / vendor roles
#   2) First-party / repo roles
roles_path              = .collections/roles:roles

# Collections live under Ansible/.collections
collections_path        = .collections

# Runtime state (facts, cache, tmp)
local_tmp               = .ansible/tmp
remote_tmp              = ~/.ansible/tmp

# =============================================================================
# Execution behavior
# =============================================================================

interpreter_python      = auto_silent
forks                   = 10
timeout                 = 30
pipelining              = True

# Privilege escalation
become                  = True
become_method           = sudo
become_ask_pass         = True

# =============================================================================
# Output & UX
# =============================================================================

stdout_callback         = yaml
bin_ansible_callbacks   = True
display_skipped_hosts   = False
display_args_to_stdout  = False
nocows                  = 1
verbosity               = 0

# =============================================================================
# Fact handling (persistent + deterministic)
# =============================================================================

gathering               = smart
fact_caching            = jsonfile
fact_caching_connection = .ansible/facts
fact_caching_timeout    = 86400

# =============================================================================
# SSH behavior
# =============================================================================

host_key_checking       = False
retry_files_enabled     = False

# =============================================================================
# Error handling & safety
# =============================================================================

error_on_undefined_vars = True
any_errors_fatal        = True

# =============================================================================
# Deprecation & warnings
# =============================================================================

deprecation_warnings    = False
command_warnings        = False

[galaxy]
# Force Galaxy roles into vendor directory
role_skeleton_ignore    = tests,docs

