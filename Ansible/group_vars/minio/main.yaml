---
# =============================================================================
# MinIO Deployment Variables
# =============================================================================
# Purpose:
#   - Terraform inputs for MinIO VM deployment
#   - Network placement (VLAN 40, 10.10.40.0/24)
#   - Proxmox storage and HA configuration
# =============================================================================

minio_vault_token: "{{ lookup('env', 'VAULT_TOKEN') | default('', true) }}"

# =============================================================================
# Terraform Module Configuration
# =============================================================================

minio_module_source: "./modules/minio"

# Proxmox API access for Terraform
minio_proxmox_api_url: "https://10.10.10.15:8006/api2/json"
minio_proxmox_tls_insecure: true
minio_proxmox_api_token_file: ".outputs/api-tokens/terraform-prov-api-token.txt"
minio_proxmox_api_token_file_ansible: ".outputs/api-tokens/ansible-prov-api-token.txt"

# =============================================================================
# Cluster Identity
# =============================================================================

minio_cluster_name: "minio-prod"
minio_environment: "prod"

# =============================================================================
# Proxmox Placement (HA Distribution)
# =============================================================================

minio_target_nodes:
  - pve-01
  - pve-04
  - pve-05

# =============================================================================
# VM Naming and IDs
# =============================================================================

minio_node_count: 3
minio_node_name_prefix: "minio"
minio_vm_id_start: 209
minio_force_create: true

# =============================================================================
# Network Configuration (VLAN 40 - 10.10.40.0/24 Storage Network)
# =============================================================================

minio_vlan_id: 40
minio_network_bridge: "vmbr40"
minio_gateway: "10.10.40.1"
minio_cidr_subnet: "/24"
minio_nameservers: "10.10.10.1 1.1.1.1"
minio_dns_primary: "10.10.10.1"
minio_dns_secondary: "1.1.1.1"

minio_ip_addresses:
  - "10.10.40.5"
  - "10.10.40.6"
  - "10.10.40.7"

# Cluster nodes (source of truth for names + static cloud-init IPs)
minio_nodes:
  - name: "minio-01"
    ip: "10.10.40.5"
    vmid: 209
    target_node: "pve-01"
    keepalived_priority: 140
  - name: "minio-02"
    ip: "10.10.40.6"
    vmid: 210
    target_node: "pve-04"
    keepalived_priority: 130
  - name: "minio-03"
    ip: "10.10.40.7"
    vmid: 211
    target_node: "pve-05"
    keepalived_priority: 120

# =============================================================================
# Proxmox Template and Storage
# =============================================================================

minio_clone_template: "debian-13-template"
minio_storage: "VM_Disks"

# =============================================================================
# Resource Allocation
# =============================================================================

minio_cpu_cores: 4
minio_cpu_sockets: 1
minio_memory_mb: 8192
minio_memory_balloon_mb: 4096
minio_disk_size: "1000G"
minio_data_dir: "/mnt/minio/data1"
minio_data_dirs:
  - "/mnt/minio/data1"
  - "/mnt/minio/data2"

# =============================================================================
# Access Configuration
# =============================================================================

minio_default_user: "sinless777"
minio_ansible_user: "sinless777"

# SSH keys from .outputs/ssh/ directories
minio_ssh_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA7g0acAC3ORT/DUzu3ftMtRW6MlVWuWZ7qqd4tNHLcY automation@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKDoqYKB+akwuGHSAJWn6EeXR70zIg9oZXuP60Al1mOS breakglass@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEMakhAavnUU1qkhadP1tNtmwG7tsu49siUyMIEcKKn9 root@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ0Ch6BKvYa5V+7su2oXhf8jRBgBdRKvoqd0UKVtt1mS sinless777@sinlessgames"

# =============================================================================
# HA and Backup Configuration
# =============================================================================

minio_ha_enabled: true
minio_ha_group: "minio-ha"
haproxy_frontend_port: 80
minio_vip_address: "10.10.40.100"
minio_vip_prefix: 24
minio_vip_interface: "eth0"
minio_keepalived_password: "m1n10vip"
minio_haproxy_stats_password: "minio-ha"
minio_api_fqdn: "minio.local.sinlessgames.com"
minio_console_fqdn: "minio-console.local.sinlessgames.com"

minio_backup_enabled: true
minio_backup_schedule: "0 3 * * *"

# =============================================================================
# VM Lifecycle Options
# =============================================================================

minio_start_at_node_boot: true
minio_agent_enabled: true
minio_protection: false
minio_startup_order: 20

# =============================================================================
# Tags and Metadata
# =============================================================================

minio_tags:
  - "minio"
  - "s3"
  - "storage"
  - "tier-3"

minio_description: "MinIO S3-compatible Object Storage Node"

# =============================================================================
# Vault Secrets Reference
# =============================================================================

minio_vault_kv_path: "ansible/minio"
minio_vault_required_keys:
  - "root_user"
  - "root_password"
  - "keepalived_password"
  - "haproxy_stats_password"
  - "cluster_endpoints"
  - "vip_address"
  - "vip_interface"

minio_buckets:
  - name: "loki"
    versioning: false
    quota: "500G"
  - name: "mimir"
    versioning: false
    quota: "500G"
  - name: "backups"
    versioning: true
    quota: "1T"
  - name: "velero"
    versioning: true
    quota: "200G"
  - name: "terraform"
    versioning: true
    quota: "10G"

minio_manage_service_accounts: true
minio_token_output_dir: "{{ playbook_dir | dirname | dirname }}/.outputs/minio"
