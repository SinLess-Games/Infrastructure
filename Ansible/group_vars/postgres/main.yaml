---
# =============================================================================
# PostgreSQL HA Cluster - Shared Defaults
# =============================================================================

# Deployment profile (override with -e postgres_environment=prod)
postgres_environment: "dev"

# Terraform/Proxmox integration
postgres_module_source: "./modules/postgres"
postgres_proxmox_api_url: "https://10.10.10.15:8006/api2/json"
postgres_proxmox_tlTerraform/main.auto.tfvarss_insecure: true
postgres_proxmox_api_token_file: ".outputs/api-tokens/terraform-prov-api-token.txt"

# VM template and topology
postgres_cluster_name: "postgres-ha"
postgres_vm_template_name: "debian-13-template"
postgres_vm_count: 3
postgres_target_nodes:
  - "pve-01"
  - "pve-04"
  - "pve-05"

# VM sizing
postgres_vm_cpu: 4
postgres_vm_memory_mb: 8192
postgres_vm_disk_gb: 80
postgres_vm_storage: "VM_Disks"

# Networking
postgres_network_bridge: "vmbr0"
postgres_vlan_id: 20
postgres_network_cidr: "/24"
postgres_network_subnet: "10.10.20.0/24"
postgres_gateway: "10.10.20.1"
postgres_dns_servers:
  - "10.10.10.13"
  - "1.1.1.1"
postgres_vip_ip: "10.10.20.50"
postgres_vip_cidr: 24
postgres_vip_iface: "eth0"
postgres_vip_dns_name_suggestion: "postgres-vip.infra.local"

# Cluster nodes (source of truth for names + static cloud-init IPs)
postgres_nodes:
  - name: "postgres-01"
    ip: "10.10.20.21"
    vmid: 221
    target_node: "pve-01"
    keepalived_priority: 140
  - name: "postgres-02"
    ip: "10.10.20.22"
    vmid: 222
    target_node: "pve-04"
    keepalived_priority: 130
  - name: "postgres-03"
    ip: "10.10.20.23"
    vmid: 223
    target_node: "pve-05"
    keepalived_priority: 120

# Access/bootstrap
postgres_default_user: "sinless777"
postgres_ansible_user: "sinless777"
postgres_ssh_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA7g0acAC3ORT/DUzu3ftMtRW6MlVWuWZ7qqd4tNHLcY automation@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKDoqYKB+akwuGHSAJWn6EeXR70zIg9oZXuP60Al1mOS breakglass@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEMakhAavnUU1qkhadP1tNtmwG7tsu49siUyMIEcKKn9 root@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ0Ch6BKvYa5V+7su2oXhf8jRBgBdRKvoqd0UKVtt1mS sinless777@sinlessgames"

# Service ports
postgres_listen_port: 5432
postgres_readonly_port: 5433
haproxy_stats_port: 8404
postgres_etcd_client_port: 2379
postgres_etcd_peer_port: 2380

# Patroni configuration
postgres_data_dir: "/var/lib/postgresql/patroni"
postgres_bin_dir: "/usr/lib/postgresql/17/bin"
postgres_config_dir: "/etc/patroni"
patroni:
  scope: "postgres-ha"
  namespace: "/service/"
  restapi_port: 8008
  superuser:
    username: "postgres"
    password: "CHANGEME_SUPERUSER_PASSWORD" # Move to Vault before production use.
  replication:
    username: "replicator"
    password: "CHANGEME_REPLICATION_PASSWORD" # Move to Vault before production use.

# Keepalived
postgres_keepalived_vrid: 62
postgres_keepalived_auth_pass: "ChangeMeVrrp" # Move to Vault before production use.

# Firewall/hardening
postgres_firewall_enabled: true
postgres_firewall_mgmt_cidrs:
  - "10.10.10.0/24"
postgres_firewall_client_cidrs:
  - "10.10.20.0/24"
postgres_firewall_allow_icmp: true

# Backups (placeholder section)
postgres_backups:
  enabled: false
  tool: "pgbackrest"
  stanza: "postgres-ha"
  repository: "TODO: configure backup repository and credentials in Vault"

# Terraform module metadata
postgres_tags:
  - "postgres"
  - "patroni"
  - "haproxy"
  - "keepalived"
postgres_description: "PostgreSQL HA cluster node (Terraform-managed)"

postgres_database_names:
  - authentik
  - grafana
  - 
