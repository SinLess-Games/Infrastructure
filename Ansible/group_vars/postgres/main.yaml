---
# =============================================================================
# PostgreSQL HA Cluster - Shared Defaults
# =============================================================================

postgres_environment: "dev"

# Terraform/Proxmox integration
postgres_module_source: "./modules/proxmox-vm-cluster"
postgres_proxmox_api_url: "{{ infra_proxmox_api_url }}"
postgres_proxmox_tls_insecure: "{{ infra_proxmox_tls_insecure }}"
postgres_proxmox_api_token_file: "{{ infra_proxmox_api_token_file }}"

# Vault secrets (KV v2)
postgres_vault_kv_path: "ansible/postgres"
postgres_vault_addr: "https://10.10.10.180:8200"
postgres_vault_token: "{{ lookup('env', 'VAULT_TOKEN') | default('', true) }}"
postgres_vault_skip_verify: true
postgres_vault_token_file: "{{ playbook_dir }}/../../.outputs/vault/unseal-keys.json"
postgres_vault_required_keys:
  - "superuser_password"
  - "replication_password"
  - "pgbouncer_password"
  - "pgbackrest_repo_password"
  - "pganalyze_api_key"
  - "pgadmin_password"
  - "keepalived_password"
  - "users"
  - "databases"

# Cluster metadata
postgres_cluster_name: "postgres-ha"
postgres_node_name_prefix: "postgres"
postgres_node_count: "{{ postgres_nodes | length }}"
postgres_vm_id_start: 103
postgres_major_version: 17

# Proxmox placement
postgres_target_nodes:
  - "pve-01"
  - "pve-04"
  - "pve-05"
postgres_clone_template: "debian-13-template"
postgres_clone_template_by_node:
  pve-01: "debian-13-template-pve-01"
  pve-04: "debian-13-template-pve-04"
  pve-05: "debian-13-template-pve-05"

# VM sizing
postgres_cpu_cores: 4
postgres_cpu_sockets: 1
postgres_memory_mb: 8192
postgres_disk_size: "80G"
postgres_storage: "VM_Disks"
postgres_storage_by_node:
  pve-01: "vm_disks_01"
  pve-04: "vm_disks_04"
  pve-05: "vm_disks_05"

# Networking
postgres_network_bridge: "vmbr40"
postgres_vlan_id: 40
postgres_cidr_subnet: "/24"
postgres_network_subnet: "10.10.40.0/24"
postgres_gateway: "10.10.40.1"
postgres_nameservers: "10.10.10.1 10.10.10.12 1.1.1.1"
postgres_vip_ip: "10.10.40.50"
postgres_vip_cidr: 24
postgres_vip_iface: "{{ ansible_default_ipv4.interface | default('eth0') }}"
postgres_vip_dns_name_suggestion: "postgres-vip.infra.local"

# Cluster nodes (source of truth for names + static cloud-init IPs)
postgres_nodes:
  - name: "postgres-01"
    ip: "10.10.40.2"
    vmid: 103
    target_node: "pve-01"
    vlan_id: 40
    proxmox_vlan_tagged: false
    keepalived_priority: 140
  - name: "postgres-02"
    ip: "10.10.40.3"
    vmid: 104
    target_node: "pve-04"
    vlan_id: 40
    proxmox_vlan_tagged: false
    keepalived_priority: 130
  - name: "postgres-03"
    ip: "10.10.40.4"
    vmid: 105
    target_node: "pve-05"
    vlan_id: 40
    proxmox_vlan_tagged: false
    keepalived_priority: 120

# Access/bootstrap
postgres_default_user: "{{ infra_bootstrap_default_user }}"
postgres_ansible_user: "{{ infra_bootstrap_ansible_user }}"
postgres_ssh_keys: "{{ infra_bootstrap_ssh_keys }}"

# Service ports
postgres_listen_port: 5432
postgres_readonly_port: 5433
haproxy_stats_port: 8404
postgres_etcd_client_port: 2379
postgres_etcd_peer_port: 2380

# Patroni configuration
postgres_data_dir: "/var/lib/postgresql/patroni"
postgres_bin_dir: "/usr/lib/postgresql/{{ postgres_major_version }}/bin"
postgres_config_dir: "/etc/patroni"
patroni:
  scope: "postgres-ha"
  namespace: "/service/"
  restapi_port: 8008
  superuser:
    username: "postgres"
    password: "{{ postgres_superuser_password | default('') }}"
  replication:
    username: "replicator"
    password: "{{ postgres_replication_password | default('') }}"

# Keepalived
postgres_keepalived_vrid: 62
postgres_keepalived_auth_pass: "{{ postgres_keepalived_password | default('') }}"

# Firewall/hardening
postgres_firewall_enabled: true
postgres_firewall_mgmt_cidrs:
  - "10.10.10.0/24"
postgres_firewall_client_cidrs:
  - "10.10.20.0/24"
postgres_firewall_allow_icmp: true

# Backups (placeholder section)
postgres_backups:
  enabled: false
  tool: "pgbackrest"
  stanza: "postgres-ha"
  repository: "TODO: configure backup repository and credentials in Vault"

# HA and backup (Proxmox)
postgres_ha_enabled: true
postgres_ha_group: "postgres-ha"
postgres_backup_enabled: true
postgres_backup_schedule: "0 4 * * *"

# VM options
postgres_start_at_node_boot: true
postgres_agent_enabled: true
postgres_protection: true
postgres_startup_order: 25

# Terraform module metadata
postgres_tags:
  - "postgres"
  - "patroni"
  - "haproxy"
  - "keepalived"
postgres_description: "PostgreSQL HA cluster node (Terraform-managed)"

postgres_database_names:
  - authentik
  - grafana
  - grafana_oncall
  - harbor
  - netbox
  - backstage
  - boundary
  - defectdojo

postgres_users: []
postgres_databases: []

# Package installation
postgres_packages_required:
  - "python3-psycopg2"
  - "python3-etcd"
  - "python3-etcd3"
  - "patroni"
  - "pgbouncer"
  - "pgbackrest"
  - "etcd-server"
  - "etcd-client"
  - "haproxy"
  - "keepalived"
  - "curl"

postgres_packages_optional:
  - "prometheus-postgres-exporter"
  - "prometheus-pgbouncer-exporter"
  - "prometheus-patroni-exporter"

postgres_pganalyze_enabled: true
postgres_pganalyze_install_method: "container"
postgres_pganalyze_container_image: "quay.io/pganalyze/collector:stable"
postgres_pganalyze_container_name: "pganalyze-collector"
postgres_pganalyze_container_packages:
  - "docker.io"
  - "python3-docker"
postgres_patroni_exporter_enabled: true

# pganalyze configuration
postgres_pganalyze_config_path: "/etc/pganalyze-collector.conf"
postgres_pganalyze_service_name: "pganalyze-collector"

# Extension and admin UI
postgres_pgvector_enabled: true
postgres_pgvector_extension_name: "vector"
postgres_pgadmin_enabled: true
postgres_pgadmin_default_email: "postgres-admin@local.sinlessgames.com"
postgres_pgadmin_port: 8080
postgres_pgadmin_backend_port: 5050
postgres_pgadmin_container_image: "docker.io/dpage/pgadmin4:latest"
postgres_pgadmin_container_name: "pgadmin4"
postgres_pgadmin_service_name: "pgadmin4"
postgres_pgadmin_config_dir: "/etc/pgadmin4"
postgres_pgadmin_data_dir: "/var/lib/pgadmin4"
postgres_pgadmin_server_group_name: "PostgreSQL HA"
postgres_pgadmin_vip_dns_name_suggestion: "pgadmin-postgres.infra.local"

# Database provisioning
postgres_db_provisioning_enabled: true
postgres_primary_host: "{{ postgres_nodes[0].name }}"
