# Ansible/group_vars/all/ssh.yaml
---
# =============================================================================
# SSH global configuration (CA-backed SSH + sane defaults)
# =============================================================================

# ---- computed building blocks ----
ssh_controller_repo_root: "{{ playbook_dir }}/../.."
ssh_controller_outputs_dir: "{{ ssh_controller_repo_root }}/.outputs"
ssh_controller_root_materials_dir: "{{ ssh_controller_outputs_dir }}/ssh/root"

# ---- SINGLE canonical CA location (NO ssh-ca) ----
ssh_ca_output_dir: "{{ ssh_controller_outputs_dir }}/ssh_ca"

# Keep if you still want “candidates”, but only point at canonical.
ssh_controller_ca_pub_candidates:
  - "{{ ssh_ca_output_dir }}/ssh_ca.pub"

# Local DNS zones you want every host to be reachable under
ssh_local_dns_zones:
  - "local.sinlessgames.com"
  - "local.sinlessgamesllc.com"

# Where the CA pubkey is installed on each node (TrustedUserCAKeys)
ssh_trusted_user_ca_keys_path: "/etc/ssh/ca/ssh_ca.pub"

# Authorized principals layout on each node
ssh_authorized_principals_dir: "/etc/ssh/auth_principals"
ssh_authorized_principals_file: "{{ ssh_authorized_principals_dir }}/%u"

# Host certificate path (ed25519 host cert)
ssh_host_certificate_path: "/etc/ssh/ssh_host_ed25519_key-cert.pub"

# Root identity + cert paths on each node
ssh_root_identity_file: "/root/.ssh/id_ed25519"
ssh_root_certificate_file: "/root/.ssh/id_ed25519-cert.pub"

# ---- final structure ----
ssh:
  controller:
    repo_root: "{{ ssh_controller_repo_root }}"
    outputs_dir: "{{ ssh_controller_outputs_dir }}"
    root_materials_dir: "{{ ssh_controller_root_materials_dir }}"
    ca_pub_candidates: "{{ ssh_controller_ca_pub_candidates }}"

  hosts:
    zones: "{{ ssh_local_dns_zones }}"
    extra_lines: []

  known_hosts:
    cert_authority_patterns:
      - "*.local.sinlessgames.com"
      - "*.local.sinlessgamesllc.com"
    trusted_user_ca_keys: "{{ ssh_trusted_user_ca_keys_path }}"

  server:
    port: 22
    listen_addresses: ["0.0.0.0"]

    pubkey_authentication: true
    password_authentication: false
    kbd_interactive_authentication: false
    challenge_response_authentication: false

    authentication_methods: "publickey"
    permit_root_login: "prohibit-password"
    use_pam: true

    trusted_user_ca_keys: "{{ ssh_trusted_user_ca_keys_path }}"
    authorized_principals_dir: "{{ ssh_authorized_principals_dir }}"
    authorized_principals_file: "{{ ssh_authorized_principals_file }}"

    enable_host_certificate: true
    host_certificate_path: "{{ ssh_host_certificate_path }}"
    banner_enabled: true
    banner_path: "/etc/issue.net"
    banner_content: |
      ***************************************************************************
                               AUTHORIZED USE ONLY
      ***************************************************************************
                        SinLess Games LLC - SSH Access Policy
      ---------------------------------------------------------------------------

      This information system is owned and operated by SinLess Games LLC and is
      provided for authorized use only.

      Access is restricted to authorized users for legitimate business purposes.
      All access is subject to SinLess Games LLC policies, standards, and Terms
      of Use, and applicable laws and regulations, including but not limited to
      HIPAA, SOC 2 Trust Services Criteria, PCI DSS, and NIST SP 800-53, GDPR.

      This system and all data on it may be monitored, intercepted, recorded,
      copied, audited, inspected, and disclosed by authorized personnel at any
      time. There is no expectation of privacy.

      By accessing or using this system, you expressly consent to monitoring,
      recording, and auditing, and agree to comply with all applicable policies
      and controls.

      Unauthorized access, use, or modification is strictly prohibited and may
      result in revocation of access, disciplinary action, and civil and/or
      criminal penalties.

      If you are not an authorized user or do not agree to these terms,
      disconnect immediately.

      ***************************************************************************

    x11_forwarding: false
    client_alive_interval: 300
    client_alive_count_max: 2
    use_dns: false
    max_auth_tries: 10

  principals:
    root: ["root", "proxmox", "admin"]

  root_client:
    identity_file: "{{ ssh_root_identity_file }}"
    certificate_file: "{{ ssh_root_certificate_file }}"
    identities_only: true
    strict_host_key_checking: "accept-new"
    password_authentication: false

  authorized_keys:
    root:
      enabled: true
      keys:
        - "{{ ssh_root_identity_file }}.pub"

  client_config:
    zones: "{{ ssh_local_dns_zones }}"
    identity_file: "~/.ssh/id_ed25519"
    certificate_file: "~/.ssh/id_ed25519-cert.pub"
    identities_only: true
    strict_host_key_checking: "accept-new"
    pubkey_authentication: true
    password_authentication: false
    server_alive_interval: 30
    server_alive_count_max: 3
    hosts:
      - pattern: "10.10.*"
        identity_file: "~/.ssh/id_ed25519"
        certificate_file: "~/.ssh/id_ed25519-cert.pub"
        identities_only: true
        strict_host_key_checking: "accept-new"
      - pattern: "*.local.sinlessgames.com *.local.sinlessgamesllc.com"
        identity_file: "~/.ssh/id_ed25519"
        certificate_file: "~/.ssh/id_ed25519-cert.pub"
        identities_only: true
        strict_host_key_checking: "accept-new"
