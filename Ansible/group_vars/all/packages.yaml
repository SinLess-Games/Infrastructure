---
# Shared package catalog for the packages role.
# Organized by host profile so plays can enable development, production,
# and shell tooling explicitly.
#
# Note:
# Exact language runtime versions are tracked here, but APT alone will not
# guarantee these versions on Debian. Keep system Python for Ansible/bootstrap,
# and install pinned developer runtimes with a dedicated role/tooling layer.

development_runtime_versions:
  golang: "1.26.1"
  nodejs: "25.8.1"
  python: "3.14.3"

shell_brew_packages:
  - k9s
  - istioctl
  - thefuck

apt_packages:
  production:
    # Minimal runtime and hardening baseline for production hosts
    - ca-certificates
    # - software-properties-common  # Not available on Debian 13
    - apt-transport-https
    - gnupg
    - curl
    - wget
    - sudo
    - locales
    - ethtool
    - bridge-utils
    - vlan
    - nftables
    - iptables
    - rsyslog
    - logrotate
    - needrestart
    - unattended-upgrades
    - parted
    - lvm2
    - mdadm
    - hdparm
    - cryptsetup
    - ntfs-3g
    - xfsprogs
    - nfs-common
    - cifs-utils
    - openssh-server
    - ufw
    - fail2ban
    - apparmor
    - auditd
    - clamav
    - clamav-freshclam
    - lynis
    - rkhunter
    - gpg
    - qemu-guest-agent

  development:
    # Python bootstrap tooling
    # Keep distro Python for Ansible and package management. Exact developer
    # Python is tracked above and should be installed separately.
    - python3
    - python3-pip
    - python3-venv
    - python3-dev
    - python3-setuptools
    - pipx
    # Node/Go runtimes are version-pinned above and should be installed
    # outside the distro package set.
    # Java/JVM
    - openjdk-17-jdk
    - openjdk-21-jdk
    - maven
    - gradle
    # Go / Rust / C/C++ / LLVM
    - rustc
    - cargo
    - gcc
    - g++
    - clang
    - clang-format
    - llvm
    - gdb
    - valgrind
    - lldb
    - ninja-build
    - ccache
    # Scripting / linters / proto
    - shellcheck
    - shfmt
    - yamllint
    - jsonlint
    - graphviz
    - protobuf-compiler
    # IaC / DevOps
    - ansible
    - ansible-lint
    # Containers
    - docker.io
    - containerd
    - podman
    - buildah
    - skopeo
    # Git helpers
    - git-extras
    - gh                 # GitHub CLI (may require vendor repo on some releases)

  shell:
    # Operator tools and interactive shell UX
    - git
    - unzip
    - zip
    - tree
    - screen
    - jq
    - yq
    - htop
    - btop
    - bash-completion
    - moreutils
    - nano
    - net-tools
    - dnsutils
    - traceroute
    - whois
    - time
    - lsb-release
    - nmap
    - tcpdump
    - zsh
    - direnv
    - fzf
    - colordiff
    - zoxide
    # Fonts for interactive terminal use
    - fonts-firacode
    - fonts-hack
    - fonts-inconsolata
    - fonts-noto
    - fonts-noto-color-emoji
