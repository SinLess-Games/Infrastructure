---
# =============================================================================
# Global User Definitions
# -----------------------------------------------------------------------------
# This file defines users ONLY.
# SSH keys are generated by roles/ssh
# SSH keys are installed by roles/common_users
# =============================================================================

users:

  - name: sinless777
    comment: "Primary operator (SinLess Games LLC)"
    shell: /bin/zsh
    ssh_principals: [sinless777, admin, root]
    groups:
      - sudo
      - adm
      - docker
    sudo: true
    sudo_nopasswd: true
    shared-certs: [root]
  
  - name: root
    comment: "Root user"
    shell: /bin/bash
    home_directory: /root
    ssh_principals: [root, admin]
    sudo: true
    sudo_nopasswd: true
    groups:
      - sudo
      - adm

  - name: automation
    comment: "Automation and CI user (Ansible, GitOps, Terraform)"
    shell: /usr/sbin/nologin
    system: true
    groups:
      - docker
    sudo: true
    sudo_nopasswd: true

  - name: breakglass
    comment: "Emergency access account (break-glass)"
    shell: /bin/bash
    groups:
      - sudo
    sudo: true
    sudo_nopasswd: true
    password_lock: true
