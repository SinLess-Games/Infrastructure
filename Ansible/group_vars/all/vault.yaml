# =====================================================================
# Vault Global Variables
# =====================================================================

# ------------------------------
# Vault Server Configuration
# ------------------------------
vault_storage_path: "/opt/vault/data"
vault_listener_address: "0.0.0.0:8200"

vault_tls_disable: false
vault_tls_cert_file: "/etc/vault/tls/vault.crt"
vault_tls_key_file: "/etc/vault/tls/vault.key"

vault_api_addr: "https://{{ ansible_host }}:8200"
vault_cluster_addr: "https://{{ ansible_host }}:8201"

vault_log_level: "info"
vault_plugin_directory: "/opt/vault/plugins"

vault_cluster_name: "sinlessgames-vault-cluster"

# ------------------------------
# Raft Join Configuration
# ------------------------------
vault_raft_retry_join:
  - leader_api_addr: "https://node1.vault:8200"
  - leader_api_addr: "https://node2.vault:8200"
  - leader_api_addr: "https://node3.vault:8200"

# ------------------------------
# Auto-Unseal (Transit)
# ------------------------------
vault_seal_type: "transit"   # transit | awskms | azurekeyvault
vault_transit_address: "https://vault1.local.sinlessgamesllc.com:8200"
vault_transit_token: "{{ vault_transit_master_token }}"
vault_transit_key_name: "autounseal"
vault_transit_mount_path: "transit"
vault_transit_skip_verify: "false"

# ------------------------------
# Audit Logging
# ------------------------------
vault_audit_file_enabled: true
vault_audit_file_path: "/opt/vault/logs/audit.log"
vault_audit_file_mode: "0640"
vault_audit_log_raw: false

vault_audit_syslog_enabled: false
vault_audit_syslog_facility: "LOCAL6"

# =====================================================================
# Bootstrap Template Variables
# =====================================================================

# ------------------------------
# Kubernetes Auth Setup
# ------------------------------
vault_kubernetes_api: "https://{{ kubernetes_api_host | default('10.96.0.1') }}"
vault_kubernetes_ca_cert: "{{ kubernetes_ca_cert }}"
vault_kubernetes_reviewer_jwt: "{{ kubernetes_sa_jwt }}"
kubernetes_cluster_name: "helix-cluster"
kubernetes_cluster_domain: "cluster.local"
istio_revision: "default"

# ------------------------------
# GitHub Auth Method (Optional)
# ------------------------------
vault_github_org: "SinLess-Games"

# ------------------------------
# Helix Platform Secrets
# ------------------------------
helix_env: "production"
helix_api_url: "https://helix.local.sinlessgamesllc.com"
helix_jwt_secret: "{{ vault_helix_jwt_secret }}"
helix_database_url: "{{ vault_helix_database_url }}"
helix_redis_url: "{{ vault_helix_redis_url }}"

helix_github_token: "{{ vault_helix_github_token }}"
helix_cloudflare_api_token: "{{ vault_helix_cloudflare_token }}"

# ------------------------------
# PKI Configuration
# ------------------------------
vault_pki_root_cn: "SinLess Games Root CA"
vault_pki_int_cn: "SinLess Games Intermediate CA"

# Intermediate PKI roles
vault_pki_k8s_allowed_domains:
  - "{{ kubernetes_cluster_domain }}"
vault_pki_helix_allowed_domains:
  - "helix.local.sinlessgamesllc.com"
  - "*.helix.svc"

# ------------------------------
# SSH Secrets Backend
# ------------------------------
vault_ssh_otp_default_user: "ubuntu"
vault_ssh_allowed_domains:
  - "sinlessgamesllc.com"

# =====================================================================
# Token Storage / Secret Paths
# =====================================================================
vault_initial_secrets:
  helix_app:
    HELIX_ENV: "{{ helix_env }}"
    HELIX_API_URL: "{{ helix_api_url }}"
    HELIX_JWT_SECRET: "{{ helix_jwt_secret }}"
    DATABASE_URL: "{{ helix_database_url }}"
    REDIS_URL: "{{ helix_redis_url }}"

  helix_github:
    GITHUB_TOKEN: "{{ helix_github_token }}"

  helix_cloudflare:
    CLOUDFLARE_API_TOKEN: "{{ helix_cloudflare_api_token }}"

  kubernetes:
    CLUSTER_NAME: "{{ kubernetes_cluster_name }}"
    ISTIO_REVISION: "{{ istio_revision }}"

# =====================================================================
# AppRole & Kubernetes Roles
# =====================================================================
vault_roles:

  approle_helix:
    policies:
      - "helix-service"
    token_ttl: "24h"
    token_max_ttl: "168h"

  approle_k8s:
    policies:
      - "kubernetes-service"
    token_ttl: "1h"
    token_max_ttl: "24h"

  k8s_helix:
    service_accounts:
      - name: "helix"
        namespace: "helix"
    policies:
      - "helix-service"
    ttl: "1h"

  k8s_default_app:
    service_accounts:
      - name: "default"
        namespace: "default"
    policies:
      - "readonly"
    ttl: "30m"
