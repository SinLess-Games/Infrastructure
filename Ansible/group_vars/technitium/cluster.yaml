---
# =============================================================================
# Technitium DNS - Cluster Configuration
# =============================================================================

technitium_cluster_enabled: true
technitium_cluster_domain: "local.sinlessgames.com"

# Primary node is the existing Raspberry Pi DNS server
technitium_cluster_primary_host: "dns-pi"
technitium_cluster_primary_ip: "10.10.10.12"
technitium_cluster_primary_url: "http://{{ technitium_cluster_primary_ip }}:5380/"

# Use a public resolver-friendly hostname for join since Technitium resolves via DNS.
technitium_cluster_primary_join_host: "{{ technitium_cluster_primary_ip | replace('.', '-') }}.nip.io"
