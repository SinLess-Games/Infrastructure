---
# =============================================================================
# Technitium Deployment Variables
# =============================================================================

# Terraform module configuration
technitium_module_source: "./modules/proxmox-vm-cluster"

# Proxmox API access for Terraform
technitium_proxmox_api_url: "{{ infra_proxmox_api_url }}"
technitium_proxmox_tls_insecure: "{{ infra_proxmox_tls_insecure }}"
technitium_proxmox_api_token_file: "{{ infra_proxmox_api_token_file }}"

# Cluster identity
technitium_cluster_name: "technitium-cluster"
technitium_environment: "prod"

# Proxmox placement (HA distribution)
technitium_target_nodes:
  - pve-01
  - pve-04
  - pve-05

# VM naming and IDs
technitium_node_count: 3
technitium_node_name_prefix: "dns"
technitium_vm_id_start: 203

# Network configuration (VLAN 1 - 10.10.10.0/24)
technitium_vlan_id: 0
technitium_network_bridge: "vmbr0"
technitium_gateway: "10.10.10.1"
technitium_cidr_subnet: "/24"
technitium_nameservers: "1.1.1.1 8.8.8.8"

technitium_ip_addresses:
  - "10.10.10.13"
  - "10.10.10.9"
  - "10.10.10.20"

# Proxmox template and storage
technitium_clone_template: "debian-13-template"
technitium_storage: "VM_Disks"

# Resource allocation
technitium_cpu_cores: 2
technitium_cpu_sockets: 1
technitium_memory_mb: 4096
technitium_disk_size: "40G"

# Access configuration
technitium_default_user: "{{ infra_bootstrap_default_user }}"
technitium_ansible_user: "ansible"

# SSH keys for VM access
technitium_ssh_keys: "{{ infra_bootstrap_ssh_keys }}"

# HA and backup
technitium_ha_enabled: true
technitium_ha_group: "dns-ha"

technitium_backup_enabled: true
technitium_backup_schedule: "0 3 * * *"

# VM lifecycle options
technitium_start_at_node_boot: true
technitium_agent_enabled: true
technitium_protection: true
technitium_startup_order: 20

# Tags and metadata
technitium_tags:
  - "technitium"
  - "dns"
  - "ha"

technitium_description: "Technitium DNS cluster node (Terraform-managed)"
