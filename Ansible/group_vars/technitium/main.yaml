technitium_api_url: "http://{{ ansible_host }}:5380"

technitium_forwarders:
  - "1.1.1.1"
  - "8.8.8.8"
  - "9.9.9.9"

technitium_enable_blocking: true

technitium_block_list_urls:
  - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
  - "https://dbl.oisd.nl/"
  - "https://s3.amazonaws.com/lists.disconnect.me/simple_ad.txt"
  - "https://s3.amazonaws.com/lists.disconnect.me/simple_tracking.txt"

technitium_allow_recursion_cidrs:
  - "10.10.10.0/24"

technitium_api_timeout: 90    # seconds to wait before fail
technitium_api_delay: 5       # seconds between polls

technitium_admin_password: '"!it;%E}3d5_B73'

# Add these mappings so the role sees what it expects
technitium_dns_zones: "{{ technitium_domains }}"
technitium_dns_zone_records: "{{ technitium_domain_records }}"

# Controller-side outputs (controller == machine running ansible)
technitium_output_dir: "{{ playbook_dir }}/../../.outputs/technitium"
technitium_token_file: "{{ technitium_output_dir }}/{{ inventory_hostname }}.api-token"

# Defaults for records
technitium_record_default_ttl: 300
technitium_token_name: "ansible"