---
# Proxmox SDN Configuration

# Enable SDN
proxmox_sdn_enabled: true
proxmox_sdn_apply_node_network: true

# Primary bridge for VLAN tagging (must exist on all nodes)
proxmox_sdn_primary_bridge: "vmbr0"

# SDN zone definition - VLAN zone for all nodes
proxmox_sdn_zones:
  - name: "vlanzone"
    type: "vlan"
    bridge: "vmbr0"
    nodes: "pve-01,pve-02,pve-03,pve-04,pve-05"
    disable_arp_nd_suppression: 0
  - name: "devzone"
    type: "vlan"
    bridge: "vmbr20"
    nodes: "pve-01,pve-02,pve-03,pve-04,pve-05"
    disable_arp_nd_suppression: 0
  - name: "testzone"
    type: "vlan"
    bridge: "vmbr30"
    nodes: "pve-01,pve-02,pve-03,pve-04,pve-05"
    disable_arp_nd_suppression: 0
  - name: "prodzone"
    type: "vlan"
    bridge: "vmbr40"
    nodes: "pve-01,pve-04,pve-05"
    disable_arp_nd_suppression: 0

# SDN networks - mapped to actual VLAN structure
proxmox_sdn_networks:
  # Infrastructure/Management VLAN
  - name: "infra"
    zone: "vlanzone"
    vlanid: 1
    subnet: "10.10.10.0/24"
    gateway: "10.10.10.1"
    enabled: true

  # Development VLAN
  - name: "dev"
    zone: "devzone"
    vlanid: 20
    subnet: "10.10.20.0/24"
    gateway: "10.10.20.1"
    enabled: true

  # Testing/Staging VLAN
  - name: "staging"
    zone: "testzone"
    vlanid: 30
    subnet: "10.10.30.0/24"
    gateway: "10.10.30.1"
    enabled: true

  # Production VLAN
  - name: "prod"
    zone: "prodzone"
    vlanid: 40
    subnet: "10.10.40.0/24"
    gateway: "10.10.40.1"
    enabled: true

  # DMZ VLAN
  - name: "dmz"
    zone: "vlanzone"
    vlanid: 50
    subnet: "10.10.50.0/24"
    gateway: "10.10.50.1"
    enabled: true

  # Ceph Storage Replication VLAN
  - name: "ceph"
    zone: "vlanzone"
    vlanid: 60
    subnet: "10.10.60.0/24"
    gateway: "10.10.60.1"
    enabled: true

# DNS servers for SDN networks
proxmox_sdn_dns_servers:
  - "10.10.10.12"
  - "1.1.1.1"
  - "8.8.8.8"

# Optional DNS search domain for SDN subnets (if supported by your PVE version)
proxmox_sdn_dns_domain: "local.sinlessgamesllc.com"

# NTP servers for time synchronization
proxmox_sdn_ntp_servers:
  - "ntp.ubuntu.com"
  - "time.cloudflare.com"

# DHCP settings (optional)
proxmox_sdn_dhcp_enabled: false

# IPAM settings (optional - for advanced IP management)
proxmox_sdn_ipam_enabled: false

# VRF settings (optional - for advanced routing)
proxmox_sdn_vrf_enabled: false
