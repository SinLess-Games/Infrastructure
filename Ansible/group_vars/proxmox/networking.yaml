# =============================================================================
# Proxmox Cluster Networking Configuration
# =============================================================================
# Manages network interfaces, bonds, bridges, and VLAN configuration
# for the Proxmox cluster

# =============================================================================
# Network Interface Configuration (Management IPs)
# =============================================================================
proxmox_node_interfaces:
  pve-01:
    enp9s0:
      inet: "10.10.10.14"
      netmask: "255.255.255.0"
      gateway: "10.10.10.1"

  # pve-02:
  #   enp0s25:
  #     inet: "10.10.10.15"
  #     netmask: "255.255.255.0"
  #     gateway: "10.10.10.1"

  pve-03:
    eno1:
      inet: "10.10.10.16"
      netmask: "255.255.255.0"
      gateway: "10.10.10.1"

  pve-04:
    eno1:
      inet: "10.10.10.17"
      netmask: "255.255.255.0"
      gateway: "10.10.10.1"

  pve-05:
    eno1:
      inet: "10.10.10.18"
      netmask: "255.255.255.0"
      gateway: "10.10.10.1"


# =============================================================================
# Bond Configuration
# =============================================================================
# bond0 = LACP trunk uplink for VLAN networks
proxmox_node_bonds:

  pve-01:
    bond0:
      interfaces:
        - enp8s0
      mode: 802.3ad
      miimon: 100
      lacp_rate: fast
      xmit_hash_policy: layer3+4

  pve-04:
    bond0:
      interfaces:
        - eno2
        - eno3
        - eno4
      mode: 802.3ad
      miimon: 100
      lacp_rate: fast
      xmit_hash_policy: layer3+4

  pve-05:
    bond0:
      interfaces:
        - eno2
        - eno3
        - eno4
      mode: 802.3ad
      miimon: 100
      lacp_rate: fast
      xmit_hash_policy: layer3+4


# =============================================================================
# Bridges configuration
# =============================================================================
# vmbr0  = VLAN 1  (Infrastructure / Management)
# vmbr20 = VLAN 20 (Development)
# vmbr30 = VLAN 30 (Testing)
# vmbr40 = VLAN 40 (Production)
# vmbr50 = VLAN 50 (DMZ)
# vmbr60 = VLAN 60 (Ceph Storage)

# Node specific bridge overrides
proxmox_node_bridges:

  pve-01:
    vmbr0:
      description: "VM Bridge - VLAN 1 (Infrastructure / Management)"
      vlan_id: 1
      ports:
        - enp9s0
      address: "10.10.10.14/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0

    vmbr1:
      description: "VM Bridge - VLAN 20 (Development, Staging)"
      vlan_id: 20
      ports:
        - bond0
      address: "10.10.20.14/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0

    vmbr40:
      prod: true
      description: "VM Bridge - VLAN 40 (Production)"
      vlan_id: 40
      vlan_tagged: false
      ports:
        - enp10s0f0
      address: "10.10.40.14/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0


  pve-02: null


  pve-03:
    vmbr0:
      description: "VM Bridge - VLAN 1 (Infrastructure / Management)"
      vlan_id: 1
      ports:
        - eno1
      address: "10.10.10.16/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0


  pve-04:
    vmbr0:
      description: "VM Bridge - VLAN 1 (Infrastructure / Management)"
      vlan_id: 1
      ports:
        - eno1
      address: "10.10.10.17/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0

    vmbr1:
      description: "VM Bridge - VLAN 20 (Development, Staging)"
      vlan_id: 20
      ports:
        - bond0
      address: "10.10.20.17/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0

    vmbr40:
      prod: true
      description: "VM Bridge - VLAN 40 (Production)"
      vlan_id: 40
      vlan_tagged: false
      ports:
        - enp10s0f0
      address: "10.10.40.17/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0

  pve-05:
    vmbr0:
      description: "VM Bridge - VLAN 1 (Infrastructure / Management)"
      vlan_id: 1
      ports:
        - eno1
      address: "10.10.10.18/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0

    vmbr1:
      description: "VM Bridge - VLAN 20 (Development, Staging)"
      vlan_id: 20
      ports:
        - bond0
      address: "10.10.20.18/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0

    vmbr40:
      prod: true
      description: "VM Bridge - VLAN 40 (Production)"
      vlan_id: 40
      vlan_tagged: false
      ports:
        - enp6s0f1
      address: "10.10.40.18/24"
      vlan_aware: true
      auto: true
      stp: true
      stp_forward_delay: 0


# =============================================================================
# Global Bridge Defaults
# =============================================================================
proxmox_bridges:

  vmbr0:
    description: "VM Bridge - VLAN 1 (Infrastructure / Management)"
    vlan_id: 1
    ports: []
    vlan_aware: true
    auto: true
    stp: true
    stp_forward_delay: 0

  vmbr40:
    prod: true
    description: "VM Bridge - VLAN 40 (Production)"
    vlan_id: 40
    ports: []
    vlan_aware: true
    auto: true
    stp: true
    stp_forward_delay: 0

# =============================================================================
# Networking Behavior
# =============================================================================

proxmox_networking_restart_required: false

proxmox_management_network: "10.10.10.0/24"
proxmox_cluster_network: "10.10.10.0/24"
