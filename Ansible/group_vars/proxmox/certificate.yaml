# =============================================================================
# Proxmox Certificate Management Configuration
# =============================================================================
# This file configures SSL/TLS certificate management for Proxmox nodes
#
# Supports:
# - Self-signed certificates
# - ACME (Let's Encrypt) certificates
# - Manual CA-signed certificates
# - Certificate renewal and rotation
#
# See: Ansible/roles/proxmox-certs/README.md for detailed documentation

# =============================================================================
# Certificate Source Configuration
# =============================================================================

# Certificate source: 'self-signed', 'acme', or 'manual'
proxmox_cert_source: "self-signed"

# Certificate validity period (days)
proxmox_cert_validity_days: 365

# =============================================================================
# Self-Signed Certificate Configuration
# =============================================================================

# Self-signed certificate paths
proxmox_cert_dir: /etc/pve/nodes/{{ inventory_hostname }}/pve-ssl.pem
proxmox_key_dir: /etc/pve/nodes/{{ inventory_hostname }}/pve-ssl.key

# Certificate Common Name (CN)
proxmox_cert_cn: "proxmox.sinlessgames.com"

# Certificate Subject Alternative Names (SANs)
proxmox_cert_san:
  - "{{ inventory_hostname }}"
  - "{{ ansible_host }}"
  - "proxmox.sinlessgames.com"
  - "*.sinlessgames.com"
  - "sinlessgames.com"
  - "proxmox.local"
  - "*.proxmox.local"

# Certificate subject fields
proxmox_cert_country: "US"
proxmox_cert_state: "State"
proxmox_cert_locality: "City"
proxmox_cert_organization: "Sinless Games"
proxmox_cert_ou: "Infrastructure"

# =============================================================================
# ACME / Let's Encrypt Configuration
# =============================================================================
# Configuration for automatic ACME (Let's Encrypt) certificate management.
#
# These Ansible variables automatically populate the Proxmox ACME fields in the UI:
#
# Proxmox UI → Datacenter → ACME → Accounts:
#   Account Name:  proxmox_acme_account_name      (default)
#   E-Mail:        proxmox_acme_email             (admin@sinlessgames.com)
#   ACME Directory: proxmox_acme_directory        (Let's Encrypt URL)
#
# Proxmox UI → Datacenter → ACME → Plugins:
#   Plugin ID:     proxmox_acme_plugin_id         (dns_cloudflare)
#   Type:          proxmox_acme_plugin_type       (dns)
#   DNS API:       proxmox_acme_dns_api           (cloudflare)
#   API Data:      proxmox_acme_dns_api_data      (CF_Token=..., from vault)
#
# See: Docs/Start-Here/09-ACME-Certificate-Management.md for setup guide

# Enable ACME certificate management (requires acme.sh)
proxmox_acme_enabled: true

# Proxmox password for API authentication (required for ACME configuration)
# Should be set via vault for security
proxmox_acme_password: "{{ vault_proxmox_root_password }}"

# ACME account name in Proxmox
proxmox_acme_account_name: "default"

# ACME Directory URLs by provider
# Let's Encrypt Production
proxmox_acme_directory_letsencrypt_prod: "https://acme-v02.api.letsencrypt.org/directory"
# Let's Encrypt Staging
proxmox_acme_directory_letsencrypt_staging: "https://acme-staging-v02.api.letsencrypt.org/directory"
# ZeroSSL
proxmox_acme_directory_zerossl: "https://acme.zerossl.com/v2/DV90"
# Buypass
proxmox_acme_directory_buypass: "https://api.buypass.com/acme/directory"

# Selected directory based on provider
proxmox_acme_provider: "letsencrypt"
proxmox_acme_provider_staging: false

# Dynamic directory selection
proxmox_acme_directory: "{{ proxmox_acme_directory_letsencrypt_staging if proxmox_acme_provider_staging else proxmox_acme_directory_letsencrypt_prod }}"

# ACME email for certificate notifications
proxmox_acme_email: "support@sinlessgames.com"

# ACME challenge type: 'http-01', 'dns-01', 'tls-alpn-01'
proxmox_acme_challenge_type: "dns-01"

# DNS validation provider for automated DNS challenges
proxmox_acme_plugin_id: "dns_cloudflare"
proxmox_acme_plugin_type: "dns"

# DNS API Provider Configuration
# Common providers: route53, cloudflare, digitalocean, ovh, linode, etc.
# Set based on your DNS provider
proxmox_acme_dns_api: "cf"

# DNS API credentials (format depends on provider)
# For Cloudflare: "CF_Token=<token>"
# For Route53: "AWS_ACCESS_KEY_ID=<key>&AWS_SECRET_ACCESS_KEY=<secret>"
# For DigitalOcean: "DO_AUTH_TOKEN=<token>"
# NOTE: For Cloudflare token, use vault: {{ vault_cloudflare_dns_token }}
proxmox_acme_dns_api_data: "{{ vault_cloudflare_dns_token | default('') }}"

# ACME domains (for Let's Encrypt)
proxmox_acme_domains:
  - "{{ inventory_hostname }}.local.sinlessgames.com"
  - "local.sinlessgames.com"

# =============================================================================
# Manual Certificate Configuration
# =============================================================================

# Use manually provided certificates
proxmox_cert_manual: false

# Path to manual certificate file (PEM format)
# proxmox_cert_manual_path: "/path/to/cert.pem"

# Path to manual private key file
# proxmox_cert_manual_key_path: "/path/to/key.pem"

# =============================================================================
# Certificate Management
# =============================================================================

# Automatically renew certificates before expiration
proxmox_cert_auto_renew: true

# Days before expiration to trigger renewal
proxmox_cert_renewal_threshold: 30

# Certificate backup before replacement
proxmox_cert_backup: true

# Backup retention (number of old certificate versions to keep)
proxmox_cert_backup_retention: 5

# Restart Proxmox services after certificate update
proxmox_cert_restart_services: true

# =============================================================================
# Certificate Locations (Read-only, for reference)
# =============================================================================

# Proxmox certificate storage directory
proxmox_certs_base_dir: /etc/pve/nodes

# Proxmox certificate file naming
proxmox_cert_filename: "pve-ssl.pem"
proxmox_key_filename: "pve-ssl.key"

# Backup directory
proxmox_cert_backup_dir: "/var/backups/proxmox-certs"
