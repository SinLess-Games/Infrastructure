---
# =============================================================================
# Storage Configuration for Proxmox Nodes
# =============================================================================

proxmox_storage_enabled: true
proxmox_storage_auto_discover_disks: true
proxmox_storage_clean_all_disks: true
proxmox_storage_clean_disk_patterns:
  - "/dev/sd[b-z]"
  - "/dev/nvme[0-9]n1"

# Disks reserved from Proxmox storage automation (cleaning/discovery/assignment).
# Use this for passthrough targets, e.g. TrueNAS data disks.
proxmox_storage_reserved_disks:
  pve-01:
    - "/dev/sde"

# Limit destructive disk cleaning and storage provisioning to the nodes that
# are meant to host local VM storage.
proxmox_storage_nodes:
  - pve-01
  - pve-03
  - pve-04
  - pve-05

# List of pools to create.
proxmox_storage_pool_names:
  - "VM_Disks"
  - "Backups"

# Weighted split for disk assignment.
# Higher weight receives more disks.
proxmox_storage_pool_weights:
  VM_Disks: 3
  Backups: 1

# Pool placement preferences.
# Backups should stay on a single smaller disk, while VM_Disks should consume
# the remaining larger capacity.
proxmox_storage_pool_max_disks:
  Backups: 1

proxmox_storage_pool_prefer:
  VM_Disks: largest
  Backups: smallest

# Optional per-pool content override (default is images,rootdir).
proxmox_storage_pool_contents:
  VM_Disks: "images,rootdir"
  Backups: "backup"
