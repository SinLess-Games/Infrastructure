proxmox_node:
  licensed: false

# Some nodes still present legacy RSA host keys, so keep SSH compatibility
# enabled until those host keys are rotated.
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no
  -o UserKnownHostsFile=/dev/null
  -o HostKeyAlgorithms=+ssh-rsa
  -o PubkeyAcceptedAlgorithms=+ssh-rsa

# =============================================================================
# Proxmox Cluster Control
# =============================================================================

proxmox_cluster_enabled: true
proxmox_cluster_name: Sinless-Games
proxmox_cluster_bootstrap: true

# =============================================================================
# Corosync / Cluster Networking
# =============================================================================

# Proxmox management bridge
proxmox_cluster_network_interface: vmbr0

# Bind corosync to the node's management IP
proxmox_cluster_bind_address: "{{ ansible_host }}"

# Address of init node to join (dynamically resolved to init node's IP)
proxmox_cluster_join_address: "{{ hostvars[proxmox_cluster_init_node]['ansible_host'] }}"
