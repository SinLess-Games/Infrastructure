---
# Proxmox HA Configuration Variables
# Place HA resource groups and VM management settings here

# HA Resource Groups - Define logical groups of nodes for resource placement
proxmox_ha_resource_groups: []
# Example:
# - name: "webservers"
#   comment: "Web application servers"
#   nodes: "pve-01,pve-02,pve-03"
#   priority: 100
# - name: "databases"
#   comment: "Database servers"
#   nodes: "pve-03,pve-04,pve-05"
#   priority: 50
# - name: "storage"
#   comment: "Storage nodes"
#   nodes: "pve-02,pve-03,pve-04"
#   priority: 25

# HA Resources - VMs and containers to manage under HA
proxmox_ha_resources: []
# Example:
# - sid: "vm:100"         # Format: vm:<id> or ct:<id>
#   group: "webservers"   # HA resource group
#   state: "started"      # started, stopped, disabled
#   max_restart: 4        # Max restarts per 24h period
#   max_relocate: 4       # Max relocate attempts
#   comment: "Web server 1"
# - sid: "vm:101"
#   group: "webservers"
#   state: "started"
#   comment: "Web server 2"
# - sid: "vm:200"
#   group: "databases"
#   state: "started"
#   max_restart: 2        # Databases - more conservative
#   max_relocate: 3
#   comment: "PostgreSQL primary"
# - sid: "ct:300"
#   group: "webservers"
#   state: "started"
#   comment: "LXC container"

# HA Affinity Rules - Control VM placement relationships
proxmox_ha_affinity_rules: []
# Affinity rules define relationships between VMs or resource groups
# Types:
#   - group: Keep VMs together on same node for performance/data locality
#   - anti: Keep VMs on different nodes for fault tolerance/load distribution
#
# Example affinity rules:
# - id: "webservers-together"
#   type: "group"                        # Keep these VMs together
#   vmgroup: "webservers"                # All VMs in webservers group
#   nodes: "pve-01,pve-02,pve-03"       # Preferred nodes for placement
#   enabled: true
#
# - id: "database-isolation"
#   type: "anti"                         # Keep these VMs separated
#   vmgroup: "databases"                 # All VMs in databases group
#   enabled: true                        # Each DB on different node
#
# - id: "cache-with-compute"
#   type: "group"                        # Redis cache runs with web servers
#   nodes: "pve-01,pve-02"
#   enabled: true
