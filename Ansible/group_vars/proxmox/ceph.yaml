---
# Ceph configuration variables

# Nodes to configure Ceph on
ceph_nodes:
  - pve-01
  - pve-04
  - pve-05

# Node used for cluster bootstrap and pool creation
ceph_bootstrap_node: pve-01

# Monitor hosts used by Proxmox storage definitions
# Must use storage network IPs (10.10.60.x) where Ceph monitors listen
ceph_mon_hosts:
  - 10.10.60.15  # pve-01 storage network
  - 10.10.60.18  # pve-04 storage network
  - 10.10.60.19  # pve-05 storage network

# Number of metadata servers per node (1 primary, rest are standbys)
ceph_mds_per_node: 2

# Packages required for Ceph on Proxmox
ceph_packages:
  - ceph
  - ceph-common

# Optional OSD devices per node (fill in device paths as needed)
# Example:
# ceph_osd_devices:
#   pve-01: ["/dev/sdb", "/dev/sdc"]
#   pve-02: ["/dev/sdb"]
#   pve-03: ["/dev/sdb"]
ceph_osd_devices: {}

# Specify the Ceph pools and their storage types
# storage_type: replicated | erasure
# application: rbd | cephfs | rgw (optional)
ceph_pools:
  - name: VM_Disks
    storage_type: replicated
    pg_num: 64
    size: 2
    application: rbd
    content: images,rootdir
    mon_hosts:
      - 10.10.60.15
      - 10.10.60.18
      - 10.10.60.19

cephfs:
  - name: ISOs
    storage_type: replicated
    pg_num: 32
    size: 2
    metadata_pool: isos_metadata
    data_pool: isos_data
    max_mds: 1
    standby_count_wanted: 0
    content: iso
    path: /mnt/pve/ISOs
    mon_hosts:
      - 10.10.60.15
      - 10.10.60.18
      - 10.10.60.19
  
  - name: Backups
    storage_type: replicated
    pg_num: 32
    size: 2
    metadata_pool: backups_metadata
    data_pool: backups_data
    max_mds: 1
    standby_count_wanted: 0
    content: backup
    path: /mnt/pve/Backups
    mon_hosts:
      - 10.10.60.15
      - 10.10.60.18
      - 10.10.60.19
