---
# =============================================================================
# Kubernetes Staging Cluster Variables - Shared
# =============================================================================

kubernetes_environment: "staging"
kubernetes_cluster_name: "k8s-staging"
kubernetes_resource_pool: "staging"
kubernetes_domain_suffix: "staging.k8s.sinlessgames.com"
kubernetes_search_domain: "{{ kubernetes_domain_suffix }}"

kubernetes_network:
  bridge: "vmbr1"
  vlan_id: 30
  subnet: "10.10.30.0/24"
  cidr_suffix: "/24"
  gateway: "10.10.30.1"
  nameservers: "10.10.10.1 1.1.1.1"

kubernetes_proxmox_target_nodes:
  - "pve-01"
  - "pve-04"
  - "pve-05"

kubernetes_master:
  count: 3
  vmid_start: 320
  name_prefix: "k8s-staging-master"
  cpu_cores: 4
  cpu_sockets: 1
  memory_mb: 8192
  disk_size: "100G"
  clone_template: "debian-13-template"
  target_nodes:
    - "pve-01"
    - "pve-04"
    - "pve-05"

kubernetes_worker:
  count: 3
  vmid_start: 330
  name_prefix: "k8s-staging-worker"
  cpu_cores: 4
  cpu_sockets: 1
  memory_mb: 8192
  disk_size: "100G"
  clone_template: "debian-13-template"
  target_nodes:
    - "pve-01"
    - "pve-04"
    - "pve-05"

kubernetes_master_ips:
  - "10.10.30.11"
  - "10.10.30.12"
  - "10.10.30.13"

kubernetes_worker_ips:
  - "10.10.30.20"
  - "10.10.30.21"
  - "10.10.30.22"

# =============================================================================
# Explicit Node Definitions
# =============================================================================

kubernetes_nodes:
  control_plane:
    - name: "k8s-staging-master-01"
      hostname: "k8s-staging-master-01"
      fqdn: "k8s-staging-master-01.staging.k8s.sinlessgames.com"
      ip: "10.10.30.11"
      vmid: 320
      target_node: "pve-01"

    - name: "k8s-staging-master-02"
      hostname: "k8s-staging-master-02"
      fqdn: "k8s-staging-master-02.staging.k8s.sinlessgames.com"
      ip: "10.10.30.12"
      vmid: 321
      target_node: "pve-04"

    - name: "k8s-staging-master-03"
      hostname: "k8s-staging-master-03"
      fqdn: "k8s-staging-master-03.staging.k8s.sinlessgames.com"
      ip: "10.10.30.13"
      vmid: 322
      target_node: "pve-05"

  workers:
    - name: "k8s-staging-worker-01"
      hostname: "k8s-staging-worker-01"
      fqdn: "k8s-staging-worker-01.staging.k8s.sinlessgames.com"
      ip: "10.10.30.20"
      vmid: 330
      target_node: "pve-01"

    - name: "k8s-staging-worker-02"
      hostname: "k8s-staging-worker-02"
      fqdn: "k8s-staging-worker-02.staging.k8s.sinlessgames.com"
      ip: "10.10.30.21"
      vmid: 331
      target_node: "pve-04"

    - name: "k8s-staging-worker-03"
      hostname: "k8s-staging-worker-03"
      fqdn: "k8s-staging-worker-03.staging.k8s.sinlessgames.com"
      ip: "10.10.30.22"
      vmid: 332
      target_node: "pve-05"

kubernetes_externaldns:
  technitium:
    server: "http://10.10.10.11:5380"
    zone: "staging.k8s.sinlessgames.com"
    token: "{{ lookup('env', 'TECHNITIUM_API_TOKEN') | default('', true) }}"
  cloudflare:
    domain_filter: "sinlessgames.com"
    token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') | default('', true) }}"

kubernetes_flux_path: "./Kubernetes/clusters/staging"
kubernetes_vault_kv_path: "secret/data/kubernetes/staging"
kubernetes_vault_eso_secret_path: "kubernetes/staging"
kubernetes_externaldns_technitium_enabled: false
