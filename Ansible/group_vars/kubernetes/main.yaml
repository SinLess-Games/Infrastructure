---
# =============================================================================
# Shared Kubernetes defaults
# =============================================================================

kubernetes_repo_root: "{{ playbook_dir | dirname | dirname }}"
kubernetes_terraform_dir: "{{ kubernetes_repo_root }}/Terraform"
kubernetes_templates_dir: "{{ kubernetes_repo_root }}/Ansible/templates/kubernetes"
kubernetes_generated_dir: "{{ kubernetes_repo_root }}/.outputs/kubernetes"
kubernetes_generated_env_dir: "{{ kubernetes_generated_dir }}/{{ kubernetes_environment }}"
kubernetes_kubeconfig_local_path: "{{ kubernetes_generated_env_dir }}/kubeconfig"
kubernetes_kubeconfig_archive_path: "{{ kubernetes_generated_env_dir }}/kubeconfig-{{ kubernetes_environment }}"

kubernetes_paths:
  repo_root: "{{ kubernetes_repo_root }}"
  terraform_dir: "{{ kubernetes_terraform_dir }}"
  templates_dir: "{{ kubernetes_templates_dir }}"
  generated_dir: "{{ kubernetes_generated_dir }}"
  generated_env_dir: "{{ kubernetes_generated_env_dir }}"

kubernetes_proxmox:
  api_url: "{{ infra_proxmox_api_url }}"
  deploy_api_url: "https://pve-01.local.sinlessgames.com:8006"
  tls_insecure: "{{ infra_proxmox_tls_insecure }}"
  api_token_file: "{{ infra_proxmox_api_token_file }}"
  storage: "VM_Disks"
  storage_by_node:
    pve-01: "vm_disks_01"
    pve-04: "vm_disks_04"
    pve-05: "vm_disks_05"
  node_ssh_hosts:
    pve-01: "10.10.10.14"
    pve-02: "10.10.10.15"
    pve-03: "10.10.10.16"
    pve-04: "10.10.10.17"
    pve-05: "10.10.10.18"

kubernetes_node_defaults:
  template: "flatcar-template"
  clone_template: "debian-13-template"
  enable_ignition_fw_cfg: false
  force_create: true
  startup_up_delay: 30
  startup_down_delay: 30

kubernetes_ansible:
  default_user: "{{ infra_bootstrap_default_user }}"
  user: "{{ infra_bootstrap_ansible_user }}"
  ssh_private_key_file: "{{ kubernetes_repo_root }}/.outputs/ssh/sinless777/id_ed25519"
  python_interpreter: "{{ ansible_python_interpreter }}"
  become: true
  become_method: sudo

kubernetes_miniconda:
  installer_url: "https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh"
  prefix: "/opt/miniconda"

kubernetes_versions:
  rke2: "v1.31.5+rke2r1"
  flux: "2.4.0"
  cilium_chart: "1.16.5"
  ingress_nginx_chart: "4.11.3"
  cert_manager_chart: "v1.16.2"
  external_dns_chart: "1.15.0"
  external_secrets_chart: "0.10.5"
  kube_prometheus_stack_chart: "66.3.1"
  promtail_chart: "6.16.6"
  beyla_chart: "1.8.9"
  istio_chart: "1.24.2"

kubernetes_network_defaults:
  cluster_cidr: "10.42.0.0/16"
  service_cidr: "10.43.0.0/16"
  cluster_dns: "10.43.0.10"

kubernetes_operation:
  plan_only: false
  destroy: false
  force_apply: false
  wait_for_ssh_timeout: 600
  wait_for_kubeconfig_timeout: 300
  wait_for_api_timeout: 600
  wait_for_node_ready_timeout: 60
  wait_for_node_ready_retries: 15
  wait_for_node_ready_delay: 20
  wait_for_rke2_active_retries: 120
  wait_for_rke2_active_delay: 10

kubernetes_vault:
  addr: "https://10.10.10.180:443"
  skip_verify: true
  token: "{{ lookup('env', 'VAULT_TOKEN') | default('', true) }}"
  token_file: "{{ playbook_dir }}/../../.outputs/vault/unseal-keys.json"
  kv_mount: "secret"
  kv_path: "kubernetes/{{ kubernetes_environment }}"
  eso_mount: "kv"
  eso_secret_path: "kubernetes/{{ kubernetes_environment }}"

kubernetes_observability:
  mimir_remote_write_url: "https://mimir.service.sinlessgames.com/api/v1/push"
  loki_push_url: "https://loki.service.sinlessgames.com/loki/api/v1/push"

kubernetes_flux:
  git_url: "https://github.com/Sinless777/Infrastructure.git"
  git_branch: "main"
  path: "./Kubernetes/clusters/{{ kubernetes_environment }}"

kubernetes_enable_ignition_fw_cfg: "{{ kubernetes_node_defaults.enable_ignition_fw_cfg }}"
kubernetes_force_create: "{{ kubernetes_node_defaults.force_create }}"

kubernetes_rke2_version: "{{ kubernetes_versions.rke2 }}"
kubernetes_cluster_cidr: "{{ kubernetes_network_defaults.cluster_cidr }}"
kubernetes_service_cidr: "{{ kubernetes_network_defaults.service_cidr }}"
kubernetes_cluster_dns: "{{ kubernetes_network_defaults.cluster_dns }}"

kubernetes_wait_for_ssh_timeout: "{{ kubernetes_operation.wait_for_ssh_timeout }}"
kubernetes_wait_for_kubeconfig_timeout: "{{ kubernetes_operation.wait_for_kubeconfig_timeout }}"
kubernetes_wait_for_api_timeout: "{{ kubernetes_operation.wait_for_api_timeout }}"
kubernetes_wait_for_node_ready_timeout: "{{ kubernetes_operation.wait_for_node_ready_timeout | default(60) }}"
kubernetes_wait_for_node_ready_retries: "{{ kubernetes_operation.wait_for_node_ready_retries | default(15) }}"
kubernetes_wait_for_node_ready_delay: "{{ kubernetes_operation.wait_for_node_ready_delay | default(20) }}"
kubernetes_wait_for_rke2_active_retries: "{{ kubernetes_operation.wait_for_rke2_active_retries | default(120) }}"
kubernetes_wait_for_rke2_active_delay: "{{ kubernetes_operation.wait_for_rke2_active_delay | default(10) }}"

kubernetes_proxmox_api_token_file: "{{ kubernetes_proxmox.api_token_file }}"

kubernetes_deploy_repo_root: "{{ kubernetes_repo_root }}"
kubernetes_deploy_terraform_dir: "{{ kubernetes_terraform_dir }}"
kubernetes_deploy_cluster_name: "{{ kubernetes_cluster_name }}"
kubernetes_deploy_environment: "{{ kubernetes_environment }}"
kubernetes_deploy_network_bridge: "{{ kubernetes_network.bridge }}"
kubernetes_deploy_network_vlan_id: "{{ kubernetes_network.vlan_id }}"
kubernetes_deploy_network_cidr_suffix: "{{ kubernetes_network.cidr_suffix }}"
kubernetes_deploy_network_nameservers: "{{ kubernetes_network.nameservers }}"
kubernetes_deploy_search_domain: "{{ kubernetes_search_domain | default(kubernetes_domain_suffix) }}"
kubernetes_deploy_cluster_cidr: "{{ kubernetes_cluster_cidr }}"
kubernetes_deploy_service_cidr: "{{ kubernetes_service_cidr }}"
kubernetes_deploy_cluster_dns: "{{ kubernetes_cluster_dns }}"
kubernetes_deploy_rke2_version: "{{ kubernetes_rke2_version }}"
kubernetes_deploy_wait_for_ssh_timeout: "{{ kubernetes_wait_for_ssh_timeout }}"
kubernetes_deploy_wait_for_kubeconfig_timeout: "{{ kubernetes_wait_for_kubeconfig_timeout }}"
kubernetes_deploy_wait_for_api_timeout: "{{ kubernetes_wait_for_api_timeout }}"
kubernetes_deploy_proxmox_api_token_file: "{{ kubernetes_proxmox.api_token_file }}"
kubernetes_deploy_proxmox_api_url: "{{ kubernetes_proxmox.deploy_api_url }}"
kubernetes_deploy_proxmox_tls_insecure: "{{ kubernetes_proxmox.tls_insecure }}"
kubernetes_deploy_vault_addr: "{{ kubernetes_vault.addr }}"
kubernetes_deploy_vault_skip_verify: "{{ kubernetes_vault.skip_verify }}"
kubernetes_deploy_vault_token: "{{ lookup('env', 'VAULT_TOKEN') | default(kubernetes_vault.token, true) }}"
kubernetes_deploy_vault_token_file: "{{ kubernetes_vault.token_file }}"

kubernetes_deploy_master_count: "{{ kubernetes_master.count }}"
kubernetes_deploy_master_vmid_start: "{{ kubernetes_master.vmid_start }}"
kubernetes_deploy_master_vm_id_start: "{{ kubernetes_master.vmid_start }}"
kubernetes_deploy_master_name_prefix: "{{ kubernetes_master.name_prefix }}"
kubernetes_deploy_master_cpu_cores: "{{ kubernetes_master.cpu_cores }}"
kubernetes_deploy_master_cpu_sockets: "{{ kubernetes_master.cpu_sockets }}"
kubernetes_deploy_master_memory_mb: "{{ kubernetes_master.memory_mb }}"
kubernetes_deploy_master_disk_size: "{{ kubernetes_master.disk_size }}"
kubernetes_deploy_master_clone_template: "{{ kubernetes_master.clone_template }}"
kubernetes_deploy_master_target_nodes: "{{ kubernetes_master.target_nodes }}"
kubernetes_deploy_master_ips: "{{ kubernetes_master_ips }}"
kubernetes_deploy_master_ip_addresses: "{{ kubernetes_master_ips }}"
kubernetes_deploy_master_gateway: "{{ kubernetes_network.gateway }}"
kubernetes_deploy_master_bridge: "{{ kubernetes_network.bridge }}"
kubernetes_deploy_master_vlan_id: "{{ kubernetes_network.vlan_id }}"
kubernetes_deploy_master_cidr_suffix: "{{ kubernetes_network.cidr_suffix }}"
kubernetes_deploy_master_nameservers: "{{ kubernetes_network.nameservers }}"
kubernetes_deploy_master_search_domain: "{{ kubernetes_domain_suffix }}"
kubernetes_deploy_master_startup_order: "{{ kubernetes_master.startup_order | default(10) }}"
kubernetes_deploy_master_startup_up_delay: "{{ kubernetes_node_defaults.startup_up_delay }}"
kubernetes_deploy_master_startup_down_delay: "{{ kubernetes_node_defaults.startup_down_delay }}"

kubernetes_deploy_worker_count: "{{ kubernetes_worker.count }}"
kubernetes_deploy_worker_vmid_start: "{{ kubernetes_worker.vmid_start }}"
kubernetes_deploy_worker_vm_id_start: "{{ kubernetes_worker.vmid_start }}"
kubernetes_deploy_worker_name_prefix: "{{ kubernetes_worker.name_prefix }}"
kubernetes_deploy_worker_cpu_cores: "{{ kubernetes_worker.cpu_cores }}"
kubernetes_deploy_worker_cpu_sockets: "{{ kubernetes_worker.cpu_sockets }}"
kubernetes_deploy_worker_memory_mb: "{{ kubernetes_worker.memory_mb }}"
kubernetes_deploy_worker_disk_size: "{{ kubernetes_worker.disk_size }}"
kubernetes_deploy_worker_clone_template: "{{ kubernetes_worker.clone_template }}"
kubernetes_deploy_worker_target_nodes: "{{ kubernetes_worker.target_nodes }}"
kubernetes_deploy_worker_ips: "{{ kubernetes_worker_ips }}"
kubernetes_deploy_worker_ip_addresses: "{{ kubernetes_worker_ips }}"
kubernetes_deploy_worker_gateway: "{{ kubernetes_network.gateway }}"
kubernetes_deploy_worker_bridge: "{{ kubernetes_network.bridge }}"
kubernetes_deploy_worker_vlan_id: "{{ kubernetes_network.vlan_id }}"
kubernetes_deploy_worker_cidr_suffix: "{{ kubernetes_network.cidr_suffix }}"
kubernetes_deploy_worker_nameservers: "{{ kubernetes_network.nameservers }}"
kubernetes_deploy_worker_search_domain: "{{ kubernetes_domain_suffix }}"
kubernetes_deploy_worker_startup_order: "{{ kubernetes_worker.startup_order | default(20) }}"
kubernetes_deploy_worker_startup_up_delay: "{{ kubernetes_node_defaults.startup_up_delay }}"
kubernetes_deploy_worker_startup_down_delay: "{{ kubernetes_node_defaults.startup_down_delay }}"

kubernetes_configure_distribution: "rke2"
kubernetes_configure_version: "{{ kubernetes_rke2_version }}"
kubernetes_configure_channel: "stable"
kubernetes_configure_cluster_cidr: "{{ kubernetes_cluster_cidr }}"
kubernetes_configure_service_cidr: "{{ kubernetes_service_cidr }}"
kubernetes_configure_cluster_dns: "{{ kubernetes_cluster_dns }}"

kubernetes_rke2_api_ip: "{{ kubernetes_api_vip | default(kubernetes_control_plane_first_ip) }}"
kubernetes_rke2_api_private_port: 9345
kubernetes_server_url: "https://{{ kubernetes_rke2_api_ip }}:{{ kubernetes_rke2_api_private_port }}"
kubernetes_rke2_join_ip: "{{ kubernetes_control_plane_first_ip }}"
kubernetes_join_server_url: "https://{{ kubernetes_rke2_join_ip }}:{{ kubernetes_rke2_api_private_port }}"
kubernetes_rke2_cni:
  - cilium
kubernetes_rke2_ingress_controller: "none"
kubernetes_rke2_disable:
  - rke2-ingress-nginx
kubernetes_rke2_disable_kube_proxy: false
kubernetes_rke2_write_kubeconfig_mode: "0644"
kubernetes_rke2_additional_sans:
  - "{{ kubernetes_rke2_api_ip }}"
  - "{{ kubernetes_control_plane_first_host }}"
  - "{{ kubernetes_domain_suffix }}"
kubernetes_rke2_pause_image: "docker.io/rancher/pause:3.6"
kubernetes_rke2_node_ip_autodetect_interface: "eth0"
kubernetes_rke2_selinux: false
kubernetes_rke2_snapshot_schedule_cron: "0 */6 * * *"
kubernetes_rke2_snapshot_retention: 14
kubernetes_rke2_etcd_expose_metrics: true
kubernetes_kube_vip:
  enabled: true
  interface: "eth0"
  image: "ghcr.io/kube-vip/kube-vip:v0.8.9"
  vip: "{{ kubernetes_api_vip | default('') }}"
  cidr: "{{ (kubernetes_network.subnet | default('0.0.0.0/24')).split('/')[-1] }}"
  controlplane: true
  services: false
  arp: true
  leader_election: true
kubernetes_proxmox_gpu:
  enabled: true
  host: "pve-01"
  vm_name: "{{ kubernetes_rke2_gpu_worker_name | default('rke2-prod-wk-01') }}"
  vmid: 410
  devices:
    - "NVidia-1060"
    - "Nvidia-3060"
kubernetes_validation_scripts_dir: "{{ kubernetes_repo_root }}/Kubernetes/validation/{{ kubernetes_environment }}/scripts"
kubernetes_rke2_kubelet_arg: []
kubernetes_rke2_kube_proxy_arg: []
kubernetes_rke2_server_node_taints: []
kubernetes_rke2_agent_node_taints: []
