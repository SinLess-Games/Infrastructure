---
# =============================================================================
# Kubernetes Development Cluster Variables - Shared
# =============================================================================

kubernetes_default_environment: "dev"
kubernetes_environment: "dev"
kubernetes_cluster_name: "k8s-dev"
kubernetes_resource_pool: "development"
kubernetes_domain_suffix: "dev.k8s.sinlessgames.com"
kubernetes_search_domain: "{{ kubernetes_domain_suffix }}"

kubernetes_network:
  bridge: "vmbr1"
  vlan_id: 20
  subnet: "10.10.20.0/24"
  cidr_suffix: "/24"
  gateway: "10.10.20.1"
  nameservers: "10.10.10.1 1.1.1.1"

kubernetes_proxmox_target_nodes:
  - pve-01
  - pve-04
  - pve-05

# Vault secrets populated at deployment time
vault_kubernetes_development_data: {}
vault_kubernetes_ansible_development_data: {}

kubernetes_deploy_rke2_server_token: "{{ vault_kubernetes_development_data.rke2_server_token | default('') }}"
kubernetes_deploy_ssh_keys: "{{ vault_kubernetes_ansible_development_data.kubernetes_ssh_keys | default([]) }}"
