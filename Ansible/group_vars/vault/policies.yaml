# Vault user policies definition
vault_user_policies:
  # Ansible policy - can read/write to ansible secrets in centralized store
  ansible: |    # Read and write to ansible secrets in centralized KV v2 store
    path "secrets/data/ansible/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    path "secrets/metadata/ansible/*" {
      capabilities = ["read", "list"]
    }

    # Read and write to kubernetes secrets for deployment
    path "secrets/data/kubernetes/*" {
      capabilities = ["read", "list"]
    }

    path "secrets/metadata/kubernetes/*" {
      capabilities = ["read", "list"]
    }

    # Allow listing top-level secrets paths for UI navigation
    path "secrets/metadata/*" {
      capabilities = ["list"]
    }

    # Allow listing the KV v2 root
    path "secrets/metadata" {
      capabilities = ["list"]
    }
    
    # Read auth methods
    path "sys/auth" {
      capabilities = ["read", "list"]
    }

  # Terraform policy - can read/write to terraform secrets in centralized store
  terraform: |
    # Read and write to terraform secrets in centralized KV v2 store
    path "secrets/data/terraform/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    path "secrets/metadata/terraform/*" {
      capabilities = ["read", "list"]
    }
    
    # Read AWS secrets engine for Terraform
    path "aws/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    # Read GCP secrets engine for Terraform
    path "gcp/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    # Read Azure secrets engine for Terraform
    path "azure/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    # Read Linode secrets engine for Terraform
    path "linode/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    
    # Read auth methods
    path "sys/auth" {
      capabilities = ["read", "list"]
    }

  # Admin policy - full access (already exists in Vault)
  admin: |
    # Admin access to everything
    path "*" {
      capabilities = ["create", "read", "update", "delete", "list", "sudo"]
    }

  # Helix frontend policy
  helix-frontend: |
    path "secrets/data/helix/frontend/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    path "secrets/metadata/helix/frontend/*" {
      capabilities = ["read", "list"]
    }

  # Helix auth service policy
  helix-auth: |
    path "secrets/data/helix/auth/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    path "secrets/metadata/helix/auth/*" {
      capabilities = ["read", "list"]
    }

  # Helix third-party policy
  helix-third-party: |
    path "secrets/data/helix/third-party/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    path "secrets/metadata/helix/third-party/*" {
      capabilities = ["read", "list"]
    }

  # SinLess Games application policy
  sinlessgames-app: |
    path "secrets/data/sinlessgames/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

    path "secrets/metadata/sinlessgames/*" {
