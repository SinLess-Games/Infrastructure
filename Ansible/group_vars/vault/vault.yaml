---
# =============================================================================
# Vault Deployment Variables
# =============================================================================
# Purpose:
#   - Terraform inputs for Vault VM deployment
#   - Network placement (VLAN 1, 10.10.10.0/24)
#   - Proxmox storage and HA configuration
# =============================================================================

# =============================================================================
# Terraform Module Configuration
# =============================================================================

vault_module_source: "./modules/vault-cluster"

# Proxmox API access for Terraform
vault_proxmox_api_url: "https://10.10.10.15:8006/api2/json"
vault_proxmox_tls_insecure: true
vault_proxmox_api_token_file: ".outputs/api-tokens/terraform-prov-api-token.txt"
vault_proxmox_api_token_file_ansible: ".outputs/api-tokens/ansible-prov-api-token.txt"

# =============================================================================
# Cluster Identity
# =============================================================================

vault_cluster_name: "vault-cluster"
vault_environment: "prod"

# =============================================================================
# Proxmox Placement (HA Distribution)
# =============================================================================

vault_target_nodes:
  - pve-01
  - pve-04
  - pve-05

# =============================================================================
# VM Naming and IDs
# =============================================================================

vault_node_count: 3
vault_node_name_prefix: "vault"
vault_vm_id_start: 200

# =============================================================================
# Network Configuration (VLAN 1 - 10.10.10.0/24)
# =============================================================================

vault_vlan_id: 0
vault_network_bridge: "vmbr0"
vault_gateway: "10.10.10.1"
vault_cidr_subnet: "/24"
vault_nameservers: "10.10.10.1 1.1.1.1"

vault_ip_addresses:
  - "10.10.10.2"
  - "10.10.10.3"
  - "10.10.10.4"

# =============================================================================
# Proxmox Template and Storage
# =============================================================================

vault_clone_template: "debian-13-template"
vault_storage: "Vault"

# =============================================================================
# Resource Allocation
# =============================================================================

vault_cpu_cores: 4
vault_cpu_sockets: 1
vault_memory_mb: 8192
vault_disk_size: "100G"

# =============================================================================
# Vault Configuration
# =============================================================================

vault_version: "1.15.4"
vault_port: 8200
vault_cluster_port: 8201
vault_storage_path: "/opt/vault/data"
vault_log_path: "/opt/vault/logs"

# Initialize Vault on first deployment (generates unseal keys)
vault_initialize: true
vault_key_shares: 5
vault_key_threshold: 3

# =============================================================================
# TLS Configuration
# =============================================================================

vault_tls_enabled: true
vault_tls_cert_path: "/opt/vault/tls/vault.crt"
vault_tls_key_path: "/opt/vault/tls/vault.key"
vault_tls_ca_path: "/opt/vault/tls/ca.crt"

# =============================================================================
# Access Configuration
# =============================================================================

vault_default_user: "sinless777"
vault_ansible_user: "ansible"

# SSH keys from .outputs/ssh/ directories
vault_ssh_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA7g0acAC3ORT/DUzu3ftMtRW6MlVWuWZ7qqd4tNHLcY automation@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKDoqYKB+akwuGHSAJWn6EeXR70zIg9oZXuP60Al1mOS breakglass@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEMakhAavnUU1qkhadP1tNtmwG7tsu49siUyMIEcKKn9 root@sinlessgames"
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ0Ch6BKvYa5V+7su2oXhf8jRBgBdRKvoqd0UKVtt1mS sinless777@sinlessgames"

# =============================================================================
# HA and Backup Configuration
# =============================================================================

vault_ha_enabled: true
vault_ha_group: "vault-ha"

vault_backup_enabled: true
vault_backup_schedule: "0 2 * * *"

# =============================================================================
# VM Lifecycle Options
# =============================================================================

vault_onboot: true
vault_agent_enabled: true
vault_protection: true
vault_startup_order: 10

# =============================================================================
# Tags and Metadata
# =============================================================================

vault_tags:
  - "vault"
  - "tier-0"
  - "ha"

vault_description: "HashiCorp Vault cluster node (Terraform-managed)"
