---
# KV v2 secrets engines
vault_kv_mounts:
  secrets:
    description: "Centralized secrets storage (KV v2)"
    options:
      version: "2"

# Non-KV secrets engines
vault_engine_mounts:
  aws:
    type: "aws"
    description: "AWS secrets engine"
    default_lease_ttl_seconds: 3600
    max_lease_ttl_seconds: 86400
  gcp:
    type: "gcp"
    description: "GCP secrets engine"
    default_lease_ttl_seconds: 3600
    max_lease_ttl_seconds: 86400
  azure:
    type: "azure"
    description: "Azure secrets engine"
    default_lease_ttl_seconds: 3600
    max_lease_ttl_seconds: 86400
  kubernetes-dev:
    type: "kubernetes"
    description: "Kubernetes dev secrets engine"
  kubernetes-test:
    type: "kubernetes"
    description: "Kubernetes test secrets engine"
  kubernetes-prod:
    type: "kubernetes"
    description: "Kubernetes prod secrets engine"
  transit:
    type: "transit"
    description: "Transit secrets engine"

# AWS secrets engine configuration
vault_aws_configs:
  aws:
    access_key: "{{ vault_aws_access_key }}"
    secret_key: "{{ vault_aws_secret_key }}"
    region: "us-east-1"
    default_lease_ttl_seconds: 3600
    max_lease_ttl_seconds: 86400

# GCP secrets engine configuration
vault_gcp_configs:
  gcp:
    credentials: "{{ vault_gcp_credentials_json }}"
    ttl: 3600
    max_ttl: 86400

# Azure secrets engine configuration
vault_azure_configs:
  azure:
    tenant_id: "{{ vault_azure_tenant_id }}"
    client_id: "{{ vault_azure_client_id }}"
    client_secret: "{{ vault_azure_client_secret }}"
    subscription_id: "{{ vault_azure_subscription_id }}"

# Linode secrets engine configuration
# Note: Linode secrets engine is not supported by Vault. Use KV v2 instead.

# Kubernetes secrets engine configuration
vault_kubernetes_configs:
  kubernetes-dev:
    kubernetes_host: "{{ vault_k8s_dev_host }}"
    kubernetes_ca_cert: "{{ vault_k8s_dev_ca_cert }}"
    token_reviewer_jwt: "{{ vault_k8s_dev_token_reviewer_jwt }}"
    issuer: "kubernetes/serviceaccount"
    disable_iss_validation: false
  kubernetes-test:
    kubernetes_host: "{{ vault_k8s_test_host }}"
    kubernetes_ca_cert: "{{ vault_k8s_test_ca_cert }}"
    token_reviewer_jwt: "{{ vault_k8s_test_token_reviewer_jwt }}"
    issuer: "kubernetes/serviceaccount"
    disable_iss_validation: false
  kubernetes-prod:
    kubernetes_host: "{{ vault_k8s_prod_host }}"
    kubernetes_ca_cert: "{{ vault_k8s_prod_ca_cert }}"
    token_reviewer_jwt: "{{ vault_k8s_prod_token_reviewer_jwt }}"
    issuer: "kubernetes/serviceaccount"
    disable_iss_validation: false

# PKI secrets engine configuration
# Note: PKI engine is already created by vault-configure role for Vault's own certificates.
# Additional PKI engines can be configured here if needed.
vault_pki_configs: {}

# Transit secrets engine configuration
vault_transit_configs:
  transit:
    keys:
      - name: "default"
        type: "aes256-gcm96"
        exportable: false

