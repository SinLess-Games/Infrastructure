---
# =============================================================================
# Ansible Galaxy Requirements
# -----------------------------------------------------------------------------
# Pinned collections and roles for deterministic infrastructure automation.
#
# Goals supported by this repo:
#   - Proxmox VE (cluster + Ceph) management
#   - Linux system baselining
#   - Kubernetes via RKE2 (HA-ready)
#   - Container tooling
#   - DNS services (Technitium)
#   - Cloudflare (DNS, records, tunnels, etc.)
#
# Notes on pinning:
#   - Collections: pin to exact versions for reproducible installs.
#   - Roles from Git: `version` MUST match a real git tag/branch/commit hash.
#     (Commonly tags are "vX.Y.Z", not "X.Y.Z".)
# =============================================================================

collections:
  # ---------------------------------------------------------------------------
  # Core / Utility
  # ---------------------------------------------------------------------------

  # POSIX-level system management (users, mounts, sysctl, services)
  - name: ansible.posix
    version: "1.6.2"

  # Filters, lookups, ipaddr, validation helpers
  - name: ansible.utils
    version: "5.1.2"

  # Broad community modules:
  # - filesystem, hardware, networking helpers
  # - lots of glue modules you end up needing everywhere
  - name: community.general
    version: "9.1.0"

  # Cryptography:
  # - TLS certs
  # - SSH keys
  # - PKI workflows
  - name: community.crypto
    version: "2.22.3"

  # Docker / container runtime management
  - name: community.docker
    version: "3.13.1"

  # PostgreSQL automation
  - name: community.postgresql
    version: "3.6.0"

  # ---------------------------------------------------------------------------
  # Kubernetes
  # ---------------------------------------------------------------------------

  # Canonical Kubernetes collection
  # - k8s / k8s_info
  # - Helm modules
  # - CRDs
  - name: kubernetes.core
    version: "5.0.0"

  # Supplemental Kubernetes helpers
  # NOTE: Prefer kubernetes.core when possible
  - name: community.kubernetes
    version: "2.0.1"

  # ---------------------------------------------------------------------------
  # DNS Management (Technitium)
  # ---------------------------------------------------------------------------

  # Technitium DNS Server management via its HTTP API
  # - zones
  # - records
  # - server settings
  # - blocklists (depending on role capabilities)
  - name: effectivelywild.technitium_dns
    version: "1.1.1"

  # ---------------------------------------------------------------------------
  # Hypervisor / Proxmox
  # ---------------------------------------------------------------------------

  # Proxmox API modules (create/manage VMs, users, pools, etc.)
  # Best for day-2 operations and provisioning.
  - name: community.proxmox
    version: "1.4.0"

  # ---------------------------------------------------------------------------
  # Cloudflare
  # ---------------------------------------------------------------------------

  # Cloudflare automation (DNS records, zones, etc.)
  # Useful for:
  # - public DNS records
  # - internal automation around tunnels / DNS entries (depending on modules used)
  - name: linuxhq.cloudflare
    version: "2.0.3"

# =============================================================================
# Roles
# =============================================================================
roles:
  # ---------------------------------------------------------------------------
  # Kubernetes: RKE2
  # ---------------------------------------------------------------------------

  # Rancher Kubernetes Engine 2 (RKE2)
  # Used for:
  # - HA production clusters
  # - staging clusters
  # - Proxmox-backed VMs or bare metal
  - name: lablabs.rke2
    version: "1.50.1"

  # ---------------------------------------------------------------------------
  # Proxmox VE: node/cluster configuration (Day-0 / Day-1)
  # ---------------------------------------------------------------------------

  # Proxmox VE management role (node/host configuration style)
  #
  # IMPORTANT:
  # - `version` must match an existing git tag/branch/commit.
  # - If you previously used "1.10.0" and got:
  #     "pathspec '1.10.0' did not match any file(s) known to git"
  #   that means the repo does NOT have a tag/branch named "1.10.0".
  # - Common tag format is "vX.Y.Z" (example: "v1.9.0").
  #
  # To verify tags:
  #   git ls-remote --tags https://github.com/lae/ansible-role-proxmox.git
  #
  # If you want maximum determinism, you can pin to a commit SHA instead.
  - name: lae.proxmox
    src: git+https://github.com/lae/ansible-role-proxmox.git
    scm: git
    version: "v1.9.0"

# =============================================================================
# Notes / Python deps (install separately; you already do this via requirements.txt)
#
# Proxmox:
#   - proxmoxer
#   - requests
#
# Kubernetes:
#   - kubernetes
#   - openshift
#   - pyyaml
#   - jmespath
#
# DNS / Cloudflare:
#   - requests/httpx (depending on libraries)
#
# Last reviewed: 2025-12
# =============================================================================
