---
- name: Build Vault runtime token from explicit token
  ansible.builtin.set_fact:
    vault_runtime_token: "{{ vault_token | default('') }}"
  no_log: true

- name: Check for Vault token file when explicit token is empty
  ansible.builtin.stat:
    path: "{{ vault_token_file }}"
  register: vault_token_file_stat
  when: vault_runtime_token | length == 0

- name: Read Vault token file
  ansible.builtin.slurp:
    src: "{{ vault_token_file }}"
  register: vault_token_file_content
  when:
    - vault_runtime_token | length == 0
    - vault_token_file_stat.stat.exists | default(false)
  no_log: true

- name: Build Vault runtime token from bootstrap file fallback
  ansible.builtin.set_fact:
    vault_runtime_token: >-
      {{
        vault_runtime_token
        if (vault_runtime_token | length > 0)
        else (
          (
            vault_token_file_content.content
            | b64decode
            | from_json
          ).root_token | default('')
        )
      }}
  when: vault_runtime_token | length == 0
  no_log: true

- name: Assert Vault runtime token is available
  ansible.builtin.assert:
    that:
      - vault_runtime_token | length > 0
    fail_msg: "A Vault token is required to load runtime secrets."

- name: Read Vault documents from KV paths
  ansible.builtin.shell: |
    set -euo pipefail
    curl --silent --show-error {{ (vault_skip_verify | bool) | ternary('--insecure', '') }} \
      --header "X-Vault-Token: ${VAULT_RUNTIME_TOKEN}" \
      "{{ vault_addr }}/v1/{{ vault_kv_mount }}/data/{{ item }}"
  args:
    executable: /bin/bash
  loop: "{{ vault_kv_paths | default([]) }}"
  loop_control:
    label: "{{ item }}"
  register: vault_runtime_document_results
  changed_when: false
  environment:
    VAULT_RUNTIME_TOKEN: "{{ vault_runtime_token }}"
  no_log: true

- name: Cache Vault runtime documents keyed by source path
  ansible.builtin.set_fact:
    vault_runtime_documents: >-
      {{
        dict(
          (vault_runtime_document_results.results | default([]))
          | map(attribute='item')
          | zip(
              (vault_runtime_document_results.results | default([]))
              | map(attribute='stdout')
              | map('from_json')
              | map(attribute='data')
              | map(attribute='data')
            )
        )
      }}
  no_log: true

- name: Initialize merged Vault runtime secret values
  ansible.builtin.set_fact:
    vault_runtime_secrets: {}
  no_log: true

- name: Merge Vault runtime secret values for convenience access
  ansible.builtin.set_fact:
    vault_runtime_secrets: "{{ vault_runtime_secrets | combine(item.value, recursive=True) }}"
  loop: "{{ vault_runtime_documents | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
