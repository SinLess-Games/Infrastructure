---
- name: Build Vault runtime token from explicit token
  ansible.builtin.set_fact:
    vault_runtime_token: "{{ vault_token | default('') }}"
  no_log: true

- name: Check for Vault token file
  ansible.builtin.stat:
    path: "{{ vault_token_file }}"
  register: vault_token_file_stat
  when: vault_token_file is defined

- name: Read Vault token file
  ansible.builtin.slurp:
    src: "{{ vault_token_file }}"
  register: vault_token_file_content
  when:
    - vault_token_file is defined
    - vault_token_file_stat.stat.exists | default(false)
  no_log: true

- name: Build Vault bootstrap token from token file
  ansible.builtin.set_fact:
    vault_bootstrap_token: >-
      {{
        (
          vault_token_file_content.content
          | b64decode
          | from_json
        ).root_token | default('')
      }}
  when:
    - vault_token_file is defined
    - vault_token_file_stat.stat.exists | default(false)
  no_log: true

- name: Initialize empty Vault bootstrap token when token file is unavailable
  ansible.builtin.set_fact:
    vault_bootstrap_token: ""
  when: vault_bootstrap_token is not defined
  no_log: true

- name: Build Vault runtime token from bootstrap file fallback
  ansible.builtin.set_fact:
    vault_runtime_token: >-
      {{
        vault_runtime_token
        if (vault_runtime_token | length > 0)
        else vault_bootstrap_token
      }}
  when: vault_runtime_token | length == 0
  no_log: true

- name: Assert Vault runtime token is available
  ansible.builtin.assert:
    that:
      - vault_runtime_token | length > 0
    fail_msg: "A Vault token is required to load runtime secrets."

- name: Read Vault documents from KV paths
  block:
    - name: Read Vault documents from KV paths with runtime token
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/{{ vault_kv_mount }}/data/{{ item }}"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_runtime_token }}"
        validate_certs: "{{ not (vault_skip_verify | bool) }}"
        return_content: true
        status_code: 200
      loop: "{{ vault_kv_paths | default([]) }}"
      loop_control:
        label: "{{ item }}"
      register: vault_runtime_document_results
      changed_when: false
      no_log: true
  rescue:
    - name: Retry Vault document reads with bootstrap token fallback
      when:
        - vault_bootstrap_token | length > 0
        - vault_bootstrap_token != vault_runtime_token
      block:
        - name: Switch Vault runtime token to bootstrap fallback
          ansible.builtin.set_fact:
            vault_runtime_token: "{{ vault_bootstrap_token }}"
          no_log: true

        - name: Read Vault documents from KV paths with bootstrap token
          ansible.builtin.uri:
            url: "{{ vault_addr }}/v1/{{ vault_kv_mount }}/data/{{ item }}"
            method: GET
            headers:
              X-Vault-Token: "{{ vault_runtime_token }}"
            validate_certs: "{{ not (vault_skip_verify | bool) }}"
            return_content: true
            status_code: 200
          loop: "{{ vault_kv_paths | default([]) }}"
          loop_control:
            label: "{{ item }}"
          register: vault_runtime_document_results
          changed_when: false
          no_log: true

    - name: Fail when Vault documents cannot be read with any available token
      ansible.builtin.fail:
        msg: >-
          Failed to read Vault runtime documents from {{ vault_addr }}/v1/{{ vault_kv_mount }}/data/*.
          The explicit runtime token could not read the requested paths, and no working bootstrap
          token fallback was available.
      when: vault_runtime_document_results is not defined

- name: Initialize vault runtime documents cache
  ansible.builtin.set_fact:
    vault_runtime_documents: {}
  no_log: true

- name: Cache Vault runtime documents keyed by source path
  ansible.builtin.set_fact:
    vault_runtime_documents: >-
      {{
        vault_runtime_documents
        | combine(
            {
              item.item: ((item.json | default({})).get('data', {}).get('data', {}))
            },
            recursive=True
          )
      }}
  loop: "{{ vault_runtime_document_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - item.item is defined
    - item.json is defined
  no_log: true

- name: Initialize merged Vault runtime secret values
  ansible.builtin.set_fact:
    vault_runtime_secrets: {}
  no_log: true

- name: Merge Vault runtime secret values for convenience access
  ansible.builtin.set_fact:
    vault_runtime_secrets: "{{ vault_runtime_secrets | combine(item.value, recursive=True) }}"
  loop: "{{ vault_runtime_documents | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
