---
# Load all KV v2 secrets under the Vault mount/path into Ansible variables.
# Defaults are aligned with this repository's Vault setup.

- name: Set Vault loader defaults
  ansible.builtin.set_fact:
    vault_addr: "{{ vault_addr | default(lookup('env', 'VAULT_ADDR') | default('https://10.10.10.180:8200', true), true) }}"
    vault_kv_mount: "{{ vault_kv_mount | default(lookup('env', 'VAULT_KV_MOUNT') | default('secrets', true), true) }}"
    vault_kv_path_raw: "{{ vault_kv_path | default(lookup('env', 'VAULT_KV_PATH') | default('', true), true) }}"
    vault_auth_file: "{{ vault_auth_file | default(playbook_dir ~ '/../../.outputs/vault/ansible.json', true) }}"
    vault_skip_verify: "{{ vault_skip_verify | default((lookup('env', 'VAULT_SKIP_VERIFY') | default('true', true)) | bool, true) }}"
    vault_kv_walk_max_iterations: "{{ vault_kv_walk_max_iterations | default(100, true) }}"
    vault_token: >-
      {{
        vault_token
        | default(minio_vault_token | default(lookup('env', 'VAULT_TOKEN') | default('', true), true), true)
      }}

- name: Normalize Vault KV path
  ansible.builtin.set_fact:
    vault_kv_path: >-
      {{
        vault_kv_path_raw
        | regex_replace('^/|/$', '')
        | regex_replace('^' ~ vault_kv_mount ~ '/', '')
      }}

- name: Verify Vault credential file exists
  ansible.builtin.stat:
    path: "{{ vault_auth_file }}"
  register: vault_auth_file_stat
  delegate_to: localhost
  when: vault_token | length == 0

- name: Fail when Vault credential file is missing
  ansible.builtin.fail:
    msg: "Vault credential file not found: {{ vault_auth_file }}"
  when: vault_token | length == 0 and not vault_auth_file_stat.stat.exists

- name: Load Vault credentials
  ansible.builtin.include_vars:
    file: "{{ vault_auth_file }}"
    name: vault_auth
  no_log: true
  when: vault_token | length == 0

- name: Set effective Vault token
  ansible.builtin.set_fact:
    vault_effective_token: "{{ vault_token if vault_token | length > 0 else vault_auth.token }}"
  no_log: true

- name: Initialize Vault discovery state
  ansible.builtin.set_fact:
    _vault_pending_paths: "{{ [vault_kv_path] if vault_kv_path | length > 0 else [] }}"
    _vault_secret_paths: "{{ [vault_kv_path] if vault_kv_path | length > 0 else [] }}"
    vault_runtime_secrets: {}
    _vault_use_direct_load: "{{ vault_kv_path | length > 0 }}"
  no_log: true

- name: Display Vault load strategy
  ansible.builtin.debug:
    msg: >-
      {%- if _vault_use_direct_load -%}
      ✓ Direct load: {{ vault_kv_path }}
      {%- else -%}
      ✓ Metadata walk: {{ vault_kv_mount }}/
      {%- endif -%}
    verbosity: 1

- name: Walk Vault metadata tree (only when no specific path provided)
  ansible.builtin.include_tasks: _vault_walk_step.yaml
  loop: "{{ range(0, (vault_kv_walk_max_iterations | int)) | list }}"
  loop_control:
    loop_var: _vault_walk_iteration
  when: 
    - not _vault_use_direct_load
    - _vault_pending_paths | length > 0

- name: Fail when Vault walk exceeds iteration guard
  ansible.builtin.fail:
    msg: >-
      Vault metadata walk exceeded {{ vault_kv_walk_max_iterations }} iterations.
      Remaining paths: {{ _vault_pending_paths | to_json }}
  when:
    - not _vault_use_direct_load
    - _vault_pending_paths | length > 0

- name: Read discovered Vault secret documents
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/{{ vault_kv_mount }}/data/{{ item }}"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_effective_token }}"
    validate_certs: "{{ not (vault_skip_verify | bool) }}"
    return_content: true
    status_code: 200
  register: _vault_secret_reads
  loop: "{{ _vault_secret_paths | unique }}"
  loop_control:
    label: "{{ item }}"
  no_log: true
  delegate_to: localhost

- name: Merge secret keys from all Vault documents
  ansible.builtin.set_fact:
    vault_runtime_secrets: >-
      {{
        vault_runtime_secrets
        | combine(item.json.data.data | default({}), recursive=True)
      }}
  loop: "{{ _vault_secret_reads.results | default([]) }}"
  no_log: true

- name: Expose Vault secret keys as host variables
  ansible.builtin.set_fact: "{{ vault_runtime_secrets }}"
  no_log: true

- name: Report Vault variable load summary
  ansible.builtin.debug:
    msg: >-
      Loaded {{ vault_runtime_secrets | length }} variables from Vault mount
      '{{ vault_kv_mount }}'{{ '/' ~ vault_kv_path if vault_kv_path else '/' }}.
    verbosity: 1
