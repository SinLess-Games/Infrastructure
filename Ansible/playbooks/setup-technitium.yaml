---
# =============================================================================
# Playbook: Deploy and Configure Technitium DNS Cluster
#
# This playbook:
#   1. Deploys Technitium VMs using the shared Proxmox VM Terraform module
#   2. Configures Technitium DNS servers and cluster (dns hosts)
#
# It assumes:
#   - Inventory defines the technitium host(s)
#   - Group vars contain:
#       * VM deployment parameters
#       * Cluster configuration
#       * API URL and token
#       * Forwarders
#       * Block lists
#       * Local zones + records
#       * Optional reverse zones
#       * Firewall CIDRs
#
# Example:
#   ansible-playbook -i inventory/hosts.yaml playbooks/setup-technitium.yaml
# =============================================================================

- name: "Deploy Technitium DNS VMs via Terraform"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../group_vars/technitium/technitium-vms.yaml

  roles:
    - role: technitium
      vars:
        technitium_role_phases: ["deploy"]
      tags: ["deploy", "terraform"]

- name: "Configure Technitium DNS Appliance"
  hosts: dns
  become: true
  gather_facts: true
  timeout: 300

  vars:
    # Optional override of how long to wait for the API
    technitium_api_timeout: 90
    technitium_api_delay: 5
    ansible_timeout: 300
    ansible_connection_timeout: 30
    packages_role_groups:
      - production
      - shell
  
  vars_files:
    - ../group_vars/technitium/cluster.yaml
    - ../group_vars/technitium/main.yaml
    - ../group_vars/technitium/domains.yaml
    - ../group_vars/technitium/domain-records.yaml
    - ../group_vars/technitium/block-lists.yaml
    - ../group_vars/technitium/reverse-zones.yaml
    - ../group_vars/technitium/firewall.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml

  roles:
    - role: dns-resolver
      tags: ["configure", "dns"]
    
    - role: users
      tags: ["configure", "users"]

    - role: packages
      tags: ["configure", "packages"]
    
    - role: shell-config
      tags: ["configure", "shell"]
    
    - role: ssh
      tags: ["configure", "sshd"]

    - role: technitium
      vars:
        technitium_role_phases: ["configure"]
      tags: ["configure", "cluster"]
