---
- name: Deploy Kubernetes staging infrastructure and core cluster foundation
  hosts: localhost
  gather_facts: false
  connection: local
  vars_files:
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/staging/main.yaml
  vars:
    kubernetes_plan_only: "{{ (kubernetes_plan_only | default(false)) | bool }}"
    kubernetes_destroy: "{{ (kubernetes_destroy | default(false)) | bool }}"
  pre_tasks:
    - name: Set Kubernetes Vault secret path for SSH keys
      ansible.builtin.set_fact:
        kubernetes_vault_addr_effective: "{{ lookup('env', 'VAULT_ADDR') | default('https://10.10.10.180:8200', true) }}"
        kubernetes_vault_ssh_path: >-
          {{
            'ansible/kubernetes/development'
            if kubernetes_environment == 'dev'
            else ('ansible/kubernetes/testing' if kubernetes_environment == 'staging' else 'ansible/kubernetes/' ~ kubernetes_environment)
          }}

    - name: Load local Vault auth file when VAULT_TOKEN is not set
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../.outputs/vault/ansible.json"
        name: kubernetes_vault_auth
      when: (lookup('env', 'VAULT_TOKEN') | default('', true)) | length == 0
      no_log: true

    - name: Read Kubernetes SSH key secret from Vault
      ansible.builtin.uri:
        url: "{{ kubernetes_vault_addr_effective }}/v1/secrets/data/{{ kubernetes_vault_ssh_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ lookup('env', 'VAULT_TOKEN') | default(kubernetes_vault_auth.token | default(''), true) }}"
        validate_certs: false
        return_content: true
        status_code: 200
      register: kubernetes_vault_ssh_secret
      no_log: true

    - name: Set Kubernetes SSH keys from Vault secret
      ansible.builtin.set_fact:
        kubernetes_ssh_keys: >-
          {{
            (kubernetes_vault_ssh_secret.json.data.data.kubernetes_ssh_keys | default([]))
            if (kubernetes_vault_ssh_secret is defined and kubernetes_vault_ssh_secret.json is defined)
            else []
          }}

    - name: Validate Kubernetes SSH keys loaded from Vault
      ansible.builtin.assert:
        that:
          - kubernetes_ssh_keys is defined
          - kubernetes_ssh_keys | length > 0
        fail_msg: "kubernetes_ssh_keys is missing in Vault for environment '{{ kubernetes_environment }}'"
  roles:
    - role: kubernetes-configure
      vars:
        kubernetes_configure_phase: "infrastructure"

- name: Configure Kubernetes staging nodes and deploy platform apps via FluxCD
  hosts: kubernetes_staging
  gather_facts: false
  become: true
  vars_files:
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/staging/main.yaml
  pre_tasks:
    - name: Remove stale host keys for staging node IPs
      ansible.builtin.command:
        cmd: "ssh-keygen -f {{ lookup('env', 'HOME') }}/.ssh/known_hosts -R {{ item.ip }}"
      loop: "{{ kubernetes_nodes.control_plane + kubernetes_nodes.workers }}"
      loop_control:
        label: "{{ item.ip }}"
      delegate_to: localhost
      run_once: true
      changed_when: false
      failed_when: false

    - name: Bootstrap Python on Flatcar nodes via Miniconda
      ansible.builtin.raw: |
        set -euo pipefail
        if [ ! -x "{{ kubernetes_miniconda_prefix }}/bin/python3" ]; then
          curl -fsSL "{{ kubernetes_miniconda_installer_url }}" -o /tmp/miniconda.sh
          bash /tmp/miniconda.sh -b -p "{{ kubernetes_miniconda_prefix }}"
          rm -f /tmp/miniconda.sh
        fi
      changed_when: false

    - name: Gather facts after Python bootstrap
      ansible.builtin.setup:

  roles:
    - role: kubernetes-configure
      vars:
        kubernetes_configure_phase: "nodes"
      when:
        - not (kubernetes_plan_only | default(false) | bool)
        - not (kubernetes_destroy | default(false) | bool)

    - role: kubernetes-deploy
      tags: ["k8s", "staging", "deploy", "flux", "platform-apps"]
      when:
        - not (kubernetes_plan_only | default(false) | bool)
        - not (kubernetes_destroy | default(false) | bool)
