---
# =============================================================================
# Playbook: Update Technitium DNS Records Only
# =============================================================================
# Purpose:
#   - Apply DNS zones/records from group_vars/technitium/domain-records.yaml
#   - Avoid full Technitium install/cluster/bootstrap workflows
# =============================================================================

- name: Update Technitium DNS records on primary
  hosts: dns
  gather_facts: false
  become: false

  vars_files:
    - ../group_vars/technitium/cluster.yaml
    - ../group_vars/technitium/main.yaml
    - ../group_vars/technitium/domain-records.yaml
  vars:
    technitium_bind_ip: "0.0.0.0"
    technitium_http_port: 5380

  tasks:
    - name: Skip non-primary DNS nodes
      ansible.builtin.meta: end_host
      when: inventory_hostname != technitium_cluster_primary_host

    - name: Wait for Technitium API on primary
      ansible.builtin.include_tasks: ../roles/technitium/tasks/wait_for_api.yaml

    - name: Detect active Technitium admin password
      ansible.builtin.include_tasks: ../roles/technitium/tasks/init_admin.yaml

    - name: Create API token (preferred)
      ansible.builtin.uri:
        url: "{{ technitium_api_url }}/api/user/createToken"
        method: POST
        body_format: form-urlencoded
        body:
          user: "{{ technitium_admin_user | default('admin') }}"
          pass: "{{ technitium_actual_password }}"
          tokenName: "{{ technitium_api_token_name | default('ansible-records') }}"
        status_code: [200, 400]
        return_content: true
      register: _technitium_create_token
      no_log: true

    - name: Login fallback for API token
      ansible.builtin.uri:
        url: "{{ technitium_api_url }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: "{{ technitium_admin_user | default('admin') }}"
          pass: "{{ technitium_actual_password }}"
        status_code: [200, 400]
        return_content: true
      register: _technitium_login
      no_log: true
      when: >-
        _technitium_create_token.json is not defined
        or _technitium_create_token.json.status is not defined
        or _technitium_create_token.json.status != "ok"

    - name: Set effective Technitium API token
      ansible.builtin.set_fact:
        technitium_api_token: >-
          {{
            (_technitium_create_token.json.token
             if (_technitium_create_token.json is defined
                 and _technitium_create_token.json.status == "ok"
                 and _technitium_create_token.json.token is defined)
             else _technitium_login.json.token)
          }}
      no_log: true

    - name: Assert Technitium API token exists
      ansible.builtin.assert:
        that:
          - technitium_api_token is defined
          - (technitium_api_token | string | length) > 0
        fail_msg: "Failed to obtain Technitium API token for DNS record update."
      no_log: true

    - name: Apply DNS records from domain-records.yaml
      ansible.builtin.include_tasks: ../roles/technitium/tasks/records.yaml
