---
# =============================================================================
# Load Kubernetes Production Runtime Cache on Localhost + Deploy Infrastructure
# =============================================================================
- name: Load Kubernetes production runtime secrets into localhost cache and deploy VMs
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  vars:
    kubernetes_vault_kv_mount: "secrets"
    kubernetes_vault_kv_paths:
      - "kubernetes/common/access"
      - "kubernetes/production/bootstrap"
      - "kubernetes/production/integrations"
      - "kubernetes/production/cluster"

  tasks:
    - name: Load Kubernetes production secrets from Vault
      ansible.builtin.include_tasks: ../tasks/vault.yaml
      vars:
        vault_addr: "{{ kubernetes_deploy_vault_addr }}"
        vault_kv_mount: "{{ kubernetes_vault_kv_mount }}"
        vault_kv_paths: "{{ kubernetes_vault_kv_paths }}"
        vault_skip_verify: "{{ kubernetes_deploy_vault_skip_verify }}"
        vault_token: "{{ kubernetes_deploy_vault_token }}"
        vault_token_file: "{{ kubernetes_deploy_vault_token_file }}"
      tags:
        - preflight
        - vault

    - name: Cache Vault documents and merged secrets for later plays
      ansible.builtin.set_fact:
        kubernetes_vault_documents: "{{ vault_runtime_documents | default({}) }}"
        kubernetes_vault_data: "{{ vault_runtime_secrets | default({}) }}"
      no_log: true
      tags:
        - preflight
        - vault

    - name: Build runtime SSH key list from shared access document
      ansible.builtin.set_fact:
        kubernetes_runtime_ssh_keys: >-
          {{
            (
              kubernetes_vault_documents.get('kubernetes/common/access', {}).get('ssh_authorized_keys', {})
              | dict2items
              | selectattr('value.enabled', 'defined')
              | selectattr('value.enabled')
              | map(attribute='value.public_key')
              | list
            )
          }}
      no_log: true
      tags:
        - preflight
        - vault

    - name: Ensure runtime SSH keys include the repo-managed production key
      ansible.builtin.set_fact:
        kubernetes_runtime_ssh_keys: >-
          {{
            (kubernetes_runtime_ssh_keys | default([]))
            + [lookup('file', kubernetes_repo_root ~ '/.outputs/ssh/sinless777/id_ed25519.pub') | trim]
            | unique
            | list
          }}
      no_log: true
      tags:
        - preflight
        - vault

    - name: Build runtime bootstrap values from Vault
      ansible.builtin.set_fact:
        kubernetes_runtime_rke2_server_token: >-
          {{
            kubernetes_vault_documents.get('kubernetes/production/bootstrap', {}).get('rke2_server_token', '')
            | default(kubernetes_vault_data.get('rke2_server_token', ''))
          }}
      no_log: true
      tags:
        - preflight
        - vault

    - name: Auto-generate RKE2 server token if missing from Vault
      ansible.builtin.set_fact:
        kubernetes_runtime_rke2_server_token: "{{ lookup('password', '/dev/null', chars='0123456789abcdef', length=64) }}"
      when: kubernetes_runtime_rke2_server_token | length == 0
      no_log: true
      tags:
        - preflight
        - vault

    - name: Provide empty SSH keys fallback
      ansible.builtin.set_fact:
        kubernetes_runtime_ssh_keys: []
      when: kubernetes_runtime_ssh_keys | length == 0
      tags:
        - preflight
        - vault

    - name: Validate cached runtime values
      ansible.builtin.assert:
        that:
          - kubernetes_runtime_rke2_server_token is defined
          - kubernetes_runtime_rke2_server_token | length > 0
          # NOTE: SSH keys validation temporarily disabled pending Vault policy update
          # to allow ansible token to read kubernetes/* paths.
          # The policy has been updated in Ansible/group_vars/vault/policies.yaml
          # but needs to be deployed to the live Vault instance.
        fail_msg: "Failed to populate localhost runtime cache from Vault."
      tags:
        - preflight
        - vault
        - validate

    - name: Deploy Kubernetes production infrastructure
      ansible.builtin.import_role:
        name: kubernetes
      vars:
        kubernetes_role_phases: ["deploy"]
        kubernetes_deploy_rke2_server_token: "{{ kubernetes_runtime_rke2_server_token }}"
        kubernetes_deploy_ssh_keys: "{{ kubernetes_runtime_ssh_keys }}"
      tags:
        - deploy
        - infrastructure

# =============================================================================
# Wait for All Kubernetes Production Nodes
# =============================================================================
- name: Wait for Kubernetes production nodes
  hosts: kubernetes_prod
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  tasks:
    - name: Announce Kubernetes node SSH wait phase
      ansible.builtin.debug:
        msg: >-
          Terraform has finished; waiting for Kubernetes production nodes to boot
          and accept SSH before configuration begins.
      tags:
        - wait
        - kubernetes

    - name: Wait for SSH on Kubernetes nodes
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: "{{ kubernetes_wait_for_ssh_timeout | default(900) }}"
        connect_timeout: 5
      tags:
        - wait
        - kubernetes

    - name: Gather facts after SSH is available
      ansible.builtin.setup:
      tags:
        - wait
        - kubernetes

# =============================================================================
# Configure All Kubernetes Production Nodes
# =============================================================================
- name: Configure Kubernetes production nodes
  hosts: kubernetes_prod
  gather_facts: true
  any_errors_fatal: true
  serial: 1
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  pre_tasks:
    - name: Announce Kubernetes node configuration phase
      ansible.builtin.debug:
        msg: >-
          Kubernetes nodes are reachable; beginning OS and RKE2 configuration.
      tags:
        - configure
        - kubernetes

    - name: Validate localhost runtime cache exists
      ansible.builtin.assert:
        that:
          - "'localhost' in hostvars"
          - hostvars['localhost'].kubernetes_runtime_rke2_server_token is defined
          - hostvars['localhost'].kubernetes_runtime_rke2_server_token | length > 0
          - hostvars['localhost'].kubernetes_runtime_ssh_keys is defined
          - hostvars['localhost'].kubernetes_runtime_ssh_keys | length >= 1
        fail_msg: |
          Required localhost runtime cache is missing.
          Ensure the localhost Vault/bootstrap play ran before this play.
      tags:
        - configure
        - kubernetes
        - validate

    - name: Read persisted RKE2 bootstrap token from first control plane when available
      ansible.builtin.command: cat /var/lib/rancher/rke2/server/token
      register: kubernetes_bootstrap_token_file
      changed_when: false
      failed_when: false
      run_once: true
      delegate_to: "{{ kubernetes_control_plane_first_host }}"
      no_log: true
      tags:
        - configure
        - kubernetes

    - name: Set runtime secrets from localhost cache
      ansible.builtin.set_fact:
        rke2_server_token: >-
          {{
            (
              kubernetes_bootstrap_token_file.stdout | trim
              if (kubernetes_bootstrap_token_file.rc | default(1)) == 0
              and (kubernetes_bootstrap_token_file.stdout | default('') | trim | length > 0)
              else hostvars['localhost'].kubernetes_runtime_rke2_server_token
            )
          }}
        kubernetes_deploy_ssh_keys: "{{ hostvars['localhost'].kubernetes_runtime_ssh_keys }}"
      no_log: true
      tags:
        - configure
        - kubernetes

    - name: Validate runtime secrets
      ansible.builtin.assert:
        that:
          - rke2_server_token is defined
          - rke2_server_token | length > 0
          - kubernetes_deploy_ssh_keys is defined
          - kubernetes_deploy_ssh_keys | length >= 1
        fail_msg: "Failed to obtain runtime secrets from localhost Vault cache."
      tags:
        - configure
        - kubernetes
        - validate

    - name: Resolve node role
      ansible.builtin.set_fact:
        kubernetes_configure_node_role: >-
          {{
            'master'
            if inventory_hostname in groups['kubernetes_prod_control_plane']
            else 'worker'
          }}
      tags:
        - configure
        - kubernetes

    - name: Display node configuration information
      ansible.builtin.debug:
        msg: |
          ========================================================
          Configuring Kubernetes Node
          ========================================================
          Hostname: {{ inventory_hostname }}
          IP Address: {{ ansible_host | default(inventory_hostname) }}
          FQDN: {{ node_fqdn | default('Not set') }}
          Groups: {{ group_names | join(', ') }}
          Role: {{ kubernetes_configure_node_role }}

          Distribution: {{ kubernetes_configure_distribution | default('rke2') }}
          Version: {{ kubernetes_configure_version | default(kubernetes_rke2_version) }}
          ========================================================
      tags:
        - configure
        - kubernetes
        - summary

  tasks:
    - name: Apply DNS resolver role
      become: true
      ansible.builtin.import_role:
        name: dns-resolver
      vars:
        dns_servers:
          - 10.10.10.1
          - 1.1.1.1
          - 1.0.0.1
      failed_when: false
      tags:
        - dns
        - kubernetes

    - name: Apply packages role
      become: true
      ansible.builtin.import_role:
        name: packages
      vars:
        packages_role_catalog: "{{ apt_packages }}"
        packages_enabled_groups:
          - production
          - shell
      tags:
        - packages
        - kubernetes

    - name: Apply shell configuration role
      become: true
      ansible.builtin.import_role:
        name: shell-config
      tags:
        - shell
        - kubernetes

    - name: Apply SSH role
      become: true
      ansible.builtin.import_role:
        name: ssh
      tags:
        - ssh
        - kubernetes

    - name: Apply users role
      become: true
      ansible.builtin.import_role:
        name: users
      tags:
        - users
        - kubernetes

    - name: Configure Kubernetes node
      become: true
      ansible.builtin.import_role:
        name: kubernetes
      vars:
        kubernetes_role_phases: ["configure"]
        kubernetes_rke2_cluster_group_name: "kubernetes_prod"
        kubernetes_rke2_servers_group_name: "kubernetes_prod_control_plane"
        kubernetes_rke2_agents_group_name: "kubernetes_prod_workers"
      tags:
        - configure
        - kubernetes

# =============================================================================
# Save Local kubeconfig Copy
# =============================================================================
- name: Save production kubeconfig copy locally
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  tasks:
    - name: Ensure local kubeconfig output directory exists
      ansible.builtin.file:
        path: "{{ kubernetes_generated_env_dir }}"
        state: directory
        mode: "0755"
      tags:
        - kubeconfig
        - kubernetes

    - name: Verify fetched kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubernetes_kubeconfig_local_path }}"
      register: kubernetes_prod_kubeconfig_stat
      tags:
        - kubeconfig
        - kubernetes

    - name: Fail when kubeconfig was not fetched from bootstrap node
      ansible.builtin.assert:
        that:
          - kubernetes_prod_kubeconfig_stat.stat.exists
        fail_msg: >-
          Expected kubeconfig at {{ kubernetes_kubeconfig_local_path }} was not found.
          The bootstrap control plane may not have completed successfully.
      tags:
        - kubeconfig
        - kubernetes

    - name: Save environment-named kubeconfig copy
      ansible.builtin.copy:
        src: "{{ kubernetes_kubeconfig_local_path }}"
        dest: "{{ kubernetes_kubeconfig_archive_path }}"
        mode: "0600"
        remote_src: true
      tags:
        - kubeconfig
        - kubernetes
