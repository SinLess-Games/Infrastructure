---
# =============================================================================
# Load Kubernetes Production Runtime Cache on Localhost + Deploy Infrastructure
# =============================================================================
- name: Load Kubernetes production runtime secrets into localhost cache and deploy VMs
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  vars:
    kubernetes_vault_kv_mount: "secrets"
    kubernetes_vault_kv_paths:
      - "kubernetes/common/access"
      - "kubernetes/production/bootstrap"
      - "kubernetes/production/integrations"
      - "kubernetes/production/cluster"

  tasks:
    - name: Load Kubernetes production secrets from Vault
      ansible.builtin.include_tasks: ../tasks/vault.yaml
      vars:
        vault_addr: "{{ kubernetes_deploy_vault_addr }}"
        vault_kv_mount: "{{ kubernetes_vault_kv_mount }}"
        vault_kv_paths: "{{ kubernetes_vault_kv_paths }}"
        vault_skip_verify: "{{ kubernetes_deploy_vault_skip_verify }}"
        vault_token: "{{ kubernetes_deploy_vault_token }}"
        vault_token_file: "{{ kubernetes_deploy_vault_token_file }}"
      tags:
        - preflight
        - vault

    - name: Cache Vault documents and merged secrets for later plays
      ansible.builtin.set_fact:
        kubernetes_vault_documents: "{{ vault_runtime_documents | default({}) }}"
        kubernetes_vault_data: "{{ vault_runtime_secrets | default({}) }}"
      no_log: true
      tags:
        - preflight
        - vault

    - name: Cache runtime operation flags and execution controls from CLI overrides and environment
      ansible.builtin.set_fact:
        kubernetes_runtime_plan_only: "{{ kubernetes_plan_only | default(kubernetes_operation.plan_only) | bool }}"
        kubernetes_runtime_destroy: "{{ kubernetes_destroy | default(kubernetes_operation.destroy) | bool }}"
        kubernetes_runtime_apply_mode: >-
          {{
            not (kubernetes_plan_only | default(kubernetes_operation.plan_only) | bool)
            and not (kubernetes_destroy | default(kubernetes_operation.destroy) | bool)
          }}
        kubernetes_runtime_configure_serial: >-
          {{
            (lookup('env', 'KUBERNETES_CONFIGURE_SERIAL') | default('3', true)) | int
          }}
        kubernetes_runtime_tf_parallelism: >-
          {{
            (
              lookup('env', 'TF_PARALLELISM')
              | default(lookup('env', 'KUBERNETES_TERRAFORM_PARALLELISM'), true)
              | default('3', true)
            ) | int
          }}
        kubernetes_runtime_tf_lock_timeout: "{{ lookup('env', 'KUBERNETES_TERRAFORM_LOCK_TIMEOUT') | default('5m', true) }}"
      tags:
        - preflight
        - deploy

    - name: Build Terraform CLI argument overrides
      ansible.builtin.set_fact:
        kubernetes_runtime_tf_cli_args_common: >-
          -parallelism={{ kubernetes_runtime_tf_parallelism }}
          -lock-timeout={{ kubernetes_runtime_tf_lock_timeout }}
      tags:
        - preflight
        - deploy

    - name: Display runtime operation mode
      ansible.builtin.debug:
        msg:
          plan_only: "{{ kubernetes_runtime_plan_only }}"
          destroy: "{{ kubernetes_runtime_destroy }}"
          apply_mode: "{{ kubernetes_runtime_apply_mode }}"
          configure_serial: "{{ kubernetes_runtime_configure_serial }}"
          terraform_parallelism: "{{ kubernetes_runtime_tf_parallelism }}"
          terraform_lock_timeout: "{{ kubernetes_runtime_tf_lock_timeout }}"
          terraform_cli_args: "{{ kubernetes_runtime_tf_cli_args_common }}"
      tags:
        - preflight
        - deploy
        - summary

    - name: Build runtime SSH key list from shared access document
      ansible.builtin.set_fact:
        kubernetes_runtime_ssh_keys: >-
          {{
            (
              kubernetes_vault_documents.get('kubernetes/common/access', {}).get('ssh_authorized_keys', {})
              | dict2items
              | selectattr('value.enabled', 'defined')
              | selectattr('value.enabled')
              | map(attribute='value.public_key')
              | list
            )
          }}
      no_log: true
      tags:
        - preflight
        - vault

    - name: Ensure runtime SSH keys include the repo-managed production key
      ansible.builtin.set_fact:
        kubernetes_runtime_ssh_keys: >-
          {{
            (kubernetes_runtime_ssh_keys | default([]))
            + [lookup('file', kubernetes_repo_root ~ '/.outputs/ssh/sinless777/id_ed25519.pub') | trim]
            | unique
            | list
          }}
      no_log: true
      tags:
        - preflight
        - vault

    - name: Build runtime bootstrap values from Vault
      ansible.builtin.set_fact:
        kubernetes_runtime_rke2_server_token: >-
          {{
            kubernetes_vault_documents.get('kubernetes/production/bootstrap', {}).get('rke2_server_token', '')
            | default(kubernetes_vault_data.get('rke2_server_token', ''))
          }}
      no_log: true
      tags:
        - preflight
        - vault

    - name: Auto-generate RKE2 server token if missing from Vault
      ansible.builtin.set_fact:
        kubernetes_runtime_rke2_server_token: "{{ lookup('password', '/dev/null', chars='0123456789abcdef', length=64) }}"
      when: kubernetes_runtime_rke2_server_token | length == 0
      no_log: true
      tags:
        - preflight
        - vault

    - name: Provide empty SSH keys fallback
      ansible.builtin.set_fact:
        kubernetes_runtime_ssh_keys: []
      when: kubernetes_runtime_ssh_keys | length == 0
      tags:
        - preflight
        - vault

    - name: Validate cached runtime values
      ansible.builtin.assert:
        that:
          - kubernetes_runtime_rke2_server_token is defined
          - kubernetes_runtime_rke2_server_token | length > 0
          - kubernetes_runtime_configure_serial | int > 0
          - kubernetes_runtime_tf_parallelism | int > 0
        fail_msg: "Failed to populate localhost runtime cache from Vault."
      tags:
        - preflight
        - vault
        - validate

    - name: Deploy Kubernetes production infrastructure
      ansible.builtin.import_role:
        name: kubernetes
      vars:
        kubernetes_role_phases: ["deploy"]
        kubernetes_deploy_rke2_server_token: "{{ kubernetes_runtime_rke2_server_token }}"
        kubernetes_deploy_ssh_keys: "{{ kubernetes_runtime_ssh_keys }}"
        kubernetes_operation:
          plan_only: "{{ kubernetes_runtime_plan_only | default(false) | bool }}"
          destroy: "{{ kubernetes_runtime_destroy | default(false) | bool }}"
          force_apply: false
          wait_for_ssh_timeout: 600
          wait_for_kubeconfig_timeout: 300
          wait_for_api_timeout: 600
          wait_for_node_ready_timeout: 120
          wait_for_node_ready_retries: 30
          wait_for_node_ready_delay: 20
      environment:
        TF_IN_AUTOMATION: "1"
        TF_INPUT: "0"
        TF_CLI_ARGS_plan: "{{ kubernetes_runtime_tf_cli_args_common }}"
        TF_CLI_ARGS_apply: "{{ kubernetes_runtime_tf_cli_args_common }}"
        TF_CLI_ARGS_destroy: "{{ kubernetes_runtime_tf_cli_args_common }}"
      tags:
        - deploy
        - infrastructure

# =============================================================================
# Wait for All Kubernetes Production Nodes
# =============================================================================
- name: Wait for Kubernetes production nodes
  hosts: kubernetes_prod
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  pre_tasks:
    - name: Skip node wait for plan or destroy operations
      ansible.builtin.meta: end_play
      when: not (hostvars['localhost'].kubernetes_runtime_apply_mode | default(true) | bool)
      tags:
        - wait
        - kubernetes

  tasks:
    - name: Announce Kubernetes node SSH wait phase
      ansible.builtin.debug:
        msg: >-
          Terraform has finished; waiting for Kubernetes production nodes to boot
          and accept SSH before configuration begins.
      tags:
        - wait
        - kubernetes

    - name: Remediate SSH authorized_keys via Proxmox guest agent before SSH wait
      ansible.builtin.shell: |
        set -euo pipefail
        ssh \
          -o ConnectTimeout=5 \
          -o BatchMode=yes \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          root@{{ kubernetes_proxmox.node_ssh_hosts[item.target_node] }} \
          /usr/sbin/qm guest exec {{ item.vmid }} -- /bin/bash -lc {{ ssh_key_remediation_script | quote }}
      vars:
        kubernetes_node_login_user: "{{ hostvars[item.name].ansible_user | default(kubernetes_ansible.default_user | default('sinless777')) }}"
        ssh_key_remediation_script: |
          install -d -m 700 -o {{ kubernetes_node_login_user }} -g {{ kubernetes_node_login_user }} /home/{{ kubernetes_node_login_user }}/.ssh
          cat > /home/{{ kubernetes_node_login_user }}/.ssh/authorized_keys <<'EOF'
          {{ hostvars['localhost'].kubernetes_runtime_ssh_keys | join('\n') }}
          EOF
          chown {{ kubernetes_node_login_user }}:{{ kubernetes_node_login_user }} /home/{{ kubernetes_node_login_user }}/.ssh/authorized_keys
          chmod 600 /home/{{ kubernetes_node_login_user }}/.ssh/authorized_keys
      loop: "{{ kubernetes_nodes.control_plane + kubernetes_nodes.workers }}"
      loop_control:
        label: "{{ item.name }}@{{ item.target_node }}"
      delegate_to: localhost
      run_once: true
      changed_when: false
      failed_when: false
      no_log: true
      tags:
        - wait
        - kubernetes

    - name: Wait for SSH on Kubernetes nodes
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: "{{ kubernetes_wait_for_ssh_timeout | default(900) }}"
        connect_timeout: 5
      tags:
        - wait
        - kubernetes

# =============================================================================
# Configure All Kubernetes Production Nodes
# =============================================================================
- name: Configure Kubernetes production nodes
  hosts: kubernetes_prod
  gather_facts: false
  any_errors_fatal: true
  order: inventory
  serial:
    - 1
    - "{{ hostvars['localhost'].kubernetes_runtime_configure_serial | default(3) | int }}"
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  pre_tasks:
    - name: Skip node configuration for plan or destroy operations
      ansible.builtin.meta: end_play
      when: not (hostvars['localhost'].kubernetes_runtime_apply_mode | default(true) | bool)
      tags:
        - configure
        - kubernetes

    - name: Announce Kubernetes node configuration phase
      ansible.builtin.debug:
        msg: >-
          Kubernetes nodes are reachable; beginning OS and RKE2 configuration.
          The first inventory host is configured alone so the bootstrap control
          plane can start before secondary nodes attempt to join.
      tags:
        - configure
        - kubernetes

    - name: Validate localhost runtime cache exists
      ansible.builtin.assert:
        that:
          - "'localhost' in hostvars"
          - hostvars['localhost'].kubernetes_runtime_rke2_server_token is defined
          - hostvars['localhost'].kubernetes_runtime_rke2_server_token | length > 0
          - hostvars['localhost'].kubernetes_runtime_ssh_keys is defined
          - hostvars['localhost'].kubernetes_runtime_ssh_keys | length >= 1
        fail_msg: |
          Required localhost runtime cache is missing.
          Ensure the localhost Vault/bootstrap play ran before this play.
      tags:
        - configure
        - kubernetes
        - validate

    - name: Gather facts for node configuration
      ansible.builtin.setup:
      tags:
        - configure
        - kubernetes

    - name: Read persisted RKE2 bootstrap token from first control plane when available
      ansible.builtin.command: cat /var/lib/rancher/rke2/server/token
      register: kubernetes_bootstrap_token_file
      changed_when: false
      failed_when: false
      run_once: true
      delegate_to: "{{ kubernetes_control_plane_first_host }}"
      no_log: true
      tags:
        - configure
        - kubernetes

    - name: Set runtime secrets from localhost cache
      ansible.builtin.set_fact:
        rke2_server_token: >-
          {{
            (
              (
                kubernetes_bootstrap_token_file.stdout
                | trim
              )
              if (kubernetes_bootstrap_token_file.rc | default(1)) == 0
              and (kubernetes_bootstrap_token_file.stdout | default('') | trim | length > 0)
              else hostvars['localhost'].kubernetes_runtime_rke2_server_token
            )
          }}
        kubernetes_deploy_ssh_keys: "{{ hostvars['localhost'].kubernetes_runtime_ssh_keys }}"
      no_log: true
      tags:
        - configure
        - kubernetes

    - name: Validate runtime secrets
      ansible.builtin.assert:
        that:
          - rke2_server_token is defined
          - rke2_server_token | length > 0
          - kubernetes_deploy_ssh_keys is defined
          - kubernetes_deploy_ssh_keys | length >= 1
        fail_msg: "Failed to obtain runtime secrets from localhost Vault cache."
      tags:
        - configure
        - kubernetes
        - validate

    - name: Resolve node role
      ansible.builtin.set_fact:
        kubernetes_configure_node_role: >-
          {{
            'master'
            if inventory_hostname in groups['kubernetes_prod_control_plane']
            else 'worker'
          }}
      tags:
        - configure
        - kubernetes

    - name: Display node configuration information
      ansible.builtin.debug:
        msg: |
          ========================================================
          Configuring Kubernetes Node
          ========================================================
          Hostname: {{ inventory_hostname }}
          IP Address: {{ ansible_host | default(inventory_hostname) }}
          FQDN: {{ node_fqdn | default('Not set') }}
          Groups: {{ group_names | join(', ') }}
          Role: {{ kubernetes_configure_node_role }}

          Distribution: {{ kubernetes_configure_distribution | default('rke2') }}
          Version: {{ kubernetes_configure_version | default(kubernetes_rke2_version) }}
          Serial Batch Size: bootstrap first, then {{ hostvars['localhost'].kubernetes_runtime_configure_serial | default(3) | int }}
          ========================================================
      tags:
        - configure
        - kubernetes
        - summary

  tasks:
    - name: Apply DNS resolver role
      become: true
      ansible.builtin.import_role:
        name: dns-resolver
      vars:
        dns_servers:
          - 10.10.10.1
          - 1.1.1.1
          - 1.0.0.1
      failed_when: false
      tags:
        - dns
        - kubernetes

    - name: Apply packages role
      become: true
      ansible.builtin.import_role:
        name: packages
      vars:
        packages_role_catalog: "{{ apt_packages }}"
        packages_enabled_groups:
          - production
          - shell
      tags:
        - packages
        - kubernetes

    - name: Apply shell configuration role
      become: true
      ansible.builtin.import_role:
        name: shell-config
      tags:
        - shell
        - kubernetes

    - name: Apply SSH role
      become: true
      ansible.builtin.import_role:
        name: ssh
      tags:
        - ssh
        - kubernetes

    - name: Apply users role
      become: true
      ansible.builtin.import_role:
        name: users
      tags:
        - users
        - kubernetes

    - name: Configure Kubernetes node
      become: true
      ansible.builtin.import_role:
        name: kubernetes
      vars:
        kubernetes_role_phases: ["configure"]
        kubernetes_rke2_cluster_group_name: "kubernetes_prod"
        kubernetes_rke2_servers_group_name: "kubernetes_prod_control_plane"
        kubernetes_rke2_agents_group_name: "kubernetes_prod_workers"
      tags:
        - configure
        - kubernetes

# =============================================================================
# Save Local kubeconfig Copy
# =============================================================================
- name: Save production kubeconfig copy locally
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  pre_tasks:
    - name: Skip kubeconfig save for plan or destroy operations
      ansible.builtin.meta: end_play
      when: not (hostvars['localhost'].kubernetes_runtime_apply_mode | default(true) | bool)
      tags:
        - kubeconfig
        - kubernetes

  tasks:
    - name: Ensure local kubeconfig output directory exists
      ansible.builtin.file:
        path: "{{ kubernetes_generated_env_dir }}"
        state: directory
        mode: "0755"
      tags:
        - kubeconfig
        - kubernetes

    - name: Verify fetched kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubernetes_kubeconfig_local_path }}"
      register: kubernetes_prod_kubeconfig_stat
      tags:
        - kubeconfig
        - kubernetes

    - name: Fail when kubeconfig was not fetched from bootstrap node
      ansible.builtin.assert:
        that:
          - kubernetes_prod_kubeconfig_stat.stat.exists
        fail_msg: >-
          Expected kubeconfig at {{ kubernetes_kubeconfig_local_path }} was not found.
          The bootstrap control plane may not have completed successfully.
      tags:
        - kubeconfig
        - kubernetes

    - name: Save environment-named kubeconfig copy
      ansible.builtin.copy:
        src: "{{ kubernetes_kubeconfig_local_path }}"
        dest: "{{ kubernetes_kubeconfig_archive_path }}"
        mode: "0600"
        remote_src: true
      tags:
        - kubeconfig
        - kubernetes

# =============================================================================
# Bootstrap Production GitOps Apps
# =============================================================================
- name: Bootstrap production platform apps
  hosts: localhost
  gather_facts: false
  any_errors_fatal: true
  vars_files:
    - ../group_vars/all/ansible.yaml
    - ../group_vars/kubernetes/main.yaml
    - ../group_vars/kubernetes/production/main.yaml
    - ../group_vars/kubernetes/production/master.yaml
    - ../group_vars/kubernetes/production/worker.yaml

  vars:
    kubernetes_vault_seed_documents: >-
      {{
        (
          lookup('file', playbook_dir ~ '/../group_vars/vault/vault-secrets.yaml')
          | from_yaml
        ).secrets | default({})
      }}
    kubernetes_argocd_admin_password_raw: >-
      {{
        (
          hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/integrations', {}).get('argocd_admin_password', '')
          | default(hostvars['localhost'].kubernetes_vault_data.get('argocd_admin_password', ''), true)
        )
        if (
          (
            hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/integrations', {}).get('argocd_admin_password', '')
            | default(hostvars['localhost'].kubernetes_vault_data.get('argocd_admin_password', ''), true)
          ) | length > 0
        )
        else (
          kubernetes_vault_seed_documents.get('kubernetes/production/integrations', {}).get('data', {}).get('argocd_admin_password', '')
        )
      }}
    kubernetes_argocd_admin_password_bcrypt: >-
      {{
        (
          (
            hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/integrations', {}).get('argocd_admin_password_bcrypt', '')
            | default(hostvars['localhost'].kubernetes_vault_data.get('argocd_admin_password_bcrypt', ''), true)
          )
          if (
            (
              hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/integrations', {}).get('argocd_admin_password_bcrypt', '')
              | default(hostvars['localhost'].kubernetes_vault_data.get('argocd_admin_password_bcrypt', ''), true)
            ) | length > 0
          )
          else (
            kubernetes_vault_seed_documents.get('kubernetes/production/integrations', {}).get('data', {}).get('argocd_admin_password_bcrypt', '')
          )
        )
        if (
          (
            (
              hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/integrations', {}).get('argocd_admin_password_bcrypt', '')
              | default(hostvars['localhost'].kubernetes_vault_data.get('argocd_admin_password_bcrypt', ''), true)
            )
            if (
              (
                hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/integrations', {}).get('argocd_admin_password_bcrypt', '')
                | default(hostvars['localhost'].kubernetes_vault_data.get('argocd_admin_password_bcrypt', ''), true)
              ) | length > 0
            )
            else (
              kubernetes_vault_seed_documents.get('kubernetes/production/integrations', {}).get('data', {}).get('argocd_admin_password_bcrypt', '')
            )
          ) | length > 0
        ) else (
          kubernetes_argocd_admin_password_raw
          | password_hash('bcrypt')
        )
      }}
    kubernetes_argocd_redis_password_raw: >-
      {{
        (
          hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/workloads', {}).get('redis_password', '')
          | default(hostvars['localhost'].kubernetes_vault_data.get('redis_password', ''), true)
        )
        if (
          (
            hostvars['localhost'].kubernetes_vault_documents.get('kubernetes/production/workloads', {}).get('redis_password', '')
            | default(hostvars['localhost'].kubernetes_vault_data.get('redis_password', ''), true)
          ) | length > 0
        )
        else (
          kubernetes_vault_seed_documents.get('kubernetes/production/workloads', {}).get('data', {}).get('redis_password', '')
        )
      }}

  tasks:
    - name: Skip GitOps bootstrap when disabled or not in apply mode
      ansible.builtin.meta: end_play
      when:
        - not (kubernetes_gitops.bootstrap_enabled | default(true) | bool)
          or not (hostvars['localhost'].kubernetes_runtime_apply_mode | default(true) | bool)
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Verify kubeconfig exists before app bootstrap
      ansible.builtin.stat:
        path: "{{ kubernetes_kubeconfig_archive_path }}"
      register: kubernetes_prod_bootstrap_kubeconfig_stat
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Fail when kubeconfig archive is missing
      ansible.builtin.assert:
        that:
          - kubernetes_prod_bootstrap_kubeconfig_stat.stat.exists
        fail_msg: >-
          Expected kubeconfig at {{ kubernetes_kubeconfig_archive_path }} was not found.
          The production cluster must be configured before GitOps apps can be bootstrapped.
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Validate Argo CD admin bcrypt is available
      ansible.builtin.assert:
        that:
          - kubernetes_argocd_admin_password_raw is defined
          - kubernetes_argocd_admin_password_raw | length > 0
          - kubernetes_argocd_admin_password_bcrypt is defined
          - kubernetes_argocd_admin_password_bcrypt | length > 0
          - kubernetes_argocd_redis_password_raw is defined
          - kubernetes_argocd_redis_password_raw | length > 0
        fail_msg: >-
          Missing argocd_admin_password or redis_password in the cached Vault data.
          Update Ansible/group_vars/vault/vault-secrets.yaml and run task vault:update-secrets.
      no_log: true
      tags:
        - apps
        - gitops
        - bootstrap
        - validate

    - name: Create temporary rendered Argo CD values file
      ansible.builtin.tempfile:
        state: file
        suffix: "-argocd-values.yaml"
      register: kubernetes_argocd_values_tempfile
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Render Argo CD Helm values with Vault-backed admin password
      ansible.builtin.copy:
        dest: "{{ kubernetes_argocd_values_tempfile.path }}"
        mode: "0600"
        content: >-
          {{
            lookup('file', kubernetes_gitops.argocd_values_path)
            | replace('${ARGOCD_ADMIN_PASSWORD_BCRYPT}', kubernetes_argocd_admin_password_bcrypt)
          }}
      no_log: true
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Add Argo Helm repository
      ansible.builtin.command:
        argv:
          - helm
          - repo
          - add
          - "{{ kubernetes_gitops.chart_repo_name }}"
          - "{{ kubernetes_gitops.chart_repo_url }}"
      register: kubernetes_argocd_repo_add
      changed_when: "'has been added' in (kubernetes_argocd_repo_add.stdout | default(''))"
      failed_when:
        - kubernetes_argocd_repo_add.rc != 0
        - "'already exists' not in (kubernetes_argocd_repo_add.stderr | default(''))"
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Update Helm repositories
      ansible.builtin.command:
        argv:
          - helm
          - repo
          - update
      changed_when: false
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Ensure GitOps namespace exists
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
          - apply
          - -k
          - "{{ kubernetes_gitops.namespace_kustomization_path }}"
      register: kubernetes_gitops_namespace_apply
      changed_when: >-
        'configured' in (kubernetes_gitops_namespace_apply.stdout | default(''))
        or 'created' in (kubernetes_gitops_namespace_apply.stdout | default(''))
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Ensure Argo CD Redis auth secret exists
      kubernetes.core.k8s:
        kubeconfig: "{{ kubernetes_kubeconfig_archive_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-redis
            namespace: "{{ kubernetes_gitops.namespace }}"
          type: Opaque
          stringData:
            auth: "{{ kubernetes_argocd_redis_password_raw }}"
      no_log: true
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Install or upgrade Argo CD bootstrap release
      ansible.builtin.command:
        argv:
          - helm
          - upgrade
          - --install
          - "{{ kubernetes_gitops.release_name }}"
          - "{{ kubernetes_gitops.chart_repo_name }}/{{ kubernetes_gitops.chart_name }}"
          - --namespace
          - "{{ kubernetes_gitops.namespace }}"
          - --version
          - "{{ kubernetes_gitops.chart_version }}"
          - --values
          - "{{ kubernetes_argocd_values_tempfile.path }}"
          - --wait
          - --timeout
          - "{{ kubernetes_gitops.wait_timeout }}"
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
      register: kubernetes_argocd_helm_install
      changed_when: >-
        'STATUS: deployed' in (kubernetes_argocd_helm_install.stdout | default(''))
        or 'STATUS: upgraded' in (kubernetes_argocd_helm_install.stdout | default(''))
      no_log: true
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Wait for Argo CD server deployment
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
          - -n
          - "{{ kubernetes_gitops.namespace }}"
          - rollout
          - status
          - "deploy/{{ kubernetes_gitops.release_name }}-argocd-server"
          - --timeout={{ kubernetes_gitops.wait_timeout }}
      changed_when: false
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Wait for Argo CD repo server deployment
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
          - -n
          - "{{ kubernetes_gitops.namespace }}"
          - rollout
          - status
          - "deploy/{{ kubernetes_gitops.release_name }}-argocd-repo-server"
          - --timeout={{ kubernetes_gitops.wait_timeout }}
      changed_when: false
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Wait for Argo CD ApplicationSet deployment
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
          - -n
          - "{{ kubernetes_gitops.namespace }}"
          - rollout
          - status
          - "deploy/{{ kubernetes_gitops.release_name }}-argocd-applicationset-controller"
          - --timeout={{ kubernetes_gitops.wait_timeout }}
      changed_when: false
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Wait for Argo CD application controller statefulset
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
          - -n
          - "{{ kubernetes_gitops.namespace }}"
          - rollout
          - status
          - "statefulset/{{ kubernetes_gitops.release_name }}-argocd-application-controller"
          - --timeout={{ kubernetes_gitops.wait_timeout }}
      changed_when: false
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Apply production cluster bootstrap manifests
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
          - apply
          - -k
          - "{{ kubernetes_gitops.bootstrap_kustomization_path }}"
      register: kubernetes_prod_cluster_bootstrap_apply
      changed_when: >-
        'configured' in (kubernetes_prod_cluster_bootstrap_apply.stdout | default(''))
        or 'created' in (kubernetes_prod_cluster_bootstrap_apply.stdout | default(''))
      tags:
        - apps
        - gitops
        - bootstrap

    - name: Wait for prod platform root application to exist
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubernetes_kubeconfig_archive_path }}"
          - -n
          - "{{ kubernetes_gitops.namespace }}"
          - get
          - application
          - prod-platform-root
      changed_when: false
      tags:
        - apps
        - gitops
        - bootstrap

  post_tasks:
    - name: Remove temporary rendered Argo CD values file
      ansible.builtin.file:
        path: "{{ kubernetes_argocd_values_tempfile.path }}"
        state: absent
      when:
        - kubernetes_argocd_values_tempfile is defined
        - kubernetes_argocd_values_tempfile.path is defined
      tags:
        - apps
        - gitops
        - bootstrap
