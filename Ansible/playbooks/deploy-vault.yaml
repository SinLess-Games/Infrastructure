---
# =============================================================================
# Vault Deployment Playbook
# =============================================================================
# Purpose:
#   - Deploy Vault VMs using the shared Proxmox VM Terraform module
#   - Render service-specific Terraform configuration from group_vars/vault
#   - Execute Terraform via Taskfile
# =============================================================================

- name: Prepare controller SSH state for Vault access
  hosts: localhost
  gather_facts: false
  connection: local
  become: true

  vars:
    vault_controller_user: "{{ lookup('env', 'USER') }}"
    vault_controller_home: "{{ lookup('env', 'HOME') }}"

  tasks:
    - name: Ensure controller SSH directory exists
      ansible.builtin.file:
        path: "{{ vault_controller_home }}/.ssh"
        state: directory
        owner: "{{ vault_controller_user }}"
        group: "{{ vault_controller_user }}"
        mode: "0700"

    - name: Ensure controller known_hosts is writable by the current user
      ansible.builtin.file:
        path: "{{ vault_controller_home }}/.ssh/known_hosts"
        state: touch
        owner: "{{ vault_controller_user }}"
        group: "{{ vault_controller_user }}"
        mode: "0600"

- name: Deploy Vault cluster with Terraform
  hosts: localhost
  gather_facts: false
  run_once: true
  connection: local

  vars_files:
    - ../group_vars/vault/vault-vms.yaml

  roles:
    - role: vault
      vars:
        vault_role_phases: ["deploy"]
      tags: ["deploy"]

- name: Configure Vault nodes
  hosts: vault
  gather_facts: true
  become: true

  vars_files:
    - ../group_vars/vault/vault-vms.yaml
    - ../group_vars/vault/users.yaml
    - ../group_vars/vault/policies.yaml
    - ../group_vars/vault/main.yaml
    - ../group_vars/vault/secrets-engines.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/vault/vault-secrets.yaml

  vars:
    # Only install essential packages for Vault nodes
    packages_role_groups:
      - production
      - shell

  roles:
    - role: dns-resolver
      tags: ["configure", "dns"]
    
    - role: users
      tags: ["configure", "users"]

    - role: packages
      tags: ["configure", "packages"]
    
    - role: shell-config
      tags: ["configure", "shell"]
    
    - role: ssh
      tags: ["configure", "sshd"]
  
    - role: vault
      vars:
        vault_role_phases: ["configure"]
      tags: ["configure"]

    - role: vault
      vars:
        vault_role_phases: ["setup"]
      tags: ["setup"]

    - role: vault
      vars:
        vault_role_phases: ["secrets"]
      tags: ["secrets"]

    - role: vault
      vars:
        vault_role_phases: ["users"]
      tags: ["users"]
