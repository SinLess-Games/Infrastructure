---
# =============================================================================
# Vault Deployment Playbook
# =============================================================================
# Purpose:
#   - Deploy Vault VMs using Terraform module
#   - Render Terraform configuration from group_vars/vault
#   - Execute Terraform via Taskfile
# =============================================================================

- name: Deploy Vault cluster with Terraform
  hosts: localhost
  gather_facts: false
  run_once: true
  connection: local

  vars_files:
    - ../group_vars/vault/vault-vms.yaml

  roles:
    - role: vault-deploy
      tags: ["deploy"]

- name: Configure Vault nodes
  hosts: vault
  gather_facts: true
  become: true

  vars_files:
    - ../group_vars/vault/vault-vms.yaml
    - ../group_vars/vault/users.yaml
    - ../group_vars/vault/policies.yaml
    - ../group_vars/vault/main.yaml
    - ../group_vars/vault/secrets-engines.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/vault/vault-secrets.yaml

  vars:
    # Only install essential packages for Vault nodes
    packages_enabled_groups:
      - base
      - cli
      - net
      - system

  roles:
    - role: dns-resolver
      tags: ["configure", "dns"]
    
    - role: users
      tags: ["configure", "users"]

    - role: packages
      tags: ["configure", "packages"]
    
    - role: shell-config
      tags: ["configure", "shell"]
    
    - role: ssh
      tags: ["configure", "sshd"]
  
    - role: vault-configure
      tags: ["configure"]
    
    - role: vault-setup
      tags: ["setup"]

    - role: vault-secrets
      tags: ["secrets"]

    - role: vault-users
      tags: ["users"]



