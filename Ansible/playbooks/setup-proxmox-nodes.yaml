---
# =============================================================================
# Playbook: configure-proxmox-node.yaml
# -----------------------------------------------------------------------------
# Purpose:
#   Apply baseline configuration AND cluster orchestration to Proxmox VE nodes
#   in a safe, deterministic order.
#
# Design guarantees:
#   - Node hardening always runs first
#   - Cluster bootstrap happens once
#   - Join operations are serialized (REQUIRED by Proxmox)
#   - Safe to re-run at any point
# =============================================================================

- name: Configure Proxmox VE nodes and cluster
  hosts: proxmox
  become: true
  gather_facts: true

  # ---------------------------------------------------------------------------
  # CRITICAL:
  # Proxmox cluster join MUST be serialized
  # ---------------------------------------------------------------------------
  # serial: 1

  vars_prompt:
    - name: "proxmox_cluster_join_password"
      prompt: "Enter the Proxmox cluster join password"
      private: true

  vars:
    proxmox_node_playbook: true

  vars_files:
    - ../group_vars/all/chrony.yaml
    - ../group_vars/proxmox.yaml
    - ../group_vars/proxmox/cluster.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/users.yaml

  roles:
    # -------------------------------------------------------------------------
    # Phase 0: Common SSH configuration
    # -------------------------------------------------------------------------
    - role: ssh
      tags: [ssh, common]

    # -------------------------------------------------------------------------
    # Phase 1: Proxmox node baseline (SAFE, cluster-agnostic)
    # -------------------------------------------------------------------------
    - role: proxmox-node
      tags: [proxmox, node, baseline]

    # -------------------------------------------------------------------------
    # Phase 2: Proxmox cluster lifecycle
    # -------------------------------------------------------------------------
    # - role: proxmox-cluster
    #   tags: [proxmox, cluster]

    # # -------------------------------------------------------------------------
    # # Phase 3: Proxmox hardware inventory collection
    # # -------------------------------------------------------------------------
    # - role: proxmox-hardware
    #   tags: [proxmox, hardware, inventory]

  tasks:

    - name: reboot Proxmox VE node if required
      ansible.builtin.reboot:
        msg: "Rebooting to apply Proxmox VE configuration changes"
        pre_reboot_delay: 5
        reboot_timeout: 6000
        test_command: whoami
      tags: [proxmox, node, reboot]