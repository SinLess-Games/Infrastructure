---
# =============================================================================
# Playbook: configure-proxmox-node.yaml
# -----------------------------------------------------------------------------
# Purpose:
#   Apply baseline configuration AND cluster orchestration to Proxmox VE nodes
#   in a safe, deterministic order.
#
# Design guarantees:
#   - Node hardening always runs first
#   - Cluster bootstrap happens once
#   - Join operations are serialized (REQUIRED by Proxmox)
#   - Safe to re-run at any point
# =============================================================================

- name: Configure Proxmox VE nodes and cluster
  hosts: proxmox
  become: true
  gather_facts: true
  timeout: 7200

  vars:
    proxmox_node_playbook: true

  vars_files:
    - ../group_vars/all/chrony.yaml
    - ../group_vars/proxmox/proxmox.yaml
    - ../group_vars/proxmox/cluster.yaml
    - ../group_vars/proxmox/keepalived.yaml
    - ../group_vars/proxmox/certificate.yaml
    - ../group_vars/proxmox/vault-certs.yaml
    - ../group_vars/proxmox/networking.yaml
    - ../group_vars/all/ssh.yaml
    - ../group_vars/all/users.yaml

  vars_prompt:
    - name: proxmox_cluster_join_password
      prompt: "Enter Proxmox cluster join password"
      private: true
      confirm: true

  roles:
    # -------------------------------------------------------------------------
    # Phase 0: Gather facts early with timeout
    # -------------------------------------------------------------------------
    - role: ssh
      tags: [ssh, common]

    # -------------------------------------------------------------------------
    # Phase 1: Proxmox node baseline (SAFE, cluster-agnostic)
    # -------------------------------------------------------------------------
    - role: proxmox-node
      tags: [proxmox, node, baseline]

    # -------------------------------------------------------------------------
    # Phase 2: Proxmox cluster lifecycle
    # -------------------------------------------------------------------------
    - role: proxmox-cluster
      tags: [proxmox, cluster]

    # -------------------------------------------------------------------------
    # Phase 3: Proxmox hardware inventory collection
    # -------------------------------------------------------------------------
    - role: proxmox-hardware
      tags: [proxmox, hardware, inventory]

    # -------------------------------------------------------------------------
    # Phase 4: Proxmox HA UI setup (HAProxy + Keepalived)
    # -------------------------------------------------------------------------
    - role: proxmox-ha-ui
      tags: [proxmox, ha-ui, haproxy, keepalived]

    # -------------------------------------------------------------------------
    # Phase 5: Proxmox certificate management
    # -------------------------------------------------------------------------
    - role: proxmox-certs
      tags: [proxmox, certs, certificates]

    # -------------------------------------------------------------------------
    # Phase 6: Proxmox cluster networking (VLAN bridges)
    # -------------------------------------------------------------------------
    - role: proxmox-networking
      tags: [proxmox, networking, bridges]

  tasks:

    - name: Gather facts if not already gathered
      ansible.builtin.setup:
        gather_timeout: 30
      when: ansible_facts is not defined or not ansible_facts

    # - name: reboot Proxmox VE node if required
    #   ansible.builtin.reboot:
    #     msg: "Rebooting to apply Proxmox VE configuration changes"
    #     pre_reboot_delay: 5
    #     reboot_timeout: 6000
    #     test_command: whoami
    #   tags: [proxmox, node, reboot]
