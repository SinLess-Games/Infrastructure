---
# =============================================================================
# MinIO Deployment Playbook
# =============================================================================
# Purpose:
#   - Deploy MinIO VMs using the shared Proxmox VM Terraform module
#   - Render service-specific Terraform configuration from group_vars/minio
#   - Configure MinIO cluster, buckets, and HA
# =============================================================================

- name: Deploy MinIO cluster with Terraform
  hosts: localhost
  gather_facts: false
  run_once: true
  connection: local

  vars:
    minio_repo_root: "{{ playbook_dir | dirname | dirname }}"
    minio_terraform_dir: "{{ minio_repo_root }}/Terraform"

  vars_files:
    - ../group_vars/minio/main.yaml

  roles:
    - role: minio
      vars:
        minio_role_phases: ["deploy"]
      tags: ["deploy"]

- name: Configure MinIO nodes
  hosts: minio
  gather_facts: true
  become: true

  vars_files:
    - ../group_vars/minio/main.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/users.yaml
    - ../group_vars/all/ssh.yaml

  vars:
    # Only install essential packages for MinIO nodes
    packages_role_groups:
      - production
      - shell

  pre_tasks:
    - name: Load MinIO vault secrets
      ansible.builtin.include_tasks:
        file: ../tasks/vault.yaml
        apply:
          tags: ["always"]
      vars:
        vault_kv_path: "ansible/minio"
      tags: ["always"]

    - name: Ensure DNS nameservers are configured
      ansible.builtin.copy:
        content: |
          nameserver {{ minio_dns_primary | default('10.10.10.1') }}
          nameserver {{ minio_dns_secondary | default('1.1.1.1') }}
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: '0644'
      tags: ["dns"]

    - name: Refresh APT cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      register: apt_cache_result
      retries: 3
      delay: 5
      until: apt_cache_result is succeeded
      tags: ["packages"]

  roles:
    - role: dns-resolver
      tags: ["dns"]

    - role: users
      tags: ["users"]

    - role: packages
      tags: ["packages"]

    - role: shell-config
      tags: ["shell"]

    - role: ssh
      tags: ["ssh"]

    - role: minio
      vars:
        minio_role_phases: ["configure"]
      tags: ["minio", "configure"]
