---
# =============================================================================
# Configure Localhost
# -----------------------------------------------------------------------------
# Prepares the local control node (dev-01) for infrastructure automation.
# This playbook ONLY runs roles that are safe for localhost execution.
# =============================================================================

- name: Configure local Ansible control node
  hosts: dev
  connection: local
  gather_facts: true
  become: true

  vars_files:
    - ../group_vars/all/users.yaml
    - ../group_vars/all/groups.yaml
    - ../group_vars/all/zsh.yaml
    - ../group_vars/all/packages.yaml
    - ../group_vars/all/ssh.yaml

  vars:
    infrastructure_repo_root: "{{ playbook_dir | dirname | dirname }}"
    packages_install_homebrew: true
    packages_role_brew_packages: "{{ shell_brew_packages }}"

  pre_tasks:
    - name: Ensure repo root .env exists for local Terraform secrets
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/env/root.env.j2"
        dest: "{{ infrastructure_repo_root }}/.env"
        owner: "{{ ansible_env.SUDO_USER | default(ansible_env.USER, true) }}"
        group: "{{ ansible_env.SUDO_USER | default(ansible_env.USER, true) }}"
        mode: "0600"

  roles:
    - users
    - ssh
    - shell-config
    - packages
