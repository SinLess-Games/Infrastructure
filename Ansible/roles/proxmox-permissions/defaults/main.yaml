---
# Default variables for proxmox-permissions role
# These can be overridden at playbook, play, or host level

# Enable/disable permission management
proxmox_permissions_enabled: true

# Development mode (simulates commands, doesn't require real Proxmox nodes)
proxmox_permissions_dev_mode: false

proxmox_auth_method: "local"  # 'local', 'pam', 'ldap', etc.

# Password generation method
proxmox_password_generate: true
proxmox_password_length: 24

# Proxmox PVE node name for SSH operations
proxmox_pve_node: "{{ inventory_hostname }}"
