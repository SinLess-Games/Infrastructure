---
# Task: Create Proxmox resource pools

- name: "Create resource pools"
  block:
    - name: "Check if proxmox_pools is defined"
      assert:
        that:
          - proxmox_pools is defined
          - proxmox_pools | type_debug == 'dict'
        fail_msg: "proxmox_pools must be defined in group_vars"

    - name: "Create pool: {{ item.key }}"
      shell: |
        pveum pool add "{{ item.key }}" \
          {% if item.value.comment is defined %}-comment "{{ item.value.comment }}"{% endif %} 2>&1 || true
        # Always report success since we use ignore_errors
        echo "Done"
      register: pool_result
      loop: "{{ proxmox_pools | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      delegate_to: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
      become: true
      ignore_unreachable: true
      ignore_errors: true
      when: not proxmox_permissions_dev_mode
      tags:
        - proxmox
        - permissions
        - pools

    - name: "[DEV MODE] Display pool creation (simulated): {{ item.key }}"
      debug:
        msg: "Would create pool: {{ item.key }} with comment: {{ item.value.comment | default('none') }}"
      loop: "{{ proxmox_pools | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: proxmox_permissions_dev_mode
      tags:
        - proxmox
        - permissions
        - pools

  tags:
    - proxmox
    - permissions
    - pools
