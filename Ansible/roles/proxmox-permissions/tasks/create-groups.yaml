---
# Task: Create Proxmox groups

- name: "Create groups"
  block:
    - name: "Check if proxmox_groups is defined"
      assert:
        that:
          - proxmox_groups is defined
          - proxmox_groups | type_debug == 'dict'
        fail_msg: "proxmox_groups must be defined in group_vars"

    - name: "Create group: {{ item.key }}"
      shell: |
        pveum group add "{{ item.key }}" \
          {% if item.value.comment is defined %}-comment "{{ item.value.comment }}"{% endif %} 2>&1 || true
        # Always report success since we use ignore_errors
        echo "Done"
      register: group_result
      loop: "{{ proxmox_groups | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      delegate_to: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
      become: true
      ignore_unreachable: true
      ignore_errors: true
      when: not proxmox_permissions_dev_mode
      tags:
        - proxmox
        - permissions
        - groups

    - name: "[DEV MODE] Display group creation (simulated): {{ item.key }}"
      debug:
        msg: "Would create group: {{ item.key }} with comment: {{ item.value.comment | default('none') }}"
      loop: "{{ proxmox_groups | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: proxmox_permissions_dev_mode
      tags:
        - proxmox
        - permissions
        - groups

  tags:
    - proxmox
    - permissions
    - groups
