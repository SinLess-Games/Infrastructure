---
# Task: Configure Proxmox ACLs (Access Control Lists)

- name: "Configure ACLs"
  block:
    - name: "Check if proxmox_users is defined"
      assert:
        that:
          - proxmox_users is defined
        fail_msg: "proxmox_users must be defined in group_vars"

    - name: "Assign roles to users via ACL: {{ item.key }}"
      shell: |
        # Set ACL for user with role(s)
        {% for role in item.value.roles %}
        pveum acl modify "{{ item.value.acl_path }}" \
          -user "{{ item.key }}@{{ item.value.realm }}" \
          -role "{{ role }}"
        {% endfor %}
      delegate_to: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
      become: true
      ignore_unreachable: true
      ignore_errors: true
      when: item.value.roles is defined and item.value.roles | length > 0 and not proxmox_permissions_dev_mode
      loop: "{{ proxmox_users | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      tags:
        - proxmox
        - permissions
        - acls

    - name: "[DEV MODE] Display ACL assignment for users (simulated): {{ item.key }}"
      debug:
        msg: "Would assign roles {{ item.value.roles | default([]) }} to user {{ item.key }}@{{ item.value.realm }}"
      when: proxmox_permissions_dev_mode
      loop: "{{ proxmox_users | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      tags:
        - proxmox
        - permissions
        - acls

    - name: "Assign roles to groups via ACL"
      shell: |
        # Set ACL for groups with roles
        {% for role in item.value.roles | default([]) %}
        pveum acl modify "/" \
          -group "{{ item.key }}" \
          -role "{{ role }}"
        {% endfor %}
      vars:
        ansible_host: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
      delegate_to: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
      become: true
      ignore_unreachable: true
      ignore_errors: true
      when: 
        - proxmox_groups is defined
        - item.value.roles is defined 
        - item.value.roles | length > 0
        - not proxmox_permissions_dev_mode
      loop: "{{ proxmox_groups | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      tags:
        - proxmox
        - permissions
        - acls

  tags:
    - proxmox
    - permissions
    - acls
