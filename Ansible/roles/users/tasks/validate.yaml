---
# =============================================================================
# Validate users role inputs
# =============================================================================

- name: Ensure users_role_entries is defined and is a list
  ansible.builtin.assert:
    that:
      - users_role_entries is defined
      - users_role_entries is iterable
    fail_msg: >
      "users_role_entries must be defined as a list of user definitions"

- name: Validate required user fields
  ansible.builtin.assert:
    that:
      - item.name is defined
    fail_msg: "Each user must define at least a 'name'"
  loop: "{{ users_role_entries }}"
  loop_control:
    label: "{{ item.name | default('undefined-user') }}"
