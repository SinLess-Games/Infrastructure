---
# =============================================================================
# Kubernetes Configure Role - Save Kubeconfig Task
# =============================================================================
# Extract kubeconfig from RKE2 master and save to local outputs directory
# Executed on localhost after master node is configured

- name: Create kubeconfig output directory
  ansible.builtin.file:
    path: "{{ kubernetes_configure_kubeconfig_output_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Wait for RKE2 kubeconfig to be generated
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 300
  when: inventory_hostname == groups['kubernetes_master'][0] | default('')

- name: Fetch kubeconfig from master node
  ansible.builtin.fetch:
    src: "{{ kubernetes_configure_config_dir }}/server.yaml"
    dest: "{{ kubernetes_configure_kubeconfig_output_dir }}/kubeconfig.tmp"
    flat: true
  when: inventory_hostname == groups['kubernetes_master'][0] | default('')

- name: Update kubeconfig with proper server address
  ansible.builtin.replace:
    path: "{{ kubernetes_configure_kubeconfig_output_dir }}/kubeconfig.tmp"
    regexp: 'server: https://[^:]+:6443'
    replace: "server: {{ kubernetes_configure_server_url }}"
  delegate_to: localhost
  become: false
  when: inventory_hostname == groups['kubernetes_master'][0] | default('')

- name: Move kubeconfig to final location
  ansible.builtin.shell:
    cmd: "mv {{ kubernetes_configure_kubeconfig_output_dir }}/kubeconfig.tmp {{ kubernetes_configure_kubeconfig_output_dir }}/{{ kubernetes_configure_kubeconfig_filename }}"
  delegate_to: localhost
  become: false
  when: inventory_hostname == groups['kubernetes_master'][0] | default('')

- name: Set kubeconfig file permissions
  ansible.builtin.file:
    path: "{{ kubernetes_configure_kubeconfig_output_dir }}/{{ kubernetes_configure_kubeconfig_filename }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: inventory_hostname == groups['kubernetes_master'][0] | default('')

- name: Display kubeconfig location
  ansible.builtin.debug:
    msg: |
      ========================================================
      ✓ Kubernetes Kubeconfig Saved Successfully!
      ========================================================
      
      Location: {{ kubernetes_configure_kubeconfig_output_dir }}/{{ kubernetes_configure_kubeconfig_filename }}
      
      Test cluster connectivity:
        export KUBECONFIG={{ kubernetes_configure_kubeconfig_output_dir }}/{{ kubernetes_configure_kubeconfig_filename }}
        kubectl get nodes
        kubectl get pods -A
      
      ========================================================
  delegate_to: localhost
  become: false
  when: inventory_hostname == groups['kubernetes_master'][0] | default('')

