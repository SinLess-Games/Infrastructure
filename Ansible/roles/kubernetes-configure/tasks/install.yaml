---
# =============================================================================
# Kubernetes Configure Role - Installation Tasks
# =============================================================================
# This task file installs RKE2 on nodes using lablabs.rke2 role and
# configures the cluster networking and CNI

# Install on Master Node
- name: Block - Configure Master Node
  become: true
  block:
    - name: Set RKE2 server variables for master node
      ansible.builtin.set_fact:
        rke2_type: server
        rke2_version: "{{ kubernetes_configure_version }}"
        rke2_channel: "{{ kubernetes_configure_rke2_channel }}"
        rke2_config:
          cluster-cidr: "{{ kubernetes_configure_cluster_cidr }}"
          service-cidr: "{{ kubernetes_configure_service_cidr }}"
          cluster-dns: "{{ kubernetes_configure_cluster_dns }}"
          advertise-address: "{{ kubernetes_master_ips[0] }}"
          bind-address: "{{ kubernetes_master_ips[0] }}"
          token: "{{ kubernetes_configure_server_token }}"
          tls-san:
            - 127.0.0.1
            - localhost
            - kubernetes
            - kubernetes.default
            - kubernetes.default.svc
            - kubernetes.default.svc.cluster.local
            - "{{ kubernetes_master_ips[0] }}"
          disable:
            - local-storage
            - servicelb
          kubelet-arg:
            - "max-pods=250"
            - "eviction-hard=memory.available<2%,nodefs.available<2%"

    - name: Install RKE2 server using lablabs.rke2 role
      ansible.builtin.include_role:
        name: lablabs.rke2
      vars:
        rke2_type: server
        rke2_version: "{{ kubernetes_configure_version }}"
        rke2_channel: "{{ kubernetes_configure_rke2_channel }}"
        rke2_config:
          cluster-cidr: "{{ kubernetes_configure_cluster_cidr }}"
          service-cidr: "{{ kubernetes_configure_service_cidr }}"
          cluster-dns: "{{ kubernetes_configure_cluster_dns }}"
          advertise-address: "{{ kubernetes_master_ips[0] }}"
          bind-address: "{{ kubernetes_master_ips[0] }}"
          token: "{{ kubernetes_configure_server_token }}"
          tls-san:
            - 127.0.0.1
            - localhost
            - kubernetes
            - kubernetes.default
            - kubernetes.default.svc
            - kubernetes.default.svc.cluster.local
            - "{{ kubernetes_master_ips[0] }}"
          disable:
            - local-storage
            - servicelb
          kubelet-arg:
            - "max-pods=250"
            - "eviction-hard=memory.available<2%,nodefs.available<2%"

    - name: Wait for RKE2 service to stabilize before checking
      ansible.builtin.pause:
        seconds: 60

    - name: Check RKE2 service status and logs
      ansible.builtin.shell:
        cmd: |
          echo "=== RKE2 Service Status ===" 
          systemctl status rke2-server || true
          echo ""
          echo "=== RKE2 Service Journal (last 50 lines) ===" 
          journalctl -u rke2-server -n 50 --no-pager || true
          echo ""
          echo "=== Checking RKE2 binary ===" 
          ls -la /opt/rke2/bin/rke2 2>/dev/null || echo "RKE2 binary not found at /opt/rke2/bin/rke2"
          echo ""
          echo "=== Checking config directory ===" 
          ls -la /etc/rancher/rke2/ 2>/dev/null || echo "Config directory not found"
      register: rke2_debug

    - name: Display RKE2 debug information
      ansible.builtin.debug:
        msg: "{{ rke2_debug.stdout }}"

    - name: Wait for RKE2 master to be ready
      ansible.builtin.shell:
        cmd: |
          timeout {{ kubernetes_configure_wait_for_api_timeout }} bash <<'EOF'
          for i in {1..600}; do
            # Check if kubeconfig exists
            if [ -f /etc/rancher/rke2/rke2.yaml ]; then
              echo "Found kubeconfig at /etc/rancher/rke2/rke2.yaml"
              exit 0
            fi
            if [ -f /etc/rancher/rke2/server.yaml ]; then
              echo "Found kubeconfig at /etc/rancher/rke2/server.yaml"
              exit 0
            fi
            # Try to check if API server is responding
            if curl -sk https://127.0.0.1:6443/readyz &>/dev/null; then
              echo "API server is ready"
              exit 0
            fi
            echo "Waiting for RKE2 master ($i/600)..."
            sleep 3
          done
          echo "Timeout waiting for RKE2 master to be ready"
          exit 1
          EOF
      register: wait_rke2_result

    - name: Wait for API server to be responsive
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 120); do
            if timeout 5 bash -c "curl -sk https://127.0.0.1:6443/readyz &>/dev/null"; then
              echo "API server is ready"
              exit 0
            fi
            echo "Waiting for API server... attempt $i/120"
            sleep 5
          done
          echo "API server check timeout - continuing anyway (service may still be stabilizing)"
          exit 0
      retries: 1
      delay: 10
      register: api_ready

    - name: Wait for all nodes to reach ready state
      ansible.builtin.shell:
        cmd: |
          KUBECTL_BIN="kubectl"
          if [ -f /opt/rke2/bin/kubectl ]; then
            KUBECTL_BIN="/opt/rke2/bin/kubectl"
          fi
          $KUBECTL_BIN --kubeconfig=/etc/rancher/rke2/rke2.yaml wait --for=condition=Ready node --all --timeout={{ kubernetes_configure_wait_for_nodes_timeout }}s || true

    - name: Display master node status
      ansible.builtin.shell:
        cmd: |
          # Find kubectl - it could be in different locations
          KUBECTL_BIN=""
          if [ -f /opt/rke2/bin/kubectl ]; then
            KUBECTL_BIN="/opt/rke2/bin/kubectl"
          elif [ -f /usr/local/bin/kubectl ]; then
            KUBECTL_BIN="/usr/local/bin/kubectl"
          elif command -v kubectl &> /dev/null; then
            KUBECTL_BIN="kubectl"
          else
            echo "kubectl not found in standard locations"
            exit 1
          fi
          
          $KUBECTL_BIN --kubeconfig=/etc/rancher/rke2/rke2.yaml get nodes -o wide
      register: node_status

    - name: Show node status
      ansible.builtin.debug:
        msg: "{{ node_status.stdout }}"

    - name: Install Cilium CNI using Helm
      ansible.builtin.shell:
        cmd: |
          export KUBECONFIG={{ kubernetes_configure_config_dir }}/server.yaml
          HELM_BIN="/root/.cache/helm/linux-amd64/helm"
          
          # Download helm if not already present
          if [ ! -f "$HELM_BIN" ]; then
            mkdir -p /root/.cache/helm/linux-amd64
            curl -sL https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz | tar xz -C /root/.cache/helm/linux-amd64 --strip-components=1
          fi
          
          # Add Cilium Helm repo
          $HELM_BIN repo add cilium https://helm.cilium.io
          $HELM_BIN repo update
          
          # Install or upgrade Cilium
          $HELM_BIN upgrade --install cilium cilium/cilium \
            --namespace kube-system \
            --set ipam.mode=kubernetes \
            --set kubeProxyReplacement=partial \
            --set operator.replicas=1 \
            --set image.pullPolicy=IfNotPresent \
            --wait \
            --timeout=5m
          
          echo "Cilium installed successfully"
      register: cilium_install
      retries: 3
      delay: 30
      until: cilium_install is succeeded

    - name: Display Cilium installation result
      ansible.builtin.debug:
        msg: "{{ cilium_install.stdout }}"

  when: "'kubernetes_dev_control_plane' in group_names"

# Install on Worker Nodes
- name: Block - Configure Worker Nodes
  become: true
  block:
    - name: Set RKE2 agent variables for worker nodes
      ansible.builtin.set_fact:
        rke2_type: agent
        rke2_version: "{{ kubernetes_configure_version }}"
        rke2_channel: "{{ kubernetes_configure_rke2_channel }}"
        rke2_config:
          server: "{{ kubernetes_configure_server_url }}"
          token: "{{ kubernetes_configure_server_token }}"
          kubelet-arg:
            - "max-pods=250"
            - "eviction-hard=memory.available<2%,nodefs.available<2%"

    - name: Install RKE2 agent using lablabs.rke2 role
      ansible.builtin.include_role:
        name: lablabs.rke2
      vars:
        rke2_type: agent
        rke2_version: "{{ kubernetes_configure_version }}"
        rke2_channel: "{{ kubernetes_configure_rke2_channel }}"
        rke2_config:
          server: "{{ kubernetes_configure_server_url }}"
          token: "{{ kubernetes_configure_server_token }}"
          kubelet-arg:
            - "max-pods=250"
            - "eviction-hard=memory.available<2%,nodefs.available<2%"

    - name: Wait for agent to join cluster
      ansible.builtin.pause:
        seconds: 30

  when: "'kubernetes_dev_workers' in group_names"

- name: Block - Verify Cluster Status (Master Only)
  block:
    - name: Get cluster nodes
      ansible.builtin.shell:
        cmd: |
          KUBECTL_BIN="kubectl"
          if [ -f /opt/rke2/bin/kubectl ]; then
            KUBECTL_BIN="/opt/rke2/bin/kubectl"
          fi
          $KUBECTL_BIN --kubeconfig=/etc/rancher/rke2/rke2.yaml get nodes -o json
      register: cluster_nodes

    - name: Display cluster nodes
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout | from_json | to_nice_json }}"

    - name: Get cluster version
      ansible.builtin.shell:
        cmd: |
          KUBECTL_BIN="kubectl"
          if [ -f /opt/rke2/bin/kubectl ]; then
            KUBECTL_BIN="/opt/rke2/bin/kubectl"
          fi
          $KUBECTL_BIN --kubeconfig=/etc/rancher/rke2/rke2.yaml version --short
      register: cluster_version

    - name: Display cluster version
      ansible.builtin.debug:
        msg: |
          Kubernetes Cluster Version:
          {{ cluster_version.stdout }}

  when: "'kubernetes_dev_control_plane' in group_names"
