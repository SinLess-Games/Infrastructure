---
# =============================================================================
# Kubernetes Configure Role - Installation Tasks
# =============================================================================
# This task file installs RKE2/k3s on nodes and configures the cluster

# Install on Master Node
- name: Block - Configure Master Node
  become: true
  block:
    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: "{{ kubernetes_configure_config_dir }}"
        state: directory
        mode: "0755"

    - name: Clean up stale RKE2 data from previous runs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/var/lib/rancher/rke2/server/db"
        - "/var/lib/rancher/rke2/server/tls"
        - "/etc/rancher/rke2/server.yaml"
        - "/etc/rancher/rke2/rke2.yaml"
      ignore_errors: true

    - name: Create RKE2 config file for master
      ansible.builtin.copy:
        content: |
          # RKE2 Master Node Configuration
          # Generated by Ansible kubernetes-configure role

          # Cluster configuration
          cluster-cidr: {{ kubernetes_configure_cluster_cidr }}
          service-cidr: {{ kubernetes_configure_service_cidr }}
          cluster-dns: {{ kubernetes_configure_cluster_dns }}

          # API Server settings
          advertise-address: {{ kubernetes_configure_advertise_address }}
          bind-address: 0.0.0.0

          # Data directory
          data-dir: {{ kubernetes_configure_data_dir }}

          # Token for node joining
          token: {{ kubernetes_configure_server_token }}

          # TLS settings
          tls-san:
            - 127.0.0.1
            - localhost
            - kubernetes
            - kubernetes.default
            - kubernetes.default.svc
            - kubernetes.default.svc.cluster.local
            - {{ kubernetes_master_ips[0] }}
            {% for ip in kubernetes_master_ips %}
            - {{ ip }}
            {% endfor %}

          # Disable default Flannel CNI - use Cilium instead
          flannel-backend: none

          # Disable local-path provisioner for dev
          disable:
            - local-storage

          # Enable metrics-server
          kubelet-arg:
            - "max-pods=250"
            - "eviction-hard=memory.available<2%,nodefs.available<2%"
        dest: "{{ kubernetes_configure_config_dir }}/config.yaml"
        mode: "0644"

    - name: Wait for network connectivity and DNS resolution
      ansible.builtin.shell:
        cmd: |
          for i in {1..30}; do
            if nslookup get.rke2.io 8.8.8.8 >/dev/null 2>&1; then
              echo "DNS resolution verified"
              exit 0
            fi
            echo "Waiting for DNS resolution... attempt $i/30"
            sleep 2
          done
          # Try alternate DNS provider
          echo "nameserver 8.8.8.8" > /etc/resolv.conf
          echo "nameserver 8.8.4.4" >> /etc/resolv.conf
          echo "Applied workaround DNS configuration"
          sleep 2
          exit 0
      register: network_check
      retries: 2
      delay: 5

    - name: Display network connectivity status
      ansible.builtin.debug:
        msg: "{{ network_check.stdout }}"

    - name: Download RKE2 installer script
      ansible.builtin.shell:
        cmd: |
          # Fix DNS if needed
          grep -q "nameserver 8.8.8.8" /etc/resolv.conf || echo "nameserver 8.8.8.8" >> /etc/resolv.conf
          
          # Try downloading with curl
          curl -fsSL {{ kubernetes_configure_rke2_installer_url }} -o /tmp/rke2-installer.sh
          if [ ! -f /tmp/rke2-installer.sh ]; then
            echo "Failed to download RKE2 installer"
            exit 1
          fi
          chmod +x /tmp/rke2-installer.sh
          ls -la /tmp/rke2-installer.sh
      retries: "{{ kubernetes_configure_install_retries }}"
      delay: "{{ kubernetes_configure_install_delay }}"
      register: rke2_installer_download

    - name: Install RKE2 on master node
      ansible.builtin.shell:
        cmd: |
          export INSTALL_RKE2_VERSION={{ kubernetes_configure_version }}
          export INSTALL_RKE2_CHANNEL={{ kubernetes_configure_rke2_channel }}
          /tmp/rke2-installer.sh
      environment:
        CONTAINERD_REGISTRY_CONFIG_PATH: "{{ kubernetes_configure_config_dir }}/registries.yaml"
      retries: "{{ kubernetes_configure_install_retries }}"
      delay: "{{ kubernetes_configure_install_delay }}"
      register: rke2_install
      until: rke2_install is succeeded

    - name: Check if RKE2 bin directory exists
      ansible.builtin.stat:
        path: "/opt/rke2/bin"
      register: rke2_bin_dir

    - name: Create RKE2 service symlinks for kubectl, ctr, crictl
      ansible.builtin.file:
        src: "/opt/rke2/bin/{{ item }}"
        dest: "{{ kubernetes_configure_install_dir }}/{{ item }}"
        state: link
        force: true
      loop:
        - kubectl
        - ctr
        - crictl
      when: rke2_bin_dir.stat.exists

    - name: Enable RKE2 service on master
      ansible.builtin.systemd:
        name: rke2-server
        enabled: true
        daemon_reload: true

    - name: Start RKE2 service on master
      ansible.builtin.systemd:
        name: rke2-server
        state: started
        daemon_reload: true

    - name: Check RKE2 service status and logs
      ansible.builtin.shell:
        cmd: |
          echo "=== RKE2 Service Status ===" 
          systemctl status rke2-server || true
          echo ""
          echo "=== RKE2 Service Journal (last 50 lines) ===" 
          journalctl -u rke2-server -n 50 --no-pager || true
          echo ""
          echo "=== Checking RKE2 binary ===" 
          ls -la /opt/rke2/bin/rke2 2>/dev/null || echo "RKE2 binary not found at /opt/rke2/bin/rke2"
          echo ""
          echo "=== Checking config directory ===" 
          ls -la /etc/rancher/rke2/ 2>/dev/null || echo "Config directory not found"
      register: rke2_debug

    - name: Display RKE2 debug information
      ansible.builtin.debug:
        msg: "{{ rke2_debug.stdout }}"

    - name: Wait for RKE2 master to be ready
      ansible.builtin.wait_for:
        path: "{{ kubernetes_configure_config_dir }}/server.yaml"
        timeout: "{{ kubernetes_configure_wait_for_api_timeout }}"

    - name: Wait for API server to be responsive
      ansible.builtin.shell:
        cmd: |
          for i in {1..60}; do
            if /opt/rke2/bin/kubectl --kubeconfig={{ kubernetes_configure_config_dir }}/server.yaml get nodes &>/dev/null; then
              echo "API server is ready"
              exit 0
            fi
            echo "Waiting for API server... attempt $i/60"
            sleep 5
          done
          echo "API server failed to become ready"
          exit 1
      retries: 3
      delay: 10
      register: api_ready

    - name: Wait for all nodes to reach ready state
      ansible.builtin.shell:
        cmd: |
          /opt/rke2/bin/kubectl --kubeconfig={{ kubernetes_configure_config_dir }}/server.yaml wait --for=condition=Ready node --all --timeout={{ kubernetes_configure_wait_for_nodes_timeout }}s || true

    - name: Display master node status
      ansible.builtin.shell:
        cmd: "/opt/rke2/bin/kubectl --kubeconfig={{ kubernetes_configure_config_dir }}/server.yaml get nodes -o wide"
      register: node_status

    - name: Show node status
      ansible.builtin.debug:
        msg: "{{ node_status.stdout }}"

    - name: Install Cilium CNI using Helm
      ansible.builtin.shell:
        cmd: |
          export KUBECONFIG={{ kubernetes_configure_config_dir }}/server.yaml
          HELM_BIN="/root/.cache/helm/linux-amd64/helm"
          
          # Download helm if not already present
          if [ ! -f "$HELM_BIN" ]; then
            mkdir -p /root/.cache/helm/linux-amd64
            curl -sL https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz | tar xz -C /root/.cache/helm/linux-amd64 --strip-components=1
          fi
          
          # Add Cilium Helm repo
          $HELM_BIN repo add cilium https://helm.cilium.io
          $HELM_BIN repo update
          
          # Install or upgrade Cilium
          $HELM_BIN upgrade --install cilium cilium/cilium \
            --namespace kube-system \
            --set ipam.mode=kubernetes \
            --set kubeProxyReplacement=partial \
            --set operator.replicas=1 \
            --set image.pullPolicy=IfNotPresent \
            --wait \
            --timeout=5m
          
          echo "Cilium installed successfully"
      register: cilium_install
      retries: 3
      delay: 30
      until: cilium_install is succeeded

    - name: Display Cilium installation result
      ansible.builtin.debug:
        msg: "{{ cilium_install.stdout }}"

  when: "'kubernetes_master' in group_names"

# Install on Worker Nodes
- name: Block - Configure Worker Nodes
  become: true
  block:
    - name: Create RKE2 agent config directory
      ansible.builtin.file:
        path: "{{ kubernetes_configure_config_dir }}"
        state: directory
        mode: "0755"

    - name: Create RKE2 agent config file
      ansible.builtin.copy:
        content: |
          # RKE2 Agent Node Configuration
          # Generated by Ansible kubernetes-configure role

          server: {{ kubernetes_configure_server_url }}
          token: {{ kubernetes_configure_server_token }}

          # Data directory
          data-dir: {{ kubernetes_configure_data_dir }}

          # Node settings
          advertise-address: {{ kubernetes_configure_advertise_address }}
          node-label:
            - "worker=true"
            - "workload-type=general"

          # Kubelet settings
          kubelet-arg:
            - "max-pods=250"
            - "eviction-hard=memory.available<2%,nodefs.available<2%"
        dest: "{{ kubernetes_configure_config_dir }}/config.yaml"
        mode: "0644"

    - name: Download RKE2 agent installer script
      ansible.builtin.get_url:
        url: "{{ kubernetes_configure_rke2_installer_url }}"
        dest: "/tmp/rke2-installer.sh"
        mode: "0755"
      retries: "{{ kubernetes_configure_install_retries }}"
      delay: "{{ kubernetes_configure_install_delay }}"

    - name: Install RKE2 agent on worker nodes
      ansible.builtin.shell:
        cmd: |
          export INSTALL_RKE2_VERSION={{ kubernetes_configure_version }}
          export INSTALL_RKE2_CHANNEL={{ kubernetes_configure_rke2_channel }}
          export INSTALL_RKE2_TYPE=agent
          /tmp/rke2-installer.sh
      retries: "{{ kubernetes_configure_install_retries }}"
      delay: "{{ kubernetes_configure_install_delay }}"
      register: rke2_agent_install
      until: rke2_agent_install is succeeded

    - name: Create RKE2 agent service symlinks
      ansible.builtin.file:
        src: "/opt/rke2/bin/{{ item }}"
        dest: "{{ kubernetes_configure_install_dir }}/{{ item }}"
        state: link
      loop:
        - kubectl
        - ctr
        - crictl
      ignore_errors: true

    - name: Enable RKE2 agent service on workers
      ansible.builtin.systemd:
        name: rke2-agent
        enabled: true
        daemon_reload: true

    - name: Start RKE2 agent service on workers
      ansible.builtin.systemd:
        name: rke2-agent
        state: started
        daemon_reload: true

    - name: Wait for agent to join cluster
      ansible.builtin.pause:
        seconds: 30

  when: "'kubernetes_worker' in group_names"

- name: Block - Verify Cluster Status (Master Only)
  block:
    - name: Get cluster nodes
      ansible.builtin.shell:
        cmd: "/opt/rke2/bin/kubectl --kubeconfig={{ kubernetes_configure_config_dir }}/server.yaml get nodes -o json"
      register: cluster_nodes

    - name: Display cluster nodes
      ansible.builtin.debug:
        msg: "{{ cluster_nodes.stdout | from_json | to_nice_json }}"

    - name: Get cluster version
      ansible.builtin.shell:
        cmd: "/opt/rke2/bin/kubectl --kubeconfig={{ kubernetes_configure_config_dir }}/server.yaml version --short"
      register: cluster_version

    - name: Display cluster version
      ansible.builtin.debug:
        msg: |
          Kubernetes Cluster Version:
          {{ cluster_version.stdout }}

  when: "'kubernetes_master' in group_names"
