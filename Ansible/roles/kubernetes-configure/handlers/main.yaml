---
# =============================================================================
# Kubernetes Configure Role - Handlers
# =============================================================================

- name: Restart RKE2 server
  ansible.builtin.systemd:
    name: rke2-server
    state: restarted
    daemon_reload: true
  listen: "restart rke2"

- name: Restart RKE2 agent
  ansible.builtin.systemd:
    name: rke2-agent
    state: restarted
    daemon_reload: true
  listen: "restart rke2 agent"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  listen: "reload systemd"
