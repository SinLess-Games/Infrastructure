---
# Proxmox HA Configuration Defaults

# HA Watchdog configuration
proxmox_ha_watchdog_enabled: true
proxmox_ha_watchdog_type: "wdt_i6300esb"  # intel 6300esb watchdog
proxmox_ha_watchdog_action: "reset"       # reset, shutdown, poweroff, pause

# HA Manager settings
proxmox_ha_migrate_on_error: true
proxmox_ha_shutdown_policy: "conditional" # conditional, always, never
proxmox_ha_max_relocate: 3                # max relocate attempts
proxmox_ha_max_restart: 1                 # max restart attempts per 24h period
proxmox_ha_restart_delay: 300             # delay in seconds between restarts (5 min)

# HA Fencing configuration
proxmox_ha_fence_enabled: true
proxmox_ha_fence_mode: "watchdog"         # watchdog, hardware

# VM-specific HA defaults (can be overridden per VM)
proxmox_ha_vm_enabled: true
proxmox_ha_vm_group: "default"            # HA resource group
proxmox_ha_vm_state: "started"            # started, stopped, disabled

# HA resource groups to create
proxmox_ha_resource_groups: []
# Example:
# - name: "webservers"
#   comment: "Web application servers"
#   nodes: "pve-01,pve-02,pve-03"
#   priority: 100
# - name: "databases"
#   comment: "Database servers"
#   nodes: "pve-02,pve-03,pve-04"
#   priority: 50

# HA resources (VMs) to manage
proxmox_ha_resources: []
# Example:
# - sid: "vm:100"         # VM ID 100
#   group: "webservers"
#   state: "started"
#   max_restart: 4
#   max_relocate: 4
# - sid: "vm:101"
#   group: "webservers"
#   state: "started"

# HA Affinity Rules - define VM placement relationships
proxmox_ha_affinity_rules: []
# Example:
# - id: "rule1"
#   type: "group"                    # group or anti
#   nodes: "pve-01,pve-02,pve-03"   # preferred nodes
#   vmgroup: "webservers"            # target resource group
#   enabled: true
# - id: "rule2"
#   type: "anti"                     # prevent co-location
#   vmgroup: "databases"
#   enabled: true

# Cluster-wide HA settings
proxmox_ha_cluster_settings:
  max_worker: 4              # parallel worker processes
  shutdown_policy: "conditional"
  migration_delay: 5         # graceful migration timeout
  recovery_delay: 60         # seconds to wait after a failure
