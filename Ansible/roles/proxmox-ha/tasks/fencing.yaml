---
# Configure Proxmox HA fencing

- name: Display fencing configuration
  ansible.builtin.debug:
    msg:
      - "HA Fencing Enabled: {{ proxmox_ha_fence_enabled }}"
      - "Fencing Mode: {{ proxmox_ha_fence_mode }}"

- name: Configure fence device via Proxmox API
  ansible.builtin.uri:
    url: "https://localhost:8006/api2/json/cluster/ha/fence"
    method: POST
    validate_certs: false
    headers:
      Cookie: "PVEAuthCookie={{ hostvars[groups['proxmox'][0]]['pve_auth_token'] | default('') }}"
    body_format: json
    body:
      type: "watchdog"
      enable: "{{ proxmox_ha_fence_enabled | int }}"
    status_code:
      - 200
      - 201
      - 400  # Already exists
  register: fence_config
  until: fence_config is succeeded or fence_config.status == 400
  retries: 3
  delay: 5
  when: inventory_hostname == groups['proxmox'][0]
  tags:
    - skip_ansible_lint  # Localhost check

- name: Fencing status
  ansible.builtin.debug:
    msg: "{{ fence_config }}"
  when: fence_config is defined
  tags:
    - debug
