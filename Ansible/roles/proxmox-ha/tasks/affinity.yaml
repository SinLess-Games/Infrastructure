---
# HA Affinity Rules Configuration
# Defines VM placement relationships and constraints

- name: Affinity Rules Block
  block:
    - name: Display affinity rules configuration
      ansible.builtin.debug:
        msg: "Configuring {{ proxmox_ha_affinity_rules | length }} HA affinity rules"
      when: proxmox_ha_affinity_rules | length > 0

    - name: Create/update HA affinity rules
      ansible.builtin.shell: |
        set -e
        
        {% for rule in proxmox_ha_affinity_rules %}
        # Process rule: {{ rule.id }}
        pvesh set "/cluster/ha/groups/{{ rule.id }}" \
          -type "{{ rule.type }}" \
          {% if rule.nodes is defined %}-nodes "{{ rule.nodes }}" {% endif %}\
          {% if rule.vmgroup is defined %}-group "{{ rule.vmgroup }}" {% endif %}\
          -enabled {{ rule.enabled | int }}
        
        echo "Created affinity rule: {{ rule.id }}"
        {% endfor %}
      args:
        executable: /bin/bash
      register: affinity_result
      changed_when: "'Created affinity rule' in affinity_result.stdout"
      when:
        - proxmox_ha_affinity_rules | length > 0
        - proxmox_ha_affinity_rules is defined
      notify:
        - Reload pve-ha-manager
        - Reload pve-ha-lrm

    - name: Display affinity rules
      ansible.builtin.shell: |
        pvesh get "/cluster/ha/groups" --output-format json | \
        jq '.data[] | select(.type != "nodes") | {id: .id, type: .type, nodes: .nodes, enabled: .enabled}'
      args:
        executable: /bin/bash
      register: affinity_list
      changed_when: false
      failed_when: false

    - name: Show current affinity rules
      ansible.builtin.debug:
        msg: "{{ affinity_list.stdout_lines }}"
      when: 
        - affinity_list.stdout | length > 0
        - not affinity_list.failed

    - name: Affinity rules status
      ansible.builtin.debug:
        msg: "No affinity rules configured"
      when: 
        - proxmox_ha_affinity_rules | length == 0 or 
          proxmox_ha_affinity_rules is not defined

  rescue:
    - name: Handle affinity rule creation failure
      ansible.builtin.debug:
        msg: "Warning: Failed to create some affinity rules. Check Proxmox configuration."
      when: affinity_result is defined and affinity_result.failed
