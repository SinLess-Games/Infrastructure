---
# Main tasks for Proxmox HA configuration

- name: Check if Proxmox cluster is initialized
  ansible.builtin.stat:
    path: /etc/pve/cluster.conf
  register: cluster_conf
  tags:
    - proxmox
    - ha

- name: Set cluster initialized flag
  ansible.builtin.set_fact:
    proxmox_ha_cluster_initialized: "{{ cluster_conf.stat.exists }}"
  tags:
    - proxmox
    - ha

- name: Include HA watchdog configuration
  ansible.builtin.include_tasks: watchdog.yaml
  when: proxmox_ha_watchdog_enabled and proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
    - watchdog

- name: Include HA fencing configuration
  ansible.builtin.include_tasks: fencing.yaml
  when: proxmox_ha_fence_enabled and proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
    - fencing

- name: Include HA resource groups configuration
  ansible.builtin.include_tasks: resource-groups.yaml
  when: proxmox_ha_resource_groups | length > 0 and proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
    - resources

- name: Include HA resources configuration
  ansible.builtin.include_tasks: resources.yaml
  when: proxmox_ha_resources | length > 0 and proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
    - resources

- name: Include HA affinity rules configuration
  ansible.builtin.include_tasks: affinity.yaml
  when: proxmox_ha_affinity_rules | length > 0 and proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
    - affinity

- name: Include cluster-wide HA settings
  ansible.builtin.include_tasks: cluster-settings.yaml
  when: proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
    - cluster

- name: Verify HA status
  ansible.builtin.include_tasks: verify.yaml
  when: proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
    - verify

- name: Display cluster status message
  ansible.builtin.debug:
    msg: "Proxmox cluster not initialized - HA configuration skipped. Run cluster initialization playbook first."
  when: not proxmox_ha_cluster_initialized
  tags:
    - proxmox
    - ha
