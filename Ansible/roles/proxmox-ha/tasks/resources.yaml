---
# Configure Proxmox HA resources (VMs)

- name: Create/Update HA resources
  ansible.builtin.shell: |
    set -o pipefail
    pvesh create /cluster/ha/resources -sid "{{ item.sid }}" \
      -group "{{ item.group | default('default') }}" \
      -state "{{ item.state | default(proxmox_ha_vm_state) }}" \
      -max_restart "{{ item.max_restart | default(proxmox_ha_max_restart) }}" \
      -max_relocate "{{ item.max_relocate | default(proxmox_ha_max_relocate) }}" \
      -comment "{{ item.comment | default('HA managed resource') }}" 2>&1 || true
  register: resource_result
  changed_when: "'created' in resource_result.stdout or 'updated' in resource_result.stdout"
  failed_when: resource_result.rc != 0 and 'already exists' not in resource_result.stderr
  loop: "{{ proxmox_ha_resources }}"
  when: proxmox_ha_resources | length > 0
  tags:
    - skip_ansible_lint

- name: Display resource creation results
  ansible.builtin.debug:
    msg: "{{ resource_result }}"
  when: resource_result is defined and resource_result.results | length > 0
  tags:
    - debug

- name: List configured HA resources
  ansible.builtin.shell: |
    set -o pipefail
    pvesh get /cluster/ha/resources --format json | jq '.'
  register: ha_resources_list
  changed_when: false
  tags:
    - debug

- name: Display HA resources
  ansible.builtin.debug:
    msg: "{{ ha_resources_list.stdout | from_json }}"
  when: ha_resources_list.stdout | length > 0
  tags:
    - debug
