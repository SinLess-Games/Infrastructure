---
# =============================================================================
# MinIO Deploy Role - Tasks
# =============================================================================
# Purpose:
#   - Render Terraform configuration for MinIO VMs
#   - Execute Terraform via Taskfile
#   - Use the shared proxmox-vm-cluster Terraform module
# =============================================================================

- name: Assert required MinIO deployment variables
  ansible.builtin.assert:
    that:
      - minio_target_nodes | length >= 2
      - minio_nodes | length == minio_node_count | int
      - minio_node_count | int >= 2
      - minio_memory_balloon_mb | int > 0
      - minio_memory_balloon_mb | int <= minio_memory_mb | int
    fail_msg: "MinIO deployment requires valid node counts/targets and memory ballooning bounds (0 < balloon <= memory)"

- name: Read Proxmox API token file for Terraform
  ansible.builtin.slurp:
    src: "{{ minio_repo_root }}/{{ minio_proxmox_api_token_file }}"
  register: minio_proxmox_token_file
  no_log: true

- name: Parse Proxmox API token values
  ansible.builtin.set_fact:
    minio_proxmox_token_text: "{{ minio_proxmox_token_file.content | b64decode | string }}"
  no_log: true

- name: Extract Proxmox API token ID and secret
  ansible.builtin.set_fact:
    minio_proxmox_api_token_id: >-
      {{ (minio_proxmox_token_text
        | regex_findall('(?m)^FULL_TOKENID=([^\n]+)'))
        | first | default('') }}
    minio_proxmox_api_token_secret: >-
      {{ (minio_proxmox_token_text
        | regex_findall('(?m)^TOKEN_SECRET=([^\n]+)'))
        | first | default('') }}
  no_log: true

- name: Assert Proxmox API token values were parsed
  ansible.builtin.assert:
    that:
      - minio_proxmox_api_token_id is not none
      - minio_proxmox_api_token_secret is not none
    fail_msg: "Failed to parse Proxmox API token ID/secret from token file"

- name: Ensure Terraform output directory exists
  ansible.builtin.file:
    path: "{{ minio_terraform_dir }}"
    state: directory

- name: Render MinIO Terraform module configuration
  ansible.builtin.template:
    src: "{{ minio_repo_root }}/Ansible/templates/minio/minio-cluster.tf.j2"
    dest: "{{ minio_terraform_dir }}/minio-cluster.tf"
    mode: "0644"

- name: Initialize Terraform (Taskfile)
  ansible.builtin.command:
    cmd: "task terraform:init"
    chdir: "{{ minio_repo_root }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ minio_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ minio_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ minio_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ minio_proxmox_tls_insecure | ternary('true', 'false') }}"

- name: Check if MinIO VMs already exist
  ansible.builtin.command:
    cmd: "ssh-keyscan -H {{ item.ip }} 2>/dev/null"
  loop: "{{ minio_nodes }}"
  register: minio_vm_check
  failed_when: false
  changed_when: false

- name: Apply Terraform configuration (Taskfile)
  ansible.builtin.command:
    cmd: "task terraform:apply:auto"
    chdir: "{{ minio_repo_root }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ minio_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ minio_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ minio_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ minio_proxmox_tls_insecure | ternary('true', 'false') }}"
  register: terraform_result
  ignore_errors: true

- name: Skip terraform if VMs already exist
  ansible.builtin.meta: noop
  when: terraform_result is failed and 'already in use' in (terraform_result.stderr | default(''))

- name: Wait for MinIO VMs to be accessible
  ansible.builtin.pause:
    seconds: 30

- name: Wait for cloud-init configuration to complete
  ansible.builtin.pause:
    seconds: 10
  tags:
    - minio-cloud-init
