---
# =============================================================================
# MinIO Configure Role - Configuration Tasks
# =============================================================================

- name: Build effective MinIO distributed volumes and endpoint settings
  ansible.builtin.set_fact:
    minio_effective_scheme: "{{ 'https' if (minio_tls_enabled | bool) else 'http' }}"
    minio_effective_data_dirs: "{{ minio_data_dirs | default([minio_data_dir], true) }}"
    minio_effective_volumes: >-
      {%- if (groups['minio'] | default([]) | length) > 1 -%}
      {%- set cluster_endpoints = [] -%}
      {%- for host in (groups['minio'] | default([])) -%}
      {%- set endpoint_host = hostvars[host].ansible_host | default(host) -%}
      {%- for data_dir in (minio_data_dirs | default([minio_data_dir], true)) -%}
      {%- set _ = cluster_endpoints.append((('https' if (minio_tls_enabled | bool) else 'http') ~ '://' ~ endpoint_host ~ ':' ~ (minio_api_port | string) ~ data_dir)) -%}
      {%- endfor -%}
      {%- endfor -%}
      {{ cluster_endpoints | join(' ') }}
      {%- else -%}
      {{ (minio_data_dirs | default([minio_data_dir], true)) | join(' ') }}
      {%- endif -%}
    minio_effective_server_host: >-
      {{
        minio_api_fqdn
        | default((vault_runtime_secrets | default({}, true)).vip_address, true)
        | default(ansible_default_ipv4.address | default(inventory_hostname), true)
      }}

- name: Render MinIO environment configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/minio/minio.env.j2"
    dest: "{{ minio_config_dir }}/minio.env"
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0640"
  notify: Restart MinIO

- name: Render MinIO systemd service
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/minio/minio.service.j2"
    dest: "/etc/systemd/system/{{ minio_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart MinIO

- name: Enable and start MinIO service
  ansible.builtin.systemd:
    name: "{{ minio_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for MinIO to be ready
  ansible.builtin.uri:
    url: "{{ minio_effective_scheme }}://localhost:{{ minio_api_port }}/minio/health/live"
    method: GET
    status_code: 200
    validate_certs: "{{ not (minio_skip_tls_verify | bool) }}"
  register: minio_health
  until: minio_health.status == 200
  retries: 30
  delay: 2
