---
# =============================================================================
# MinIO Configure Role - Installation Tasks
# =============================================================================

- name: Create MinIO group
  ansible.builtin.group:
    name: "{{ minio_group }}"
    system: true
    state: present

- name: Create MinIO user
  ansible.builtin.user:
    name: "{{ minio_user }}"
    group: "{{ minio_group }}"
    system: true
    shell: /bin/false
    home: "{{ minio_data_dir }}"
    create_home: false
    state: present

- name: Ensure MinIO partition tooling is installed
  ansible.builtin.package:
    name:
      - parted
      - e2fsprogs
    state: present
  when: minio_prepare_data_partition | bool

- name: Ensure dedicated MinIO data partition exists
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -b "{{ minio_data_device }}" ]; then
      parted -s "{{ minio_data_parent_disk }}" mkpart primary ext4 "{{ minio_data_partition_start }}" 100%
      partprobe "{{ minio_data_parent_disk }}"
      udevadm settle
    fi
  args:
    executable: /bin/bash
  when: minio_prepare_data_partition | bool

- name: Ensure filesystem exists on MinIO data partition
  ansible.builtin.filesystem:
    fstype: ext4
    dev: "{{ minio_data_device }}"
  when: minio_prepare_data_partition | bool

- name: Ensure MinIO mountpoint exists
  ansible.builtin.file:
    path: "{{ minio_data_mountpoint }}"
    state: directory
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0750"
  when: minio_prepare_data_partition | bool

- name: Mount MinIO data partition
  ansible.builtin.mount:
    path: "{{ minio_data_mountpoint }}"
    src: "{{ minio_data_device }}"
    fstype: ext4
    opts: defaults,nofail
    state: mounted
  when: minio_prepare_data_partition | bool

- name: Create MinIO directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0750"
  loop: >-
    {{
      (minio_data_dirs | default([minio_data_dir], true))
      + [minio_config_dir, minio_config_dir ~ '/certs']
    }}

- name: Download MinIO server binary
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/minio"
    dest: "{{ minio_bin_dir }}/minio"
    mode: "0755"
    owner: root
    group: root
  notify: Restart MinIO

- name: Download MinIO client (mc) binary
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-amd64/mc"
    dest: "{{ minio_bin_dir }}/mc"
    mode: "0755"
    owner: root
    group: root

- name: Install MinIO dependencies
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - jq
      - qemu-guest-agent
      - wget
    state: present

- name: Ensure QEMU guest agent is enabled and running
  ansible.builtin.service:
    name: qemu-guest-agent
    enabled: true
    state: started
