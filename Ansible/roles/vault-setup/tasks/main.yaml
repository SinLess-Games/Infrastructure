---
# =============================================================================
# Vault Setup Role - Tasks
# =============================================================================
# Purpose:
#   - Enable Vault secrets backends via Terraform
#   - Stages Terraform/modules/vault-secrets into a temporary working directory
# =============================================================================

- name: "Check for Vault root token file"
  ansible.builtin.stat:
    path: "{{ vault_setup_token_file }}"
  register: vault_setup_token_stat
  delegate_to: localhost
  become: false
  run_once: true
  when: vault_setup_enabled | bool

- name: "Fail if Vault root token file is missing"
  ansible.builtin.fail:
    msg: "Vault root token file not found at {{ vault_setup_token_file }}. Run vault initialization first."
  when:
    - vault_setup_enabled | bool
    - not vault_setup_token_stat.stat.exists
  delegate_to: localhost
  run_once: true

- name: "Read Vault root token file"
  ansible.builtin.slurp:
    src: "{{ vault_setup_token_file }}"
  register: vault_setup_token_file
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_token_stat.stat.exists

- name: "Parse Vault root token"
  ansible.builtin.set_fact:
    vault_setup_root_token: "{{ vault_setup_token_file.content | b64decode | from_json }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_token_file.content is defined

- name: "Probe Vault API address"
  ansible.builtin.uri:
    url: "{{ vault_setup_vault_addr }}/v1/sys/health"
    method: GET
    validate_certs: false
    status_code: [200, 429, 472, 473, 501, 503]
  register: vault_setup_health_probe
  delegate_to: localhost
  become: false
  run_once: true
  failed_when: false
  when:
    - vault_setup_enabled | bool
    - vault_setup_vault_addr is defined

- name: "Verify Vault API address is reachable or use fallback"
  ansible.builtin.debug:
    msg: "Using Vault address: vault.local.sinlessgames.com ({{ hostvars[groups['vault'][0]].ansible_host }}:8200)"
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_vault_addr is defined

- name: "Enable Vault auth methods"
  ansible.builtin.shell: |
    export VAULT_ADDR="{{ vault_setup_vault_addr }}"
    export VAULT_SKIP_VERIFY="{{ vault_setup_skip_tls_verify | ternary('true', 'false') }}"
    export VAULT_TOKEN="{{ vault_setup_root_token.root_token }}"

    {{ vault_bin_path | default('/usr/local/bin/vault') }} auth enable -path="{{ item.path }}" "{{ item.type }}" 2>&1 || echo "Auth method already enabled"
  environment:
    VAULT_SKIP_VERIFY: "{{ vault_setup_skip_tls_verify | ternary('true', 'false') }}"
  loop: "{{ vault_auth_methods | default([]) }}"
  loop_control:
    label: "{{ item.type }}@{{ item.path }}"
  register: vault_auth_enable
  changed_when: "'successfully enabled' in vault_auth_enable.stdout"
  run_once: true
  delegate_to: "{{ groups['vault'][0] }}"
  when:
    - vault_setup_enabled | bool
    - vault_setup_vault_addr is defined
    - vault_setup_root_token is defined
    - vault_auth_methods is defined
    - vault_auth_methods | length > 0

- name: "Build Terraform environment (Vault setup)"
  ansible.builtin.set_fact:
    vault_setup_tf_env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_vault_addr: "https://{{ hostvars[groups['vault'][0]].ansible_host }}:8200"
      TF_VAR_vault_token: "{{ vault_setup_root_token.root_token }}"
      TF_VAR_vault_skip_tls_verify: "{{ vault_setup_skip_tls_verify | ternary('true', 'false') }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_root_token is defined

- name: "Add CA cert file to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_vault_ca_cert_file': vault_setup_ca_cert_file}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_ca_cert_file | length > 0

- name: "Add KV mounts to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_kv_mounts': vault_setup_kv_mounts | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_kv_mounts is defined
    - vault_setup_kv_mounts | length > 0

- name: "Add engine mounts to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_engine_mounts': vault_setup_engine_mounts | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_engine_mounts is defined
    - vault_setup_engine_mounts | length > 0

- name: "Add AWS configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_aws_configs': vault_setup_aws_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_aws_configs is defined
    - vault_setup_aws_configs | length > 0

- name: "Add GCP configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_gcp_configs': vault_setup_gcp_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_gcp_configs is defined
    - vault_setup_gcp_configs | length > 0

- name: "Add Azure configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_azure_configs': vault_setup_azure_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_azure_configs is defined
    - vault_setup_azure_configs | length > 0

- name: "Add Linode configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_linode_configs': vault_setup_linode_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_linode_configs is defined
    - vault_setup_linode_configs | length > 0

- name: "Add Kubernetes configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_kubernetes_configs': vault_setup_kubernetes_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_kubernetes_configs is defined
    - vault_setup_kubernetes_configs | length > 0

- name: "Add SSH configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_ssh_configs': vault_setup_ssh_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_ssh_configs is defined
    - vault_setup_ssh_configs | length > 0

- name: "Add PKI configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_pki_configs': vault_setup_pki_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_pki_configs is defined
    - vault_setup_pki_configs | length > 0

- name: "Add Transit configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_transit_configs': vault_setup_transit_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_transit_configs is defined
    - vault_setup_transit_configs | length > 0

- name: "Add Terraform configs to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_terraform_configs': vault_setup_terraform_configs | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_terraform_configs is defined
    - vault_setup_terraform_configs | length > 0

- name: "Create temporary Terraform workdir (Vault secrets)"
  ansible.builtin.tempfile:
    state: directory
    suffix: "-vault-secrets"
  register: vault_setup_tf_workdir
  delegate_to: localhost
  become: false
  run_once: true
  when: vault_setup_enabled | bool

- name: "Stage Vault secrets Terraform module"
  ansible.builtin.copy:
    src: "{{ vault_setup_terraform_dir }}/"
    dest: "{{ vault_setup_tf_workdir.path }}/"
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_tf_workdir.path is defined

- name: "Clear stale Terraform state (before init)"
  ansible.builtin.file:
    path: "{{ vault_setup_tf_workdir.path }}/{{ item }}"
    state: absent
  loop:
    - ".terraform"
    - "terraform.tfstate"
    - "terraform.tfstate.backup"
    - ".terraform.lock.hcl"
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_tf_workdir.path is defined

- name: "Initialize Terraform (Vault secrets backends)"
  ansible.builtin.command:
    cmd: "task terraform:vault-secrets:init VAULT_SECRETS_WORKDIR={{ vault_setup_tf_workdir.path }}"
    chdir: "{{ vault_repo_root }}"
  environment: "{{ vault_setup_tf_env }}"
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_tf_workdir.path is defined

- name: "Refresh Terraform state (sync with Vault)"
  ansible.builtin.command:
    cmd: "task terraform:vault-secrets:refresh VAULT_SECRETS_WORKDIR={{ vault_setup_tf_workdir.path }}"
    chdir: "{{ vault_repo_root }}"
  environment: "{{ vault_setup_tf_env }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: vault_setup_tf_refresh_result
  failed_when: false
  changed_when: false
  when:
    - vault_setup_enabled | bool
    - vault_setup_tf_workdir.path is defined

- name: "Apply Terraform (Vault secrets backends)"
  ansible.builtin.command:
    cmd: "task terraform:vault-secrets:apply:auto VAULT_SECRETS_WORKDIR={{ vault_setup_tf_workdir.path }}"
    chdir: "{{ vault_repo_root }}"
  environment: "{{ vault_setup_tf_env }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: vault_setup_tf_apply_result
  failed_when: 
    - vault_setup_tf_apply_result.rc != 0
    - "'path is already in use' not in vault_setup_tf_apply_result.stderr"
  retries: 3
  delay: 10
  until:
    - vault_setup_tf_apply_result.rc == 0 or 'path is already in use' in vault_setup_tf_apply_result.stderr
  when:
    - vault_setup_enabled | bool
    - vault_setup_tf_workdir.path is defined

- name: "Cleanup Terraform working directory"
  ansible.builtin.file:
    path: "{{ vault_setup_tf_workdir.path }}"
    state: absent
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_tf_workdir.path is defined
