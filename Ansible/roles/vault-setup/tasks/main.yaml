---
# =============================================================================
# Vault Setup Role - Tasks
# =============================================================================
# Purpose:
#   - Enable Vault secrets backends via Terraform
#   - Uses Terraform/modules/vault-secrets as the working directory
# =============================================================================

- name: "Check for Vault root token file"
  ansible.builtin.stat:
    path: "{{ vault_setup_token_file }}"
  register: vault_setup_token_stat
  delegate_to: localhost
  become: false
  run_once: true
  when: vault_setup_enabled | bool

- name: "Fail if Vault root token file is missing"
  ansible.builtin.fail:
    msg: "Vault root token file not found at {{ vault_setup_token_file }}. Run vault initialization first."
  when:
    - vault_setup_enabled | bool
    - not vault_setup_token_stat.stat.exists
  delegate_to: localhost
  run_once: true

- name: "Read Vault root token file"
  ansible.builtin.slurp:
    src: "{{ vault_setup_token_file }}"
  register: vault_setup_token_file
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_token_stat.stat.exists

- name: "Parse Vault root token"
  ansible.builtin.set_fact:
    vault_setup_root_token: "{{ vault_setup_token_file.content | b64decode | from_json }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_token_file.content is defined

- name: "Probe Vault API address"
  ansible.builtin.uri:
    url: "{{ vault_setup_vault_addr }}/v1/sys/health"
    method: GET
    validate_certs: false
    status_code: [200, 429, 472, 473, 501, 503]
  register: vault_setup_health_probe
  delegate_to: localhost
  become: false
  run_once: true
  failed_when: false
  when:
    - vault_setup_enabled | bool
    - vault_setup_vault_addr is defined

- name: "Verify Vault API address is reachable or use fallback"
  ansible.builtin.debug:
    msg: "Using Vault address: {{ vault_setup_vault_addr }}"
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_vault_addr is defined

- name: "Build Terraform environment (Vault setup)"
  ansible.builtin.set_fact:
    vault_setup_tf_env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_vault_addr: "https://{{ hostvars[groups['vault'][0]].ansible_host }}:8200"
      TF_VAR_vault_token: "{{ vault_setup_root_token.root_token }}"
      TF_VAR_vault_skip_tls_verify: "{{ vault_setup_skip_tls_verify | ternary('true', 'false') }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_root_token is defined

- name: "Add CA cert file to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_vault_ca_cert_file': vault_setup_ca_cert_file}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_ca_cert_file | length > 0

- name: "Add KV mounts to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_kv_mounts': vault_setup_kv_mounts | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_kv_mounts is defined
    - vault_setup_kv_mounts | length > 0

- name: "Add engine mounts to Terraform environment (optional)"
  ansible.builtin.set_fact:
    vault_setup_tf_env: "{{ vault_setup_tf_env | combine({'TF_VAR_engine_mounts': vault_setup_engine_mounts | to_json}) }}"
  no_log: true
  run_once: true
  when:
    - vault_setup_enabled | bool
    - vault_setup_engine_mounts is defined
    - vault_setup_engine_mounts | length > 0

- name: "Initialize Terraform (Vault secrets backends)"
  ansible.builtin.command:
    cmd: "task terraform:vault-secrets:init"
    chdir: "{{ vault_repo_root }}"
  environment: "{{ vault_setup_tf_env }}"
  delegate_to: localhost
  become: false
  run_once: true
  when: vault_setup_enabled | bool

- name: "Apply Terraform (Vault secrets backends)"
  ansible.builtin.command:
    cmd: "task terraform:vault-secrets:apply:auto"
    chdir: "{{ vault_repo_root }}"
  environment: "{{ vault_setup_tf_env }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: vault_setup_tf_apply_result
  retries: 3
  delay: 10
  until: vault_setup_tf_apply_result.rc == 0
  when: vault_setup_enabled | bool
  when: vault_setup_enabled | bool

- name: "Cleanup Terraform working directory"
  ansible.builtin.file:
    path: "/tmp/vault-terraform-setup"
    state: absent
  delegate_to: "{{ groups['vault'][0] }}"
  run_once: true
  when: vault_setup_enabled | bool
