---
- name: Create required kernel module config
  ansible.builtin.copy:
    dest: /etc/modules-load.d/rke2.conf
    mode: "0644"
    content: |
      {% for module in kubernetes_role_kernel_modules %}
      {{ module }}
      {% endfor %}

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kubernetes_role_kernel_modules }}"

- name: Configure Kubernetes sysctl values
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop: "{{ kubernetes_role_sysctl | dict2items }}"

- name: Disable swap at runtime
  ansible.builtin.command: swapoff -a
  changed_when: false
  failed_when: false

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Install required operating system packages
  ansible.builtin.package:
    name: "{{ kubernetes_role_required_packages }}"
    state: present
  tags:
    - rootfs

- name: Expand Kubernetes root filesystem when template disk layout is undersized
  ansible.builtin.shell: |
    set -euo pipefail

    root_device="$(findmnt -n -o SOURCE /)"
    root_disk="/dev/$(lsblk -no PKNAME "${root_device}")"
    root_partnum="$(cat "/sys/class/block/$(basename "${root_device}")/partition")"
    root_size_bytes="$(blockdev --getsize64 "${root_device}")"
    target_size_gb="{{ ((inventory_hostname in groups[kubernetes_rke2_servers_group_name]) | ternary(kubernetes_control_plane.disk_size, kubernetes_workers.disk_size)) | regex_search('[0-9]+') }}"
    target_size_bytes="$(( target_size_gb * 1024 * 1024 * 1024 ))"
    changed=0

    if [ "${root_size_bytes}" -lt "${target_size_bytes}" ]; then
      swapoff -a || true
      sed -i '/\sswap\s/d' /etc/fstab

      if parted -s "${root_disk}" print | awk '$1 == "5" { found = 1 } END { exit (found ? 0 : 1) }'; then
        parted -s "${root_disk}" rm 5
      fi

      if parted -s "${root_disk}" print | awk '$1 == "2" { found = 1 } END { exit (found ? 0 : 1) }'; then
        parted -s "${root_disk}" rm 2
      fi

      growpart_output="$(growpart "${root_disk}" "${root_partnum}" 2>&1)" || growpart_rc=$?
      growpart_rc="${growpart_rc:-0}"

      if [ "${growpart_rc}" -eq 0 ]; then
        partprobe "${root_disk}" || true
        udevadm settle || true
        sleep 2
        resize2fs "${root_device}"
        changed=1
      elif printf '%s\n' "${growpart_output}" | grep -q '^NOCHANGE:'; then
        :
      else
        printf '%s\n' "${growpart_output}" >&2
        exit "${growpart_rc}"
      fi
    fi

    echo "changed=${changed}"
  args:
    executable: /bin/bash
  register: kubernetes_role_rootfs_expand
  changed_when: "'changed=1' in (kubernetes_role_rootfs_expand.stdout | default(''))"
  when: kubernetes_role_expand_rootfs | bool
  tags:
    - rootfs

- name: Reconcile system hostname with inventory hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  register: kubernetes_role_hostname_update
  when: ansible_hostname != inventory_hostname

- name: Clear stale RKE2 agent state
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/rke2/agent
    - /etc/rancher/node
  notify: Restart rke2-agent
  when:
    - inventory_hostname in groups[kubernetes_rke2_agents_group_name]
    - kubernetes_rke2_reset_agent_state | default(false) | bool

- name: Flush pending handler after RKE2 agent state reset
  ansible.builtin.meta: flush_handlers
  when:
    - inventory_hostname in groups[kubernetes_rke2_agents_group_name]
    - kubernetes_rke2_reset_agent_state | default(false) | bool

- name: Enable Debian non-free APT components on dedicated GPU worker
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: '^(deb(?:-src)?\s+\S+\s+\S+\s+)main(?:\s+non-free-firmware)?$'
    replace: '\1{{ kubernetes_gpu_host_driver_management.apt_components | join(" ") }}'
  register: kubernetes_gpu_sources
  when:
    - kubernetes_gpu_host_driver_management.enabled | bool
    - inventory_hostname == kubernetes_rke2_gpu_worker_name
    - ansible_facts['distribution'] == 'Debian'

- name: Install NVIDIA host driver packages on dedicated GPU worker
  ansible.builtin.apt:
    name: "{{ kubernetes_gpu_host_driver_management.packages }}"
    state: present
    update_cache: true
    cache_valid_time: 0
    dpkg_options: "force-confdef,force-confold"
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
  register: kubernetes_gpu_driver_packages
  when:
    - kubernetes_gpu_host_driver_management.enabled | bool
    - inventory_hostname == kubernetes_rke2_gpu_worker_name

- name: Detect NVIDIA PCI devices on dedicated GPU worker
  ansible.builtin.shell: |
    set -euo pipefail
    count=0
    for vendor_path in /sys/bus/pci/devices/*/vendor; do
      [ -f "${vendor_path}" ] || continue
      if grep -qi '^0x10de$' "${vendor_path}"; then
        count=$((count + 1))
      fi
    done
    printf '%s\n' "${count}"
  args:
    executable: /bin/bash
  register: kubernetes_gpu_nvidia_pci_count
  changed_when: false
  when:
    - kubernetes_gpu_host_driver_management.enabled | bool
    - inventory_hostname == kubernetes_rke2_gpu_worker_name

- name: Reboot dedicated GPU worker after NVIDIA driver installation
  ansible.builtin.reboot:
    reboot_timeout: "{{ kubernetes_gpu_host_driver_management.reboot_timeout }}"
    msg: "Rebooting after NVIDIA host driver installation"
  when:
    - kubernetes_gpu_host_driver_management.enabled | bool
    - inventory_hostname == kubernetes_rke2_gpu_worker_name
    - >
      kubernetes_gpu_sources is changed
      or kubernetes_gpu_driver_packages is changed
      or (kubernetes_gpu_nvidia_pci_count.stdout | default('0') | int) == 0

- name: Verify nvidia-smi on dedicated GPU worker
  ansible.builtin.command: nvidia-smi
  register: kubernetes_gpu_nvidia_smi
  changed_when: false
  retries: 6
  delay: 10
  until: kubernetes_gpu_nvidia_smi.rc == 0
  when:
    - kubernetes_gpu_host_driver_management.enabled | bool
    - inventory_hostname == kubernetes_rke2_gpu_worker_name

- name: Re-apply Kubernetes sysctl values after potential GPU worker reboot
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop: "{{ kubernetes_role_sysctl | dict2items }}"

- name: Ensure RKE2 configuration directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_role_rke2_config_dir }}"
    state: directory
    mode: "0755"

- name: Install RKE2
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION="{{ kubernetes_rke2_version }}" sh -
  args:
    creates: /usr/local/bin/rke2

- name: Ensure RKE2 manifests directory exists on control plane nodes
  ansible.builtin.file:
    path: /var/lib/rancher/rke2/server/manifests
    state: directory
    mode: "0755"
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name]

- name: Read persisted local RKE2 server token when available
  ansible.builtin.slurp:
    src: /var/lib/rancher/rke2/server/token
  register: kubernetes_role_local_server_token
  no_log: true
  failed_when: false
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name]

- name: Prefer persisted local RKE2 server token for control plane config
  ansible.builtin.set_fact:
    rke2_server_token: >-
      {{
        (
          kubernetes_role_local_server_token.content
          | b64decode
          | trim
        )
        if (
          kubernetes_role_local_server_token is defined
          and (kubernetes_role_local_server_token.failed | default(false)) == false
          and (kubernetes_role_local_server_token.content | default('') | length > 0)
        )
        else rke2_server_token
      }}
  no_log: true
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name]

- name: Render kube-vip manifest on control plane nodes
  ansible.builtin.template:
    src: kube-vip-static-pod.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/kube-vip.yaml
    mode: "0644"
  register: kubernetes_role_kube_vip_manifest
  when:
    - inventory_hostname in groups[kubernetes_rke2_servers_group_name]
    - kubernetes_kube_vip.enabled | bool

- name: Check if RKE2 server is active on primary control plane
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - rke2-server
  register: kubernetes_role_rke2_server_active
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == kubernetes_control_plane_first_host
    - kubernetes_kube_vip.enabled | bool
    - kubernetes_role_kube_vip_manifest is defined
    - kubernetes_role_kube_vip_manifest.changed | bool

- name: Recreate kube-vip pod when manifest spec changes
  ansible.builtin.command:
    argv:
      - /usr/local/bin/rke2
      - kubectl
      - --kubeconfig
      - /etc/rancher/rke2/rke2.yaml
      - delete
      - pod
      - kube-vip
      - -n
      - kube-system
      - --ignore-not-found=true
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == kubernetes_control_plane_first_host
    - kubernetes_kube_vip.enabled | bool
    - kubernetes_role_kube_vip_manifest is defined
    - kubernetes_role_kube_vip_manifest.changed | bool
    - kubernetes_role_rke2_server_active is defined
    - kubernetes_role_rke2_server_active.rc == 0

- name: Apply kube-vip manifest after pod recreation
  ansible.builtin.command:
    argv:
      - /usr/local/bin/rke2
      - kubectl
      - --kubeconfig
      - /etc/rancher/rke2/rke2.yaml
      - apply
      - -f
      - /var/lib/rancher/rke2/server/manifests/kube-vip.yaml
  changed_when: false
  when:
    - inventory_hostname == kubernetes_control_plane_first_host
    - kubernetes_kube_vip.enabled | bool
    - kubernetes_role_kube_vip_manifest is defined
    - kubernetes_role_kube_vip_manifest.changed | bool
    - kubernetes_role_rke2_server_active is defined
    - kubernetes_role_rke2_server_active.rc == 0

- name: Render RKE2 server configuration
  ansible.builtin.template:
    src: rke2-server-config.yaml.j2
    dest: "{{ kubernetes_role_rke2_config_dir }}/config.yaml"
    mode: "0600"
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name]
  notify: Restart rke2-server

- name: Clean stale bootstrap database on control plane nodes before start
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/rke2/server/db/state.db
    - /var/lib/rancher/rke2/server/db/etcd-tmp
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name] and inventory_hostname != kubernetes_control_plane_first_host
  failed_when: false

- name: Detect stale secondary control-plane join state
  ansible.builtin.command: journalctl -u rke2-server --no-pager -n 120
  register: kubernetes_role_rke2_recent_journal
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname in groups[kubernetes_rke2_servers_group_name]
    - inventory_hostname != kubernetes_control_plane_first_host

- name: Reset stale secondary control-plane RKE2 state on CA validation failure
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/rke2/server/tls
    - /var/lib/rancher/rke2/server/cred
    - /var/lib/rancher/rke2/server/db
    - /var/lib/rancher/rke2/agent
    - /etc/rancher/node
    - /var/lib/rancher/rke2/server/token
    - /var/lib/rancher/rke2/server/node-token
  when:
    - inventory_hostname in groups[kubernetes_rke2_servers_group_name]
    - inventory_hostname != kubernetes_control_plane_first_host
    - kubernetes_role_rke2_recent_journal is defined
    - kubernetes_role_rke2_recent_journal.stdout is defined
    - "'CA cert validation failed' in kubernetes_role_rke2_recent_journal.stdout or 'certificate signed by unknown authority' in kubernetes_role_rke2_recent_journal.stdout"
  failed_when: false

- name: Wait for bootstrap control plane supervisor port to become reachable
  ansible.builtin.wait_for:
    host: "{{ kubernetes_control_plane_first_ip }}"
    port: "{{ kubernetes_rke2_api_private_port }}"
    delay: 5
    timeout: 1800
    connect_timeout: 5
  when:
    - inventory_hostname != kubernetes_control_plane_first_host
    - inventory_hostname in groups[kubernetes_rke2_cluster_group_name]

- name: Render RKE2 agent configuration
  ansible.builtin.template:
    src: rke2-agent-config.yaml.j2
    dest: "{{ kubernetes_role_rke2_config_dir }}/config.yaml"
    mode: "0600"
  when: inventory_hostname in groups[kubernetes_rke2_agents_group_name]
  notify: Restart rke2-agent

- name: Ensure RKE2 server service is enabled and started
  ansible.builtin.systemd:
    name: "{{ kubernetes_role_rke2_server_service }}"
    enabled: true
    state: started
    daemon_reload: true
  register: kubernetes_role_rke2_server_start
  failed_when: false
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name]

- name: Wait for RKE2 server service to become active
  ansible.builtin.command: systemctl is-active {{ kubernetes_role_rke2_server_service }}
  register: kubernetes_role_rke2_server_active
  changed_when: false
  retries: "{{ kubernetes_wait_for_rke2_active_retries | int }}"
  delay: "{{ kubernetes_wait_for_rke2_active_delay | int }}"
  until: kubernetes_role_rke2_server_active.stdout == 'active'
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name]

- name: Assert RKE2 server service is active
  ansible.builtin.assert:
    that:
      - kubernetes_role_rke2_server_active.stdout == 'active'
    fail_msg: >-
      rke2-server failed to reach active state.
      start_result={{ kubernetes_role_rke2_server_start | to_nice_json }}
      active_result={{ kubernetes_role_rke2_server_active | to_nice_json }}
  when: inventory_hostname in groups[kubernetes_rke2_servers_group_name]

- name: Ensure RKE2 agent service is enabled and started
  ansible.builtin.systemd:
    name: "{{ kubernetes_role_rke2_agent_service }}"
    enabled: true
    state: started
    daemon_reload: true
  register: kubernetes_role_rke2_agent_start
  failed_when: false
  when: inventory_hostname in groups[kubernetes_rke2_agents_group_name]

- name: Wait for RKE2 agent service to become active
  ansible.builtin.command: systemctl is-active {{ kubernetes_role_rke2_agent_service }}
  register: kubernetes_role_rke2_agent_active
  changed_when: false
  retries: "{{ kubernetes_wait_for_rke2_active_retries | int }}"
  delay: "{{ kubernetes_wait_for_rke2_active_delay | int }}"
  until: kubernetes_role_rke2_agent_active.stdout == 'active'
  when: inventory_hostname in groups[kubernetes_rke2_agents_group_name]

- name: Assert RKE2 agent service is active
  ansible.builtin.assert:
    that:
      - kubernetes_role_rke2_agent_active.stdout == 'active'
    fail_msg: >-
      rke2-agent failed to reach active state.
      start_result={{ kubernetes_role_rke2_agent_start | to_nice_json }}
      active_result={{ kubernetes_role_rke2_agent_active | to_nice_json }}
  when: inventory_hostname in groups[kubernetes_rke2_agents_group_name]

- name: Wait for kubeconfig on bootstrap control plane
  ansible.builtin.wait_for:
    path: /etc/rancher/rke2/rke2.yaml
    timeout: "{{ kubernetes_wait_for_kubeconfig_timeout }}"
  when: inventory_hostname == kubernetes_control_plane_first_host

- name: Fetch admin kubeconfig from bootstrap node
  ansible.builtin.fetch:
    src: /etc/rancher/rke2/rke2.yaml
    dest: "{{ kubernetes_role_local_kubeconfig_path }}"
    flat: true
  when: inventory_hostname == kubernetes_control_plane_first_host

- name: Rewrite kubeconfig server endpoint to production API VIP
  ansible.builtin.replace:
    path: "{{ kubernetes_role_local_kubeconfig_path }}"
    regexp: 'https://127.0.0.1:6443'
    replace: "https://{{ kubernetes_rke2_api_ip }}:6443"
  delegate_to: localhost
  when: inventory_hostname == kubernetes_control_plane_first_host

- name: Wait for current node to report Ready
  ansible.builtin.command:
    argv:
      - /var/lib/rancher/rke2/bin/kubectl
      - --kubeconfig=/etc/rancher/rke2/rke2.yaml
      - wait
      - --for=condition=Ready
      - node/{{ inventory_hostname }}
      - --timeout={{ kubernetes_wait_for_node_ready_timeout }}s
  register: kubernetes_role_node_ready_wait
  changed_when: false
  retries: "{{ kubernetes_wait_for_node_ready_retries | int }}"
  delay: "{{ kubernetes_wait_for_node_ready_delay | int }}"
  until: kubernetes_role_node_ready_wait.rc == 0
  delegate_to: "{{ kubernetes_control_plane_first_host }}"
  when:
    - inventory_hostname != kubernetes_control_plane_first_host
    - inventory_hostname in groups[kubernetes_rke2_cluster_group_name]
