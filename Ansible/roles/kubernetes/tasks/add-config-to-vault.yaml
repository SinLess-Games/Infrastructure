---
# =============================================================================
# Configure per-environment Vault Kubernetes secrets engine
# =============================================================================
# Purpose:
#   - Ensure a Vault Kubernetes secrets engine exists for the environment
#   - Read the cluster CA from the first control plane node kubeconfig
#   - Ensure a Kubernetes ServiceAccount + RBAC exist for the secrets engine
#   - Generate a service account JWT from the cluster when one is not provided
#   - Configure the engine /config endpoint so Vault can talk to the cluster
#
# Notes:
#   - This configures a Vault Kubernetes secrets engine, not KV
#   - This task file only actively runs on the first RKE2 server
#   - Kubernetes API actions are executed on the first control plane node using
#     the RKE2 kubectl binary, so localhost does not need kubectl installed
#   - This file checks both /sys/mounts and /sys/auth to catch path collisions
# =============================================================================

- name: Resolve Kubernetes secrets engine source host
  ansible.builtin.set_fact:
    vault_kubernetes_source_host: >-
      {{
        kubernetes_rke2_first_server_host
        | default(
            groups[
              kubernetes_rke2_servers_group_name_resolved
              | default(
                  kubernetes_rke2_servers_group_name
                  | default('kubernetes_dev_control_plane')
                )
            ][0]
          )
      }}
    vault_kubernetes_manage_on_this_host: >-
      {{
        inventory_hostname ==
        (
          kubernetes_rke2_first_server_host
          | default(
              groups[
                kubernetes_rke2_servers_group_name_resolved
                | default(
                    kubernetes_rke2_servers_group_name
                    | default('kubernetes_dev_control_plane')
                  )
              ][0]
            )
        )
      }}
  tags:
    - vault
    - kubernetes
    - configure

- name: Skip Vault Kubernetes secrets engine configuration on non-source nodes
  ansible.builtin.debug:
    msg: >-
      Skipping Vault Kubernetes secrets engine configuration on {{ inventory_hostname }}.
      The mount will be configured by {{ vault_kubernetes_source_host }}.
  when: not vault_kubernetes_manage_on_this_host | bool
  tags:
    - vault
    - kubernetes
    - summary

- name: Configure Vault Kubernetes secrets engine from first control plane node
  when: vault_kubernetes_manage_on_this_host | bool
  block:
    - name: Set Vault Kubernetes secrets engine core defaults
      ansible.builtin.set_fact:
        vault_kubernetes_mount: >-
          {{ 'kubernetes-' ~ (kubernetes_environment | default('dev')) }}

        vault_kubernetes_addr: >-
          {{
            kubernetes_deploy_vault_addr
            | default(
                vault_addr
                | default(lookup('env', 'VAULT_ADDR'), true),
                true
              )
          }}

        vault_kubernetes_token: >-
          {{
            kubernetes_deploy_vault_token
            | default(
                vault_token
                | default(lookup('env', 'VAULT_TOKEN'), true),
                true
              )
          }}

        vault_kubernetes_skip_verify: >-
          {{
            kubernetes_deploy_vault_skip_verify
            | default(
                vault_skip_verify
                | default(lookup('env', 'VAULT_SKIP_VERIFY') | default('true', true), true),
                true
              )
            | bool
          }}

        vault_kubernetes_disable_local_ca_jwt: >-
          {{
            (
              vars['vault_kubernetes_disable_local_ca_jwt']
              if 'vault_kubernetes_disable_local_ca_jwt' in vars
              else true
            ) | bool
          }}

        vault_kubernetes_kubeconfig_source_path: >-
          {{
            vars.get('vault_kubernetes_kubeconfig_source_path')
            or '/etc/rancher/rke2/rke2.yaml'
          }}

        vault_kubernetes_remote_kubectl_bin: >-
          {{
            vars.get('vault_kubernetes_remote_kubectl_bin')
            or '/var/lib/rancher/rke2/bin/kubectl'
          }}

        vault_kubernetes_api_host: >-
          {{
            vars.get('vault_kubernetes_api_host')
            or vars.get('kubernetes_rke2_api_ip')
            or hostvars[vault_kubernetes_source_host].get('ansible_host')
            or hostvars[vault_kubernetes_source_host].get('node_fqdn')
            or vault_kubernetes_source_host
          }}

        vault_kubernetes_api_port: >-
          {{
            vars.get('vault_kubernetes_api_port')
            or '6443'
          }}

        vault_kubernetes_service_account_jwt: >-
          {{
            (
              vars.get('vault_kubernetes_service_account_jwt')
              or lookup('env', 'VAULT_KUBERNETES_SERVICE_ACCOUNT_JWT')
              or ''
            ) | trim
          }}

        vault_kubernetes_service_account_jwt_file: >-
          {{
            (
              vars.get('vault_kubernetes_service_account_jwt_file')
              or lookup('env', 'VAULT_KUBERNETES_SERVICE_ACCOUNT_JWT_FILE')
              or ''
            ) | trim
          }}

        vault_kubernetes_service_account_name: >-
          {{
            vars.get('vault_kubernetes_service_account_name')
            or vars.get('vault_kubernetes_reviewer_service_account_name')
            or 'vault-k8s-secrets-engine'
          }}

        vault_kubernetes_service_account_namespace: >-
          {{
            vars.get('vault_kubernetes_service_account_namespace')
            or vars.get('vault_kubernetes_reviewer_service_account_namespace')
            or 'kube-system'
          }}

        vault_kubernetes_token_duration: >-
          {{
            vars.get('vault_kubernetes_token_duration')
            or vars.get('vault_kubernetes_reviewer_token_duration')
            or '24h'
          }}

        vault_kubernetes_force_configure: >-
          {{
            (
              vars['vault_kubernetes_force_configure']
              if 'vault_kubernetes_force_configure' in vars
              else false
            ) | bool
          }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Set Vault Kubernetes secrets engine derived defaults
      ansible.builtin.set_fact:
        vault_kubernetes_mount_key: "{{ vault_kubernetes_mount }}/"

        vault_kubernetes_clusterrole_name: >-
          {{
            vars.get('vault_kubernetes_clusterrole_name')
            or (vault_kubernetes_mount ~ '-token-manager')
          }}

        vault_kubernetes_clusterrolebinding_name: >-
          {{
            vars.get('vault_kubernetes_clusterrolebinding_name')
            or vars.get('vault_kubernetes_reviewer_clusterrolebinding_name')
            or (vault_kubernetes_mount ~ '-token-manager')
          }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Show Kubernetes secrets engine input status
      ansible.builtin.debug:
        msg:
          mount: "{{ vault_kubernetes_mount }}"
          vault_addr_present: "{{ (vault_kubernetes_addr | default('')) | length > 0 }}"
          vault_token_present: "{{ (vault_kubernetes_token | default('')) | length > 0 }}"
          api_host: "{{ vault_kubernetes_api_host }}"
          kubeconfig_source_path: "{{ vault_kubernetes_kubeconfig_source_path }}"
          remote_kubectl_bin: "{{ vault_kubernetes_remote_kubectl_bin }}"
          service_account_name: "{{ vault_kubernetes_service_account_name }}"
          service_account_namespace: "{{ vault_kubernetes_service_account_namespace }}"
          service_account_jwt_present: "{{ (vault_kubernetes_service_account_jwt | default('')) | length > 0 }}"
          service_account_jwt_file: "{{ vault_kubernetes_service_account_jwt_file | default('') }}"
      tags:
        - vault
        - kubernetes
        - debug

    - name: Validate required Kubernetes secrets engine inputs
      ansible.builtin.assert:
        that:
          - vault_kubernetes_mount is defined
          - vault_kubernetes_mount | length > 0
          - vault_kubernetes_addr is defined
          - vault_kubernetes_addr | length > 0
          - vault_kubernetes_token is defined
          - vault_kubernetes_token | length > 0
          - vault_kubernetes_api_host is defined
          - vault_kubernetes_api_host | length > 0
          - vault_kubernetes_kubeconfig_source_path is defined
          - vault_kubernetes_kubeconfig_source_path | length > 0
          - vault_kubernetes_remote_kubectl_bin is defined
          - vault_kubernetes_remote_kubectl_bin | length > 0
          - vault_kubernetes_service_account_name is defined
          - vault_kubernetes_service_account_name | length > 0
          - vault_kubernetes_service_account_namespace is defined
          - vault_kubernetes_service_account_namespace | length > 0
        fail_msg: |
          Missing required Vault Kubernetes secrets engine inputs.
          Required:
            - vault_kubernetes_mount
            - vault_kubernetes_addr
            - vault_kubernetes_token
            - vault_kubernetes_api_host
            - vault_kubernetes_kubeconfig_source_path
            - vault_kubernetes_remote_kubectl_bin
            - vault_kubernetes_service_account_name
            - vault_kubernetes_service_account_namespace
      tags:
        - vault
        - kubernetes
        - validate

    - name: Check remote kubectl binary exists
      ansible.builtin.stat:
        path: "{{ vault_kubernetes_remote_kubectl_bin }}"
      register: vault_kubernetes_remote_kubectl_stat
      tags:
        - vault
        - kubernetes
        - validate

    - name: Assert remote kubectl binary exists
      ansible.builtin.assert:
        that:
          - vault_kubernetes_remote_kubectl_stat.stat.exists
          - vault_kubernetes_remote_kubectl_stat.stat.isreg
        fail_msg: >-
          Remote kubectl binary not found at {{ vault_kubernetes_remote_kubectl_bin }}
          on {{ inventory_hostname }}.
      tags:
        - vault
        - kubernetes
        - validate

    - name: Read kubeconfig from source node
      ansible.builtin.slurp:
        src: "{{ vault_kubernetes_kubeconfig_source_path }}"
      register: vault_kubernetes_remote_kubeconfig
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Parse kubeconfig YAML
      ansible.builtin.set_fact:
        vault_kubernetes_kubeconfig_parsed: >-
          {{
            (vault_kubernetes_remote_kubeconfig.content | b64decode | from_yaml)
          }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Extract Kubernetes CA certificate from kubeconfig
      ansible.builtin.set_fact:
        vault_kubernetes_ca_cert_resolved: >-
          {{
            (
              vault_kubernetes_kubeconfig_parsed.clusters[0].cluster['certificate-authority-data']
            ) | b64decode
          }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Ensure service account exists for Kubernetes secrets engine
      ansible.builtin.shell: |
        set -o pipefail
        cat <<EOF | {{ vault_kubernetes_remote_kubectl_bin }} --kubeconfig {{ vault_kubernetes_kubeconfig_source_path }} apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: {{ vault_kubernetes_service_account_name }}
          namespace: {{ vault_kubernetes_service_account_namespace }}
        EOF
      args:
        executable: /bin/bash
      register: vault_kubernetes_service_account_apply
      changed_when: >-
        'created' in (vault_kubernetes_service_account_apply.stdout | default(''))
        or
        'configured' in (vault_kubernetes_service_account_apply.stdout | default(''))
      tags:
        - vault
        - kubernetes
        - configure

    - name: Ensure cluster role exists for Kubernetes secrets engine
      ansible.builtin.shell: |
        set -o pipefail
        cat <<EOF | {{ vault_kubernetes_remote_kubectl_bin }} --kubeconfig {{ vault_kubernetes_kubeconfig_source_path }} apply -f -
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: {{ vault_kubernetes_clusterrole_name }}
        rules:
          - apiGroups: [""]
            resources: ["serviceaccounts/token"]
            verbs: ["create"]
        EOF
      args:
        executable: /bin/bash
      register: vault_kubernetes_clusterrole_apply
      changed_when: >-
        'created' in (vault_kubernetes_clusterrole_apply.stdout | default(''))
        or
        'configured' in (vault_kubernetes_clusterrole_apply.stdout | default(''))
      tags:
        - vault
        - kubernetes
        - configure

    - name: Ensure clusterrolebinding exists for Kubernetes secrets engine
      ansible.builtin.shell: |
        set -o pipefail
        cat <<EOF | {{ vault_kubernetes_remote_kubectl_bin }} --kubeconfig {{ vault_kubernetes_kubeconfig_source_path }} apply -f -
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: {{ vault_kubernetes_clusterrolebinding_name }}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: {{ vault_kubernetes_clusterrole_name }}
        subjects:
          - kind: ServiceAccount
            name: {{ vault_kubernetes_service_account_name }}
            namespace: {{ vault_kubernetes_service_account_namespace }}
        EOF
      args:
        executable: /bin/bash
      register: vault_kubernetes_clusterrolebinding_apply
      changed_when: >-
        'created' in (vault_kubernetes_clusterrolebinding_apply.stdout | default(''))
        or
        'configured' in (vault_kubernetes_clusterrolebinding_apply.stdout | default(''))
      tags:
        - vault
        - kubernetes
        - configure

    - name: Generate service account JWT from cluster
      ansible.builtin.command:
        argv:
          - "{{ vault_kubernetes_remote_kubectl_bin }}"
          - --kubeconfig
          - "{{ vault_kubernetes_kubeconfig_source_path }}"
          - -n
          - "{{ vault_kubernetes_service_account_namespace }}"
          - create
          - token
          - "{{ vault_kubernetes_service_account_name }}"
          - "--duration={{ vault_kubernetes_token_duration }}"
      register: vault_kubernetes_generated_jwt
      changed_when: false
      no_log: true
      when: (vault_kubernetes_service_account_jwt | default('', true) | trim) | length == 0
      tags:
        - vault
        - kubernetes
        - configure

    - name: Ensure local service account JWT directory exists
      ansible.builtin.file:
        path: "{{ vault_kubernetes_service_account_jwt_file | dirname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      when:
        - (vault_kubernetes_service_account_jwt | default('', true) | trim) | length == 0
        - (vault_kubernetes_service_account_jwt_file | default('', true) | trim) | length > 0
      tags:
        - vault
        - kubernetes
        - configure

    - name: Persist generated service account JWT to localhost file
      ansible.builtin.copy:
        content: "{{ vault_kubernetes_generated_jwt.stdout | trim }}"
        dest: "{{ vault_kubernetes_service_account_jwt_file }}"
        mode: "0600"
      delegate_to: localhost
      become: false
      no_log: true
      when:
        - (vault_kubernetes_service_account_jwt | default('', true) | trim) | length == 0
        - vault_kubernetes_generated_jwt is defined
        - (vault_kubernetes_generated_jwt.stdout | default('', true) | trim) | length > 0
        - (vault_kubernetes_service_account_jwt_file | default('', true) | trim) | length > 0
      tags:
        - vault
        - kubernetes
        - configure

    - name: Resolve service account JWT
      ansible.builtin.set_fact:
        vault_kubernetes_service_account_jwt_resolved: >-
          {{
            (vault_kubernetes_service_account_jwt | default('', true) | trim)
            or
            (
              (vault_kubernetes_generated_jwt.stdout | default('', true) | trim)
              if (vault_kubernetes_generated_jwt is defined)
              else ''
            )
          }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Validate resolved Kubernetes secrets engine credentials
      ansible.builtin.assert:
        that:
          - vault_kubernetes_service_account_jwt_resolved is defined
          - vault_kubernetes_service_account_jwt_resolved | length > 0
          - vault_kubernetes_ca_cert_resolved is defined
          - vault_kubernetes_ca_cert_resolved | length > 0
        fail_msg: |
          Missing Kubernetes secrets engine credentials.
          Could not resolve a service account JWT from:
            - vault_kubernetes_service_account_jwt
            - generated token via kubectl on {{ inventory_hostname }}
          The cluster CA cert is read from:
            - {{ vault_kubernetes_kubeconfig_source_path }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - validate

    - name: Read current Vault secrets engine mounts
      ansible.builtin.uri:
        url: "{{ vault_kubernetes_addr }}/v1/sys/mounts"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_kubernetes_token }}"
        validate_certs: "{{ not (vault_kubernetes_skip_verify | default(true) | bool) }}"
        return_content: true
        status_code: 200
      register: vault_kubernetes_mounts
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Read current Vault auth mounts
      ansible.builtin.uri:
        url: "{{ vault_kubernetes_addr }}/v1/sys/auth"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_kubernetes_token }}"
        validate_certs: "{{ not (vault_kubernetes_skip_verify | default(true) | bool) }}"
        return_content: true
        status_code: 200
      register: vault_kubernetes_auth_mounts
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Resolve current mount state
      ansible.builtin.set_fact:
        vault_kubernetes_mount_current: >-
          {{
            vault_kubernetes_mounts.json.data[vault_kubernetes_mount_key]
            if vault_kubernetes_mount_key in vault_kubernetes_mounts.json.data
            else {}
          }}
        vault_kubernetes_mount_exists: "{{ vault_kubernetes_mount_key in vault_kubernetes_mounts.json.data }}"
        vault_kubernetes_auth_mount_current: >-
          {{
            vault_kubernetes_auth_mounts.json.data[vault_kubernetes_mount_key]
            if vault_kubernetes_mount_key in vault_kubernetes_auth_mounts.json.data
            else {}
          }}
        vault_kubernetes_auth_mount_exists: "{{ vault_kubernetes_mount_key in vault_kubernetes_auth_mounts.json.data }}"
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Fail if same path already exists as an auth method
      ansible.builtin.assert:
        that:
          - not vault_kubernetes_auth_mount_exists
        fail_msg: |
          Vault path collision detected.
          The path {{ vault_kubernetes_mount }} already exists under sys/auth as:
            type: {{ vault_kubernetes_auth_mount_current.type | default('unknown') }}
          A Kubernetes secrets engine cannot be enabled at a path already used by an auth method.
      tags:
        - vault
        - kubernetes
        - validate

    - name: Fail if existing mount is not a Kubernetes secrets engine
      ansible.builtin.assert:
        that:
          - not vault_kubernetes_mount_exists or vault_kubernetes_mount_current.type == 'kubernetes'
        fail_msg: |
          Existing Vault mount {{ vault_kubernetes_mount }} is not a Kubernetes secrets engine.
          Existing type: {{ vault_kubernetes_mount_current.type | default('unknown') }}
      tags:
        - vault
        - kubernetes
        - validate

    - name: Enable Kubernetes secrets engine for environment
      ansible.builtin.uri:
        url: "{{ vault_kubernetes_addr }}/v1/sys/mounts/{{ vault_kubernetes_mount }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_kubernetes_token }}"
        validate_certs: "{{ not (vault_kubernetes_skip_verify | default(true) | bool) }}"
        body_format: json
        body:
          type: kubernetes
          description: "Kubernetes {{ kubernetes_environment }} secrets engine"
        return_content: true
        status_code: [200, 204, 400, 403, 404, 500]
      register: vault_kubernetes_enable_mount_result
      delegate_to: localhost
      become: false
      failed_when: false
      when: not vault_kubernetes_mount_exists
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Assert Kubernetes secrets engine mount was enabled successfully
      ansible.builtin.assert:
        that:
          - vault_kubernetes_mount_exists or (vault_kubernetes_enable_mount_result.status | int) in [200, 204]
        fail_msg: |
          Failed to enable Vault Kubernetes secrets engine at mount {{ vault_kubernetes_mount }}.
          HTTP status: {{ vault_kubernetes_enable_mount_result.status | default('unknown') }}
          Response:
          {{ vault_kubernetes_enable_mount_result.json | default(vault_kubernetes_enable_mount_result.content | default('No response body')) }}
      when: not vault_kubernetes_mount_exists
      tags:
        - vault
        - kubernetes
        - validate

    - name: Read current Kubernetes secrets engine config
      ansible.builtin.uri:
        url: "{{ vault_kubernetes_addr }}/v1/{{ vault_kubernetes_mount }}/config"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_kubernetes_token }}"
        validate_certs: "{{ not (vault_kubernetes_skip_verify | default(true) | bool) }}"
        return_content: true
        status_code: [200, 404]
      register: vault_kubernetes_current_config
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Normalize current Kubernetes secrets engine config
      ansible.builtin.set_fact:
        vault_kubernetes_current_config_data: >-
          {{
            (vault_kubernetes_current_config.json | default({})).data | default({})
          }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Build desired Kubernetes secrets engine config payload
      ansible.builtin.set_fact:
        vault_kubernetes_config_payload:
          kubernetes_host: "https://{{ vault_kubernetes_api_host }}:{{ vault_kubernetes_api_port }}"
          kubernetes_ca_cert: "{{ vault_kubernetes_ca_cert_resolved }}"
          service_account_jwt: "{{ vault_kubernetes_service_account_jwt_resolved }}"
          disable_local_ca_jwt: "{{ vault_kubernetes_disable_local_ca_jwt | bool }}"
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Determine whether Kubernetes secrets engine config needs update
      ansible.builtin.set_fact:
        vault_kubernetes_config_needs_update: >-
          {{
            vault_kubernetes_force_configure
            or
            (vault_kubernetes_current_config.status | int != 200)
            or
            ((vault_kubernetes_current_config_data.kubernetes_host | default('')) != ('https://' ~ vault_kubernetes_api_host ~ ':' ~ vault_kubernetes_api_port))
            or
            ((vault_kubernetes_current_config_data.kubernetes_ca_cert | default('')) != vault_kubernetes_ca_cert_resolved)
            or
            ((vault_kubernetes_current_config_data.disable_local_ca_jwt | default(false) | bool) != (vault_kubernetes_disable_local_ca_jwt | bool))
          }}
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Configure Kubernetes secrets engine
      ansible.builtin.uri:
        url: "{{ vault_kubernetes_addr }}/v1/{{ vault_kubernetes_mount }}/config"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_kubernetes_token }}"
        validate_certs: "{{ not (vault_kubernetes_skip_verify | default(true) | bool) }}"
        body_format: json
        body: "{{ vault_kubernetes_config_payload }}"
        return_content: true
        status_code: [200, 204, 400, 403, 404, 500]
      register: vault_kubernetes_configure_result
      delegate_to: localhost
      become: false
      failed_when: false
      when: vault_kubernetes_config_needs_update
      no_log: true
      tags:
        - vault
        - kubernetes
        - configure

    - name: Assert Kubernetes secrets engine was configured successfully
      ansible.builtin.assert:
        that:
          - not vault_kubernetes_config_needs_update or (vault_kubernetes_configure_result.status | int) in [200, 204]
        fail_msg: |
          Failed to configure Vault Kubernetes secrets engine at mount {{ vault_kubernetes_mount }}.
          HTTP status: {{ vault_kubernetes_configure_result.status | default('unknown') }}
          Response:
          {{ vault_kubernetes_configure_result.json | default(vault_kubernetes_configure_result.content | default('No response body')) }}
      tags:
        - vault
        - kubernetes
        - validate

    - name: Read back Kubernetes secrets engine config
      ansible.builtin.uri:
        url: "{{ vault_kubernetes_addr }}/v1/{{ vault_kubernetes_mount }}/config"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_kubernetes_token }}"
        validate_certs: "{{ not (vault_kubernetes_skip_verify | default(true) | bool) }}"
        return_content: true
        status_code: 200
      register: vault_kubernetes_verified_config
      delegate_to: localhost
      become: false
      changed_when: false
      no_log: true
      tags:
        - vault
        - kubernetes
        - verify

    - name: Report Kubernetes secrets engine configuration result
      ansible.builtin.debug:
        msg: |
          ========================================================
          Vault Kubernetes Secrets Engine Configured
          ========================================================
          Mount: {{ vault_kubernetes_mount }}
          Kubernetes Host: {{ vault_kubernetes_verified_config.json.data.kubernetes_host }}
          disable_local_ca_jwt: {{ vault_kubernetes_verified_config.json.data.disable_local_ca_jwt }}
          Source Node: {{ vault_kubernetes_source_host }}
          Service Account: {{ vault_kubernetes_service_account_namespace }}/{{ vault_kubernetes_service_account_name }}
          Updated: {{ vault_kubernetes_config_needs_update }}
          ========================================================
      tags:
        - vault
        - kubernetes
        - summary