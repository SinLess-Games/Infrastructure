---
# =============================================================================
# Install Kubernetes via lablabs.rke2
# =============================================================================

- name: Assert required RKE2 install inputs are present
  ansible.builtin.assert:
    that:
      - rke2_server_token is defined
      - rke2_server_token | length > 0
      - kubernetes_cluster_name is defined
      - kubernetes_cluster_name | length > 0
      - kubernetes_cluster_cidr is defined
      - kubernetes_cluster_cidr | length > 0
      - kubernetes_service_cidr is defined
      - kubernetes_service_cidr | length > 0
      - kubernetes_cluster_dns is defined
      - kubernetes_cluster_dns | length > 0
    fail_msg: |
      Missing one or more required variables for RKE2 installation.
      Required:
        - rke2_server_token
        - kubernetes_cluster_name
        - kubernetes_cluster_cidr
        - kubernetes_service_cidr
        - kubernetes_cluster_dns
  tags:
    - kubernetes
    - install
    - rke2

- name: Resolve RKE2 inventory group names
  ansible.builtin.set_fact:
    kubernetes_rke2_servers_group_name_resolved: >-
      {%- if kubernetes_rke2_servers_group_name is defined and kubernetes_rke2_servers_group_name in groups -%}
      {{ kubernetes_rke2_servers_group_name }}
      {%- elif 'kubernetes_dev_control_plane' in groups -%}
      kubernetes_dev_control_plane
      {%- elif 'masters' in groups -%}
      masters
      {%- else -%}
      __missing_servers_group__
      {%- endif -%}
    kubernetes_rke2_agents_group_name_resolved: >-
      {%- if kubernetes_rke2_agents_group_name is defined and kubernetes_rke2_agents_group_name in groups -%}
      {{ kubernetes_rke2_agents_group_name }}
      {%- elif 'kubernetes_dev_workers' in groups -%}
      kubernetes_dev_workers
      {%- elif 'kubernetes_dev_worker' in groups -%}
      kubernetes_dev_worker
      {%- elif 'workers' in groups -%}
      workers
      {%- else -%}
      __missing_agents_group__
      {%- endif -%}
    kubernetes_rke2_cluster_group_name_resolved: >-
      {%- if kubernetes_rke2_cluster_group_name is defined and kubernetes_rke2_cluster_group_name in groups -%}
      {{ kubernetes_rke2_cluster_group_name }}
      {%- elif 'kubernetes_dev' in groups -%}
      kubernetes_dev
      {%- elif 'k8s_cluster' in groups -%}
      k8s_cluster
      {%- else -%}
      __missing_cluster_group__
      {%- endif -%}
  tags:
    - kubernetes
    - install
    - rke2

- name: Validate resolved RKE2 inventory groups exist
  ansible.builtin.assert:
    that:
      - kubernetes_rke2_servers_group_name_resolved in groups
      - kubernetes_rke2_agents_group_name_resolved in groups
      - groups[kubernetes_rke2_servers_group_name_resolved] | length >= 1
      - groups[kubernetes_rke2_agents_group_name_resolved] | length >= 1
    fail_msg: |
      Unable to resolve valid RKE2 inventory groups.
      Resolved groups:
        servers: {{ kubernetes_rke2_servers_group_name_resolved }}
        agents: {{ kubernetes_rke2_agents_group_name_resolved }}
        cluster: {{ kubernetes_rke2_cluster_group_name_resolved }}
      Available groups:
        {{ groups.keys() | list | sort | join(', ') }}
  tags:
    - kubernetes
    - install
    - rke2

- name: Determine RKE2 node role from inventory and explicit role
  ansible.builtin.set_fact:
    kubernetes_rke2_node_type: >-
      {{
        'server'
        if (
          (kubernetes_configure_node_role | default('')) == 'master'
          or inventory_hostname in groups[kubernetes_rke2_servers_group_name_resolved]
        )
        else 'agent'
      }}
  tags:
    - kubernetes
    - install
    - rke2

- name: Assert host belongs to a valid RKE2 inventory group
  ansible.builtin.assert:
    that:
      - kubernetes_rke2_node_type in ['server', 'agent']
      - >
        inventory_hostname in groups[kubernetes_rke2_servers_group_name_resolved]
        or
        inventory_hostname in groups[kubernetes_rke2_agents_group_name_resolved]
    fail_msg: |
      Host {{ inventory_hostname }} is not a member of the expected RKE2 groups.
      Expected groups:
        - {{ kubernetes_rke2_servers_group_name_resolved }}
        - {{ kubernetes_rke2_agents_group_name_resolved }}
  tags:
    - kubernetes
    - install
    - rke2

- name: Resolve first RKE2 server host
  ansible.builtin.set_fact:
    kubernetes_rke2_first_server_host: "{{ groups[kubernetes_rke2_servers_group_name_resolved][0] }}"
    kubernetes_rke2_api_ip_resolved: >-
      {{
        kubernetes_rke2_api_ip
        | default(
            hostvars[groups[kubernetes_rke2_servers_group_name_resolved][0]].ansible_host
            | default(groups[kubernetes_rke2_servers_group_name_resolved][0])
          )
      }}
  tags:
    - kubernetes
    - install
    - rke2

- name: Build base lablabs.rke2 variables
  ansible.builtin.set_fact:
    rke2_type: "{{ kubernetes_rke2_node_type }}"
    rke2_token: "{{ rke2_server_token }}"
    rke2_version: >-
      {{
        kubernetes_configure_version
        | default(kubernetes_rke2_version, true)
        | default(kubernetes_versions.rke2, true)
      }}
    rke2_download_kubeconf: "{{ (inventory_hostname == kubernetes_rke2_first_server_host) | bool }}"
    rke2_download_kubeconf_file_name: "{{ kubernetes_cluster_name }}.yaml"
    rke2_download_kubeconf_path: "{{ kubernetes_generated_env_dir | default(kubernetes_generated_dir | default('/tmp')) }}"
    rke2_cluster_group_name: "{{ kubernetes_rke2_cluster_group_name_resolved }}"
    rke2_servers_group_name: "{{ kubernetes_rke2_servers_group_name_resolved }}"
    rke2_agents_group_name: "{{ kubernetes_rke2_agents_group_name_resolved }}"
    rke2_api_ip: "{{ kubernetes_rke2_api_ip_resolved }}"
    rke2_api_private_port: "{{ kubernetes_rke2_api_private_port | default(9345) }}"
    rke2_cni: "{{ kubernetes_rke2_cni | default(['cilium']) }}"
    rke2_cluster_cidr:
      - "{{ kubernetes_configure_cluster_cidr }}"
    rke2_service_cidr:
      - "{{ kubernetes_configure_service_cidr }}"
    rke2_additional_sans:
      - "{{ kubernetes_rke2_api_ip_resolved }}"
    rke2_disable:
      - rke2-ingress-nginx
    rke2_ingress_controller: "none"
    rke2_write_kubeconfig_mode: "{{ kubernetes_rke2_write_kubeconfig_mode | default('0644') }}"
    rke2_server_options:
      - "cluster-dns: {{ kubernetes_configure_cluster_dns }}"
    rke2_agent_options:
      - "cluster-dns: {{ kubernetes_configure_cluster_dns }}"
    rke2_channel: "stable"
  no_log: true
  tags:
    - kubernetes
    - install
    - rke2

- name: Set optional RKE2 kubelet args
  ansible.builtin.set_fact:
    rke2_kubelet_arg: "{{ kubernetes_rke2_kubelet_arg }}"
  when:
    - kubernetes_rke2_kubelet_arg is defined
    - kubernetes_rke2_kubelet_arg | length > 0
  tags:
    - kubernetes
    - install
    - rke2

- name: Set optional RKE2 kube-proxy args
  ansible.builtin.set_fact:
    rke2_kube_proxy_arg: "{{ kubernetes_rke2_kube_proxy_arg }}"
  when:
    - kubernetes_rke2_kube_proxy_arg is defined
    - kubernetes_rke2_kube_proxy_arg | length > 0
  tags:
    - kubernetes
    - install
    - rke2

- name: Remove any existing kubeconfig files with permission issues
  ansible.builtin.file:
    path: "{{ rke2_download_kubeconf_path }}/{{ item }}"
    state: absent
  delegate_to: localhost
  run_once: true
  loop:
    - "kubeconfig"
    - "{{ kubernetes_cluster_name }}.yaml"
    - "k8s-{{ kubernetes_environment }}.yaml"
  ignore_errors: true
  tags:
    - kubernetes
    - install
    - rke2

- name: Ensure kubeconfig parent directories exist with correct ownership
  ansible.builtin.file:
    path: "{{ rke2_download_kubeconf_path | dirname }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"
    recurse: true
  delegate_to: localhost
  run_once: true
  tags:
    - kubernetes
    - install
    - rke2

- name: Ensure kubeconfig download directory exists with correct ownership
  ansible.builtin.file:
    path: "{{ rke2_download_kubeconf_path }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"
  delegate_to: localhost
  run_once: true
  tags:
    - kubernetes
    - install
    - rke2

- name: Show resolved RKE2 installation plan
  ansible.builtin.debug:
    msg: |
      ========================================================
      RKE2 Installation Plan
      ========================================================
      Host: {{ inventory_hostname }}
      Node Type: {{ rke2_type }}
      Cluster Group: {{ rke2_cluster_group_name }}
      Servers Group: {{ rke2_servers_group_name }}
      Agents Group: {{ rke2_agents_group_name }}
      First Server: {{ kubernetes_rke2_first_server_host }}
      API Endpoint: {{ rke2_api_ip }}:{{ rke2_api_private_port }}
      Version: {{ rke2_version }}
      Channel: {{ rke2_channel }}
      CNI: {{ rke2_cni | join(', ') }}
      Cluster CIDR: {{ rke2_cluster_cidr | join(', ') }}
      Service CIDR: {{ rke2_service_cidr | join(', ') }}
      Cluster DNS: {{ kubernetes_cluster_dns }}
      Kubeconfig Download: {{ rke2_download_kubeconf }}
      ========================================================
  tags:
    - kubernetes
    - install
    - rke2

- name: Install and configure RKE2 via lablabs.rke2
  ansible.builtin.include_role:
    name: lablabs.rke2
  tags:
    - kubernetes
    - install
    - rke2