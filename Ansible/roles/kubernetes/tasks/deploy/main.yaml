---
- name: Ensure generated directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ kubernetes_generated_dir }}"
    - "{{ kubernetes_generated_env_dir }}"
    - "{{ kubernetes_role_generated_snippets_dir }}"
    - "{{ kubernetes_role_generated_logs_dir }}"
  delegate_to: localhost
  run_once: true

- name: Render control plane cloud-init snippets
  ansible.builtin.template:
    src: "{{ kubernetes_templates_dir }}/cloud-init-master.yaml.j2"
    dest: "{{ kubernetes_role_generated_snippets_dir }}/{{ item.name }}-cloud-init.yaml"
    mode: "0644"
  loop: "{{ kubernetes_nodes.control_plane }}"
  loop_control:
    index_var: node_index
  vars:
    kubernetes_default_user: "{{ kubernetes_ansible.default_user }}"
  delegate_to: localhost
  run_once: true

- name: Render worker cloud-init snippets
  ansible.builtin.template:
    src: "{{ kubernetes_templates_dir }}/cloud-init-worker.yaml.j2"
    dest: "{{ kubernetes_role_generated_snippets_dir }}/{{ item.name }}-cloud-init.yaml"
    mode: "0644"
  loop: "{{ kubernetes_nodes.workers }}"
  loop_control:
    index_var: node_index
  vars:
    kubernetes_default_user: "{{ kubernetes_ansible.default_user }}"
  delegate_to: localhost
  run_once: true

- name: Render production Terraform for Kubernetes cluster
  ansible.builtin.template:
    src: "{{ kubernetes_templates_dir }}/k8s-prod-cluster.tf.j2"
    dest: "{{ kubernetes_role_generated_tf_file }}"
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Check for Proxmox API token file
  ansible.builtin.stat:
    path: "{{ kubernetes_deploy_proxmox_api_token_file }}"
  register: kubernetes_proxmox_api_token_file_stat
  delegate_to: localhost
  run_once: true

- name: Assert Proxmox API token file exists
  ansible.builtin.assert:
    that:
      - kubernetes_proxmox_api_token_file_stat.stat.exists | default(false)
    fail_msg: >-
      Missing Proxmox API token file at {{ kubernetes_deploy_proxmox_api_token_file }}.
      Generate or refresh the Terraform automation token before deploying Kubernetes.
  delegate_to: localhost
  run_once: true

- name: Read Proxmox API token file
  ansible.builtin.slurp:
    src: "{{ kubernetes_deploy_proxmox_api_token_file }}"
  register: kubernetes_proxmox_api_token_file_content
  delegate_to: localhost
  run_once: true
  no_log: true

- name: Decode Proxmox API token file text
  ansible.builtin.set_fact:
    kubernetes_proxmox_api_token_file_text: "{{ kubernetes_proxmox_api_token_file_content.content | b64decode }}"
  delegate_to: localhost
  run_once: true
  no_log: true

- name: Extract Proxmox API token ID
  ansible.builtin.shell: |
    set -euo pipefail
    awk -F= '/^FULL_TOKENID=/{print $2; exit}' "{{ kubernetes_deploy_proxmox_api_token_file }}"
  args:
    executable: /bin/bash
  register: kubernetes_terraform_proxmox_api_token_id_result
  delegate_to: localhost
  run_once: true
  changed_when: false
  no_log: true

- name: Extract Proxmox API token secret
  ansible.builtin.shell: |
    set -euo pipefail
    awk -F= '/^TOKEN_SECRET=/{print $2; exit}' "{{ kubernetes_deploy_proxmox_api_token_file }}"
  args:
    executable: /bin/bash
  register: kubernetes_terraform_proxmox_api_token_secret_result
  delegate_to: localhost
  run_once: true
  changed_when: false
  no_log: true

- name: Build Terraform runtime credentials
  ansible.builtin.set_fact:
    kubernetes_terraform_proxmox_api_token_id: "{{ kubernetes_terraform_proxmox_api_token_id_result.stdout | trim }}"
    kubernetes_terraform_proxmox_api_token_secret: "{{ kubernetes_terraform_proxmox_api_token_secret_result.stdout | trim }}"
  delegate_to: localhost
  run_once: true
  no_log: true

- name: Assert Terraform runtime credentials are complete
  ansible.builtin.assert:
    that:
      - kubernetes_terraform_proxmox_api_token_id | length > 0
      - kubernetes_terraform_proxmox_api_token_secret | length > 0
      - kubernetes_deploy_proxmox_api_url | length > 0
      - kubernetes_deploy_ssh_keys | length > 0
    fail_msg: "Terraform runtime credentials or SSH keys are incomplete for Kubernetes deployment."
  delegate_to: localhost
  run_once: true
  no_log: true

- name: Clear stale Proxmox VM locks before Terraform apply
  ansible.builtin.command:
    argv:
      - ssh
      - -o
      - ConnectTimeout=5
      - -o
      - BatchMode=yes
      - -o
      - StrictHostKeyChecking=no
      - -o
      - UserKnownHostsFile=/dev/null
      - root@{{ kubernetes_proxmox.node_ssh_hosts[item.target_node] }}
      - /bin/bash
      - -c
      - |
        set -eu
        set -o pipefail
        vmid="{{ item.vmid }}"
        if [ -f "/etc/pve/qemu-server/${vmid}.conf" ]; then
          timeout 5 /usr/sbin/qm unlock "${vmid}" 2>/dev/null || true
        fi
        rm -f "/var/lock/qemu-server/lock-${vmid}.conf"
  loop: "{{ kubernetes_nodes.control_plane + kubernetes_nodes.workers }}"
  loop_control:
    label: "{{ item.name }}@{{ item.target_node }}"
  throttle: 2
  delegate_to: localhost
  run_once: true
  changed_when: false
  failed_when: false
  register: stale_lock_cleanup_result
  when: not kubernetes_operation.plan_only | bool

- name: Clear orphaned Proxmox cloud-init volumes before Terraform apply
  ansible.builtin.command:
    argv:
      - ssh
      - -o
      - ConnectTimeout=5
      - -o
      - BatchMode=yes
      - -o
      - StrictHostKeyChecking=no
      - -o
      - UserKnownHostsFile=/dev/null
      - root@{{ kubernetes_proxmox.node_ssh_hosts[item.target_node] }}
      - /bin/bash
      - -c
      - |
        set -eu
        set -o pipefail
        vmid="{{ item.vmid }}"
        storage="{{ item.storage | default(kubernetes_proxmox.storage_by_node[item.target_node] | default(kubernetes_proxmox.storage)) }}"
        volume="vm-${vmid}-cloudinit"

        # Remove stale cloud-init volume references from the configured storage ID.
        timeout 10 /usr/sbin/pvesm free "${storage}:${volume}" >/dev/null 2>&1 || true

        # Fallback for stale LVs that are no longer visible through pvesm metadata.
        for vg in $(/usr/sbin/vgs --noheadings -o vg_name 2>/dev/null | awk '{print $1}'); do
          if timeout 5 /usr/sbin/lvs --noheadings -o lv_name "${vg}" 2>/dev/null | awk '{print $1}' | grep -Fxq "${volume}"; then
            timeout 10 /usr/sbin/lvremove -fy "${vg}/${volume}" >/dev/null 2>&1 || true
          fi
        done
  loop: "{{ kubernetes_nodes.control_plane + kubernetes_nodes.workers }}"
  loop_control:
    label: "{{ item.name }}@{{ item.target_node }}"
  throttle: 2
  delegate_to: localhost
  run_once: true
  changed_when: false
  failed_when: false
  register: orphan_cloudinit_cleanup_result
  when: not kubernetes_operation.plan_only | bool

- name: Clear orphaned Proxmox cloud-init volumes via API before Terraform apply
  ansible.builtin.uri:
    url: >-
      {{ kubernetes_proxmox.api_url | regex_replace('/+$', '') }}/nodes/{{ item.target_node }}/storage/{{ item.storage | default(kubernetes_proxmox.storage_by_node[item.target_node] | default(kubernetes_proxmox.storage)) }}/content/vm-{{ item.vmid }}-cloudinit
    method: DELETE
    headers:
      Authorization: >-
        PVEAPIToken={{ kubernetes_terraform_proxmox_api_token_id }}={{ kubernetes_terraform_proxmox_api_token_secret }}
    validate_certs: "{{ not (kubernetes_deploy_proxmox_tls_insecure | bool) }}"
    status_code:
      - 200
      - 404
      - 500
  loop: "{{ kubernetes_nodes.control_plane + kubernetes_nodes.workers }}"
  loop_control:
    label: "{{ item.name }}@{{ item.target_node }}"
  delegate_to: localhost
  run_once: true
  changed_when: false
  failed_when: false
  no_log: true
  register: orphan_cloudinit_cleanup_api_result
  when: not kubernetes_operation.plan_only | bool

- name: Initialize Terraform working directory
  ansible.builtin.command:
    argv:
      - terraform
      - -chdir={{ kubernetes_terraform_dir }}
      - init
  delegate_to: localhost
  run_once: true
  changed_when: false
  when: not kubernetes_operation.plan_only | bool
  environment:
    TF_VAR_proxmox_api_url: "{{ kubernetes_deploy_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ kubernetes_terraform_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ kubernetes_terraform_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ kubernetes_deploy_proxmox_tls_insecure | bool | ternary('true', 'false') }}"
    TF_VAR_kubernetes_ssh_keys: "{{ kubernetes_deploy_ssh_keys | to_json }}"
  no_log: true

- name: Apply Terraform cluster plan
  ansible.builtin.command:
    argv:
      - terraform
      - -chdir={{ kubernetes_terraform_dir }}
      - apply
      - -auto-approve
      - -no-color
      - -target=module.kubernetes_prod_control_plane
      - -target=module.kubernetes_prod_workers
  delegate_to: localhost
  run_once: true
  async: 14400
  poll: 15
  when:
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool
  environment:
    TF_VAR_proxmox_api_url: "{{ kubernetes_deploy_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ kubernetes_terraform_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ kubernetes_terraform_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ kubernetes_deploy_proxmox_tls_insecure | bool | ternary('true', 'false') }}"
    TF_VAR_kubernetes_ssh_keys: "{{ kubernetes_deploy_ssh_keys | to_json }}"

- name: Destroy Terraform cluster resources
  ansible.builtin.command:
    argv:
      - terraform
      - -chdir={{ kubernetes_terraform_dir }}
      - destroy
      - -auto-approve
      - -no-color
      - -target=module.kubernetes_prod_control_plane
      - -target=module.kubernetes_prod_workers
  delegate_to: localhost
  run_once: true
  async: 14400
  poll: 15
  when:
    - not kubernetes_operation.plan_only | bool
    - kubernetes_operation.destroy | bool
  environment:
    TF_VAR_proxmox_api_url: "{{ kubernetes_deploy_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ kubernetes_terraform_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ kubernetes_terraform_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ kubernetes_deploy_proxmox_tls_insecure | bool | ternary('true', 'false') }}"
    TF_VAR_kubernetes_ssh_keys: "{{ kubernetes_deploy_ssh_keys | to_json }}"

- name: Read dedicated GPU worker VM config from Proxmox
  ansible.builtin.command:
    argv:
      - qm
      - config
      - "{{ kubernetes_proxmox_gpu.vmid | string }}"
  become: true
  delegate_to: "{{ kubernetes_proxmox.node_ssh_hosts[kubernetes_proxmox_gpu.host] | default(kubernetes_proxmox_gpu.host) }}"
  run_once: true
  changed_when: false
  register: kubernetes_gpu_vm_config
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool

- name: Determine whether dedicated GPU worker passthrough mappings need update
  ansible.builtin.set_fact:
    kubernetes_gpu_passthrough_needs_update: >-
      {{
        ('hostpci0: mapping=' ~ kubernetes_proxmox_gpu.devices[0] ~ ',pcie=1') not in (kubernetes_gpu_vm_config.stdout | default(''))
        or ('hostpci1: mapping=' ~ kubernetes_proxmox_gpu.devices[1] ~ ',pcie=1') not in (kubernetes_gpu_vm_config.stdout | default(''))
        or 'machine: q35' not in (kubernetes_gpu_vm_config.stdout | default(''))
      }}
  delegate_to: localhost
  run_once: true
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool

- name: Configure GPU passthrough on dedicated worker VM
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ kubernetes_proxmox_gpu.vmid | string }}"
      - --machine
      - q35
      - --hostpci0
      - "mapping={{ kubernetes_proxmox_gpu.devices[0] }},pcie=1"
      - --hostpci1
      - "mapping={{ kubernetes_proxmox_gpu.devices[1] }},pcie=1"
  become: true
  delegate_to: "{{ kubernetes_proxmox.node_ssh_hosts[kubernetes_proxmox_gpu.host] | default(kubernetes_proxmox_gpu.host) }}"
  run_once: true
  changed_when: true
  register: kubernetes_gpu_passthrough_config
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool
    - kubernetes_gpu_passthrough_needs_update | default(false)

- name: Read dedicated GPU worker VM power state from Proxmox
  ansible.builtin.command:
    argv:
      - qm
      - status
      - "{{ kubernetes_proxmox_gpu.vmid | string }}"
  become: true
  delegate_to: "{{ kubernetes_proxmox.node_ssh_hosts[kubernetes_proxmox_gpu.host] | default(kubernetes_proxmox_gpu.host) }}"
  run_once: true
  changed_when: false
  register: kubernetes_gpu_vm_status
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool
    - kubernetes_gpu_passthrough_needs_update | default(false)

- name: Stop dedicated GPU worker VM after passthrough update
  ansible.builtin.command:
    argv:
      - qm
      - stop
      - "{{ kubernetes_proxmox_gpu.vmid | string }}"
  become: true
  delegate_to: "{{ kubernetes_proxmox.node_ssh_hosts[kubernetes_proxmox_gpu.host] | default(kubernetes_proxmox_gpu.host) }}"
  run_once: true
  changed_when: true
  failed_when: false
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool
    - kubernetes_gpu_passthrough_needs_update | default(false)
    - kubernetes_gpu_vm_status.stdout is defined
    - "'status: running' in kubernetes_gpu_vm_status.stdout"

- name: Wait for dedicated GPU worker VM to stop after passthrough update
  ansible.builtin.command:
    argv:
      - qm
      - status
      - "{{ kubernetes_proxmox_gpu.vmid | string }}"
  become: true
  delegate_to: "{{ kubernetes_proxmox.node_ssh_hosts[kubernetes_proxmox_gpu.host] | default(kubernetes_proxmox_gpu.host) }}"
  run_once: true
  changed_when: false
  register: kubernetes_gpu_vm_stopped
  retries: 24
  delay: 5
  until: "'status: stopped' in kubernetes_gpu_vm_stopped.stdout"
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool
    - kubernetes_gpu_passthrough_needs_update | default(false)

- name: Start dedicated GPU worker VM after passthrough update
  ansible.builtin.command:
    argv:
      - qm
      - start
      - "{{ kubernetes_proxmox_gpu.vmid | string }}"
  become: true
  delegate_to: "{{ kubernetes_proxmox.node_ssh_hosts[kubernetes_proxmox_gpu.host] | default(kubernetes_proxmox_gpu.host) }}"
  run_once: true
  changed_when: true
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool
    - kubernetes_gpu_passthrough_needs_update | default(false)

- name: Wait for dedicated GPU worker VM to start after passthrough update
  ansible.builtin.command:
    argv:
      - qm
      - status
      - "{{ kubernetes_proxmox_gpu.vmid | string }}"
  become: true
  delegate_to: "{{ kubernetes_proxmox.node_ssh_hosts[kubernetes_proxmox_gpu.host] | default(kubernetes_proxmox_gpu.host) }}"
  run_once: true
  changed_when: false
  register: kubernetes_gpu_vm_started
  retries: 24
  delay: 5
  until: "'status: running' in kubernetes_gpu_vm_started.stdout"
  when:
    - kubernetes_proxmox_gpu.enabled | bool
    - not kubernetes_operation.plan_only | bool
    - not kubernetes_operation.destroy | bool
    - kubernetes_gpu_passthrough_needs_update | default(false)
