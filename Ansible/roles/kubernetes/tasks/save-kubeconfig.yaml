---
# =============================================================================
# Save kubeconfig locally
# =============================================================================
# Purpose:
#   - Read the kubeconfig generated by RKE2 on the first control plane node
#   - Rewrite the default localhost API endpoint to the node's reachable address
#   - Save the kubeconfig on the Ansible controller under:
#       .outputs/kubernetes/<environment>/
# =============================================================================

- name: Assert kubeconfig save inputs are present
  ansible.builtin.assert:
    that:
      - kubernetes_environment is defined
      - kubernetes_environment | length > 0
      - kubernetes_cluster_name is defined
      - kubernetes_cluster_name | length > 0
    fail_msg: |
      Missing required variables for kubeconfig save.
      Required:
        - kubernetes_environment
        - kubernetes_cluster_name
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Define kubeconfig save paths and API endpoint
  ansible.builtin.set_fact:
    kubernetes_kubeconfig_source_path: "{{ kubernetes_kubeconfig_source_path | default('/etc/rancher/rke2/rke2.yaml') }}"
    kubernetes_kubeconfig_output_root: >-
      {{
        kubernetes_generated_dir
        | default((playbook_dir | dirname | dirname) ~ '/.outputs/kubernetes')
      }}
    kubernetes_kubeconfig_output_dir: >-
      {{
        (
          kubernetes_generated_dir
          | default((playbook_dir | dirname | dirname) ~ '/.outputs/kubernetes')
        ) ~ '/' ~ kubernetes_environment
      }}
    kubernetes_kubeconfig_output_file: >-
      {{
        (
          (
            kubernetes_generated_dir
            | default((playbook_dir | dirname | dirname) ~ '/.outputs/kubernetes')
          ) ~ '/' ~ kubernetes_environment
        ) ~ '/kubeconfig'
      }}
    kubernetes_kubeconfig_server_host: >-
      {{
        kubernetes_kubeconfig_server_host
        | default(
            kubernetes_rke2_api_ip
            | default(
                hostvars[inventory_hostname].ansible_host
                | default(node_fqdn | default(inventory_hostname))
              )
          )
      }}
    kubernetes_kubeconfig_server_port: "{{ kubernetes_kubeconfig_server_port | default('6443') }}"
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Ensure local kubeconfig output directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_kubeconfig_output_dir }}"
    state: directory
    mode: "0750"
  delegate_to: localhost
  become: false
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Read kubeconfig from node
  ansible.builtin.slurp:
    src: "{{ kubernetes_kubeconfig_source_path }}"
  register: kubernetes_remote_kubeconfig
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Decode kubeconfig content
  ansible.builtin.set_fact:
    kubernetes_kubeconfig_original_content: "{{ kubernetes_remote_kubeconfig.content | b64decode }}"
  no_log: true
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Build rewritten kubeconfig content
  ansible.builtin.set_fact:
    kubernetes_kubeconfig_content: >-
      {{
        kubernetes_kubeconfig_original_content
        | replace(
            'server: https://127.0.0.1:6443',
            'server: https://' ~ kubernetes_kubeconfig_server_host ~ ':' ~ kubernetes_kubeconfig_server_port
          )
        | replace(
            'server: https://localhost:6443',
            'server: https://' ~ kubernetes_kubeconfig_server_host ~ ':' ~ kubernetes_kubeconfig_server_port
          )
      }}
  no_log: true
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Assert kubeconfig no longer points to loopback
  ansible.builtin.assert:
    that:
      - "'server: https://127.0.0.1:6443' not in kubernetes_kubeconfig_content"
      - "'server: https://localhost:6443' not in kubernetes_kubeconfig_content"
    fail_msg: |
      Kubeconfig rewrite failed.
      It still contains a loopback API endpoint instead of:
      https://{{ kubernetes_kubeconfig_server_host }}:{{ kubernetes_kubeconfig_server_port }}
  no_log: true
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig
    - validate

- name: Save kubeconfig locally
  ansible.builtin.copy:
    content: "{{ kubernetes_kubeconfig_content }}"
    dest: "{{ kubernetes_kubeconfig_output_file }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Save environment-named kubeconfig copy locally
  ansible.builtin.copy:
    content: "{{ kubernetes_kubeconfig_content }}"
    dest: "{{ kubernetes_kubeconfig_output_dir }}/{{ kubernetes_cluster_name }}.yaml"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig

- name: Display kubeconfig save result
  ansible.builtin.debug:
    msg: |
      ========================================================
      Kubeconfig saved successfully
      ========================================================
      Cluster: {{ kubernetes_cluster_name }}
      Environment: {{ kubernetes_environment }}
      Source Node: {{ inventory_hostname }}
      API Endpoint: https://{{ kubernetes_kubeconfig_server_host }}:{{ kubernetes_kubeconfig_server_port }}

      Saved Files:
        - {{ kubernetes_kubeconfig_output_file }}
        - {{ kubernetes_kubeconfig_output_dir }}/{{ kubernetes_cluster_name }}.yaml
      ========================================================
  tags:
    - kubernetes
    - kubeconfig
    - save-kubeconfig