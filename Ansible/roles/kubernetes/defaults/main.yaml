---
kubernetes_role_phases:
  - configure

kubernetes_role_generated_tf_file: "{{ kubernetes_terraform_dir }}/k8s-{{ kubernetes_environment }}-cluster.generated.tf"
kubernetes_role_terraform_template: "{{ 'k8s-prod-cluster.tf.j2' if kubernetes_environment == 'prod' else 'k8s-dev-cluster.tf.j2' }}"
kubernetes_role_generated_snippets_dir: "{{ kubernetes_generated_env_dir }}/cloud-init"
kubernetes_role_generated_logs_dir: "{{ kubernetes_generated_env_dir }}/logs"
kubernetes_role_local_kubeconfig_path: "{{ kubernetes_kubeconfig_local_path }}"
kubernetes_role_rke2_config_dir: "/etc/rancher/rke2"
kubernetes_role_rke2_server_service: "rke2-server"
kubernetes_role_rke2_agent_service: "rke2-agent"
kubernetes_role_required_packages:
  - curl
  - wget
  - jq
  - tar
  - socat
  - open-iscsi
  - nfs-common
  - iptables
  - ca-certificates
  - chrony
  - gnupg
  - lvm2
  - parted
  - cloud-guest-utils
  - ethtool
  - pciutils
  - python3-pip
kubernetes_role_kernel_modules:
  - overlay
  - br_netfilter
  - iptable_nat
  - iptable_filter
  - nf_conntrack
kubernetes_role_sysctl:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1
  net.ipv6.conf.all.forwarding: 1
  vm.overcommit_memory: 1
  kernel.panic: 10
  kernel.panic_on_oops: 1
  vm.max_map_count: 262144
  fs.inotify.max_user_instances: 8192
  fs.inotify.max_user_watches: 1048576
kubernetes_role_expand_rootfs: true
