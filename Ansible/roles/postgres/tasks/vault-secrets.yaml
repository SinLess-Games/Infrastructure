---
# =============================================================================
# Vault Secrets Retrieval
# =============================================================================

- name: Check for Vault token file
  ansible.builtin.stat:
    path: "{{ postgres_vault_token_file }}"
  delegate_to: localhost
  run_once: true
  register: postgres_vault_token_file_stat

- name: Normalize Postgres Vault KV path
  ansible.builtin.set_fact:
    postgres_vault_kv_mount: >-
      {{ postgres_vault_kv_mount | default(lookup('env', 'VAULT_KV_MOUNT') | default('secrets', true), true) }}
    postgres_vault_kv_path_effective: >-
      {{
        postgres_vault_kv_path
        | regex_replace('^/|/$', '')
        | regex_replace('^' ~ (postgres_vault_kv_mount | default('secrets')) ~ '/', '')
      }}
  run_once: true

- name: Load Vault root token from file
  ansible.builtin.slurp:
    src: "{{ postgres_vault_token_file }}"
  delegate_to: localhost
  run_once: true
  register: postgres_vault_token_file_content
  when:
    - postgres_vault_token | length == 0
    - postgres_vault_token_file_stat.stat.exists
  no_log: true

- name: Set effective Vault token
  ansible.builtin.set_fact:
    postgres_vault_token_effective: >-
      {{ postgres_vault_token if postgres_vault_token | length > 0
         else ((postgres_vault_token_file_content.content | b64decode | from_json).root_token | default('')) }}
  run_once: true
  no_log: true

- name: Assert Vault token is available
  ansible.builtin.assert:
    that:
      - postgres_vault_token_effective | length > 0
    fail_msg: "Vault token is missing. Set VAULT_TOKEN or ensure {{ postgres_vault_token_file }} is present."
  run_once: true

- name: Read Postgres secrets from Vault (KV v2)
  ansible.builtin.command: >-
    vault kv get -format=json
    {{ postgres_vault_kv_mount }}/{{ postgres_vault_kv_path_effective }}
  delegate_to: localhost
  run_once: true
  register: postgres_vault_raw
  changed_when: false
  environment:
    VAULT_ADDR: "{{ postgres_vault_addr }}"
    VAULT_TOKEN: "{{ postgres_vault_token_effective }}"
    VAULT_SKIP_VERIFY: "{{ postgres_vault_skip_verify }}"
  no_log: true

- name: Parse Postgres secrets
  ansible.builtin.set_fact:
    postgres_vault_data: "{{ (postgres_vault_raw.stdout | from_json).data.data }}"
  run_once: true
  no_log: true

- name: Set Postgres app secret lists
  ansible.builtin.set_fact:
    postgres_app_users: "{{ postgres_vault_data.users | default([]) }}"
    postgres_app_databases: "{{ postgres_vault_data.databases | default([]) }}"
    postgres_database_names_effective: >-
      {{
        (postgres_vault_data.databases | default([]) | map(attribute='name') | list)
        if (postgres_vault_data.databases | default([]) | length > 0)
        else postgres_database_names
      }}
  run_once: true
  no_log: true

- name: Assert required Vault secrets are present
  ansible.builtin.assert:
    that:
      - postgres_vault_required_keys | difference(postgres_vault_data.keys()) | length == 0
    fail_msg: "Missing one or more required Vault keys in {{ postgres_vault_kv_path }}"
  run_once: true

- name: Set Postgres secret facts
  ansible.builtin.set_fact:
    postgres_superuser_password: "{{ postgres_vault_data.superuser_password }}"
    postgres_replication_password: "{{ postgres_vault_data.replication_password }}"
    postgres_pgbouncer_password: "{{ postgres_vault_data.pgbouncer_password }}"
    postgres_pgbackrest_repo_password: "{{ postgres_vault_data.pgbackrest_repo_password }}"
    postgres_pganalyze_api_key: "{{ postgres_vault_data.pganalyze_api_key }}"
    postgres_pgadmin_password: "{{ postgres_vault_data.pgadmin_password }}"
    postgres_keepalived_password: "{{ postgres_vault_data.keepalived_password }}"
  run_once: true
  no_log: true

- name: Build pgBouncer userlist
  ansible.builtin.set_fact:
    postgres_pgbouncer_userlist: >-
      {{
        [{'name': patroni.superuser.username, 'password': postgres_superuser_password}]
        + (postgres_app_users | default([]))
      }}
  run_once: true
  no_log: true
