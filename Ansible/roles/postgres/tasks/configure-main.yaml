---
# =============================================================================
# Postgres Setup + Configure Role - Main Tasks
# =============================================================================
# This role configures a PostgreSQL HA cluster with:
# - Patroni for automatic failover
# - etcd for distributed consensus
# - HAProxy for load balancing
# - Keepalived for VIP management
# - pgBouncer for connection pooling
# - pgBackRest for backups
# - pgAnalyze for monitoring
# =============================================================================

- name: Load Vault secrets
  ansible.builtin.include_tasks: vault-secrets.yaml
  tags: ["always", "vault"]

- name: Install packages
  ansible.builtin.include_tasks: packages.yaml
  tags: ["packages", "install"]

- name: Configure pgAnalyze monitoring
  ansible.builtin.include_tasks: pganalyze.yaml
  tags: ["monitoring", "pganalyze"]
  when: postgres_pganalyze_enabled

- name: Configure etcd cluster
  ansible.builtin.include_tasks: etcd.yaml
  tags: ["etcd", "ha"]

- name: Configure Patroni
  ansible.builtin.include_tasks: patroni.yaml
  tags: ["patroni", "ha"]

- name: Initialize databases
  ansible.builtin.include_tasks: database-init.yaml
  tags: ["database", "init"]

- name: Configure replication
  ansible.builtin.include_tasks: replication.yaml
  tags: ["replication", "ha"]

- name: Configure HAProxy
  ansible.builtin.include_tasks: haproxy.yaml
  tags: ["haproxy", "loadbalancer"]

- name: Configure Keepalived
  ansible.builtin.include_tasks: keepalived.yaml
  tags: ["keepalived", "vip"]

- name: Configure pgBouncer
  ansible.builtin.include_tasks: pgbouncer.yaml
  tags: ["pgbouncer", "pooling"]

- name: Configure pgBackRest
  ansible.builtin.include_tasks: pgbackrest.yaml
  tags: ["pgbackrest", "backup"]
  when: postgres_backups.enabled

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yaml
  tags: ["firewall", "security"]
  when: postgres_firewall_enabled

- name: Verify cluster health
  ansible.builtin.include_tasks: verify.yaml
  tags: ["verify", "health-check", "validation"]
