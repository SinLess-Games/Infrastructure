---
- name: Ensure PostgreSQL Vault secret token file is present when token env var is empty
  ansible.builtin.stat:
    path: "{{ postgres_vault_token_file }}"
  register: postgres_vault_token_file_stat
  when: postgres_vault_token | length == 0

- name: Read PostgreSQL Vault token file
  ansible.builtin.slurp:
    src: "{{ postgres_vault_token_file }}"
  register: postgres_vault_token_file_content
  when:
    - postgres_vault_token | length == 0
    - postgres_vault_token_file_stat.stat.exists | default(false)
  no_log: true

- name: Build PostgreSQL Vault runtime token
  ansible.builtin.set_fact:
    postgres_vault_runtime_token: >-
      {{
        postgres_vault_token
        if (postgres_vault_token | length > 0)
        else (
          (
            postgres_vault_token_file_content.content
            | b64decode
            | from_json
          ).root_token | default('')
        )
      }}
  no_log: true

- name: Assert PostgreSQL Vault runtime token is available
  ansible.builtin.assert:
    that:
      - postgres_vault_runtime_token | length > 0
    fail_msg: "A Vault token is required to load PostgreSQL secrets."

- name: Read PostgreSQL runtime secrets from Vault
  ansible.builtin.shell: |
    set -euo pipefail
    curl --silent --show-error {{ (postgres_vault_skip_verify | bool) | ternary('--insecure', '') }} \
      --header "X-Vault-Token: ${POSTGRES_VAULT_TOKEN}" \
      "{{ postgres_vault_addr }}/v1/secrets/data/{{ postgres_vault_kv_path }}"
  args:
    executable: /bin/bash
  register: postgres_vault_secret_response
  changed_when: false
  environment:
    POSTGRES_VAULT_TOKEN: "{{ postgres_vault_runtime_token }}"

- name: Cache PostgreSQL runtime secrets on localhost
  ansible.builtin.set_fact:
    postgres_runtime_secrets: "{{ (postgres_vault_secret_response.stdout | from_json).data.data | default({}) }}"
    postgres_runtime_secret_document: "{{ (postgres_vault_secret_response.stdout | from_json).data | default({}) }}"
  no_log: true

- name: Validate required PostgreSQL Vault keys exist
  ansible.builtin.assert:
    that: >-
      {{
        postgres_vault_required_keys
        | difference((postgres_runtime_secrets | default({})) | dict2items | map(attribute='key') | list)
        | length == 0
      }}
    fail_msg: "Vault document {{ postgres_vault_kv_path }} is missing one or more required PostgreSQL secrets."

- name: Map PostgreSQL Vault secrets into localhost runtime facts
  ansible.builtin.set_fact:
    "{{ item.value }}": "{{ postgres_runtime_secrets[item.key] }}"
  loop: "{{ postgres_vault_secret_field_map | dict2items }}"
  loop_control:
    label: "{{ item.value }}"
  no_log: true
