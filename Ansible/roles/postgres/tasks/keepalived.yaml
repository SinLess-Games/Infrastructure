---
# =============================================================================
# Keepalived - VIP Management
# =============================================================================

- name: Configure Keepalived
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/haproxy/keepalived.conf.j2"
    dest: "/etc/keepalived/keepalived.conf"
    owner: root
    group: root
    mode: "0644"
  vars:
    routing_profile: "postgres"
  notify: Restart keepalived

- name: Create Keepalived check script
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/haproxy/health-check.sh.j2"
    dest: "/usr/local/bin/check-haproxy.sh"
    owner: root
    group: root
    mode: "0755"
  vars:
    routing_profile: "postgres"

- name: Enable and start Keepalived
  ansible.builtin.service:
    name: keepalived
    state: started
    enabled: true

- name: Wait for VIP to be assigned on primary node
  ansible.builtin.command: "ip -o -4 addr show dev {{ postgres_vip_iface }}"
  register: postgres_vip_check
  retries: 12
  delay: 5
  until: postgres_vip_ip in (postgres_vip_check.stdout | default(''))
  changed_when: false
  run_once: true
  delegate_to: "{{ postgres_primary_host }}"
