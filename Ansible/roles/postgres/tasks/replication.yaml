---
# =============================================================================
# Replication User Setup
# =============================================================================

- name: Create replication user
  community.postgresql.postgresql_user:
    name: "{{ patroni.replication.username }}"
    password: "{{ postgres_replication_password }}"
    role_attr_flags: "REPLICATION,LOGIN"
    login_unix_socket: "/var/run/postgresql"
  become: true
  become_user: postgres
  run_once: true
  delegate_to: "{{ postgres_primary_host }}"

- name: Configure pg_hba for replication
  ansible.builtin.blockinfile:
    path: "/etc/postgresql/17/main/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - REPLICATION"
    block: |
      # Replication connections
      host    replication     {{ patroni.replication.username }}      {{ postgres_network_subnet }}      scram-sha-256
      host    replication     {{ patroni.replication.username }}      127.0.0.1/32                       scram-sha-256
  notify: Reload postgresql
