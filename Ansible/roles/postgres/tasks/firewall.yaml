---
# =============================================================================
# Firewall Configuration
# =============================================================================

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  when: postgres_firewall_enabled

- name: Configure UFW default policies
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  when: postgres_firewall_enabled

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  when: postgres_firewall_enabled

- name: Allow PostgreSQL from management network
  community.general.ufw:
    rule: allow
    port: "{{ postgres_listen_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ postgres_firewall_mgmt_cidrs }}"
  when: postgres_firewall_enabled

- name: Allow PostgreSQL from client networks
  community.general.ufw:
    rule: allow
    port: "{{ postgres_listen_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ postgres_firewall_client_cidrs }}"
  when: postgres_firewall_enabled

- name: Allow Patroni REST API from cluster nodes
  community.general.ufw:
    rule: allow
    port: "{{ patroni.restapi_port }}"
    proto: tcp
    src: "{{ item.ip }}"
  loop: "{{ postgres_nodes }}"
  when: postgres_firewall_enabled

- name: Allow etcd from cluster nodes
  community.general.ufw:
    rule: allow
    port: "{{ item.1 }}"
    proto: tcp
    src: "{{ item.0.ip }}"
  loop: "{{ postgres_nodes | product([postgres_etcd_client_port, postgres_etcd_peer_port]) | list }}"
  when: postgres_firewall_enabled

- name: Allow HAProxy stats
  community.general.ufw:
    rule: allow
    port: "{{ haproxy_stats_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ postgres_firewall_mgmt_cidrs }}"
  when: postgres_firewall_enabled

- name: Allow VRRP/ICMP in UFW before rules
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    marker: "# {mark} ANSIBLE MANAGED BLOCK - VRRP/ICMP"
    insertbefore: "^# End required lines"
    block: |
      # Allow VRRP (protocol 112)
      -A ufw-before-input -p 112 -j ACCEPT
      {% if postgres_firewall_allow_icmp %}
      # Allow ICMP
      -A ufw-before-input -p icmp -j ACCEPT
      {% endif %}
  register: postgres_ufw_before_rules
  when: postgres_firewall_enabled

- name: Reload UFW after before.rules update
  ansible.builtin.command: "ufw reload"
  changed_when: false
  when:
    - postgres_firewall_enabled
    - postgres_ufw_before_rules is changed

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: postgres_firewall_enabled
