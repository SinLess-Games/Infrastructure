---
# =============================================================================
# Postgres Deploy Role - Tasks
# =============================================================================
# Purpose:
#   - Render Terraform configuration for Postgres VMs
#   - Execute Terraform via Taskfile
#   - Use the shared proxmox-vm-cluster Terraform module
# =============================================================================

- name: Build Postgres IP address list
  ansible.builtin.set_fact:
    postgres_ip_addresses: "{{ postgres_nodes | map(attribute='ip') | list }}"

- name: Assert required Postgres deployment variables
  ansible.builtin.assert:
    that:
      - postgres_target_nodes | length >= 3
      - postgres_ip_addresses | length == postgres_node_count | int
      - postgres_node_count | int >= 3
    fail_msg: "Postgres deployment requires at least 3 target nodes and IPs matching node count"

- name: Read Proxmox API token file for Terraform
  ansible.builtin.slurp:
    src: "{{ postgres_repo_root }}/{{ postgres_proxmox_api_token_file }}"
  register: postgres_proxmox_token_file
  no_log: true

- name: Parse Proxmox API token values
  ansible.builtin.set_fact:
    postgres_proxmox_token_text: "{{ postgres_proxmox_token_file.content | b64decode | string }}"
  no_log: true

- name: Extract Proxmox API token ID and secret
  ansible.builtin.set_fact:
    postgres_proxmox_api_token_id: >-
      {{ (postgres_proxmox_token_text
        | regex_findall('(?m)^FULL_TOKENID=([^\n]+)'))
        | first | default('') }}
    postgres_proxmox_api_token_secret: >-
      {{ (postgres_proxmox_token_text
        | regex_findall('(?m)^TOKEN_SECRET=([^\n]+)'))
        | first | default('') }}
  no_log: true

- name: Assert Proxmox API token values were parsed
  ansible.builtin.assert:
    that:
      - postgres_proxmox_api_token_id is not none
      - postgres_proxmox_api_token_secret is not none
    fail_msg: "Failed to parse Proxmox API token ID/secret from token file"

- name: Ensure Terraform output directory exists
  ansible.builtin.file:
    path: "{{ postgres_terraform_dir }}"
    state: directory

- name: Render Postgres Terraform module configuration
  ansible.builtin.template:
    src: "{{ postgres_repo_root }}/Ansible/templates/postgres/postgres-cluster.tf.j2"
    dest: "{{ postgres_terraform_dir }}/postgres-cluster.tf"
    mode: "0644"

- name: Initialize Terraform (Taskfile)
  ansible.builtin.command:
    cmd: "task terraform:init:reconfigure"
    chdir: "{{ postgres_repo_root }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ postgres_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ postgres_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ postgres_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ postgres_proxmox_tls_insecure | ternary('true', 'false') }}"

- name: Check if Postgres VMs already exist
  ansible.builtin.command:
    cmd: "ssh-keyscan -H {{ item }} 2>/dev/null"
  loop: "{{ postgres_ip_addresses }}"
  register: postgres_vm_check
  failed_when: false
  changed_when: false

- name: Apply Terraform configuration (Taskfile)
  ansible.builtin.command:
    cmd: "task terraform:apply:auto"
    chdir: "{{ postgres_repo_root }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ postgres_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ postgres_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ postgres_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ postgres_proxmox_tls_insecure | ternary('true', 'false') }}"
  register: terraform_result
  ignore_errors: true

- name: Skip terraform if VMs already exist
  ansible.builtin.meta: noop
  when: terraform_result is failed and 'already in use' in (terraform_result.stderr | default(''))

- name: Wait for Postgres VMs to be accessible
  ansible.builtin.pause:
    seconds: 30

- name: Wait for cloud-init configuration to complete
  ansible.builtin.pause:
    seconds: 10
  tags:
    - postgres-cloud-init
