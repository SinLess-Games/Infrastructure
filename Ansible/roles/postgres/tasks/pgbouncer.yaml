---
# =============================================================================
# pgBouncer - Connection Pooling
# =============================================================================

- name: Create pgBouncer configuration directory
  ansible.builtin.file:
    path: "/etc/pgbouncer"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Configure pgBouncer
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/pgbouncer.ini.j2"
    dest: "/etc/pgbouncer/pgbouncer.ini"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart pgbouncer

- name: Configure pgBouncer authentication
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/pgbouncer-userlist.txt.j2"
    dest: "/etc/pgbouncer/userlist.txt"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart pgbouncer

- name: Enable and start pgBouncer
  ansible.builtin.service:
    name: pgbouncer
    state: started
    enabled: true
