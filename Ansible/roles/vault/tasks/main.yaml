---
- name: Run Vault deploy phase
  ansible.builtin.include_vars:
    file: "{{ role_path }}/defaults/deploy.yaml"
    name: __vault_deploy_defaults
  when: "'deploy' in vault_role_phases"
  tags:
    - vault
    - deploy

- name: Apply Vault deploy defaults
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ (__vault_deploy_defaults | default({})) | dict2items }}"
  when: "'deploy' in vault_role_phases"
  tags:
    - vault
    - deploy

- name: Include Vault deploy tasks
  ansible.builtin.include_tasks: deploy.yaml
  when: "'deploy' in vault_role_phases"
  tags:
    - vault
    - deploy

- name: Run Vault configure phase
  ansible.builtin.include_vars:
    file: "{{ role_path }}/defaults/configure.yaml"
    name: __vault_configure_defaults
  when: "'configure' in vault_role_phases"
  tags:
    - vault
    - configure

- name: Apply Vault configure defaults
  ansible.builtin.set_fact:
