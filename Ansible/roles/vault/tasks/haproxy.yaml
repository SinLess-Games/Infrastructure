---
# Setup HAProxy load balancing
# Location: Ansible/roles/vault-configure/tasks/haproxy.yaml

- name: "Setup HAProxy load balancing"
  block:
    - name: "Install HAProxy"
      package:
        name: "haproxy"
        state: present
      when: vault_haproxy_enabled | bool

    - name: "Ensure HAProxy directories exist"
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/var/lib/haproxy", owner: "haproxy", group: "haproxy", mode: "0755" }
        - { path: "/run/haproxy", owner: "haproxy", group: "haproxy", mode: "0755" }
      when: vault_haproxy_enabled | bool

    - name: "Deploy Terraform Vault authentication Lua script"
      template:
        src: "{{ playbook_dir }}/../templates/vault/terraform-vault-auth.lua.j2"
        dest: "/etc/haproxy/terraform-vault-auth.lua"
        owner: "root"
        group: "root"
        mode: "0644"
      when: vault_haproxy_enabled | bool

    - name: "Create or refresh combined PEM file for HAProxy SSL"
      shell: |
        cat {{ vault_tls_cert_file }} {{ vault_tls_key_file }} > /tmp/vault-combined.pem.new
        if ! cmp -s /tmp/vault-combined.pem.new /etc/haproxy/vault-combined.pem; then
          mv /tmp/vault-combined.pem.new /etc/haproxy/vault-combined.pem
          chmod 600 /etc/haproxy/vault-combined.pem
          chown haproxy:haproxy /etc/haproxy/vault-combined.pem
          echo "updated"
        else
          rm -f /tmp/vault-combined.pem.new
        fi
      register: haproxy_combined_pem_update
      changed_when: "'updated' in haproxy_combined_pem_update.stdout"
      when: vault_haproxy_enabled | bool
      notify: "restart haproxy"

    - name: "Template HAProxy configuration"
      template:
        src: "{{ playbook_dir }}/../templates/haproxy/haproxy.cfg.j2"
        dest: "/etc/haproxy/haproxy.cfg"
        owner: "root"
        group: "root"
        mode: "0644"
        backup: true
      vars:
        routing_profile: "vault"
      notify: "restart haproxy"
      when: vault_haproxy_enabled | bool

    - name: "Validate HAProxy configuration"
      command: "haproxy -c -f /etc/haproxy/haproxy.cfg"
      register: haproxy_config_check
      changed_when: false
      when: vault_haproxy_enabled | bool

    - name: "Debug: Show current listeners before HAProxy start"
      command: "ss -lntp 'sport = :443 or sport = :8200 or sport = :8201'"
      register: haproxy_debug_listeners
      changed_when: false
      failed_when: false
      when: vault_haproxy_enabled | bool

    - name: "Debug: Display current listeners"
      debug:
        msg: |
          Current listeners before HAProxy start:
          {{ haproxy_debug_listeners.stdout | default('') }}
      when: vault_haproxy_enabled | bool

    - name: "Enable and start HAProxy"
      block:
        - name: "Start HAProxy service"
          systemd:
            name: haproxy
            state: started
            enabled: true
      rescue:
        - name: "HAProxy service status"
          command: "systemctl status --no-pager haproxy"
          register: haproxy_status
          changed_when: false
          failed_when: false

        - name: "HAProxy journal output"
          command: "journalctl -xeu haproxy.service --no-pager -n 200"
          register: haproxy_journal
          changed_when: false
          failed_when: false

        - name: "Check listeners on Vault/HAProxy ports"
          command: "ss -lntp 'sport = :443 or sport = :8200 or sport = :8201'"
          register: haproxy_listeners
          changed_when: false
          failed_when: false

        - name: "Report HAProxy failure details"
          fail:
            msg: |-
              HAProxy failed to start.
              systemctl status:
              {{ haproxy_status.stdout | default('') }}
              {{ haproxy_status.stderr | default('') }}

              journalctl:
              {{ haproxy_journal.stdout | default('') }}
              {{ haproxy_journal.stderr | default('') }}

              listeners:
              {{ haproxy_listeners.stdout | default('') }}
              {{ haproxy_listeners.stderr | default('') }}
      when: vault_haproxy_enabled | bool

  tags:
    - "vault"
    - "vault-ha"
    - "vault-haproxy"
