---
# System-level configuration for Vault nodes
# This ensures the system is properly configured before installing Vault

- name: Configure DNS nameservers
  copy:
    content: |
      nameserver {{ vault_dns_primary | default('10.10.10.1') }}
      nameserver {{ vault_dns_secondary | default('1.1.1.1') }}
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
    - vault
    - system
    - dns

- name: Ensure DNS is working
  command: nslookup releases.hashicorp.com
  register: dns_test
  changed_when: false
  failed_when: dns_test.rc != 0
  tags:
    - vault
    - system
    - dns
