---
# =============================================================================
# Vault Secrets Role - Tasks
# =============================================================================
# Purpose:
#   - Load secrets from group_vars/vault/vault-secrets.yaml
#   - Write secrets to the KV v2 'secrets' mount in Vault
# =============================================================================

- name: "Load Vault secrets definitions"
  ansible.builtin.include_vars:
    file: "{{ vault_secrets_file }}"
  when:
    - vault_secrets_enabled | bool
    - vault_secrets_file | length > 0
  run_once: true

- name: "Set Vault secrets data from definitions"
  ansible.builtin.set_fact:
    vault_secrets_data: "{{ secrets | default({}) }}"
  when:
    - vault_secrets_enabled | bool
  run_once: true

- name: "Assert Vault secrets data is available"
  ansible.builtin.assert:
    that:
      - vault_secrets_data is mapping
      - vault_secrets_data | length > 0
    fail_msg: "No Vault secrets found. Check {{ vault_secrets_file }}."
  when:
    - vault_secrets_enabled | bool
  run_once: true

- name: "Check for Vault token file"
  ansible.builtin.stat:
    path: "{{ vault_secrets_token_file }}"
  delegate_to: localhost
  run_once: true
  register: vault_secrets_token_file_stat
  when:
    - vault_secrets_enabled | bool
    - vault_secrets_token | length == 0

- name: "Load Vault root token from file"
  ansible.builtin.slurp:
    src: "{{ vault_secrets_token_file }}"
  delegate_to: localhost
  run_once: true
  register: vault_secrets_token_file_content
  when:
    - vault_secrets_enabled | bool
    - vault_secrets_token | length == 0
    - vault_secrets_token_file_stat.stat.exists
  no_log: true

- name: "Set effective Vault token"
  ansible.builtin.set_fact:
    vault_secrets_token_effective: >-
      {{ vault_secrets_token if vault_secrets_token | length > 0
         else ((vault_secrets_token_file_content.content | b64decode | from_json).root_token | default('')) }}
  run_once: true
  no_log: true
  when:
    - vault_secrets_enabled | bool

- name: "Assert Vault token is available"
  ansible.builtin.assert:
    that:
      - vault_secrets_token_effective | length > 0
    fail_msg: "Vault token is missing. Set vault_secrets_token or ensure {{ vault_secrets_token_file }} is present."
  when:
    - vault_secrets_enabled | bool
  run_once: true

- name: "Probe Vault API health"
  ansible.builtin.uri:
    url: "{{ vault_secrets_addr }}/v1/sys/health"
    method: GET
    validate_certs: "{{ not (vault_secrets_skip_tls_verify | bool) }}"
    status_code: [200, 429, 472, 473, 501, 503]
  register: vault_secrets_health_probe
  delegate_to: localhost
  run_once: true
  failed_when: false
  when:
    - vault_secrets_enabled | bool

- name: "Write KV v2 secrets"
  ansible.builtin.uri:
    url: "{{ vault_secrets_addr }}/v1/{{ vault_secrets_mount }}/data/{{ item.key }}"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_secrets_token_effective }}"
    validate_certs: "{{ not (vault_secrets_skip_tls_verify | bool) }}"
    body_format: json
    body:
      data: "{{ item.value.data | default({}) }}"
    status_code: [200, 204]
  loop: "{{ vault_secrets_data | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
  run_once: true
  delegate_to: localhost
  when:
    - vault_secrets_enabled | bool

- name: "Report Vault secrets write summary"
  ansible.builtin.debug:
    msg: "Wrote {{ vault_secrets_data | length }} secrets to Vault mount '{{ vault_secrets_mount }}'."
  when:
    - vault_secrets_enabled | bool
  run_once: true
