---
- name: Ensure Vault bootstrap data exists locally for secrets updates
  ansible.builtin.stat:
    path: "{{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}"
  register: vault_bootstrap_file
  delegate_to: localhost
  become: false
  run_once: true
  tags:
    - vault
    - secrets

- name: Assert Vault bootstrap data is available for secrets updates
  ansible.builtin.assert:
    that:
      - vault_bootstrap_file.stat.exists
    fail_msg: >-
      Vault bootstrap data file {{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}
      is required before running the secrets-only phase.
  run_once: true
  tags:
    - vault
    - secrets

- name: Load Vault bootstrap data from localhost for secrets updates
  ansible.builtin.slurp:
    src: "{{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}"
  register: vault_bootstrap_file_content
  delegate_to: localhost
  become: false
  run_once: true
  no_log: true
  tags:
    - vault
    - secrets

- name: Cache Vault bootstrap data on localhost for secrets updates
  ansible.builtin.set_fact:
    vault_bootstrap_data: "{{ vault_bootstrap_file_content.content | b64decode | from_json }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  no_log: true
  tags:
    - vault
    - secrets

- name: Ensure local Vault CA certificate exists for secrets updates
  ansible.builtin.stat:
    path: "{{ vault_tls_local_dir }}/ca.crt"
  register: vault_local_ca_file
  delegate_to: localhost
  become: false
  run_once: true
  tags:
    - vault
    - secrets

- name: Assert local Vault CA certificate exists
  ansible.builtin.assert:
    that:
      - vault_local_ca_file.stat.exists
    fail_msg: >-
      Local Vault CA certificate {{ vault_tls_local_dir }}/ca.crt is missing.
      Run the full Vault configure phase first so the secrets-only phase can validate TLS.
  run_once: true
  tags:
    - vault
    - secrets

- name: Write configured KV secrets
  ansible.builtin.uri:
    url: "{{ vault_bootstrap_addr }}/v1/secrets/data/{{ item.key }}"
    method: POST
    headers:
      X-Vault-Token: "{{ hostvars['localhost'].vault_bootstrap_data.root_token }}"
    ca_path: "{{ vault_tls_local_dir }}/ca.crt"
    body_format: json
    body:
      data: "{{ item.value.data | default({}) }}"
    status_code:
      - 200
      - 204
  loop: "{{ secrets | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  delegate_to: localhost
  become: false
  run_once: true
  when: (vault_kv_mounts | default({}))['secrets'] is defined
  no_log: true
  tags:
    - vault
    - secrets
