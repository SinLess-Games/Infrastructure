---
- name: Restart vault
  ansible.builtin.systemd:
    name: "{{ vault_service_name }}"
    state: restarted
    daemon_reload: true

- name: Restart haproxy
  ansible.builtin.systemd:
    name: haproxy
    state: restarted

- name: Restart keepalived
  ansible.builtin.systemd:
    name: keepalived
    state: restarted
