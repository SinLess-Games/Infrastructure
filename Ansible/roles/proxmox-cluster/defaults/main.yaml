---
# =============================================================================
# proxmox-cluster — defaults
# -----------------------------------------------------------------------------
# Cluster-level defaults for Proxmox VE.
#
# IMPORTANT:
# - These defaults are SAFE and CONSERVATIVE.
# - Override intentionally in group_vars or host_vars.
# - This role NEVER destroys clusters automatically.
# =============================================================================

# -----------------------------------------------------------------------------
# Cluster identity
# -----------------------------------------------------------------------------

proxmox_cluster:
  # Cluster name (REQUIRED)
  # Must match exactly across all nodes.
  name: sinless-games

  # Expected number of nodes in the cluster
  # Used for quorum validation and safety checks.
  expected_nodes: 1

  # -----------------------------------------------------------------------------
  # Node role behavior
  # -----------------------------------------------------------------------------

  # Allow re-joining a node that was previously part of a cluster
  # ⚠️ DANGEROUS — requires manual cleanup in many cases
  allow_rejoin: false

  # Enforce quorum checks after cluster changes
  # If true, role will FAIL if quorum is not healthy
  enforce_quorum: true

  # -----------------------------------------------------------------------------
  # Corosync configuration (cluster transport)
  # -----------------------------------------------------------------------------

  corosync:
    # Transport type
    # knet is default for modern Proxmox
    transport: knet

    # Primary cluster network (CIDR or network base)
    # REQUIRED for multi-node clusters
    bindnetaddr: null

    # Link mode:
    #   passive | active | rr
    link_mode: active

    # Enable secure authentication (recommended)
    secure_auth: true

    # Number of redundant rings (advanced setups)
    # 1 = single ring (default)
    ring_count: 1

  # -----------------------------------------------------------------------------
  # Quorum & safety controls
  # -----------------------------------------------------------------------------

  quorum:
    # Fail role execution if quorum is lost
    fail_on_quorum_loss: true

    # Minimum votes required (auto-calculated if null)
    expected_votes: null

    # Allow single-node cluster (lab/dev only)
    allow_single_node: false

  # -----------------------------------------------------------------------------
  # API & cluster services
  # -----------------------------------------------------------------------------

  api:
    # Validate Proxmox API availability during cluster ops
    validate_api: true

    # Timeout (seconds) when waiting for API availability
    api_timeout: 15

  # -----------------------------------------------------------------------------
  # Timeouts & retries
  # -----------------------------------------------------------------------------

  timeouts:
    # Wait time for cluster filesystem (/etc/pve) sync
    pve_fs_sync: 30

    # Wait time for corosync to stabilize
    corosync_stabilize: 20

  # -----------------------------------------------------------------------------
  # Debugging & verbosity
  # -----------------------------------------------------------------------------

  debug:
    # Print cluster discovery details
    show_cluster_status: true

    # Print corosync configuration after changes
    show_corosync_config: false

# -----------------------------------------------------------------------------
# INTERNAL DEFAULTS — DO NOT OVERRIDE
# -----------------------------------------------------------------------------
# These are used internally by the role logic.
# -----------------------------------------------------------------------------

_proxmox_cluster_internal:
  pve_cluster_fs: /etc/pve
  corosync_conf: /etc/pve/corosync.conf
  corosync_service: corosync

proxmox_cluster_mode: expand
