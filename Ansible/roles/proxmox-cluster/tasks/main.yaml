---
# =============================================================================
# proxmox-cluster — main
# -----------------------------------------------------------------------------
# Orchestrates the Proxmox cluster lifecycle in a SAFE, deterministic order.
#
# Principles:
# - Validation is always read-only and repeatable
# - Cluster creation is strictly single-shot (bootstrap node only)
# - Join logic is explicit, guarded, and mode-aware
# - Discovery refreshes facts before any dependent phase
# - Quorum and health checks never mutate state
# =============================================================================

# -----------------------------------------------------------------------------
# Phase 0: Guardrails
# -----------------------------------------------------------------------------

- name: Assert proxmox cluster role is enabled
  ansible.builtin.assert:
    that:
      - proxmox_cluster_enabled | bool
    fail_msg: >
      Proxmox cluster role is disabled.
      Set proxmox_cluster_enabled: true to proceed.

# -----------------------------------------------------------------------------
# Phase 1: Pre-flight validation (NO state changes)
# -----------------------------------------------------------------------------

- name: Pre-flight validation (inputs, platform, intent)
  ansible.builtin.import_tasks: validate.yaml

# -----------------------------------------------------------------------------
# Phase 2: Cluster creation (bootstrap node only, create mode)
# -----------------------------------------------------------------------------
# - Runs exactly once
# - Never runs on already-clustered nodes
# -----------------------------------------------------------------------------

- name: Create Proxmox cluster (bootstrap node only)
  ansible.builtin.import_tasks: create.yaml
  when:
    - proxmox_cluster_mode | default('expand') == 'create'
    - proxmox_is_bootstrap | bool
    - not proxmox_cluster_is_clustered | bool

# -----------------------------------------------------------------------------
# Phase 3: Discover cluster state (authoritative refresh)
# -----------------------------------------------------------------------------
# - Must run after create to populate correct facts
# - Safe to run on all nodes
# -----------------------------------------------------------------------------

- name: Discover current cluster state
  ansible.builtin.import_tasks: discover.yaml

# -----------------------------------------------------------------------------
# Phase 4: Re-validate using discovered facts
# -----------------------------------------------------------------------------
# - Ensures join/quorum logic operates on current reality
# - Still read-only
# -----------------------------------------------------------------------------

- name: Re-validate cluster state with discovered facts
  ansible.builtin.import_tasks: validate.yaml

# -----------------------------------------------------------------------------
# Phase 5: Join cluster (non-init nodes only)
# -----------------------------------------------------------------------------
# - Requires init node to already be clustered
# - Explicitly blocked on init node
# -----------------------------------------------------------------------------

- name: Join Proxmox cluster (non-init nodes)
  ansible.builtin.import_tasks: join.yaml
  when:
    - proxmox_cluster_mode | default('expand') in ['create', 'expand']
    - not proxmox_cluster_is_init_node | bool
    - not proxmox_cluster_is_clustered | bool
    - hostvars[proxmox_cluster_init_node].proxmox_cluster_is_clustered
        | default(false) | bool

