# =============================================================================
# HAProxy Configuration
# =============================================================================

# HAProxy package
haproxy_package_name: haproxy

# HAProxy service name
haproxy_service_name: haproxy

# HAProxy configuration path
haproxy_config_path: /etc/haproxy/haproxy.cfg

# Proxmox UI port
proxmox_ui_port: 8006

# HAProxy frontend port (exposed to clients)
haproxy_frontend_port: 443

# HAProxy stats port (optional, for monitoring)
haproxy_stats_port: 8404

# =============================================================================
# Keepalived Configuration
# =============================================================================

# Keepalived package
keepalived_package_name: keepalived

# Keepalived service name
keepalived_service_name: keepalived

# Keepalived configuration path
keepalived_config_path: /etc/keepalived/keepalived.conf

# Virtual IP (VIP) for HA UI - MUST be set in group_vars
# keepalived_vip: "192.168.1.50"

# Virtual IP netmask
keepalived_vip_netmask: 24

# Virtual IP interface (should match cluster network interface)
keepalived_vip_interface: "{{ proxmox_cluster_network_interface | default('vmbr0') }}"

# Keepalived router ID (cluster identifier)
# keepalived_router_id: 100

# Keepalived priority (100=master, lower=backup)
# Higher priority nodes will become master
keepalived_priority: 100

# Keepalived authentication password (should be set via vault)
# keepalived_auth_pass: "{{ vault_keepalived_password }}"
keepalived_auth_pass: "proxmox-ha-ui"

# Keepalived virtual router MAC address (optional)
# keepalived_vrrp_mac: "00:00:5e:00:01:01"

# Health check interval (seconds)
keepalived_health_check_interval: 2

# Health check timeout (seconds)
keepalived_health_check_timeout: 5

# Health check fall count (how many failures before marking down)
keepalived_health_check_fall: 3

# Health check rise count (how many successes before marking up)
keepalived_health_check_rise: 2

# =============================================================================
# SSL/TLS Configuration
# =============================================================================

# Use SSL for HAProxy
haproxy_use_ssl: true

# Certificate paths
haproxy_cert_path: /etc/ssl/private/proxmox-ha-ui.pem
haproxy_key_path: /etc/ssl/private/proxmox-ha-ui.key
haproxy_ca_path: /etc/ssl/certs/ca-certificates.crt

# =============================================================================
# HAProxy Backend Nodes
# =============================================================================

# Backend nodes are automatically discovered from proxmox hosts
# This is constructed from inventory
haproxy_backend_nodes: []
