---
- name: Install keepalived and haproxy packages
  apt:
    name:
      - keepalived
      - haproxy
      - ssl-cert
    state: present
    update_cache: yes
  become: yes

- name: Create directories for certificates
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: yes
  loop:
    - /etc/ssl/private
    - /etc/ssl/certs

- name: Generate self-signed certificate for Proxmox UI (if not exists)
  block:
    - name: Check if certificate exists
      stat:
        path: "{{ haproxy_cert_path }}"
      register: cert_stat

    - name: Generate self-signed certificate
      shell: |
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout {{ haproxy_key_path }} \
          -out {{ haproxy_cert_path }} \
          -subj "/C=US/ST=State/L=City/O=Organization/CN=proxmox-ha-ui" \
          -addext "subjectAltName=DNS:proxmox-ha-ui,DNS:*.proxmox.local"
      become: yes
      when: not cert_stat.stat.exists

    - name: Combine certificate and key
      shell: |
        cat {{ haproxy_cert_path }} {{ haproxy_key_path }} > {{ haproxy_cert_path }}.pem
      become: yes
      when: not cert_stat.stat.exists

    - name: Set certificate permissions
      file:
        path: "{{ item }}"
        mode: '0600'
        owner: root
        group: root
      become: yes
      loop:
        - "{{ haproxy_cert_path }}"
        - "{{ haproxy_key_path }}"
        - "{{ haproxy_cert_path }}.pem"

  when: haproxy_use_ssl

- name: Configure HAProxy
  template:
    src: haproxy.cfg.j2
    dest: "{{ haproxy_config_path }}"
    mode: '0644'
    backup: yes
  become: yes
  notify: reload haproxy

- name: Configure Keepalived
  template:
    src: keepalived.conf.j2
    dest: "{{ keepalived_config_path }}"
    mode: '0644'
    backup: yes
  become: yes
  notify: restart keepalived

- name: Create keepalived health check script
  template:
    src: check-proxmox-ui.sh.j2
    dest: /usr/local/bin/check-proxmox-ui.sh
    mode: '0755'
  become: yes

- name: Enable and start keepalived
  systemd:
    name: "{{ keepalived_service_name }}"
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Enable and start haproxy
  systemd:
    name: "{{ haproxy_service_name }}"
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Verify HAProxy configuration
  command: haproxy -c -f "{{ haproxy_config_path }}"
  changed_when: false
  become: yes

- name: Verify Keepalived is running
  command: systemctl is-active "{{ keepalived_service_name }}"
  changed_when: false
  register: keepalived_status
  become: yes
