---
# =============================================================================
# MinIO Configure Role - Defaults
# =============================================================================

# MinIO version
minio_version: "latest"

# MinIO directories
minio_data_dir: "/mnt/minio/data"
minio_data_dirs:
  - "/mnt/minio/data"
minio_data_mountpoint: "/mnt/minio"
minio_config_dir: "/etc/minio"
minio_bin_dir: "/usr/local/bin"
minio_prepare_data_partition: true
minio_data_parent_disk: "/dev/vda"
minio_data_device: "/dev/vda3"
minio_data_partition_start: "20GiB"

# MinIO ports
minio_api_port: 9000
minio_console_port: 9001

# MinIO service
minio_service_name: "minio"
minio_user: "minio-user"
minio_group: "minio-user"
minio_site_name: "sinlessgames-prod"
minio_api_fqdn: ""
minio_console_fqdn: ""
minio_skip_tls_verify: false
minio_manage_service_accounts: false
minio_bind_to_host_ip: true
minio_token_output_dir: "{{ playbook_dir | dirname | dirname }}/../.outputs/minio"

# Buckets to create
minio_buckets:
  - name: "loki"
    versioning: false
    quota: "500G"
  - name: "mimir"
    versioning: false
    quota: "500G"
  - name: "backups"
    versioning: true
    quota: "1T"
  - name: "velero"
    versioning: true
    quota: "200G"
  - name: "terraform"
    versioning: true
    quota: "10G"

# HAProxy configuration
haproxy_enabled: true
haproxy_stats_port: 8404
haproxy_stats_user: "admin"
haproxy_frontend_port: 80
haproxy_frontend_ssl_port: 443

# Keepalived configuration
keepalived_enabled: true
keepalived_router_id: 51
keepalived_priority_master: 100
keepalived_priority_backup: 90
keepalived_check_interval: 2
keepalived_auth_type: "PASS"
minio_vip_address: "10.10.40.100"
minio_vip_prefix: 24
minio_vip_interface: ""
minio_keepalived_password: "minio-vrrp-pass"
minio_haproxy_stats_password: "minio-haproxy-pass"

# TLS/SSL configuration
minio_tls_enabled: false
minio_cert_path: "/etc/minio/certs/public.crt"
minio_key_path: "/etc/minio/certs/private.key"
