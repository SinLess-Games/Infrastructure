---
# =============================================================================
# MinIO Configure Role - HAProxy Configuration Tasks
# =============================================================================

- name: Install HAProxy
  ansible.builtin.apt:
    name: haproxy
    state: present
    update_cache: true

- name: Enable non-local VIP binding for HAProxy
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-haproxy-ip-nonlocal-bind.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.ipv4.ip_nonlocal_bind = 1

- name: Apply non-local VIP binding sysctl
  ansible.builtin.command: sysctl -p /etc/sysctl.d/99-haproxy-ip-nonlocal-bind.conf
  changed_when: false

- name: Render HAProxy configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/minio/haproxy.cfg.j2"
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: "haproxy -c -f %s"
  notify: Restart HAProxy

- name: Enable and start HAProxy service
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: started
