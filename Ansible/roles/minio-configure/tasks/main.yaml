---
# =============================================================================
# MinIO Configure Role - Tasks
# =============================================================================
# Purpose:
#   - Install MinIO server
#   - Configure MinIO cluster
#   - Create buckets and users
#   - Setup HAProxy load balancer
#   - Setup Keepalived for VIP management
# =============================================================================

- name: Include MinIO installation tasks
  ansible.builtin.include_tasks:
    file: install.yaml
    apply:
      tags: ['minio', 'install']
  tags: ['minio', 'install']

- name: Include MinIO configuration tasks
  ansible.builtin.include_tasks:
    file: configure.yaml
    apply:
      tags: ['minio', 'configure']
  tags: ['minio', 'configure']

- name: Include HAProxy configuration tasks
  ansible.builtin.include_tasks:
    file: haproxy.yaml
    apply:
      tags: ['minio', 'haproxy']
  when: haproxy_enabled | bool
  tags: ['minio', 'haproxy']

- name: Include Keepalived configuration tasks
  ansible.builtin.include_tasks:
    file: keepalived.yaml
    apply:
      tags: ['minio', 'keepalived']
  when: keepalived_enabled | bool
  tags: ['minio', 'keepalived']

- name: Include bucket configuration tasks
  ansible.builtin.include_tasks:
    file: buckets.yaml
    apply:
      tags: ['minio', 'buckets']
  run_once: true
  tags: ['minio', 'buckets']
- name: Include MinIO verification tasks
  ansible.builtin.include_tasks:
    file: verify.yaml
    apply:
      tags: ['minio', 'verify']
  tags: ['minio', 'verify']
