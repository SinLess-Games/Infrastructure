---
- name: Ensure Wazuh Vault token file is present when token env var is empty
  ansible.builtin.stat:
    path: "{{ wazuh_vault_token_file }}"
  register: wazuh_vault_token_file_stat
  when: wazuh_vault_token | length == 0

- name: Read Wazuh Vault token file
  ansible.builtin.slurp:
    src: "{{ wazuh_vault_token_file }}"
  register: wazuh_vault_token_file_content
  when:
    - wazuh_vault_token | length == 0
    - wazuh_vault_token_file_stat.stat.exists | default(false)
  no_log: true

- name: Build Wazuh Vault runtime token
  ansible.builtin.set_fact:
    wazuh_vault_runtime_token: >-
      {{
        wazuh_vault_token
        if (wazuh_vault_token | length > 0)
        else (
          (
            wazuh_vault_token_file_content.content
            | b64decode
            | from_json
          ).root_token | default('')
        )
      }}
  no_log: true

- name: Assert Wazuh Vault runtime token is available
  ansible.builtin.assert:
    that:
      - wazuh_vault_runtime_token | length > 0
    fail_msg: "A Vault token is required to load Wazuh secrets."

- name: Read Wazuh runtime secrets from Vault
  ansible.builtin.shell: |
    set -euo pipefail
    curl --silent --show-error {{ (wazuh_vault_skip_verify | bool) | ternary('--insecure', '') }} \
      --header "X-Vault-Token: ${WAZUH_VAULT_TOKEN}" \
      "{{ wazuh_vault_addr }}/v1/secrets/data/{{ wazuh_vault_kv_path }}"
  args:
    executable: /bin/bash
  register: wazuh_vault_secret_response
  changed_when: false
  environment:
    WAZUH_VAULT_TOKEN: "{{ wazuh_vault_runtime_token }}"

- name: Cache Wazuh runtime secrets on localhost
  ansible.builtin.set_fact:
    wazuh_runtime_secrets: "{{ (wazuh_vault_secret_response.stdout | from_json).data.data | default({}) }}"
    wazuh_runtime_secret_document: "{{ (wazuh_vault_secret_response.stdout | from_json).data | default({}) }}"
  no_log: true

- name: Validate required Wazuh Vault keys exist
  ansible.builtin.assert:
    that: >-
      {{
        wazuh_vault_required_keys
        | difference((wazuh_runtime_secrets | default({})) | dict2items | map(attribute='key') | list)
        | length == 0
      }}
    fail_msg: "Vault document {{ wazuh_vault_kv_path }} is missing one or more required Wazuh secrets."

- name: Map Wazuh Vault secrets into localhost runtime facts
  ansible.builtin.set_fact:
    "{{ item.value }}": "{{ wazuh_runtime_secrets[item.key] }}"
  loop: "{{ wazuh_vault_secret_field_map | dict2items }}"
  loop_control:
    label: "{{ item.value }}"
  no_log: true
