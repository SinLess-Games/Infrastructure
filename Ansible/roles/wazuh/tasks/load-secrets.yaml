---
- name: Ensure Wazuh Vault token file is present when token env var is empty
  ansible.builtin.stat:
    path: "{{ wazuh_vault_token_file }}"
  register: wazuh_vault_token_file_stat
  when: wazuh_vault_token | length == 0

- name: Read Wazuh Vault token file
  ansible.builtin.slurp:
    src: "{{ wazuh_vault_token_file }}"
  register: wazuh_vault_token_file_content
  when:
    - wazuh_vault_token | length == 0
    - wazuh_vault_token_file_stat.stat.exists | default(false)
  no_log: true

- name: Build Wazuh Vault runtime token
  ansible.builtin.set_fact:
    wazuh_vault_runtime_token: >-
      {{
        wazuh_vault_token
        if (wazuh_vault_token | length > 0)
        else (
          (
            wazuh_vault_token_file_content.content
            | b64decode
            | from_json
          ).root_token | default('')
        )
      }}
  no_log: true

- name: Assert Wazuh Vault runtime token is available
  ansible.builtin.assert:
    that:
      - wazuh_vault_runtime_token | length > 0
    fail_msg: "A Vault token is required to load Wazuh secrets."

- name: Define Wazuh ossec.conf secret keys required from Vault
  ansible.builtin.set_fact:
    wazuh_ossec_conf_vault_required_keys:
      - vault_wazuh_agent_enrollment_password
      - vault_wazuh_github_api_token
      - vault_wazuh_virustotal_api_key
      - vault_wazuh_discord_hook_url
      - vault_wazuh_haproxy_password
      - vault_wazuh_cluster_key
  no_log: true

- name: Check Wazuh Vault endpoint health before reading secrets
  ansible.builtin.uri:
    url: "{{ wazuh_vault_addr | regex_replace('/+$', '') }}/v1/sys/health"
    method: GET
    validate_certs: "{{ not (wazuh_vault_skip_verify | bool) }}"
    return_content: false
    timeout: 10
    status_code:
      - 200
      - 429
      - 472
      - 473
      - 501
      - 503
  register: wazuh_vault_health
  changed_when: false

- name: Read Wazuh runtime secrets from Vault
  ansible.builtin.shell: |
    set -euo pipefail
    curl --fail --max-time 30 --silent --show-error {{ (wazuh_vault_skip_verify | bool) | ternary('--insecure', '') }} \
      --header "X-Vault-Token: ${WAZUH_VAULT_TOKEN}" \
      "{{ wazuh_vault_addr }}/v1/secrets/data/{{ wazuh_vault_kv_path }}"
  args:
    executable: /bin/bash
  register: wazuh_vault_secret_response
  changed_when: false
  environment:
    WAZUH_VAULT_TOKEN: "{{ wazuh_vault_runtime_token }}"
  no_log: true

- name: Cache Wazuh runtime secrets on localhost
  ansible.builtin.set_fact:
    wazuh_runtime_secrets: "{{ (wazuh_vault_secret_response.stdout | from_json).data.data | default({}) }}"
    wazuh_runtime_secret_document: "{{ (wazuh_vault_secret_response.stdout | from_json).data | default({}) }}"
  no_log: true

- name: Build Wazuh required Vault key list
  ansible.builtin.set_fact:
    wazuh_effective_vault_required_keys: >-
      {{
        (
          (wazuh_vault_required_keys | default([]))
          + wazuh_ossec_conf_vault_required_keys
        )
        | unique
      }}
  no_log: true

- name: Validate required Wazuh Vault keys exist
  ansible.builtin.assert:
    that:
      - >-
        {{
          wazuh_effective_vault_required_keys
          | difference((wazuh_runtime_secrets | default({})) | dict2items | map(attribute='key') | list)
          | length == 0
        }}
    fail_msg: >-
      Vault document {{ wazuh_vault_kv_path }} is missing one or more required Wazuh secrets.
      Required keys:
      {{ wazuh_effective_vault_required_keys | join(', ') }}

- name: Map Wazuh Vault secrets into localhost runtime facts
  ansible.builtin.set_fact:
    "{{ item.value }}": "{{ wazuh_runtime_secrets[item.key] }}"
  loop: "{{ wazuh_vault_secret_field_map | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.value }}"
  when:
    - item.key in wazuh_runtime_secrets
  no_log: true

- name: Map Wazuh ossec.conf Vault secrets into runtime facts
  ansible.builtin.set_fact:
    "{{ item }}": "{{ wazuh_runtime_secrets[item] }}"
  loop: "{{ wazuh_ossec_conf_vault_required_keys }}"
  loop_control:
    label: "{{ item }}"
  no_log: true
