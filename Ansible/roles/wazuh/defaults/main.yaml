---
wazuh_role_phases:
  - secrets
  - deploy
  - configure

wazuh_repo_root: "{{ playbook_dir | dirname | dirname }}"
wazuh_primary_inventory_host: "{{ (groups['wazuh'] | default([])) | first | default(wazuh_node_name) }}"
wazuh_proxmox_api_user: "root@pam"
wazuh_proxmox_api_retries: 5
wazuh_proxmox_api_retry_delay: 3

wazuh_vault_secret_field_map:
  api_username: wazuh_api_username
  api_password: wazuh_api_password
  admin_password: wazuh_admin_password

wazuh_dashboard_customization_enabled: true
wazuh_dashboard_custom_logo_src: "{{ wazuh_repo_root }}/Ansible/files/images/company-logo.png"
wazuh_dashboard_custom_assets_dir: "/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom/images"
wazuh_dashboard_customization_file: "/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml"
wazuh_dashboard_customization_app_logo_filename: "customization.logo.app.png"
wazuh_dashboard_customization_healthcheck_logo_filename: "customization.logo.healthcheck.png"
wazuh_dashboard_customization_reports_logo_filename: "customization.logo.reports.png"
wazuh_dashboard_customization_report_header: ""
wazuh_dashboard_customization_report_footer: ""
