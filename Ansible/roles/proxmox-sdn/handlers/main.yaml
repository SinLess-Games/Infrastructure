---
# Proxmox SDN handlers

- name: Reload Proxmox networking
  ansible.builtin.systemd:
    name: networking
    state: restarted
  register: networking_reload
  until: networking_reload is succeeded
  retries: 3
  delay: 5

- name: Reapply SDN configuration
  ansible.builtin.shell: |
    pvesh set /cluster/sdn -apply 1 -force 1 2>/dev/null || pvesh set /cluster/sdn -reload 1 -force 1 2>/dev/null || pvesh set /cluster/sdn -apply 1 2>/dev/null || pvesh set /cluster/sdn -reload 1
  register: sdn_reload
  until: sdn_reload is succeeded
  retries: 3
  delay: 5
  changed_when: true
  failed_when: false
  run_once: true
  delegate_to: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
