---
# Proxmox SDN Main Tasks

- name: Check if SDN is available
  ansible.builtin.shell: |
    pvesh get /cluster/sdn 2>/dev/null && echo "available" || echo "unavailable"
  args:
    executable: /bin/bash
  register: sdn_check
  changed_when: false
  failed_when: false
  tags:
    - proxmox
    - sdn

- name: Display SDN availability
  ansible.builtin.debug:
    msg: "Proxmox SDN is {{ 'available' if 'available' in sdn_check.stdout else 'not available on this cluster' }}"
  tags:
    - proxmox
    - sdn

- name: Create SDN zones
  ansible.builtin.include_tasks: zones.yaml
  when: proxmox_sdn_enabled and 'available' in sdn_check.stdout
  tags:
    - proxmox
    - sdn
    - zones

- name: Create SDN networks
  ansible.builtin.include_tasks: networks.yaml
  when: proxmox_sdn_enabled and 'available' in sdn_check.stdout
  tags:
    - proxmox
    - sdn
    - networks

- name: Detect SDN apply/reload capability
  ansible.builtin.shell: |
    if pvesh help /cluster/sdn 2>/dev/null | grep -q 'apply'; then
      echo 'apply'
    elif pvesh help /cluster/sdn 2>/dev/null | grep -q 'reload'; then
      echo 'reload'
    else
      echo 'unsupported'
    fi
  args:
    executable: /bin/bash
  register: sdn_capability
  changed_when: false
  failed_when: false
  run_once: true
  delegate_to: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
  when: proxmox_sdn_enabled and 'available' in sdn_check.stdout
  tags:
    - proxmox
    - sdn
    - apply

- name: Apply SDN configuration to cluster
  block:
    - name: Execute SDN apply/reload command
      ansible.builtin.shell: |
        case "{{ sdn_capability.stdout_lines[0] }}" in
          apply)
            pvesh set /cluster/sdn -apply 1 -force 1
            ;;
          reload)
            pvesh set /cluster/sdn -reload 1 -force 1
            ;;
          *)
            echo "SDN apply/reload not supported" >&2
            exit 1
            ;;
        esac
      args:
        executable: /bin/bash
      register: sdn_apply_result
      changed_when: sdn_apply_result.rc == 0
      failed_when: sdn_apply_result.rc != 0
      run_once: true
      delegate_to: "{{ hostvars[groups['pve_nodes'] | first]['ansible_host'] }}"
      tags:
        - proxmox
        - sdn
        - apply

    - name: Display SDN apply result
      ansible.builtin.debug:
        msg: "SDN configuration applied successfully on {{ hostvars[groups['pve_nodes'] | first]['inventory_hostname'] }}"
      tags:
        - proxmox
        - sdn
        - apply
  when:
    - proxmox_sdn_enabled
    - '"available" in sdn_check.stdout'
    - sdn_capability.stdout_lines[0] != 'unsupported'
  rescue:
    - name: Report SDN apply failure
      ansible.builtin.fail:
        msg: "Failed to apply SDN configuration: {{ sdn_apply_result.stderr_lines | default(['Unknown error']) | join(', ') }}"
      tags:
        - proxmox
        - sdn
        - apply

- name: Check node network apply support
  ansible.builtin.shell: pvesh help /nodes/{{ inventory_hostname }}/network 2>/dev/null || true
  args:
    executable: /bin/bash
  register: node_net_help
  changed_when: false
  failed_when: false
  when: proxmox_sdn_apply_node_network | default(false)
  tags:
    - proxmox
    - sdn
    - apply

- name: Apply pending node network changes
  ansible.builtin.shell: >-
    {% if node_net_help.stdout is search('apply') %}
    pvesh set /nodes/{{ inventory_hostname }}/network -apply 1 -force 1
    {% elif node_net_help.stdout is search('reload') %}
    pvesh set /nodes/{{ inventory_hostname }}/network -reload 1 -force 1
    {% else %}
    true
    {% endif %}
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  when:
    - proxmox_sdn_apply_node_network | default(false)
    - node_net_help is defined
  tags:
    - proxmox
    - sdn
    - apply

- name: Verify SDN configuration
  ansible.builtin.include_tasks: verify.yaml
  when: proxmox_sdn_enabled and 'available' in sdn_check.stdout
  tags:
    - proxmox
    - sdn
    - verify
