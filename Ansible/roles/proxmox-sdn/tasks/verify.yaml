---
# SDN Verification and Status

- name: Verify SDN configuration
  block:
    - name: Get SDN zone status
      ansible.builtin.shell: |
        pvesh get /cluster/sdn/zones --output-format yaml 2>/dev/null || echo "Unable to retrieve zones"
      args:
        executable: /bin/bash
      register: zones_status
      changed_when: false
      failed_when: false

    - name: Display SDN zones
      ansible.builtin.debug:
        msg: |
          SDN Zones:
          {{ zones_status.stdout }}
      when: zones_status.stdout | length > 0

    - name: Get SDN network status
      ansible.builtin.shell: |
        pvesh get /cluster/sdn/vnets --output-format yaml 2>/dev/null || echo "Unable to retrieve networks"
      args:
        executable: /bin/bash
      register: networks_status
      changed_when: false
      failed_when: false

    - name: Display SDN networks
      ansible.builtin.debug:
        msg: |
          SDN Networks:
          {{ networks_status.stdout }}
      when: networks_status.stdout | length > 0


    - name: Validate SDN configuration
      ansible.builtin.debug:
        msg: "SDN configuration verified successfully"

  rescue:
    - name: Handle verification failure
      ansible.builtin.debug:
        msg: "Note: SDN verification skipped (may not be fully initialized)"
