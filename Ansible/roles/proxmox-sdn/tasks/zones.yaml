---
# SDN Zone Configuration

- name: Display SDN zones to create
  ansible.builtin.debug:
    msg: "Creating SDN zone: {{ item.name }} ({{ item.type }})"
  loop: "{{ proxmox_sdn_zones }}"
  loop_control:
    label: "{{ item.name }}"

- name: Check if SDN zone exists
  ansible.builtin.shell: pvesh get /cluster/sdn/zones/{{ item.name }} 2>/dev/null && echo "exists" || echo "missing"
  args:
    executable: /bin/bash
  register: zone_check
  changed_when: false
  loop: "{{ proxmox_sdn_zones }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create VLAN zones
  ansible.builtin.shell: >-
    pvesh create /cluster/sdn/zones
    --type "{{ item.0.type }}"
    --zone "{{ item.0.name }}"
    --bridge "{{ item.0.bridge | default(proxmox_sdn_primary_bridge) }}"
    --nodes "{{ item.0.nodes }}"
  args:
    executable: /bin/bash
  register: zone_result
  changed_when: zone_result.rc == 0
  failed_when: zone_result.rc != 0
  loop: "{{ proxmox_sdn_zones | zip(zone_check.results) }}"
  loop_control:
    label: "{{ item.0.name }}"
  when: item.1.stdout == "missing"
  run_once: true

- name: Report zone creation status
  ansible.builtin.debug:
    msg: "Zone {{ item.0.name }}: {{ 'Created' if item.1.stdout == 'missing' else 'Already exists' }}"
  loop: "{{ proxmox_sdn_zones | zip(zone_check.results) }}"
  loop_control:
    label: "{{ item.0.name }}"
