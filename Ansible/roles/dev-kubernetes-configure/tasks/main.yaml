---
- name: Validate dev Kubernetes required variables
  ansible.builtin.assert:
    that:
      - kubernetes_environment == "dev"
      - kubernetes_nodes.control_plane | length == kubernetes_control_plane.count | int
      - kubernetes_nodes.workers | length == kubernetes_workers.count | int
      - kubernetes_versions.rke2 | length > 0
      - kubernetes_versions.cilium_chart | length > 0
      - kubernetes_versions.ingress_nginx_chart | length > 0
      - kubernetes_versions.cert_manager_chart | length > 0
      - kubernetes_versions.external_dns_chart | length > 0

- name: Infrastructure phase (Terraform + Butane/Ignition + inventory)
  when:
    - inventory_hostname == "localhost"
    - kubernetes_configure_phase in ["all", "infrastructure"]
  block:
    - name: Read Proxmox API token file
      ansible.builtin.slurp:
        src: "{{ kubernetes_repo_root }}/{{ kubernetes_proxmox_api_token_file }}"
      register: kubernetes_proxmox_token_file

    - name: Parse Proxmox API token text
      ansible.builtin.set_fact:
        kubernetes_proxmox_token_text: "{{ kubernetes_proxmox_token_file.content | b64decode | string }}"
      no_log: true

    - name: Extract Proxmox API token ID and secret
      ansible.builtin.set_fact:
        kubernetes_proxmox_api_token_id: >-
          {{ (kubernetes_proxmox_token_text | regex_findall('(?m)^FULL_TOKENID=([^\n]+)')) | first | default('') }}
        kubernetes_proxmox_api_token_secret: >-
          {{ (kubernetes_proxmox_token_text | regex_findall('(?m)^TOKEN_SECRET=([^\n]+)')) | first | default('') }}
      no_log: true

    - name: Build flattened node list for generation
      ansible.builtin.set_fact:
        kubernetes_dev_all_nodes: "{{ kubernetes_nodes.control_plane + kubernetes_nodes.workers }}"

    - name: Ensure generated directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ kubernetes_dev_generated_dir }}"
        - "{{ kubernetes_dev_butane_dir }}"
        - "{{ kubernetes_dev_ignition_dir }}"
        - "{{ kubernetes_dev_externaldns_values_dir }}"

    - name: Render Butane templates for control-plane nodes
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/flatcar-control-plane.bu.j2"
        dest: "{{ kubernetes_dev_butane_dir }}/{{ item.name }}.bu.yaml"
        mode: "0644"
      loop: "{{ kubernetes_nodes.control_plane }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        node: "{{ item }}"

    - name: Render Butane templates for worker nodes
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/flatcar-worker.bu.j2"
        dest: "{{ kubernetes_dev_butane_dir }}/{{ item.name }}.bu.yaml"
        mode: "0644"
      loop: "{{ kubernetes_nodes.workers }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        node: "{{ item }}"

    - name: Compile Butane to Ignition
      ansible.builtin.command:
        cmd: >-
          butane --strict --pretty
          --output {{ kubernetes_dev_ignition_dir }}/{{ item.name }}.ign
          {{ kubernetes_dev_butane_dir }}/{{ item.name }}.bu.yaml
      loop: "{{ kubernetes_dev_all_nodes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Kill any existing Ignition HTTP server
      ansible.builtin.shell: |
        if pgrep -f "python.*http.server" > /dev/null 2>&1; then
          pkill -f "python.*http.server"
          sleep 1
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Start Ignition HTTP server in background on port 9000
      ansible.builtin.shell: |
        cd {{ kubernetes_dev_ignition_dir }}
        nohup python3 -m http.server 9000 > /tmp/ignition-http-server.log 2>&1 &
        sleep 2
        curl -s http://localhost:9000/ > /dev/null && echo "HTTP server started successfully on port 9000"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Render Terraform cluster file for dev
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/kubernetes-cluster.tf.j2"
        dest: "{{ kubernetes_dev_tf_file }}"
        mode: "0644"

    - name: Render generated dev inventory
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/kubernetes-dev-inventory.yaml.j2"
        dest: "{{ kubernetes_dev_inventory_file }}"
        mode: "0644"

    - name: Ensure snippets directory exists on Proxmox target nodes
      ansible.builtin.file:
        path: /var/lib/vz/snippets
        state: directory
        mode: "0755"
      become: true
      delegate_to: "{{ item }}"
      loop: "{{ kubernetes_dev_all_nodes | map(attribute='target_node') | unique | list }}"
      loop_control:
        label: "{{ item }}"

    - name: Upload node Ignition snippets to target Proxmox nodes
      ansible.builtin.copy:
        src: "{{ kubernetes_dev_ignition_dir }}/{{ item.name }}.ign"
        dest: "/var/lib/vz/snippets/{{ item.name }}.ign"
        mode: "0644"
      become: true
      delegate_to: "{{ item.target_node }}"
      loop: "{{ kubernetes_dev_all_nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.target_node }}"

    - name: Terraform init for Kubernetes dev cluster
      ansible.builtin.command:
        cmd: task terraform:init
        chdir: "{{ kubernetes_repo_root }}"
      environment:
        TF_IN_AUTOMATION: "1"
        TF_VAR_proxmox_api_url: "{{ kubernetes_proxmox_api_url }}"
        TF_VAR_proxmox_api_token_id: "{{ kubernetes_proxmox_api_token_id }}"
        TF_VAR_proxmox_api_token_secret: "{{ kubernetes_proxmox_api_token_secret }}"
        TF_VAR_proxmox_tls_insecure: "{{ kubernetes_proxmox_tls_insecure | ternary('true', 'false') }}"
      no_log: true

    - name: Terraform plan for Kubernetes dev cluster
      ansible.builtin.command:
        cmd: task terraform:plan -- -target=module.kubernetes_dev_masters -target=module.kubernetes_dev_workers
        chdir: "{{ kubernetes_repo_root }}"
      environment:
        TF_IN_AUTOMATION: "1"
        TF_VAR_proxmox_api_url: "{{ kubernetes_proxmox_api_url }}"
        TF_VAR_proxmox_api_token_id: "{{ kubernetes_proxmox_api_token_id }}"
        TF_VAR_proxmox_api_token_secret: "{{ kubernetes_proxmox_api_token_secret }}"
        TF_VAR_proxmox_tls_insecure: "{{ kubernetes_proxmox_tls_insecure | ternary('true', 'false') }}"
      no_log: false
      changed_when: false
      failed_when: false

    - name: Terraform apply for Kubernetes dev cluster
      ansible.builtin.command:
        cmd: task terraform:apply:auto -- -target=module.kubernetes_dev_masters -target=module.kubernetes_dev_workers
        chdir: "{{ kubernetes_repo_root }}"
      environment:
        TF_IN_AUTOMATION: "1"
        TF_VAR_proxmox_api_url: "{{ kubernetes_proxmox_api_url }}"
        TF_VAR_proxmox_api_token_id: "{{ kubernetes_proxmox_api_token_id }}"
        TF_VAR_proxmox_api_token_secret: "{{ kubernetes_proxmox_api_token_secret }}"
        TF_VAR_proxmox_tls_insecure: "{{ kubernetes_proxmox_tls_insecure | ternary('true', 'false') }}"
      when:
        - not kubernetes_plan_only | bool
        - not kubernetes_destroy | bool
      no_log: false

    - name: Start VMs after setting Ignition fw_cfg args
      ansible.builtin.shell: |
        set -euo pipefail
        /usr/sbin/qm start {{ item.vmid }} || true
      args:
        executable: /bin/bash
      become: true
      delegate_to: "{{ item.target_node }}"
      loop: "{{ kubernetes_dev_all_nodes }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.target_node }}"
      when:
        - not kubernetes_plan_only | bool
        - not kubernetes_destroy | bool

    - name: Terraform destroy for Kubernetes dev cluster
      ansible.builtin.command:
        cmd: task terraform:destroy:auto -- -target=module.kubernetes_dev_masters -target=module.kubernetes_dev_workers
        chdir: "{{ kubernetes_repo_root }}"
      environment:
        TF_IN_AUTOMATION: "1"
        TF_VAR_proxmox_api_url: "{{ kubernetes_proxmox_api_url }}"
        TF_VAR_proxmox_api_token_id: "{{ kubernetes_proxmox_api_token_id }}"
        TF_VAR_proxmox_api_token_secret: "{{ kubernetes_proxmox_api_token_secret }}"
        TF_VAR_proxmox_tls_insecure: "{{ kubernetes_proxmox_tls_insecure | ternary('true', 'false') }}"
      when: kubernetes_destroy | bool
      no_log: false

    - name: Wait for dev Kubernetes SSH availability
      ansible.builtin.wait_for:
        host: "{{ item.ip }}"
        port: 22
        timeout: "{{ kubernetes_wait_for_ssh_timeout }}"
        delay: 10
      loop: "{{ kubernetes_dev_all_nodes }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - not kubernetes_plan_only | bool
        - not kubernetes_destroy | bool

    - name: Stop Ignition HTTP server (VMs are now ready)
      ansible.builtin.shell: |
        if pgrep -f "python.*http.server" > /dev/null 2>&1; then
          pkill -f "python.*http.server"
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      when:
        - not kubernetes_plan_only | bool
        - not kubernetes_destroy | bool

- name: Node/bootstrap phase (RKE2 + core addons)
  when:
    - inventory_hostname != "localhost"
    - kubernetes_configure_phase in ["all", "nodes"]
    - not kubernetes_plan_only | bool
    - not kubernetes_destroy | bool
  block:
    - name: Ensure prerequisite directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/rancher/rke2
        - /var/lib/rancher/rke2
        - /etc/sysctl.d
      become: true

    - name: Configure Kubernetes prerequisite sysctl values
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-kubernetes.conf
        mode: "0644"
        content: |
          net.ipv4.ip_forward=1
          net.bridge.bridge-nf-call-iptables=1
          net.bridge.bridge-nf-call-ip6tables=1
          vm.max_map_count=262144
      become: true

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      become: true
      changed_when: false

    - name: Generate or load RKE2 token
      ansible.builtin.set_fact:
        kubernetes_rke2_token: "{{ lookup('password', kubernetes_dev_generated_dir + '/rke2-token chars=ascii_letters,digits length=64') }}"
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Render RKE2 server config
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/rke2-server-config.yaml.j2"
        dest: /etc/rancher/rke2/config.yaml
        mode: "0600"
      become: true
      when: inventory_hostname in groups['kubernetes_dev_control_plane']
      no_log: true

    - name: Render RKE2 agent config
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/rke2-agent-config.yaml.j2"
        dest: /etc/rancher/rke2/config.yaml
        mode: "0600"
      become: true
      when: inventory_hostname in groups['kubernetes_dev_workers']
      no_log: true

    - name: Install RKE2 server binary
      ansible.builtin.shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ kubernetes_versions.rke2 }} INSTALL_RKE2_TYPE=server sh -
      args:
        executable: /bin/bash
        creates: /usr/local/bin/rke2
      become: true
      when: inventory_hostname in groups['kubernetes_dev_control_plane']

    - name: Install RKE2 agent binary
      ansible.builtin.shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ kubernetes_versions.rke2 }} INSTALL_RKE2_TYPE=agent sh -
      args:
        executable: /bin/bash
        creates: /usr/local/bin/rke2
      become: true
      when: inventory_hostname in groups['kubernetes_dev_workers']

    - name: Enable and start RKE2 server
      ansible.builtin.systemd:
        name: rke2-server
        enabled: true
        state: started
      become: true
      when: inventory_hostname in groups['kubernetes_dev_control_plane']

    - name: Ensure RKE2 kubectl path is exported on control-plane nodes
      ansible.builtin.copy:
        dest: /etc/profile.d/rke2-path.sh
        mode: "0644"
        content: |
          export PATH="$PATH:/var/lib/rancher/rke2/bin"
      become: true
      when: inventory_hostname in groups['kubernetes_dev_control_plane']

    - name: Ensure kubeconfig directory exists for admin user on control-plane
      ansible.builtin.file:
        path: "/home/{{ kubernetes_ansible_user }}/.kube"
        state: directory
        mode: "0700"
        owner: "{{ kubernetes_ansible_user }}"
        group: "{{ kubernetes_ansible_user }}"
      become: true
      when: inventory_hostname in groups['kubernetes_dev_control_plane']

    - name: Copy RKE2 kubeconfig to admin user's home on control-plane
      ansible.builtin.copy:
        src: /etc/rancher/rke2/rke2.yaml
        dest: "/home/{{ kubernetes_ansible_user }}/.kube/config"
        mode: "0600"
        owner: "{{ kubernetes_ansible_user }}"
        group: "{{ kubernetes_ansible_user }}"
        remote_src: true
      become: true
      when: inventory_hostname in groups['kubernetes_dev_control_plane']

    - name: Enable and start RKE2 agent
      ansible.builtin.systemd:
        name: rke2-agent
        enabled: true
        state: started
      become: true
      when: inventory_hostname in groups['kubernetes_dev_workers']

    - name: Wait for Kubernetes API
      ansible.builtin.wait_for:
        host: "{{ hostvars[groups['kubernetes_dev_control_plane'][0]].ansible_host }}"
        port: 6443
        timeout: 600
        delay: 15
      delegate_to: localhost
      run_once: true

    - name: Fetch kubeconfig from bootstrap control-plane
      ansible.builtin.fetch:
        src: /etc/rancher/rke2/rke2.yaml
        dest: "{{ kubernetes_dev_kubeconfig }}.raw"
        flat: true
      become: true
      delegate_to: "{{ groups['kubernetes_dev_control_plane'][0] }}"
      run_once: true

    - name: Build local kubeconfig with reachable API endpoint
      ansible.builtin.replace:
        path: "{{ kubernetes_dev_kubeconfig }}.raw"
        regexp: "127.0.0.1"
        replace: "{{ hostvars[groups['kubernetes_dev_control_plane'][0]].ansible_host }}"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Copy kubeconfig to final path
      ansible.builtin.copy:
        src: "{{ kubernetes_dev_kubeconfig }}.raw"
        dest: "{{ kubernetes_dev_kubeconfig }}"
        mode: "0600"
        remote_src: true
      become: false
      delegate_to: localhost
      run_once: true

    - name: Ensure Helm tools exist for addon deployment
      ansible.builtin.command: "which {{ item }}"
      loop:
        - helm
        - kubectl
      changed_when: false
      become: false
      delegate_to: localhost
      run_once: true

    - name: Add Helm repositories for core addons
      ansible.builtin.command:
        cmd: "helm repo add {{ item.name }} {{ item.url }}"
      loop:
        - { name: cilium, url: "https://helm.cilium.io/" }
        - { name: ingress-nginx, url: "https://kubernetes.github.io/ingress-nginx" }
        - { name: jetstack, url: "https://charts.jetstack.io" }
        - { name: external-dns, url: "https://kubernetes-sigs.github.io/external-dns/" }
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Install Cilium
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install cilium cilium/cilium
          --namespace kube-system
          --version {{ kubernetes_versions.cilium_chart }}
          --set kubeProxyReplacement=true
          --set operator.replicas=1
          --set nodeinit.enabled=true
          --set hubble.relay.enabled=true
          --set hubble.ui.enabled=false
          --wait --timeout 10m
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Verify Cilium status
      ansible.builtin.command:
        cmd: kubectl -n kube-system rollout status ds/cilium --timeout=10m
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Install ingress-nginx
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
          --namespace ingress-nginx --create-namespace
          --version {{ kubernetes_versions.ingress_nginx_chart }}
          --set controller.replicaCount=2
          --set controller.service.externalTrafficPolicy=Local
          --set controller.podLabels.cluster={{ kubernetes_environment }}
          --wait --timeout 10m
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Install cert-manager
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install cert-manager jetstack/cert-manager
          --namespace cert-manager --create-namespace
          --version {{ kubernetes_versions.cert_manager_chart }}
          --set installCRDs=true
          --set podLabels.cluster={{ kubernetes_environment }}
          --wait --timeout 10m
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Ensure external-dns namespace exists
      ansible.builtin.command:
        cmd: kubectl create namespace external-dns --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Render ExternalDNS values (Technitium)
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/externaldns-technitium-values.yaml.j2"
        dest: "{{ kubernetes_dev_externaldns_values_dir }}/externaldns-technitium-values.yaml"
        mode: "0644"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Render ExternalDNS values (Cloudflare)
      ansible.builtin.template:
        src: "{{ kubernetes_templates_dir }}/externaldns-cloudflare-values.yaml.j2"
        dest: "{{ kubernetes_dev_externaldns_values_dir }}/externaldns-cloudflare-values.yaml"
        mode: "0644"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Create Technitium ExternalDNS secret
      ansible.builtin.shell: |
        kubectl -n external-dns create secret generic externaldns-technitium-secret \
          --from-literal=api-token='{{ kubernetes_externaldns.technitium.token }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Create Cloudflare ExternalDNS secret
      ansible.builtin.shell: |
        kubectl -n external-dns create secret generic externaldns-cloudflare-secret \
          --from-literal=api-token='{{ kubernetes_externaldns.cloudflare.token }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Install ExternalDNS for Technitium
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install externaldns-technitium external-dns/external-dns
          --namespace external-dns
          --version {{ kubernetes_versions.external_dns_chart }}
          --values {{ kubernetes_dev_externaldns_values_dir }}/externaldns-technitium-values.yaml
          --wait --timeout 10m
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true

    - name: Install ExternalDNS for Cloudflare
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install externaldns-cloudflare external-dns/external-dns
          --namespace external-dns
          --version {{ kubernetes_versions.external_dns_chart }}
          --values {{ kubernetes_dev_externaldns_values_dir }}/externaldns-cloudflare-values.yaml
          --wait --timeout 10m
      environment:
        KUBECONFIG: "{{ kubernetes_dev_kubeconfig }}"
      become: false
      delegate_to: localhost
      run_once: true
