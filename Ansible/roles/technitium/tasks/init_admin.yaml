---
# =============================================================================
# Technitium DNS — Initial Admin Setup
# =============================================================================
# Detects whether the instance uses the custom password or the default "admin".
# Sets a fact `technitium_actual_password` for use in subsequent tasks.
# =============================================================================

- name: Technitium | Check if custom password works
  ansible.builtin.uri:
    url: "{{ technitium_api_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_admin_user | default('admin') }}"
      pass: "{{ technitium_admin_password }}"
    status_code: [200, 400]
    return_content: true
  register: _technitium_custom_password_check
  failed_when: false
  no_log: true

- name: Technitium | Set actual password to custom if it works
  ansible.builtin.set_fact:
    technitium_actual_password: "{{ technitium_admin_password }}"
  when: >-
    _technitium_custom_password_check.json is defined
    and _technitium_custom_password_check.json.status is defined
    and _technitium_custom_password_check.json.status == "ok"

- name: Technitium | Set actual password to default if custom doesn't work
  ansible.builtin.set_fact:
    technitium_actual_password: "admin"
  when: >-
    _technitium_custom_password_check.json is not defined
    or _technitium_custom_password_check.json.status is not defined
    or _technitium_custom_password_check.json.status != "ok"

- name: Technitium | Verify default password works when custom fails
  ansible.builtin.uri:
    url: "{{ technitium_api_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_admin_user | default('admin') }}"
      pass: "admin"
    status_code: [200, 400]
    return_content: true
  register: _technitium_default_password_check
  failed_when: false
  no_log: true
  when: >-
    _technitium_custom_password_check.json is not defined
    or _technitium_custom_password_check.json.status is not defined
    or _technitium_custom_password_check.json.status != "ok"

- name: Technitium | Fallback to custom password if default also fails
  ansible.builtin.set_fact:
    technitium_actual_password: "{{ technitium_admin_password }}"
  when: >-
    _technitium_default_password_check.json is defined
    and _technitium_default_password_check.json.status is defined
    and _technitium_default_password_check.json.status != "ok"

- name: Technitium | Log password detection result
  ansible.builtin.debug:
    msg: "Using {{ 'custom' if technitium_actual_password == technitium_admin_password else 'default' }} password for {{ inventory_hostname }}"
