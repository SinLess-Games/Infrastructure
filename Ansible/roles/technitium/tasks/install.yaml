---
# =============================================================================
# Technitium DNS — Install Tasks (FINAL FIXED + IDEMPOTENT)
# =============================================================================

# -----------------------------------------------------------------------------
# Guard rails
# -----------------------------------------------------------------------------
- name: Install | Assert Debian-family host
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "Technitium role currently supports Debian-family hosts only."
    success_msg: "All assertions passed"

# -----------------------------------------------------------------------------
# Defaults (override in inventory / group_vars / host_vars)
# -----------------------------------------------------------------------------
- name: Install | Set defaults
  ansible.builtin.set_fact:
    technitium_container_name: "{{ technitium_container_name | default('technitium') }}"
    technitium_image: "{{ technitium_image | default('technitium/dns-server') }}"
    technitium_image_tag: "{{ technitium_image_tag | default('latest') }}"
    technitium_data_dir: "{{ technitium_data_dir | default('/opt/technitium') }}"
    technitium_http_port: "{{ technitium_http_port | default(5380) }}"
    technitium_dns_port: "{{ technitium_dns_port | default(53) }}"
    technitium_bind_ip: "{{ technitium_bind_ip | default('0.0.0.0') }}"
    technitium_timezone: "{{ technitium_timezone | default('UTC') }}"
    technitium_env: "{{ technitium_env | default({}) }}"
    technitium_restart_policy: "{{ technitium_restart_policy | default('unless-stopped') }}"
    technitium_install_docker_compose_plugin: "{{ technitium_install_docker_compose_plugin | default(false) }}"

    technitium_manage_port53_conflicts: "{{ technitium_manage_port53_conflicts | default(true) }}"
    technitium_conflicting_dns_services:
      - systemd-resolved
      - dnsmasq
      - unbound
      - bind9
      - named
      - pihole-FTL

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
- name: Install | Build container environment
  ansible.builtin.set_fact:
    _technitium_env: "{{ {'TZ': technitium_timezone} | combine(technitium_env, recursive=True) }}"

# -----------------------------------------------------------------------------
# OS detection (Jinja-safe)
# -----------------------------------------------------------------------------
- name: Install | Read /etc/os-release
  ansible.builtin.slurp:
    src: /etc/os-release
  register: _os_release_raw

- name: Install | Parse /etc/os-release
  ansible.builtin.set_fact:
    _os_release: >-
      {{
        dict(
          _os_release_raw.content
          | b64decode
          | split('\n')
          | select('search', '=')
          | map('split', '=', 1)
        )
      }}

- name: Install | Determine Docker repo distro + codename
  ansible.builtin.set_fact:
    _docker_repo_distro: >-
      {{
        'raspbian'
        if ansible_distribution | lower in ['raspbian', 'raspberry pi os']
        else ansible_distribution | lower
      }}
    _docker_repo_codename: "{{ ansible_distribution_release | lower }}"
    _docker_repo_url: >-
      https://download.docker.com/linux/{{
        'raspbian'
        if ansible_distribution | lower in ['raspbian', 'raspberry pi os']
        else ansible_distribution | lower
      }}

# -----------------------------------------------------------------------------
# Docker installation
# -----------------------------------------------------------------------------
- name: Install | Install APT prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Install | Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install | Add Docker GPG key
  ansible.builtin.get_url:
    url: "{{ _docker_repo_url }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: Install | Get dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: _dpkg_arch
  changed_when: false

- name: Install | Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ _dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] {{ _docker_repo_url }} {{ _docker_repo_codename }} stable"
    filename: docker
    state: present
    update_cache: true

- name: Install | Install Docker engine
  ansible.builtin.apt:
    name: >-
      {{ ['docker-ce', 'docker-ce-cli', 'containerd.io', 'docker-buildx-plugin']
         + (technitium_install_docker_compose_plugin | bool
            | ternary(['docker-compose-plugin'], [])) }}
    state: present

- name: Install | Ensure Docker running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Install | Install python3-docker
  ansible.builtin.apt:
    name: python3-docker
    state: present

# -----------------------------------------------------------------------------
# Detect existing Technitium container (CRITICAL FIX)
# -----------------------------------------------------------------------------
- name: Install | Check if Technitium container already exists
  community.docker.docker_container_info:
    name: "{{ technitium_container_name }}"
  register: _technitium_container_info
  failed_when: false

# -----------------------------------------------------------------------------
# Port 53 conflict handling
# -----------------------------------------------------------------------------
- name: Install | Stop conflicting DNS services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ technitium_conflicting_dns_services }}"
  when: technitium_manage_port53_conflicts | bool
  failed_when: false

- name: Install | Check TCP/53
  ansible.builtin.shell: "ss -H -ltnup '( sport = :53 )' || true"
  register: _tcp53
  changed_when: false

- name: Install | Check UDP/53
  ansible.builtin.shell: "ss -H -lnup '( sport = :53 )' || true"
  register: _udp53
  changed_when: false

- name: Install | Fail if port 53 still busy (only on first install)
  ansible.builtin.fail:
    msg: |
      Port 53 is still in use by a non-Technitium service.

      TCP:
      {{ _tcp53.stdout | default('none') }}

      UDP:
      {{ _udp53.stdout | default('none') }}
  when:
    - technitium_manage_port53_conflicts | bool
    - (_technitium_container_info.container is not defined)
    - (_tcp53.stdout | length > 0 or _udp53.stdout | length > 0)

# -----------------------------------------------------------------------------
# Technitium container
# -----------------------------------------------------------------------------
- name: Install | Ensure data directory exists
  ansible.builtin.file:
    path: "{{ technitium_data_dir }}"
    state: directory
    mode: "0755"

- name: Install | Run Technitium DNS container
  community.docker.docker_container:
    name: "{{ technitium_container_name }}"
    image: "{{ technitium_image }}:{{ technitium_image_tag }}"
    pull: true
    state: started
    restart_policy: "{{ technitium_restart_policy }}"
    published_ports:
      - "{{ technitium_bind_ip }}:{{ technitium_http_port }}:5380/tcp"
      - "{{ technitium_bind_ip }}:{{ technitium_dns_port }}:53/udp"
      - "{{ technitium_bind_ip }}:{{ technitium_dns_port }}:53/tcp"
    volumes:
      - "{{ technitium_data_dir }}:/etc/dns"
    env: "{{ _technitium_env }}"
