---
# =============================================================================
# DNS Resolver Role – Fix Static /etc/resolv.conf
# =============================================================================

- name: Remove immutable attribute from /etc/resolv.conf when present
  ansible.builtin.command: chattr -i /etc/resolv.conf
  changed_when: false
  failed_when: false

- name: Remove symlink if /etc/resolv.conf is a symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  when: dns__resolv_is_symlink

- name: Create static /etc/resolv.conf
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/dns/resolv.conf.j2"
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'
    unsafe_writes: true

- name: Protect /etc/resolv.conf from being overwritten
  ansible.builtin.file:
    path: /etc/resolv.conf
    attributes: +i
  failed_when: false

- name: Display static resolv.conf fix status
  ansible.builtin.debug:
    msg: "Created static /etc/resolv.conf with DNS servers: {{ dns_servers }}"
