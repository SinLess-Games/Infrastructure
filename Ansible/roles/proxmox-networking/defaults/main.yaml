---
# =============================================================================
# Proxmox Networking Role Defaults
# =============================================================================
# This role consumes variables defined in:
#   group_vars/proxmox/networking.yaml
#
# The following defaults control role behavior and provide fallback values.
# Override these in group_vars or host_vars as needed.
# =============================================================================

# =============================================================================
# Role Behavior Flags
# =============================================================================

# Enable/disable network management entirely
proxmox_networking_enabled: true

# Apply configuration automatically (set to false for dry-run/review)
proxmox_networking_apply: true

# Backup existing configuration before changes
proxmox_networking_backup: true

# =============================================================================
# File Paths
# =============================================================================

# Location of network interfaces file on nodes
proxmox_interfaces_file: "/etc/network/interfaces"

# Directory for storing network configuration backups
proxmox_networking_backup_dir: "{{ lookup('env', 'PWD') }}/.outputs"

# =============================================================================
# Expected Variables from group_vars
# =============================================================================
# The role expects these variables to be defined in group_vars/proxmox/networking.yaml
# If not set here, they MUST be provided by group_vars or the role will fail:
#
# - proxmox_node_interfaces (REQUIRED)
#   Type: dict
#   Example:
#     pve-01:
#       enp9s0:
#         inet: "10.10.10.15"
#         netmask: "255.255.255.0"
#         gateway: "10.10.10.1"
#
# - proxmox_node_bonds (REQUIRED)
#   Type: dict (can be empty)
#   Example:
#     pve-01:
#       bond0:
#         interfaces: ["enp8s0"]
#         mode: "802.3ad"
#         miimon: 100
#         lacp_rate: "fast"
#         xmit_hash_policy: "layer3+4"
#
# - proxmox_node_bridges (REQUIRED)
#   Type: dict (can be empty)
#   Example:
#     pve-01:
#       vmbr40:
#         description: "VM Bridge - VLAN 40 (Production)"
#         vlan_id: 40
#         ports: ["bond0"]
#         address: "10.10.40.15/24"
#         vlan_aware: true
#         auto: true
#         stp: true
#         stp_forward_delay: 0
#
# - proxmox_bridges (REQUIRED)
#   Type: dict
#   Global defaults for all bridges across all nodes
#
# - proxmox_management_network (REQUIRED)
#   Type: string (CIDR)
#   Example: "10.10.10.0/24"
#
# - proxmox_cluster_network (REQUIRED)
#   Type: string (CIDR)
#   Example: "10.10.10.0/24"
#
# - proxmox_ceph_network (REQUIRED)
#   Type: string (CIDR)
#   Example: "10.10.60.0/24"
#
# - proxmox_networking_restart_required (OPTIONAL, default: false)
#   Type: boolean
#   Whether to automatically restart networking after applying config

# =============================================================================
# Fallback Variables (if group_vars not provided)
# =============================================================================

# Management network CIDR (fallback only)
proxmox_management_network: "10.10.10.0/24"

# Cluster network CIDR (fallback only)
proxmox_cluster_network: "10.10.10.0/24"

# Ceph network CIDR (fallback only)
proxmox_ceph_network: "10.10.60.0/24"

# Whether to automatically restart networking after applying config
proxmox_networking_restart_required: true

# Empty defaults for required variables (will use group_vars)
proxmox_node_interfaces: {}
proxmox_node_bonds: {}
proxmox_node_bridges: {}
proxmox_bridges: {}
