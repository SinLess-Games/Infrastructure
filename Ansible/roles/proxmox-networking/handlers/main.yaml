---
# =============================================================================
# Proxmox Networking Handlers
# =============================================================================

- name: Reload networking interfaces
  shell: |
    ifreload -a
  become: yes
  listen: "reload networking"

- name: Restart networking service
  systemd:
    name: networking
    state: restarted
    daemon_reload: yes
  become: yes
  listen: "restart networking"
