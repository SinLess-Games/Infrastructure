---
# =============================================================================
# Proxmox Networking Handlers
# =============================================================================
# Handlers for network configuration management.
# Triggered by notify: in tasks when network configuration is changed.
# =============================================================================

- name: restart networking
  block:
    - name: Reload network interfaces with ifreload
      command: ifreload -a
      become: yes
      register: reload_result
      failed_when: "'error' in reload_result.stderr | lower"
      listen: "restart networking"

  become: yes
