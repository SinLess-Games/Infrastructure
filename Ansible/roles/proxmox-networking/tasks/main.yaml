---
# =============================================================================
# Proxmox Networking Configuration Tasks
# =============================================================================
# Configures network interfaces, bonds, and VLAN bridges using the complete
# variable structure defined in group_vars/proxmox/networking.yaml
#
# Variables consumed:
#   - proxmox_node_interfaces: Management IPs per node
#   - proxmox_node_bonds: Bond configuration per node
#   - proxmox_node_bridges: Node-specific bridge overrides
#   - proxmox_bridges: Global bridge defaults
#   - proxmox_management_network: Management network CIDR
#   - proxmox_cluster_network: Cluster network CIDR
#   - proxmox_ceph_network: Ceph storage network CIDR
#   - proxmox_networking_restart_required: Auto-restart flag
# =============================================================================

- name: Ensure networking facts are gathered
  setup:
    gather_subset:
      - network
  when: ansible_facts.network is not defined

# =============================================================================
# Phase 0: Validate and prepare configuration
# =============================================================================

- name: Validate node is in proxmox_node_interfaces
  assert:
    that:
      - inventory_hostname in proxmox_node_interfaces
    fail_msg: "Node {{ inventory_hostname }} is not defined in proxmox_node_interfaces"
  tags: [network, validate]

- name: Set fact for node management interface configuration
  set_fact:
    node_interfaces: "{{ proxmox_node_interfaces[inventory_hostname] }}"
    node_bonds: "{{ proxmox_node_bonds.get(inventory_hostname, {}) }}"
    node_bridge_overrides: "{{ proxmox_node_bridges.get(inventory_hostname, {}) }}"
  tags: [network, facts]

- name: Display configuration for this node
  debug:
    msg:
      - "Node: {{ inventory_hostname }}"
      - "Management interfaces: {{ node_interfaces.keys() | list }}"
      - "Bonds: {{ node_bonds.keys() | list }}"
      - "Bridge overrides: {{ node_bridge_overrides.keys() | list | difference(['vmbr0']) }}"
  tags: [network, facts]

# =============================================================================
# Phase 1: Backup existing network configuration
# =============================================================================

- name: Create backup directory on controller
  file:
    path: "{{ proxmox_networking_backup_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true
  when: proxmox_networking_backup
  tags: [network, backup]

- name: Download current network interfaces configuration
  fetch:
    src: "{{ proxmox_interfaces_file }}"
    dest: "{{ proxmox_networking_backup_dir }}/{{ inventory_hostname }}_interfaces_{{ ansible_date_time.iso8601_basic_short }}"
    flat: yes
  become: yes
  when: proxmox_networking_backup
  tags: [network, backup]

- name: Backup interfaces file on node
  block:
    - name: Create backup of interfaces file on node
      shell: |
        cp {{ proxmox_interfaces_file }} {{ proxmox_interfaces_file }}.bak.{{ ansible_date_time.iso8601_basic_short }}
      become: yes
      changed_when: false
      register: backup_created

    - name: Display backup location
      debug:
        msg: "Backup created: {{ proxmox_interfaces_file }}.bak.{{ ansible_date_time.iso8601_basic_short }}"
      when: backup_created is succeeded

  when: proxmox_networking_backup
  tags: [network, backup]

# =============================================================================
# Phase 2: Gather and validate current network state
# =============================================================================

- name: Get current network interfaces
  shell: |
    ip link show | grep -E "^[0-9]+:" | awk -F': ' '{print $2}' | grep -v "^lo$"
  register: current_interfaces
  changed_when: false
  become: yes
  tags: [network, facts]

- name: Extract existing management interface configuration
  shell: |
    # Get only up to the first VLAN bridge config or any bridges
    awk '
    /^auto vmbr[0-9]/ || /^auto bond/ { exit }
    NF > 0 { print }
    ' {{ proxmox_interfaces_file }}
  register: original_config
  changed_when: false
  become: yes
  tags: [network, parse]

- name: Get interface addresses
  shell: |
    ip addr show | grep -E "inet|inet6" | grep -v "127.0.0.1" | awk '{print $2}'
  register: interface_addresses
  changed_when: false
  become: yes
  tags: [network, facts]

- name: Display current network state
  debug:
    msg:
      - "Current interfaces: {{ current_interfaces.stdout_lines }}"
      - "Current addresses: {{ interface_addresses.stdout_lines }}"
      - "Management interface config preserved for: {{ node_interfaces.keys() | list | join(', ') }}"
  tags: [network, facts]

# =============================================================================
# Phase 3: Prepare and merge bridge configuration
# =============================================================================

- name: Merge global and node-specific bridge configurations
  set_fact:
    merged_bridges: >-
      {{
        proxmox_bridges | combine(
          node_bridge_overrides | dict2items | selectattr('value', 'ne', None) | list | items2dict
        )
      }}
  tags: [network, config]

- name: Validate all bridges have required fields
  assert:
    that:
      - item.value.description is defined
      - item.value.vlan_id is defined
      - item.value.vlan_aware is defined
      - item.value.auto is defined
      - item.value.stp is defined
    fail_msg: "Bridge {{ item.key }} missing required fields: description, vlan_id, vlan_aware, auto, stp"
  loop: "{{ merged_bridges | dict2items }}"
  tags: [network, validate]

- name: Display merged bridge configuration
  debug:
    msg: |
      Bridge configuration for {{ inventory_hostname }}:
      {% for name, config in merged_bridges.items() | sort %}
      - {{ name }}: {{ config.description }}
        VLAN: {{ config.vlan_id }}
        Address: {{ config.get('address', 'none') }}
        Ports: {{ config.get('ports', []) | join(', ') if config.get('ports') else 'none' }}
        VLAN-Aware: {{ config.get('vlan_aware', false) }}
        STP: {{ config.get('stp', false) }}
      {% endfor %}
  tags: [network, config]

# =============================================================================
# Phase 4: Validate bonds configuration if present
# =============================================================================

- name: Validate bond configuration
  block:
    - name: Check bonds have required fields
      assert:
        that:
          - item.value.interfaces is defined
          - item.value.mode is defined
          - item.value.miimon is defined
        fail_msg: "Bond {{ item.key }} missing required fields"
      loop: "{{ node_bonds | dict2items }}"

    - name: Display bond configuration
      debug:
        msg: |
          Bond configuration for {{ inventory_hostname }}:
          {% for name, config in node_bonds.items() %}
          - {{ name }}: {{ config.mode }}
            Interfaces: {{ config.interfaces | join(', ') }}
            MII: {{ config.miimon }}ms, LACP rate: {{ config.get('lacp_rate', 'standard') }}
          {% endfor %}

  when: node_bonds | length > 0
  tags: [network, validate]

# =============================================================================
# Phase 5: Generate and validate network configuration
# =============================================================================

- name: Generate new interfaces configuration from template
  block:
    - name: Template interfaces file
      template:
        src: "interfaces.j2"
        dest: "/etc/network/interfaces.new"
        owner: root
        group: root
        mode: '0644'
        backup: yes
      become: yes
      register: interfaces_template
      tags: [network, template]

    - name: Display generated configuration
      shell: cat /etc/network/interfaces.new
      register: generated_config
      changed_when: false
      become: yes
      tags: [network, template]

    - name: Show generated configuration
      debug:
        msg: "{{ generated_config.stdout_lines }}"
      tags: [network, template]

  tags: [network]

# =============================================================================
# Phase 6: Configuration validation and summary
# =============================================================================

- name: Validate network parameters
  assert:
    that:
      - proxmox_management_network is regex('^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[0-9]{1,2}$')
      - proxmox_cluster_network is regex('^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[0-9]{1,2}$')
      - proxmox_ceph_network is regex('^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/[0-9]{1,2}$')
    fail_msg: "Invalid network CIDR format in management/cluster/ceph networks"
  tags: [network, validate]

- name: Display network configuration summary
  debug:
    msg: |
      ==================== NETWORK CONFIGURATION SUMMARY ====================
      Node: {{ inventory_hostname }}
      
      === Management Interface ===
      {% for iface, config in node_interfaces.items() %}
      - {{ iface }}:
        IP: {{ config.inet }}/{{ config.netmask }}
        Gateway: {{ config.gateway }}
      {% endfor %}
      
      === Bonds ===
      {% if node_bonds %}
      {% for bond_name, bond_config in node_bonds.items() %}
      - {{ bond_name }}: {{ bond_config.mode }}
        Interfaces: {{ bond_config.interfaces | join(', ') }}
        MII: {{ bond_config.miimon }}ms
      {% endfor %}
      {% else %}
      (none configured)
      {% endif %}
      
      === VLAN Bridges ===
      {% for name, config in merged_bridges.items() | sort %}
      - {{ name }} (VLAN {{ config.vlan_id }}): {{ config.description }}
        Address: {{ config.get('address', 'none') }}
        Ports: {{ config.get('ports', []) | join(', ') if config.get('ports', []) else 'none' }}
        VLAN-Aware: {{ config.get('vlan_aware', false) }}
        STP: {{ config.get('stp', false) }}
      {% endfor %}
      
      === Network Parameters ===
      Management Network: {{ proxmox_management_network }}
      Cluster Network: {{ proxmox_cluster_network }}
      Ceph Network: {{ proxmox_ceph_network }}
      Restart Required: {{ proxmox_networking_restart_required }}
      
      Generated config file: /etc/network/interfaces.new
      {% if proxmox_networking_apply | bool %}Status: Ready to apply{% else %}Status: Review only (apply disabled){% endif %}
      ======================================================================
  tags: [network, summary]

# =============================================================================
# Phase 7: Apply configuration (if enabled)
# =============================================================================

- name: Apply network configuration
  block:
    - name: Copy new configuration to interfaces file
      copy:
        src: /etc/network/interfaces.new
        dest: "{{ proxmox_interfaces_file }}"
        remote_src: yes
        owner: root
        group: root
        mode: '0644'
        backup: yes
      become: yes
      register: config_applied
      notify: "restart networking"
      tags: [network, apply]

    - name: Display configuration applied
      debug:
        msg: "Network configuration applied to {{ proxmox_interfaces_file }}"
      when: config_applied is changed
      tags: [network, apply]

    - name: Test configuration with ifreload (dry-run)
      shell: |
        ifreload -n 2>&1 || echo "Validation passed (warnings may occur)"
      become: yes
      register: ifreload_test
      changed_when: false
      tags: [network, apply]

    - name: Display ifreload test results
      debug:
        msg: "Configuration validation: {{ ifreload_test.stdout_lines }}"
      tags: [network, apply]

  when: proxmox_networking_enabled | bool and proxmox_networking_apply | bool
  tags: [network]

# =============================================================================
# Phase 8: Handle restart if required
# =============================================================================

- name: Reload networking configuration
  block:
    - name: Reload network interfaces (ifreload -a)
      command: ifreload -a
      become: yes
      register: reload_result
      changed_when: "'error' not in reload_result.stderr | lower"
      when: proxmox_networking_restart_required | bool
      tags: [network, reload]

    - name: Display reload results
      debug:
        msg: |
          Network reload results:
          stdout: {{ reload_result.stdout | default('skipped') }}
          stderr: {{ reload_result.stderr | default('skipped') }}
      when: proxmox_networking_restart_required | bool
      tags: [network, reload]

    - name: Verify bridges after reload
      shell: |
        ip link show | grep -E "vmbr" | awk '{print $2}' | sed 's/:$//' | sort
      register: created_bridges
      changed_when: false
      become: yes
      when: proxmox_networking_restart_required | bool
      tags: [network, reload]

    - name: Display active bridges
      debug:
        msg: "Active bridges: {{ created_bridges.stdout_lines if created_bridges is defined and created_bridges.stdout_lines is defined and (created_bridges.stdout_lines | length) > 0 else 'Bridges will be active after reboot' }}"
      tags: [network, reload]

  when: proxmox_networking_enabled | bool and proxmox_networking_apply | bool
  tags: [network]

# =============================================================================
# Configuration Summary
# =============================================================================

- name: Final configuration summary (apply disabled)
  debug:
    msg: |
      ==================== CONFIGURATION REVIEW REQUIRED ====================
      Configuration has been generated but NOT applied.
      
      To apply manually:
        1. Review: cat /etc/network/interfaces.new
        2. Compare: diff /etc/network/interfaces /etc/network/interfaces.new
        3. Backup: cp /etc/network/interfaces /etc/network/interfaces.bak
        4. Apply: cp /etc/network/interfaces.new /etc/network/interfaces
        5. Reload: ifreload -a (or reboot for guaranteed consistency)
      
      Node: {{ inventory_hostname }}
      Generated config: /etc/network/interfaces.new
      Auto-restart enabled: {{ proxmox_networking_restart_required }}
      ======================================================================
  when: not (proxmox_networking_apply | bool) or not (proxmox_networking_enabled | bool)
  tags: [network, summary]

- name: Configuration applied successfully
  debug:
    msg: |
      ==================== CONFIGURATION APPLIED ====================
      Node: {{ inventory_hostname }}
      Configuration file: {{ proxmox_interfaces_file }}
      
      {% if proxmox_networking_restart_required | bool %}
      Network configuration has been reloaded.
      New VLAN bridges are now active.
      Management network: {{ proxmox_management_network }}
      Cluster network: {{ proxmox_cluster_network }}
      Ceph network: {{ proxmox_ceph_network }}
      
      To verify: ip link show | grep vmbr
      {% else %}
      Configuration applied but network restart is NOT required.
      Changes will take effect after reboot or manual restart.
      {% endif %}
      ===============================================================
  when: proxmox_networking_enabled | bool and proxmox_networking_apply | bool and config_applied is changed
  tags: [network, summary]
