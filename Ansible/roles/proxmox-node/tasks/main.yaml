---
# =============================================================================
# Role: proxmox-node
# File: roles/proxmox-node/tasks/main.yaml
#
# Purpose:
#   Configure a Proxmox VE node in a safe, repeatable, cluster-ready manner.
#   Designed for:
#     - Proxmox VE clusters
#     - Ceph (Squid)
#     - Corosync / HA
#
# Execution order is intentional.
# =============================================================================

# -----------------------------------------------------------------------------
# Validation (fail fast)
# -----------------------------------------------------------------------------
- name: Validate Proxmox node variables
  ansible.builtin.import_tasks: validate.yaml
  tags: [proxmox, validate]

# -----------------------------------------------------------------------------
# Repository configuration
# -----------------------------------------------------------------------------
- name: Configure Proxmox and Ceph repositories
  ansible.builtin.import_tasks: repos.yaml
  tags: [proxmox, repos]

# -----------------------------------------------------------------------------
# System packages
# -----------------------------------------------------------------------------
- name: Install Proxmox node packages
  ansible.builtin.import_tasks: packages.yaml
  tags: [proxmox, packages]

# -----------------------------------------------------------------------------
# Kernel & bootloader configuration
# -----------------------------------------------------------------------------
- name: Configure kernel and boot parameters
  ansible.builtin.import_tasks: kernel.yaml
  tags: [proxmox, kernel]

# -----------------------------------------------------------------------------
# Sysctl tuning (networking, Ceph, virtualization)
# -----------------------------------------------------------------------------
- name: Apply sysctl tuning
  ansible.builtin.import_tasks: sysctl.yaml
  tags: [proxmox, sysctl]

# -----------------------------------------------------------------------------
# Security hardening (SSH, firewall, services)
# -----------------------------------------------------------------------------
- name: Apply Proxmox node security configuration
  ansible.builtin.import_tasks: security.yaml
  tags: [proxmox, security]

# -----------------------------------------------------------------------------
# Time synchronization (Chrony)
# -----------------------------------------------------------------------------
- name: Configure time synchronization
  ansible.builtin.import_tasks: time.yaml
  tags: [proxmox, time, chrony]

# -----------------------------------------------------------------------------
# DNS resolver configuration (node-level)
# -----------------------------------------------------------------------------
- name: Configure node DNS
  ansible.builtin.import_tasks: dns.yaml
  tags: [proxmox, dns]

# -----------------------------------------------------------------------------
# Proxmox API & cluster readiness
# -----------------------------------------------------------------------------
- name: Configure Proxmox API access
  ansible.builtin.import_tasks: api.yaml
  tags: [proxmox, api]

# -----------------------------------------------------------------------------
# Final sanity checks
# -----------------------------------------------------------------------------
- name: Proxmox node configuration completed
  ansible.builtin.debug:
    msg: >
      Proxmox node {{ inventory_hostname }} has completed base configuration.
      Reboot may be required if kernel or sysctl parameters changed.
  tags: [proxmox, summary]
