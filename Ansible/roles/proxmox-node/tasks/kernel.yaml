---
# =============================================================================
# proxmox-node — kernel
# -----------------------------------------------------------------------------
# Kernel, sysctl, and boot-time tuning for Proxmox VE nodes.
#
# Goals:
# - Safe defaults for virtualization hosts
# - Prepared for Kubernetes, Ceph, and high-throughput networking
# - Explicit, auditable, and reversible
#
# Validation is handled in tasks/validate.yaml
# This file assumes the host is already verified as Proxmox VE.
#
# This file does NOT reboot automatically.
# =============================================================================

# -----------------------------------------------------------------------------
# Load required kernel modules
# -----------------------------------------------------------------------------

- name: Ensure required kernel modules are loaded
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - kvm
    - kvm_intel
    - kvm_amd
    - vfio
    - vfio_iommu_type1
    - vfio_pci
    - br_netfilter
    - overlay
  failed_when: false

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/proxmox.conf
    mode: "0644"
    content: |
      kvm
      kvm_intel
      kvm_amd
      vfio
      vfio_iommu_type1
      vfio_pci
      br_netfilter
      overlay

# -----------------------------------------------------------------------------
# Sysctl tuning
# -----------------------------------------------------------------------------

- name: Apply Proxmox kernel sysctl tuning
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-proxmox.conf
    mode: "0644"
    content: |
      # ---------------------------------------------------------
      # Proxmox / Virtualization defaults
      # ---------------------------------------------------------
      vm.swappiness = 10
      vm.dirty_ratio = 20
      vm.dirty_background_ratio = 10
      vm.max_map_count = 262144

      # ---------------------------------------------------------
      # Networking (Kubernetes / Ceph friendly)
      # ---------------------------------------------------------
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
      net.ipv4.tcp_mtu_probing = 1
      net.ipv4.tcp_congestion_control = bbr
      net.core.netdev_max_backlog = 250000
      net.core.rmem_max = 134217728
      net.core.wmem_max = 134217728
      net.ipv4.tcp_rmem = 4096 87380 67108864
      net.ipv4.tcp_wmem = 4096 65536 67108864

      # ---------------------------------------------------------
      # File descriptors / inotify
      # ---------------------------------------------------------
      fs.inotify.max_user_instances = 8192
      fs.inotify.max_user_watches = 1048576
      fs.file-max = 2097152

      # ---------------------------------------------------------
      # Security hardening (safe defaults)
      # ---------------------------------------------------------
      kernel.kptr_restrict = 2
      kernel.dmesg_restrict = 1
      kernel.unprivileged_bpf_disabled = 1

- name: Reload sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: true

# -----------------------------------------------------------------------------
# IOMMU configuration (optional, guarded)
# -----------------------------------------------------------------------------

- name: Detect CPU vendor
  ansible.builtin.set_fact:
    proxmox_cpu_vendor: >-
      {{ 'intel' if 'GenuineIntel' in ansible_processor | join(' ')
         else 'amd' if 'AuthenticAMD' in ansible_processor | join(' ')
         else 'unknown' }}

- name: Configure GRUB for IOMMU (optional)
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: >-
      GRUB_CMDLINE_LINUX_DEFAULT="quiet
      {{ 'intel_iommu=on iommu=pt' if proxmox_cpu_vendor == 'intel'
         else 'amd_iommu=on iommu=pt' if proxmox_cpu_vendor == 'amd'
         else '' }}"
  when:
    - proxmox_node.enable_iommu | default(false)

- name: Update GRUB configuration
  ansible.builtin.command: update-grub
  when:
    - proxmox_node.enable_iommu | default(false)
  changed_when: true

# -----------------------------------------------------------------------------
# Hugepages (optional, Ceph / high-perf workloads)
# -----------------------------------------------------------------------------

- name: Configure hugepages (optional)
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-hugepages.conf
    mode: "0644"
    content: |
      vm.nr_hugepages = {{ proxmox_node.hugepages | default(0) }}
  when:
    - proxmox_node.hugepages is defined
    - proxmox_node.hugepages | int > 0

# -----------------------------------------------------------------------------
# Reboot hint (explicit, never automatic)
# -----------------------------------------------------------------------------

- name: Kernel configuration applied — reboot required
  ansible.builtin.debug:
    msg: >
      Kernel and sysctl configuration applied.
      A reboot is REQUIRED for IOMMU or module changes to fully take effect.
      Reboot manually when safe.
