---
# =============================================================================
# proxmox-node — security
# -----------------------------------------------------------------------------
# Baseline security hardening for Proxmox VE nodes
# with automatic SSH key deployment for cluster joins.
# =============================================================================

# -----------------------------------------------------------------------------
# Root SSH keys deployment (from .outputs/ssh/root)
# -----------------------------------------------------------------------------

- name: Ensure root SSH directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Copy all root SSH materials to node
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/root/.ssh/{{ item | basename }}"
    owner: root
    group: root
    mode: >-
      {{ '0600'
         if (item | regex_search('id_.*$') and not item | regex_search('\\.pub$'))
         else '0644'
      }}
  with_fileglob:
    - "{{ ssh_output_base }}/root/*"

- name: Ensure root authorized_keys contains root public key
  ansible.builtin.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', ssh_output_base + '/root/id_ed25519.pub') }}"

- name: Configure root SSH client defaults for cluster operations
  ansible.builtin.blockinfile:
    path: /root/.ssh/config
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE PROXMOX SSH CONFIG"
    block: |
      Host *
        IdentityFile /root/.ssh/id_ed25519
        StrictHostKeyChecking no
        UserKnownHostsFile /root/.ssh/known_hosts
        LogLevel ERROR

- name: Add cluster init node to known_hosts
  ansible.builtin.known_hosts:
    path: /root/.ssh/known_hosts
    name: "{{ proxmox_cluster_init_node }}"
    key: "{{ lookup('pipe', 'ssh-keyscan -p 22 ' ~ proxmox_cluster_init_node) }}"
  when:
    - proxmox_cluster_init_node is defined
    - proxmox_cluster_init_node | length > 0

# -----------------------------------------------------------------------------
# SSH hardening (safe defaults for Proxmox)
# -----------------------------------------------------------------------------

- name: Ensure SSH server is installed
  ansible.builtin.package:
    name: openssh-server
    state: present

- name: Harden SSH configuration (Proxmox-safe)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
    state: present
    create: false
  loop:
    - { key: "Protocol", value: "2" }
    - { key: "PermitRootLogin", value: "prohibit-password" }
    - { key: "PasswordAuthentication", value: "no" }
    - { key: "ChallengeResponseAuthentication", value: "no" }
    - { key: "UsePAM", value: "yes" }
    - { key: "X11Forwarding", value: "no" }
    - { key: "ClientAliveInterval", value: "300" }
    - { key: "ClientAliveCountMax", value: "2" }
  notify: Restart sshd

# -----------------------------------------------------------------------------
# Firewall baseline (do not enforce policy here)
# -----------------------------------------------------------------------------

- name: Ensure firewall tooling is installed
  ansible.builtin.package:
    name:
      - nftables
      - iptables
      - ipset
    state: present

- name: Ensure nftables service is enabled (but not enforcing rules)
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

# -----------------------------------------------------------------------------
# Kernel / sysctl safety settings
# -----------------------------------------------------------------------------

- name: Apply kernel network hardening sysctls
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: "net.ipv4.ip_forward", value: "1" }           # Required for bridges
    - { name: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.rp_filter", value: "2" }   # Loose mode for corosync
    - { name: "net.ipv4.conf.default.rp_filter", value: "2" }
    - { name: "kernel.kptr_restrict", value: "2" }
    - { name: "kernel.dmesg_restrict", value: "1" }

# -----------------------------------------------------------------------------
# Disable insecure legacy services (only if they exist)
# -----------------------------------------------------------------------------

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Disable legacy/insecure services if present
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - telnet
    - rsh
    - rlogin
    - rexec
  when: item in ansible_facts.services

# -----------------------------------------------------------------------------
# APT security hygiene
# -----------------------------------------------------------------------------

- name: Ensure unattended-upgrades is installed
  ansible.builtin.package:
    name: unattended-upgrades
    state: present

- name: Enable unattended-upgrades service
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started

# -----------------------------------------------------------------------------
# Validation marker
# -----------------------------------------------------------------------------

- name: Proxmox security baseline applied
  ansible.builtin.debug:
    msg: "Proxmox node security baseline successfully applied."
