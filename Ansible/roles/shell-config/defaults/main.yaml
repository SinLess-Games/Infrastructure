---
# =============================================================================
# shell-config defaults
# =============================================================================

shell_config_enabled: true

shell_default: zsh

shell_config_users: "{{ users }}"

shell_install_starship: true
shell_install_oh_my_zsh: true

shell_zsh_theme: robbyrussell

# Where config files live (XDG-compliant)
shell_starship_config_dir: ".config/starship"
shell_starship_config_file: "config.toml"
