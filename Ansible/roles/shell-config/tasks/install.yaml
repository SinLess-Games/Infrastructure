---
# =============================================================================
# Install shell tooling (zsh, oh-my-zsh, starship)
# -----------------------------------------------------------------------------
# - zsh: system package
# - oh-my-zsh: per-user install (git clone, non-destructive)
# - starship: package manager preferred, script fallback
# =============================================================================

# -----------------------------------------------------------------------------
# Zsh
# -----------------------------------------------------------------------------

- name: Ensure zsh is installed
  ansible.builtin.package:
    name: zsh
    state: present
  when: shell_install_zsh | default(true)

# -----------------------------------------------------------------------------
# Oh My Zsh (per-user, safe + idempotent)
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Oh My Zsh (per-user, crash-safe)
# -----------------------------------------------------------------------------

- name: Ensure Oh My Zsh directory exists (root, no ownership)
  ansible.builtin.file:
    path: "{{ item.home_directory }}/.oh-my-zsh"
    state: directory
    mode: "0755"
  loop: "{{ shell_config_users }}"
  when:
    - shell_install_oh_my_zsh
    - item.shell == '/bin/zsh'

- name: Fix ownership of Oh My Zsh directory
  ansible.builtin.file:
    path: "{{ item.home_directory }}/.oh-my-zsh"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    recurse: true
  loop: "{{ shell_config_users }}"
  when:
    - shell_install_oh_my_zsh
    - item.shell == '/bin/zsh'

- name: Install Oh My Zsh (git clone as user, idempotent)
  become: false
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ item.home_directory }}/.oh-my-zsh"
    version: master
    update: false
  loop: "{{ shell_config_users }}"
  when:
    - shell_install_oh_my_zsh
    - item.shell == '/bin/zsh'



# -----------------------------------------------------------------------------
# Starship Prompt
# -----------------------------------------------------------------------------

- name: Check if starship is already installed
  ansible.builtin.command: starship --version
  register: starship_check
  changed_when: false
  failed_when: false

# Prefer native package manager when available
- name: Install starship via package manager
  ansible.builtin.package:
    name: starship
    state: present
  when:
    - shell_install_starship | bool
    - starship_check.rc != 0
    - ansible_facts.pkg_mgr is defined
    - ansible_facts.pkg_mgr in ['apt', 'dnf', 'pacman', 'zypper']

# Fallback: official install script (safe + idempotent)
- name: Install starship via official install script (fallback)
  ansible.builtin.shell: |
    curl -fsSL https://starship.rs/install.sh | sh -s -- -y
  args:
    creates: /usr/local/bin/starship
  when:
    - shell_install_starship | bool
    - starship_check.rc != 0
