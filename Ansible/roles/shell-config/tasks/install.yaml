---
# =============================================================================
# Install shell tooling and remove starship
# -----------------------------------------------------------------------------
# - zsh: system package
# - oh-my-zsh: per-user install (git clone, non-destructive)
# - starship: removed when detected
# =============================================================================

# -----------------------------------------------------------------------------
# Zsh
# -----------------------------------------------------------------------------

- name: Ensure zsh is installed
  ansible.builtin.package:
    name: zsh
    state: present
  when: shell_install_zsh | default(true)

# -----------------------------------------------------------------------------
# Oh My Zsh (per-user, safe + idempotent)
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Oh My Zsh (per-user, crash-safe)
# -----------------------------------------------------------------------------

- name: Ensure Oh My Zsh directory exists (root, no ownership)
  ansible.builtin.file:
    path: "{{ item.home_directory }}/.oh-my-zsh"
    state: directory
    mode: "0755"
  loop: "{{ shell__home_users | default(shell__resolved_users) }}"
  when:
    - shell_install_oh_my_zsh
    - item.shell is defined
    - item.shell.endswith('zsh')

- name: Fix ownership of Oh My Zsh directory
  ansible.builtin.file:
    path: "{{ item.home_directory }}/.oh-my-zsh"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    recurse: true
  loop: "{{ shell__home_users | default(shell__resolved_users) }}"
  when:
    - shell_install_oh_my_zsh
    - item.shell is defined
    - item.shell.endswith('zsh')

- name: Install Oh My Zsh (git clone as user, idempotent)
  become: false
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ item.home_directory }}/.oh-my-zsh"
    version: master
    update: false
  loop: "{{ shell__home_users | default(shell__resolved_users) }}"
  when:
    - shell_install_oh_my_zsh
    - item.shell is defined
    - item.shell.endswith('zsh')

# -----------------------------------------------------------------------------
# Starship cleanup
# -----------------------------------------------------------------------------

- name: Remove starship package when requested
  ansible.builtin.package:
    name: starship
    state: absent
  when: shell_remove_starship | bool
  failed_when: false

- name: Remove starship binaries from common locations
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/starship
    - /usr/bin/starship
    - /home/linuxbrew/.linuxbrew/bin/starship
    - /opt/homebrew/bin/starship
  when: shell_remove_starship | bool

- name: Remove starship user config directories
  ansible.builtin.file:
    path: "{{ item.0.home_directory }}/{{ item.1 }}"
    state: absent
  loop: "{{ (shell__home_users | default(shell__resolved_users)) | product(['.config/starship', '.config/starship.toml']) | list }}"
  loop_control:
    label: "{{ item.0.name }} -> {{ item.1 }}"
  when: shell_remove_starship | bool
