---
# =============================================================================
# Validation — shell-config role
# -----------------------------------------------------------------------------
# Purpose:
# - Fail fast on misconfiguration
# - Ensure variables are sane before installation/configuration
# - Prevent accidental shell changes or broken user setups
# =============================================================================

# -----------------------------------------------------------------------------
# Required variables
# -----------------------------------------------------------------------------

- name: Validate resolved shell users is a list
  ansible.builtin.assert:
    that:
      - shell__resolved_users is defined
      - shell__resolved_users is iterable
    fail_msg: >
      shell_role_users must resolve to a list.
      Example:
        shell_role_users:
          - name: user
            home_directory: /home/user

# -----------------------------------------------------------------------------
# Validate user structure
# -----------------------------------------------------------------------------

- name: Validate each resolved shell user entry
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.home_directory is defined
      - item.home_directory | length > 0
    fail_msg: >
      Each entry in shell_role_users must define:
        - name
        - home_directory
  loop: "{{ shell__resolved_users }}"
  loop_control:
    label: "{{ item.name | default('UNKNOWN') }}"

# -----------------------------------------------------------------------------
# Feature toggles (safe defaults)
# -----------------------------------------------------------------------------

- name: Validate shell_install_oh_my_zsh flag
  ansible.builtin.assert:
    that:
      - shell_install_oh_my_zsh | default(false) | type_debug == 'bool'
    fail_msg: "shell_install_oh_my_zsh must be a boolean"

- name: Validate shell_remove_starship flag
  ansible.builtin.assert:
    that:
      - shell_remove_starship | default(true) | type_debug == 'bool'
    fail_msg: "shell_remove_starship must be a boolean"

- name: Validate shell_set_default_shell flag
  ansible.builtin.assert:
    that:
      - shell_set_default_shell | default(false) | type_debug == 'bool'
    fail_msg: "shell_set_default_shell must be a boolean"

# -----------------------------------------------------------------------------
# Plugin validation (if defined)
# -----------------------------------------------------------------------------

- name: Validate zsh plugins structure (optional)
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.repo is defined
      - item.repo | regex_search('^https?://')
    fail_msg: >
      Each plugin must define:
        - name
        - repo (valid http/https URL)
  loop: "{{ plugins | default([]) }}"
  loop_control:
    label: "{{ item.name | default('UNKNOWN') }}"
  when: plugins is defined

# -----------------------------------------------------------------------------
# Filesystem sanity checks
# -----------------------------------------------------------------------------

- name: Ensure user home directories exist
  ansible.builtin.stat:
    path: "{{ item.home_directory }}"
  register: home_dirs
  loop: "{{ shell__resolved_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build shell users with existing home directories
  ansible.builtin.set_fact:
    shell__home_users: >-
      {{
        home_dirs.results
        | selectattr('stat.exists')
        | map(attribute='item')
        | list
      }}

- name: Report shell users skipped because home directories are missing
  ansible.builtin.debug:
    msg: "Skipping shell dotfile/plugin management for {{ item.item.name }} because {{ item.item.home_directory }} does not exist"
  when: not item.stat.exists
  loop: "{{ home_dirs.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Validate shell bin command source directory
  ansible.builtin.stat:
    path: "{{ shell_bin_commands_src }}"
  register: shell_bin_commands_src_stat
  delegate_to: localhost
  become: false
  run_once: true
  when: shell_bin_commands_enabled | bool

- name: Fail if shell bin command source directory is missing
  ansible.builtin.fail:
    msg: "shell_bin_commands_src does not exist: {{ shell_bin_commands_src }}"
  when:
    - shell_bin_commands_enabled | bool
    - not shell_bin_commands_src_stat.stat.exists

# -----------------------------------------------------------------------------
# Safety checks
# -----------------------------------------------------------------------------

- name: Prevent accidental shell change for system users
  ansible.builtin.assert:
    that:
      - item.shell is not defined or item.shell != '/usr/sbin/nologin'
    fail_msg: >
      User {{ item.name }} has shell '/usr/sbin/nologin'.
      Refusing to manage shell configuration.
  loop: "{{ shell__resolved_users }}"
  loop_control:
    label: "{{ item.name }}"
