---
# =============================================================================
# shell-config — main task dispatcher
# -----------------------------------------------------------------------------
# Execution order is intentional:
#   0. derive users     → normalize role inputs
#   1. validate        → fail fast, no mutation
#   2. install         → system + shell tooling cleanup
#   3. install-plugins → Oh My Zsh / Zsh plugins
#   4. configure       → dotfiles, aliases, ~/bin commands
#   5. set-default-shell → optional, explicit shell change
# =============================================================================

# -----------------------------------------------------------------------------
# Normalize shell role users
# -----------------------------------------------------------------------------
# - Accept explicit role inputs first
# - Fall back to existing shell_config_users / users for compatibility
# - home_directory is derived when omitted
# -----------------------------------------------------------------------------

- name: Initialize resolved shell users
  ansible.builtin.set_fact:
    shell__resolved_users: []

- name: Build resolved shell users from role input
  ansible.builtin.set_fact:
    shell__resolved_users: >-
      {{
        shell__resolved_users + [
          item | combine({
            'home_directory': item.home_directory | default('/home/' ~ item.name)
          })
        ]
      }}
  loop: "{{ shell_role_users }}"
  when:
    - item.name is defined
    - item.shell is not defined or item.shell is not search('nologin')

# -----------------------------------------------------------------------------
# Validation (fail fast)
# -----------------------------------------------------------------------------

- name: Validate shell configuration inputs
  ansible.builtin.import_tasks: validate.yaml

# -----------------------------------------------------------------------------
# Installation
# -----------------------------------------------------------------------------

- name: Install shell tooling and remove starship
  ansible.builtin.import_tasks: install.yaml

- name: Install Zsh / Oh My Zsh plugins
  ansible.builtin.import_tasks: install-plugins.yaml

# -----------------------------------------------------------------------------
# Configuration
# -----------------------------------------------------------------------------

- name: Configure shell environment and dotfiles
  ansible.builtin.import_tasks: configure.yaml

# -----------------------------------------------------------------------------
# Optional shell change
# -----------------------------------------------------------------------------

- name: Set default shell for users (optional)
  ansible.builtin.import_tasks: set-default-shell.yaml
