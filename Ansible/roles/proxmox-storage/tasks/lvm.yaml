---
# Configure LVM storage pools using discovered disks or explicit devices
# All disks (discovered or specified) are grouped into a single thin pool

- name: Initialize discovered_disks if not set
  ansible.builtin.set_fact:
    discovered_disks: []
  when: discovered_disks is not defined
  tags: [proxmox, storage, storage:lvm]

- name: Determine disks to use (discovered or explicit)
  ansible.builtin.set_fact:
    pool_disks: >-
      {%- if item.devices is defined and item.devices | length > 0 -%}
        {{- item.devices -}}
      {%- else -%}
        {{- discovered_disks | map(attribute='path') | list -}}
      {%- endif -%}
  loop: "{{ proxmox_storage_pools }}"
  loop_control:
    label: "{{ item.name }}"
  register: disk_list_result
  tags: [proxmox, storage, storage:lvm]

- name: Create LVM physical volumes from disks
  ansible.builtin.shell: |
    disks="{{ disk_list_result.results[item_index].ansible_facts.pool_disks | join(' ') }}"
    # Remove local-lvm VG if using its disks
    if vgs local-lvm_vg 2>/dev/null && echo "$disks" | grep -q "/dev/sdb"; then
      vgremove -f local-lvm_vg 2>/dev/null || true
    fi
    # Create new PVs
    for disk in $disks; do
      pvremove -f "$disk" 2>/dev/null || true
      pvcreate "$disk"
    done
  register: pv_result
  changed_when: "'Physical volume' in pv_result.stdout"
  failed_when: false
  become: true
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - item.type | default('') == 'lvmthin'
    - disk_list_result.results[item_index].ansible_facts.pool_disks | length > 0
  loop: "{{ proxmox_storage_pools }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: item_index
  tags: [proxmox, storage, storage:lvm]

- name: Create volume groups for LVM thin pools
  ansible.builtin.shell: |
    VG_NAME="{{ item.name }}_vg"
    DISK_LIST="{{ disk_list_result.results[item_index].ansible_facts.pool_disks | join(' ') }}"
    
    if ! vgs "$VG_NAME" 2>/dev/null; then
      vgcreate "$VG_NAME" $DISK_LIST
    fi
  register: vg_result
  changed_when: "'Volume group' in vg_result.stdout"
  failed_when:
    - vg_result.rc != 0
    - "'already exists' not in vg_result.stderr"
  become: true
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - item.type | default('') == 'lvmthin'
    - disk_list_result.results[item_index].ansible_facts.pool_disks | length > 0
  loop: "{{ proxmox_storage_pools }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: item_index
  tags: [proxmox, storage, storage:lvm]

- name: Create LVM thin pools
  ansible.builtin.shell: |
    VG_NAME="{{ item.name }}_vg"
    LV_NAME="{{ item.name }}_lv"
    if ! lvs "$VG_NAME/$LV_NAME" 2>/dev/null; then
      lvcreate -l 100%FREE -T "$VG_NAME/$LV_NAME"
    fi
  register: lv_result
  changed_when: "'Logical volume' in lv_result.stdout"
  failed_when:
    - lv_result.rc != 0
    - "'already exists' not in lv_result.stderr"
  become: true
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - item.type | default('') == 'lvmthin'
    - disk_list_result.results[item_index].ansible_facts.pool_disks | length > 0
  loop: "{{ proxmox_storage_pools }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: item_index
  tags: [proxmox, storage, storage:lvm]

- name: Verify LVM pools
  ansible.builtin.shell: |
    VG_NAME="{{ item.name }}_vg"
    lvs -o name,size "$VG_NAME" 2>/dev/null || echo "Pool not found"
  register: lvm_verify
  changed_when: false
  failed_when: false
  become: true
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - item.type | default('') == 'lvmthin'
    - disk_list_result.results[item_index].ansible_facts.pool_disks | length > 0
  loop: "{{ proxmox_storage_pools }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: item_index
  tags: [proxmox, storage, storage:lvm]

- name: Display LVM pool status
  ansible.builtin.debug:
    msg: "{{ item.item.name }}: {{ item.stdout_lines | default(['Not configured']) | join('\n') }}"
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - item.item.type | default('') == 'lvmthin'
  loop: "{{ lvm_verify.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags: [proxmox, storage, storage:lvm]

- name: Display LVM pool status
  ansible.builtin.debug:
    msg: "{{ item.item.name }}: {{ item.stdout_lines | default(['Not configured']) | join('\n') }}"
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - discovered_disks | length > 0
    - item.item.type | default('') == 'lvmthin'
  loop: "{{ lvm_verify.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags: [proxmox, storage, storage:lvm]
