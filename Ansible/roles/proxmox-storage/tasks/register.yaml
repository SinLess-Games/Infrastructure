---
# Register storage with Proxmox

- name: Register LVM thin pools in Proxmox
  ansible.builtin.shell: |
    set -e
    POOL_NAME='vmdisks'
    POOL_CONTENT='images,rootdir'
    VG_NAME="vmdisks_vg"
    LV_NAME="vmdisks_lv"

    if pvesm list | grep -q "^$POOL_NAME "; then
      echo "Storage $POOL_NAME already exists"
    else
      pvesm add lvmthin "$POOL_NAME" --vgname "$VG_NAME" --thinpool "$LV_NAME" --content "$POOL_CONTENT" || echo "Failed to add storage"
    fi
  register: reg_result
  changed_when: "'added' in reg_result.stdout or 'Storage' not in reg_result.stdout"
  failed_when: false
  become: true
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - discovered_disks | length > 0
  tags: [proxmox, storage, storage:register]

- name: Register directory storage in Proxmox
  ansible.builtin.shell: |
    set -e
    POOL_NAME='{{ item.name }}'
    POOL_PATH='{{ item.path }}'
    POOL_CONTENT='{{ item.content | default("images,rootdir") }}'

    mkdir -p "$POOL_PATH"
    chmod 700 "$POOL_PATH"

    if pvesm list | grep -q "^$POOL_NAME "; then
      echo "Storage $POOL_NAME already exists"
    else
      pvesm add dir "$POOL_NAME" --path "$POOL_PATH" --content "$POOL_CONTENT" || echo "Failed to add storage"
    fi
  register: dir_result
  changed_when: "'added' in dir_result.stdout or 'Storage' not in dir_result.stdout"
  failed_when: false
  become: true
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - item.type | default('') == 'dir'
    - item.path is defined
  loop: "{{ proxmox_storage_pools }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [proxmox, storage, storage:register]

- name: Register ZFS pools in Proxmox
  ansible.builtin.shell: |
    set -e
    POOL_NAME='{{ item.name }}'
    POOL_CONTENT='{{ item.content | default("images,rootdir") }}'

    if pvesm list | grep -q "^$POOL_NAME "; then
      echo "Storage $POOL_NAME already exists"
    else
      pvesm add zfspool "$POOL_NAME" --pool "$POOL_NAME/vm-data" --content "$POOL_CONTENT" || echo "Failed to add storage"
    fi
  register: zfs_reg_result
  changed_when: "'added' in zfs_reg_result.stdout or 'Storage' not in zfs_reg_result.stdout"
  failed_when: false
  become: true
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - item.type | default('') == 'zfspool'
    - item.device is defined
  loop: "{{ proxmox_storage_pools }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [proxmox, storage, storage:register]

- name: Display Proxmox storage list
  ansible.builtin.shell: pvesm status
  register: storage_list
  changed_when: false
  failed_when: false
  become: true
  when: inventory_hostname in proxmox_storage_target_nodes
  tags: [proxmox, storage, storage:register]

- name: Show registered storage
  ansible.builtin.debug:
    msg: "{{ storage_list.stdout_lines }}"
  when: inventory_hostname in proxmox_storage_target_nodes
  tags: [proxmox, storage, storage:register]
