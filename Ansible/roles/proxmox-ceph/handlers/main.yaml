---
# Ceph service handlers

- name: Restart Ceph services
  ansible.builtin.systemd:
    name: ceph.target
    state: restarted
    daemon_reload: true
  when: inventory_hostname in ceph_nodes

- name: Restart Ceph monitors
  ansible.builtin.systemd:
    name: ceph-mon.target
    state: restarted
    daemon_reload: true
  when: inventory_hostname in ceph_nodes

- name: Restart Ceph OSDs
  ansible.builtin.systemd:
    name: ceph-osd.target
    state: restarted
    daemon_reload: true
  when: inventory_hostname in ceph_nodes

- name: Restart Ceph managers
  ansible.builtin.systemd:
    name: ceph-mgr.target
    state: restarted
    daemon_reload: true
  when: inventory_hostname in ceph_nodes

- name: Enable Ceph services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    daemon_reload: true
  loop:
    - ceph.target
    - ceph-mon.target
    - ceph-osd.target
    - ceph-mgr.target
  when: inventory_hostname in ceph_nodes
