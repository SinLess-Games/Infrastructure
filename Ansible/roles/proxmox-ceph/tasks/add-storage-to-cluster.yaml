---
# Ansible/roles/proxmox-ceph/tasks/add-storage-to-cluster.yaml
#
# Fallback task to ensure Ceph-backed storages are added to Proxmox cluster config.
# This is needed when storage.yaml skips addition due to MDS not being active yet.
#
# Safe/idempotent:
# - Only adds storages if they don't already exist in /etc/pve/storage.cfg
# - Handles mount timeouts gracefully (pvesm adds the config even if mount fails)
# - Silently succeeds if storage already exists

# ============================================================
# Compute effective inputs using same normalization as storage.yaml
# ============================================================
- name: Compute effective Ceph node/mon/bootstrap defaults (bootstrap only)
  ansible.builtin.set_fact:
    ceph_cluster_name_effective: "{{ ceph_cluster_name | default('ceph') }}"
    ceph_nodes_effective: "{{ ceph_nodes | default(groups.get('ceph', groups.get('ceph_nodes', []))) }}"
    ceph_bootstrap_node_effective: >-
      {{
        ceph_bootstrap_node
          | default((ceph_nodes | default(groups.get('ceph', groups.get('ceph_nodes', []))) | first)
          | default(inventory_hostname))
      }}
  when: inventory_hostname == ceph_bootstrap_node_effective
  become: true

- name: Build input lists with sane defaults (bootstrap only)
  ansible.builtin.set_fact:
    ceph_mon_hosts_effective: "{{ ceph_mon_hosts | default(ceph_nodes_effective | default([])) }}"
    rbd_input: "{{ rbd_pool_definitions | default(rbd_pools | default(ceph_rbd_pools | default(ceph_pools | default([])))) }}"
    cephfs_input: "{{ cephfs_definitions | default(cephfs_filesystems | default(cephfs | default([]))) }}"
  when: inventory_hostname == ceph_bootstrap_node_effective
  become: true

- name: Normalize RBD pool definitions (bootstrap only)
  ansible.builtin.set_fact:
    rbd_pools_effective: "{{ rbd_input }}"
  when: inventory_hostname == ceph_bootstrap_node_effective
  become: true

- name: Normalize CephFS definitions (bootstrap only)
  ansible.builtin.set_fact:
    cephfs_effective: "{{ cephfs_input }}"
  when: inventory_hostname == ceph_bootstrap_node_effective
  become: true

- name: Assert we have a bootstrap node to modify cluster storage.cfg
  ansible.builtin.assert:
    that:
      - ceph_bootstrap_node_effective is defined
      - (ceph_bootstrap_node_effective | string | length) > 0
    fail_msg: "ceph_bootstrap_node_effective is not set. Define ceph_bootstrap_node (or ceph_nodes)."
  run_once: true
  become: true

# ============================================================
# Read current cluster storage.cfg once
# ============================================================
- name: Read /etc/pve/storage.cfg (bootstrap only)
  ansible.builtin.slurp:
    path: /etc/pve/storage.cfg
  register: pve_storage_cfg_slurp
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true

- name: Decode storage.cfg text (bootstrap only)
  ansible.builtin.set_fact:
    pve_storage_cfg_text: "{{ (pve_storage_cfg_slurp.content | b64decode) if (pve_storage_cfg_slurp.content is defined) else '' }}"
  run_once: true
  become: true

# ============================================================
# Add RBD storages (if missing)
# ============================================================
- name: Add missing RBD storages to Proxmox cluster (bootstrap only)
  vars:
    storid: "{{ item.name }}"
    pool: "{{ item.name }}"
    monhosts_csv: "{{ (item.mon_hosts | default(ceph_mon_hosts_effective)) | join(',') }}"
    content: "{{ (item.content | default('images,rootdir')) | string }}"
    username: "{{ (item.username | default('admin')) | string }}"
    krbd: "{{ (item.krbd | default(ceph_rbd_krbd | default(0))) | int }}"
  ansible.builtin.command:
    argv:
      - pvesm
      - add
      - rbd
      - "{{ storid }}"
      - --pool
      - "{{ pool }}"
      - --monhost
      - "{{ monhosts_csv }}"
      - --content
      - "{{ content }}"
      - --username
      - "{{ username }}"
      - --krbd
      - "{{ krbd | string }}"
  loop: "{{ rbd_pools_effective }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.application | default('rbd')) == 'rbd'
    - pve_storage_cfg_text is not search('(?m)^rbd:\\s*' ~ storid ~ '\\s*$')
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true
  failed_when: false
  register: rbd_add_results
  changed_when: rbd_add_results.rc is defined and rbd_add_results.rc == 0

- name: Re-read /etc/pve/storage.cfg after RBD additions (bootstrap only)
  ansible.builtin.slurp:
    path: /etc/pve/storage.cfg
  register: pve_storage_cfg_slurp_after_rbd
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true

- name: Decode storage.cfg text after RBD additions (bootstrap only)
  ansible.builtin.set_fact:
    pve_storage_cfg_text_after_rbd: "{{ (pve_storage_cfg_slurp_after_rbd.content | b64decode) if (pve_storage_cfg_slurp_after_rbd.content is defined) else '' }}"
  run_once: true
  become: true

- name: Ensure RBD storage stanzas exist in storage.cfg (bootstrap only)
  vars:
    storid: "{{ item.name }}"
    pool: "{{ item.name }}"
    monhosts_csv: "{{ (item.mon_hosts | default(ceph_mon_hosts_effective)) | join(',') }}"
    content: "{{ (item.content | default('images,rootdir')) | string }}"
    username: "{{ (item.username | default('admin')) | string }}"
    krbd: "{{ (item.krbd | default(ceph_rbd_krbd | default(0))) | int }}"
  ansible.builtin.blockinfile:
    path: /etc/pve/storage.cfg
    marker: "# {mark} ANSIBLE RBD {{ storid }}"
    block: |
      rbd: {{ storid }}
      	content {{ content }}
      	krbd {{ krbd }}
      	monhost {{ monhosts_csv }}
      	pool {{ pool }}
      	username {{ username }}
  loop: "{{ rbd_pools_effective }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.application | default('rbd')) == 'rbd'
    - pve_storage_cfg_text_after_rbd is not search('(?m)^rbd:\\s*' ~ storid ~ '\\s*$')
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true

# ============================================================
# Add CephFS storages - handle mount timeouts gracefully
# Mount may fail but storage config is still created in /etc/pve/storage.cfg
# ============================================================
- name: Add missing CephFS storages to Proxmox cluster (bootstrap only)
  vars:
    storid: "{{ item.name }}"
    fsname: "{{ item.fs_name | default(item.name) | string }}"
    monhosts_csv: "{{ (item.mon_hosts | default(ceph_mon_hosts_effective)) | join(',') }}"
    path: "{{ item.path | default('/mnt/pve/' ~ item.name) | string }}"
    content: "{{ item.content | default('iso') | string }}"
    username: "{{ item.username | default('admin') | string }}"
  ansible.builtin.shell: |
    set +e
    timeout 90 pvesm add cephfs "{{ storid }}" \
      --monhost "{{ monhosts_csv }}" \
      --content "{{ content }}" \
      --path "{{ path }}" \
      --username "{{ username }}" \
      --fs-name "{{ fsname }}"
    rc=$?
    # Success codes: 0 (success), 1 (mount error but config added), 124 (timeout)
    # These all result in the storage being added to /etc/pve/storage.cfg
    if [ $rc -eq 0 ] || [ $rc -eq 1 ] || [ $rc -eq 124 ]; then
      exit 0
    fi
    exit $rc
  args:
    executable: /bin/bash
  loop: "{{ cephfs_effective }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - pve_storage_cfg_text is not search('(?m)^cephfs:\\s*' ~ (item.name | string) ~ '\\s*$')
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true
  changed_when: true

- name: Re-read /etc/pve/storage.cfg after CephFS additions (bootstrap only)
  ansible.builtin.slurp:
    path: /etc/pve/storage.cfg
  register: pve_storage_cfg_slurp_after_cephfs
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true

- name: Decode storage.cfg text after CephFS additions (bootstrap only)
  ansible.builtin.set_fact:
    pve_storage_cfg_text_after_cephfs: "{{ (pve_storage_cfg_slurp_after_cephfs.content | b64decode) if (pve_storage_cfg_slurp_after_cephfs.content is defined) else '' }}"
  run_once: true
  become: true

- name: Ensure CephFS storage stanzas exist in storage.cfg (bootstrap only)
  vars:
    storid: "{{ item.name }}"
    fsname: "{{ item.fs_name | default(item.name) | string }}"
    monhosts_csv: "{{ (item.mon_hosts | default(ceph_mon_hosts_effective)) | join(',') }}"
    path: "{{ item.path | default('/mnt/pve/' ~ item.name) | string }}"
    content: "{{ item.content | default('iso') | string }}"
    username: "{{ item.username | default('admin') | string }}"
  ansible.builtin.blockinfile:
    path: /etc/pve/storage.cfg
    marker: "# {mark} ANSIBLE CEPHFS {{ storid }}"
    block: |
      cephfs: {{ storid }}
      	path {{ path }}
      	content {{ content }}
      	fs-name {{ fsname }}
      	monhost {{ monhosts_csv }}
      	username {{ username }}
  loop: "{{ cephfs_effective }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - pve_storage_cfg_text_after_cephfs is not search('(?m)^cephfs:\\s*' ~ (item.name | string) ~ '\\s*$')
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true

# ============================================================
# Verify storages were added
# ============================================================
- name: Re-read /etc/pve/storage.cfg after changes (bootstrap only)
  ansible.builtin.slurp:
    path: /etc/pve/storage.cfg
  register: pve_storage_cfg_slurp_after
  delegate_to: "{{ ceph_bootstrap_node_effective }}"
  run_once: true
  become: true

- name: Show Ceph storage stanzas now present (bootstrap only)
  ansible.builtin.debug:
    msg: >-
      Storage entries configured. Refresh the Proxmox UI (Datacenter -> Storage).
      RBD: {{ (rbd_pools_effective | selectattr('application','defined') | selectattr('application','equalto','rbd') | map(attribute='name') | list) | default([]) }}
      CephFS: {{ (cephfs_effective | map(attribute='name') | list) | default([]) }}
  run_once: true
  become: true
