---
# Create Ceph managers on all designated nodes

- name: Create Ceph manager on each node
  ansible.builtin.command: pveceph mgr create
  args:
    creates: "/var/lib/ceph/mgr/ceph-{{ inventory_hostname }}"
  when: inventory_hostname in ceph_nodes
  register: ceph_mgr_result
  retries: "{{ ceph_join_retries }}"
  delay: "{{ ceph_join_delay }}"
  until: ceph_mgr_result.rc == 0 or "'already exists' in ceph_mgr_result.stderr"
  notify:
    - Restart Ceph managers
  failed_when:
    - ceph_mgr_result.rc != 0
    - "'already exists' not in ceph_mgr_result.stderr"

- name: Wait for manager to be ready
  ansible.builtin.wait_for:
    path: "/var/lib/ceph/mgr/ceph-{{ inventory_hostname }}"
    state: present
    timeout: 30
  register: ceph_mgr_wait_result
  retries: "{{ ceph_join_retries }}"
  delay: "{{ ceph_join_delay }}"
  until: ceph_mgr_wait_result is succeeded
  when:
    - inventory_hostname in ceph_nodes
    - ceph_mgr_result is changed
