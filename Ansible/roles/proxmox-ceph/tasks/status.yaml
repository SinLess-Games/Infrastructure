---
# Display Ceph cluster status and configuration

- name: Verify Ceph cluster health
  ansible.builtin.command: ceph health
  delegate_to: "{{ ceph_bootstrap_node }}"
  run_once: true
  register: ceph_health_result
  changed_when: false

- name: Display Ceph cluster status
  ansible.builtin.debug:
    msg: "{{ ceph_health_result.stdout }}"
  when: ceph_health_result is defined
  run_once: true

- name: Get Ceph service status
  ansible.builtin.command: ceph -s
  delegate_to: "{{ ceph_bootstrap_node }}"
  run_once: true
  register: ceph_status_result
  changed_when: false
  failed_when: false

- name: Display full Ceph status
  ansible.builtin.debug:
    msg: "{{ ceph_status_result.stdout_lines }}"
  when: ceph_status_result is defined
  run_once: true

- name: Display Ceph pools created
  ansible.builtin.debug:
    msg: "Ceph pools configured: {{ ceph_pools | map(attribute='name') | list }}"
  run_once: true

- name: Display Ceph nodes with monitors
  ansible.builtin.debug:
    msg: "Monitors should be on: {{ ceph_nodes | join(', ') }}"
  run_once: true

- name: Display Ceph nodes with managers
  ansible.builtin.debug:
    msg: "Managers should be on: {{ ceph_nodes | join(', ') }}"
  run_once: true

- name: Display Ceph nodes with metadata servers
  ansible.builtin.debug:
    msg: "Metadata servers should be on: {{ ceph_nodes | join(', ') }}"
  run_once: true
