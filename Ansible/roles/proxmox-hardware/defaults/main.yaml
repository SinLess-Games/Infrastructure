---
# Ansible/roles/proxmox-hardware/defaults/main.yaml
# Controller-side output paths for Proxmox hardware inventory

# Resolve repository root on the controller
infra_repo_root: "{{ lookup('ansible.builtin.pipe', 'git rev-parse --show-toplevel') | trim }}"

# Persistent output root (gitignored)
infra_output_root: "{{ infra_repo_root }}/.outputs"

# Proxmox hardware inventory base directory
proxmox_hardware_output_base: "{{ infra_output_root }}/proxmox-hardware"

# Per-node output directory (keyed by inventory hostname)
proxmox_hardware_node_dir: "{{ proxmox_hardware_output_base }}/{{ inventory_hostname }}"
