---
# Discover available non-root disks and return a size-sorted inventory.

- name: Initialize discovered disk list
  ansible.builtin.set_fact:
    discovered_disks: []
  when: inventory_hostname in proxmox_storage_target_nodes

- name: Discover free disks as JSON
  ansible.builtin.shell: |
    set -euo pipefail

    root_source="$(findmnt -n -o SOURCE / 2>/dev/null || true)"
    root_vg="$(lsblk -no VG "$root_source" 2>/dev/null | awk 'NF{print $1; exit}' || true)"
    if [ -z "$root_vg" ] && [[ "$root_source" == /dev/mapper/* ]]; then
      root_vg="$(basename "$root_source" | sed -E 's/-[^-]+$//')"
    fi

    root_disks=""
    reserved_disks='{{ proxmox_storage_reserved_disks_effective | default([]) | map("regex_replace", "^/dev/", "") | list | join("\n") }}'
    if [ -n "$root_vg" ]; then
      while read -r pv; do
        [ -n "$pv" ] || continue
        pkname="$(lsblk -ndo PKNAME "$pv" 2>/dev/null || true)"
        if [ -n "$pkname" ]; then
          root_disks="${root_disks}${pkname}\n"
        else
          root_disks="${root_disks}$(basename "$pv" | sed -E 's/p?[0-9]+$//')\n"
        fi
      done < <(pvs --noheadings -o pv_name --select "vg_name=$root_vg" 2>/dev/null | awk 'NF{print $1}')
    else
      pkname="$(lsblk -ndo PKNAME "$root_source" 2>/dev/null || true)"
      if [ -n "$pkname" ]; then
        root_disks="${root_disks}${pkname}\n"
      else
        root_disks="${root_disks}$(basename "$root_source" | sed -E 's/p?[0-9]+$//')\n"
      fi
    fi

    first=1
    printf '['
    for disk in $(lsblk -dn -o NAME,TYPE | awk '$2=="disk" {print $1}'); do
      path="/dev/$disk"
      size="$(lsblk -dn -b -o SIZE "$path" 2>/dev/null || echo 0)"

      if printf '%b' "$root_disks" | awk 'NF' | sort -u | grep -Fxq "$disk"; then
        continue
      fi

      if printf '%s\n' "$reserved_disks" | awk 'NF' | sort -u | grep -Fxq "$disk"; then
        continue
      fi

      if [ "$size" -le 0 ]; then
        continue
      fi

      # Skip disks that currently expose partitions.
      if [ "$(lsblk -ln -o NAME "$path" | wc -l)" -gt 1 ]; then
        continue
      fi

      # Skip mounted disks.
      if lsblk -ln -o MOUNTPOINT "$path" | grep -q '/'; then
        continue
      fi

      if [ $first -eq 0 ]; then
        printf ','
      fi
      printf '{"name":"%s","path":"%s","size":%s,"size_gb":%.2f}' "$disk" "$path" "$size" "$(awk "BEGIN {print $size/1073741824}")"
      first=0
    done
    printf ']'
  args:
    executable: /bin/bash
  register: proxmox_storage_discovery_raw
  changed_when: false
  when:
    - proxmox_storage_auto_discover_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes

- name: Parse discovered disk JSON
  ansible.builtin.set_fact:
    discovered_disks: "{{ (proxmox_storage_discovery_raw.stdout | from_json) | sort(attribute='size', reverse=true) }}"
  when:
    - proxmox_storage_auto_discover_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes

- name: Display discovered disks
  ansible.builtin.debug:
    msg:
      - "Discovered {{ discovered_disks | length }} free disk(s) on {{ inventory_hostname }}"
      - "{{ discovered_disks | to_nice_yaml }}"
  tags: [proxmox, storage, storage:discover]
  when: inventory_hostname in proxmox_storage_target_nodes
