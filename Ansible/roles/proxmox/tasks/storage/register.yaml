---
# Register storage with Proxmox

- name: Register weighted LVM thin pools in Proxmox
  ansible.builtin.shell: |
    set -euo pipefail
    pool_name='{{ item.storage_id }}'
    legacy_pool_name='{{ item.name }}'
    pool_type='{{ item.type }}'
    vg_name='{{ item.vg_name }}'
    thin_name='{{ item.thinpool_name }}'
    lv_name='{{ item.lv_name }}'
    mount_path='{{ item.mount_path }}'
    content='{{ item.content }}'
    node_name='{{ inventory_hostname }}'

    vg_exists() {
      local vg="$1"
      vgs --noheadings -o vg_name "$vg" 2>/dev/null | awk 'NF{print $1}' | grep -Fxq "$vg"
    }

    lv_exists_in_vg() {
      local vg="$1"
      local lv="$2"
      lvs --noheadings -o lv_name "$vg" 2>/dev/null | awk 'NF{print $1}' | grep -Fxq "$lv"
    }

    if [ "$legacy_pool_name" != "$pool_name" ] && pvesm status 2>/dev/null | awk '{print $1}' | grep -Fxq "$legacy_pool_name"; then
      pvesm remove "$legacy_pool_name" || true
    fi

    # Remove pre-existing storage entry to ensure desired vg/thin mapping is current.
    if pvesm status 2>/dev/null | awk '{print $1}' | grep -Fxq "$pool_name"; then
      pvesm remove "$pool_name" || true
    fi

    if [ "$pool_type" = "lvmthin" ] && vg_exists "$vg_name" && lv_exists_in_vg "$vg_name" "$thin_name"; then
      pvesm add lvmthin "$pool_name" \
        --vgname "$vg_name" \
        --thinpool "$thin_name" \
        --content "$content" \
        --nodes "$node_name"
    elif [ "$pool_type" = "dir" ] && vg_exists "$vg_name" && lv_exists_in_vg "$vg_name" "$lv_name" && mountpoint -q "$mount_path"; then
      pvesm add dir "$pool_name" \
        --path "$mount_path" \
        --content "$content" \
        --nodes "$node_name"
    else
      echo "DEBUG: pool_type=$pool_type vg=$vg_name thin=$thin_name lv=$lv_name mount=$mount_path" >&2
      vgs --noheadings -o vg_name 2>/dev/null | awk 'NF{print "DEBUG: vg=" $1}' >&2 || true
      lvs --noheadings -o vg_name,lv_name 2>/dev/null | awk 'NF{print "DEBUG: lv=" $1 "/" $2}' >&2 || true
      if [ -n "$mount_path" ]; then
        mountpoint -q "$mount_path" && echo "DEBUG: mountpoint present: $mount_path" >&2 || echo "DEBUG: mountpoint missing: $mount_path" >&2
      fi
      echo "ERROR: Storage backend $pool_name is not ready for registration" >&2
      exit 1
    fi
  args:
    executable: /bin/bash
  register: reg_result
  changed_when: reg_result.rc == 0
  failed_when: reg_result.rc != 0
  become: true
  loop: "{{ proxmox_storage_pools_normalized }}"
  loop_control:
    label: "{{ item.storage_id }}"
  when:
    - inventory_hostname in proxmox_storage_target_nodes
    - (proxmox_storage_disk_assignments[item.name] | default([]) | length) > 0
  tags: [proxmox, storage, storage:register]

- name: Display Proxmox storage list
  ansible.builtin.shell: pvesm status
  register: storage_list
  changed_when: false
  failed_when: false
  become: true
  when: inventory_hostname in proxmox_storage_target_nodes
  tags: [proxmox, storage, storage:register]

- name: Show registered storage
  ansible.builtin.debug:
    msg: "{{ storage_list.stdout_lines }}"
  when: inventory_hostname in proxmox_storage_target_nodes
  tags: [proxmox, storage, storage:register]
