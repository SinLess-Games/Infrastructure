---
# =============================================================================
# Role: proxmox-storage
# File: roles/proxmox-storage/tasks/main.yaml
#
# Purpose:
#   Configure local storage on Proxmox nodes.
#   - Optionally clean all non-root disks
#   - Auto-discover available disks
#   - Create LVM or ZFS storage pools
#   - Register with Proxmox
#
# Execution order is intentional.
# =============================================================================

- name: Validate storage variables
  ansible.builtin.import_tasks: validate.yaml
  tags: [proxmox, storage, validate]

- name: Discover available disks
  ansible.builtin.import_tasks: discover-disks.yaml
  tags: [proxmox, storage, storage:discover]

- name: Configure LVM storage
  ansible.builtin.import_tasks: lvm.yaml
  tags: [proxmox, storage, storage:lvm]

- name: Register storage in Proxmox
  ansible.builtin.import_tasks: register.yaml
  tags: [proxmox, storage, storage:register]

- name: Display storage summary
  ansible.builtin.import_tasks: summary.yaml
  tags: [proxmox, storage, storage:summary]
