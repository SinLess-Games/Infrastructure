---
# Clean all non-root disks so they can be reused for fresh Proxmox storage pools.

- name: Remove all non-root volume groups and logical volumes
  ansible.builtin.shell: |
    set -euo pipefail

    root_source="$(findmnt -n -o SOURCE / 2>/dev/null || true)"
    root_vg=""

    if [ -n "$root_source" ]; then
      root_vg="$(lsblk -no VG "$root_source" 2>/dev/null | awk 'NF{print $1; exit}' || true)"
    fi

    if [ -z "$root_vg" ] && [[ "$root_source" == /dev/mapper/* ]]; then
      root_vg="$(basename "$root_source" | sed -E 's/-[^-]+$//')"
    fi

    while read -r vg; do
      [ -n "$vg" ] || continue

      if [ -n "$root_vg" ] && [ "$vg" = "$root_vg" ]; then
        continue
      fi

      lvremove -ff -y "$vg"/* 2>/dev/null || true
      vgremove -ff -y "$vg" 2>/dev/null || true
    done < <(vgs --noheadings -o vg_name 2>/dev/null | awk '{print $1}' || true)
  args:
    executable: /bin/bash
  changed_when: false
  become: true
  when:
    - proxmox_storage_clean_all_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes

- name: Find root disk backing device
  ansible.builtin.shell: |
    set -euo pipefail
    root_source="$(findmnt -n -o SOURCE / 2>/dev/null || true)"
    [ -n "$root_source" ] || exit 1

    root_vg="$(lsblk -no VG "$root_source" 2>/dev/null | awk 'NF{print $1; exit}' || true)"
    if [ -z "$root_vg" ] && [[ "$root_source" == /dev/mapper/* ]]; then
      root_vg="$(basename "$root_source" | sed -E 's/-[^-]+$//')"
    fi

    if [ -n "$root_vg" ]; then
      while read -r pv; do
        [ -n "$pv" ] || continue
        pkname="$(lsblk -ndo PKNAME "$pv" 2>/dev/null || true)"
        if [ -n "$pkname" ]; then
          echo "$pkname"
        else
          basename "$pv" | sed -E 's/p?[0-9]+$//'
        fi
      done < <(pvs --noheadings -o pv_name --select "vg_name=$root_vg" 2>/dev/null | awk 'NF{print $1}')
    else
      pkname="$(lsblk -ndo PKNAME "$root_source" 2>/dev/null || true)"
      if [ -n "$pkname" ]; then
        echo "$pkname"
      else
        basename "$root_source" | sed -E 's/p?[0-9]+$//'
      fi
    fi | awk 'NF' | sort -u
  args:
    executable: /bin/bash
  register: proxmox_storage_root_disk
  changed_when: false
  become: true
  when:
    - proxmox_storage_clean_all_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes

- name: Collect candidate non-root disks
  ansible.builtin.shell: |
    set -euo pipefail
    root_disks='{{ proxmox_storage_root_disk.stdout_lines | default([]) | join("\n") }}'
    for disk in $(lsblk -dn -o NAME,TYPE | awk '$2=="disk" {print $1}'); do
      if printf '%s\n' "$root_disks" | grep -Fxq "$disk"; then
        continue
      fi
      echo "/dev/$disk"
    done
  args:
    executable: /bin/bash
  register: proxmox_storage_clean_candidates
  changed_when: false
  become: true
  when:
    - proxmox_storage_clean_all_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes

- name: Filter candidate disks by configured patterns
  ansible.builtin.set_fact:
    proxmox_storage_disks_to_clean: >-
      {{
        (proxmox_storage_clean_candidates.stdout_lines | default([]))
        | select('match', '(' ~ (proxmox_storage_clean_disk_patterns | join(')|(')) ~ ')$')
        | reject('in', proxmox_storage_reserved_disks_effective | default([]))
        | list
      }}
  when:
    - proxmox_storage_clean_all_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes

- name: Show disks selected for cleaning
  ansible.builtin.debug:
    msg:
      - "Disks selected for cleaning on {{ inventory_hostname }}:"
      - "{{ proxmox_storage_disks_to_clean | default([]) | join(', ') if (proxmox_storage_disks_to_clean | default([]) | length > 0) else 'none' }}"
  when:
    - proxmox_storage_clean_all_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes

- name: Clean selected non-root disks
  ansible.builtin.shell: |
    set -euo pipefail
    disk="{{ item }}"

    for part in $(lsblk -ln -o PATH "$disk" | tail -n +2); do
      umount "$part" 2>/dev/null || true
      wipefs -a -f "$part" 2>/dev/null || true
      mdadm --zero-superblock "$part" 2>/dev/null || true
    done

    for pv in $(pvs --noheadings -o pv_name 2>/dev/null | awk '{print $1}' | grep -E "^${disk}([0-9]+|p[0-9]+)?$" || true); do
      vg=$(pvs --noheadings -o vg_name "$pv" 2>/dev/null | awk 'NF {print $1}' | head -n1)
      if [ -n "$vg" ]; then
        lvremove -ff -y "$vg"/* 2>/dev/null || true
        vgremove -ff -y "$vg" 2>/dev/null || true
      fi
      pvremove -ff -y "$pv" 2>/dev/null || true
    done

    zpool labelclear -f "$disk" 2>/dev/null || true
    sgdisk --zap-all "$disk" 2>/dev/null || true
    wipefs -a -f "$disk" 2>/dev/null || true
    dd if=/dev/zero of="$disk" bs=1M count=16 conv=fsync status=none || true
    blockdev --getsz "$disk" >/dev/null 2>&1 && \
      dd if=/dev/zero of="$disk" bs=512 seek=$(( $(blockdev --getsz "$disk") - 32768 )) count=32768 conv=fsync status=none || true
    partprobe "$disk" 2>/dev/null || true
    udevadm settle 2>/dev/null || true
  loop: "{{ proxmox_storage_disks_to_clean | default([]) }}"
  loop_control:
    label: "{{ item }}"
  become: true
  when:
    - proxmox_storage_clean_all_disks | bool
    - inventory_hostname in proxmox_storage_target_nodes
    - proxmox_storage_disks_to_clean | default([]) | length > 0
