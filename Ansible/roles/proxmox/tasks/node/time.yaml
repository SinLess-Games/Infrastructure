---
# =============================================================================
# proxmox-node :: time
# -----------------------------------------------------------------------------
# Purpose:
# - Configure reliable, deterministic time sync using chrony
# - Mandatory for:
#   * Proxmox clusters (Corosync quorum)
#   * Ceph (OSD + MON clock skew intolerance)
#   * Kubernetes / etcd
#
# This task:
# - Installs chrony
# - Deploys managed chrony.conf
# - Enables and restarts the service safely
# =============================================================================

# -----------------------------------------------------------------------------
# Ensure chrony system user and group exist
# -----------------------------------------------------------------------------
# Ensure chrony system group exists
- name: Ensure chrony group exists
  ansible.builtin.group:
    name: chrony
    system: true
    state: present

# Ensure chrony system user exists
- name: Ensure chrony user exists
  ansible.builtin.user:
    name: chrony
    group: chrony
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/chrony
    create_home: false
    state: present

# -----------------------------------------------------------------------------
# Install chrony
# -----------------------------------------------------------------------------

- name: Build effective NTP/chrony source configuration
  ansible.builtin.set_fact:
    chrony_servers: "{{ ntp_servers | default(chrony_servers | default([]), true) }}"
    chrony_pools: "{{ ntp_pools | default(chrony_pools | default([]), true) }}"

- name: Ensure chrony is installed
  ansible.builtin.package:
    name: chrony
    state: present

# -----------------------------------------------------------------------------
# Stop conflicting time services
# -----------------------------------------------------------------------------

- name: Disable systemd-timesyncd if present
  ansible.builtin.service:
    name: systemd-timesyncd
    state: stopped
    enabled: false
  failed_when: false

# -----------------------------------------------------------------------------
# Deploy chrony configuration
# -----------------------------------------------------------------------------

- name: Ensure chrony config directory exists
  ansible.builtin.file:
    path: /etc/chrony
    state: directory
    mode: "0755"

- name: Deploy chrony configuration (managed)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/chrony/chrony.conf.j2"
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony

- name: Ensure chrony run directory exists with correct permissions
  ansible.builtin.file:
    path: /run/chrony
    state: directory
    owner: chrony
    group: chrony
    mode: "0755"

- name: Ensure chrony lib directory exists with correct permissions
  ansible.builtin.file:
    path: /var/lib/chrony
    state: directory
    owner: chrony
    group: chrony
    mode: "0755"

# -----------------------------------------------------------------------------
# Enable and start chrony
# -----------------------------------------------------------------------------

- name: Enable and start chrony service
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

# -----------------------------------------------------------------------------
# Validation (non-fatal)
# -----------------------------------------------------------------------------

- name: Check chrony tracking status
  ansible.builtin.command: chronyc tracking
  register: chrony_tracking
  changed_when: false
  failed_when: false

- name: Display chrony tracking summary
  ansible.builtin.debug:
    msg: "{{ chrony_tracking.stdout_lines }}"
  when: chrony_tracking.stdout is defined

# =============================================================================
# Handlers (defined in role handlers/main.yaml)
# =============================================================================
# - Restart chrony
# =============================================================================
