---
# =============================================================================
# proxmox-node — security
# -----------------------------------------------------------------------------
# Baseline security hardening for Proxmox VE nodes
# with automatic SSH key deployment for cluster joins.
# =============================================================================

# -----------------------------------------------------------------------------
# Firewall baseline (do not enforce policy here)
# -----------------------------------------------------------------------------

- name: Ensure firewall tooling is installed
  ansible.builtin.package:
    name:
      - nftables
      - iptables
      - ipset
    state: present

- name: Ensure nftables service is enabled (but not enforcing rules)
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

# -----------------------------------------------------------------------------
# Kernel / sysctl safety settings
# -----------------------------------------------------------------------------

- name: Apply kernel network hardening sysctls
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: "net.ipv4.ip_forward", value: "1" }           # Required for bridges
    - { name: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.rp_filter", value: "2" }   # Loose mode for corosync
    - { name: "net.ipv4.conf.default.rp_filter", value: "2" }
    - { name: "kernel.kptr_restrict", value: "2" }
    - { name: "kernel.dmesg_restrict", value: "1" }

# -----------------------------------------------------------------------------
# Disable insecure legacy services (only if they exist)
# -----------------------------------------------------------------------------

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Disable legacy/insecure services if present
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - telnet
    - rsh
    - rlogin
    - rexec
  when: item in ansible_facts.services

# -----------------------------------------------------------------------------
# APT security hygiene
# -----------------------------------------------------------------------------

- name: Ensure unattended-upgrades is installed
  ansible.builtin.package:
    name: unattended-upgrades
    state: present

- name: Enable unattended-upgrades service
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started

# -----------------------------------------------------------------------------
# Validation marker
# -----------------------------------------------------------------------------

- name: Proxmox security baseline applied
  ansible.builtin.debug:
    msg: "Proxmox node security baseline successfully applied."
