---
# Task: Create custom Proxmox roles via SSH to first cluster node

- name: "Create custom roles"
  block:
    - name: "Check if proxmox_roles is defined"
      assert:
        that:
          - proxmox_roles is defined
          - proxmox_roles | type_debug == 'dict'
        fail_msg: "proxmox_roles must be defined as a dictionary in group_vars"

    - name: "Create or update role: {{ item.key }}"
      shell: |
        set -euo pipefail

        role_name="{{ item.key }}"
        desired_privs="{{ item.value.privileges | join(' ') }}"

        role_state=$(pveum role list --output-format json | ROLE="$role_name" DESIRED="$desired_privs" python3 -c 'import json, os, sys; role=os.environ.get("ROLE"); desired=set(filter(None, os.environ.get("DESIRED", "").split())); data=json.load(sys.stdin); role_data=next((r for r in data if r.get("roleid")==role), None); print("MISSING" if not role_data else ("MATCH" if set(filter(None, role_data.get("privs", "").split(",")))==desired else "DIFF"))')

        if [ "$role_state" = "MISSING" ]; then
          echo "Creating role: $role_name"
          pveum role add "$role_name" -privs "$desired_privs"
          echo "CHANGED"
        elif [ "$role_state" = "DIFF" ]; then
          echo "Updating role: $role_name"
          pveum role modify "$role_name" -privs "$desired_privs"
          echo "CHANGED"
        else
          echo "Role $role_name already up to date"
          echo "UNCHANGED"
        fi
      register: role_result
      changed_when: "'CHANGED' in role_result.stdout"
      loop: "{{ proxmox_roles | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      delegate_to: "{{ groups['pve_nodes'] | first }}"
      become: true
      run_once: true
      when: not proxmox_permissions_dev_mode
      tags:
        - proxmox
        - permissions
        - roles

    - name: "[DEV MODE] Display role creation (simulated): {{ item.key }}"
      debug:
        msg: "Would create role: {{ item.key }} with privileges: {{ item.value.privileges }}"
      loop: "{{ proxmox_roles | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: proxmox_permissions_dev_mode
      tags:
        - proxmox
        - permissions
        - roles

  tags:
    - proxmox
    - permissions
    - roles
