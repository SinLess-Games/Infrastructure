---
# =============================================================================
# SSH :: Users :: Install SSH client config
# -----------------------------------------------------------------------------
# Purpose:
# - Deploy ~/.ssh/config for users
# - Use Ansible-managed Jinja template
# - Support global defaults and per-host overrides
#
# Source template:
#   {{ playbook_dir }}/../templates/ssh/config.j2
# =============================================================================

# -----------------------------------------------------------------------------
# Resolve home directories from /etc/passwd (NSS-independent)
# -----------------------------------------------------------------------------

- name: Read user home from /etc/passwd for SSH users
  ansible.builtin.command: "awk -F: '$1==\"{{ item.name }}\" {print $6}' /etc/passwd"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: ssh__passwd_home_lookup
  changed_when: false
  failed_when: false
  timeout: 10
  ignore_errors: true

- name: Initialize SSH user home directory map
  ansible.builtin.set_fact:
    ssh__home_by_user: "{{ ssh__home_by_user | default({}) }}"
  changed_when: false

- name: Build SSH user home directory map from existing local users
  ansible.builtin.set_fact:
    ssh__home_by_user: "{{ ssh__home_by_user | default({}) | combine({ item.item.name: item.stdout }) }}"
  loop: "{{ ssh__passwd_home_lookup.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default('unknown') }}"
  when:
    - (item.rc | default(1)) == 0
    - (item.stdout | default('') | length) > 0
  changed_when: false

# -----------------------------------------------------------------------------
# Ensure ~/.ssh exists
# -----------------------------------------------------------------------------

- name: Ensure ~/.ssh directory exists for users
  ansible.builtin.file:
    path: "{{ ssh__home_by_user[item.name] }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in ssh__home_by_user

# -----------------------------------------------------------------------------
# Deploy SSH client config
# -----------------------------------------------------------------------------

- name: Deploy SSH client config for users
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/ssh/config.j2"
    dest: "{{ ssh__home_by_user[item.name] }}/.ssh/config"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0600"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in ssh__home_by_user
  vars:
    ansible_template_src: "templates/ssh/config.j2"
    ssh_client: >-
      {{
        {
          'global': {
            'strict_host_key_checking': ssh.client_config.strict_host_key_checking | default('accept-new'),
            'forward_agent': ssh.client_config.forward_agent | default('no'),
            'forward_x11': ssh.client_config.forward_x11 | default('no'),
            'server_alive_interval': ssh.client_config.server_alive_interval | default(30),
            'server_alive_count_max': ssh.client_config.server_alive_count_max | default(3),
            'identity_file': ssh.client_config.identity_file
              | default(ssh__home_by_user[item.name] ~ '/.ssh/id_' ~ (ssh_key_type | default('ed25519'))),
            'certificate_file': ssh.client_config.certificate_file
              | default(ssh__home_by_user[item.name] ~ '/.ssh/id_' ~ (ssh_key_type | default('ed25519')) ~ '-cert.pub'),
            'identities_only': ssh.client_config.identities_only | default(true)
          },
          'hosts': ssh.client_config.hosts | default([])
        }
      }}
