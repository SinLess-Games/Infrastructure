---
# =============================================================================
# SSH :: Users :: Install SSH client config
# -----------------------------------------------------------------------------
# Purpose:
# - Deploy ~/.ssh/config for users
# - Use Ansible-managed Jinja template
# - Support global defaults and per-host overrides
#
# Source template:
#   {{ playbook_dir }}/../templates/ssh/config.j2
# =============================================================================

# -----------------------------------------------------------------------------
# Resolve home directories safely
# -----------------------------------------------------------------------------

- name: Resolve home directories from passwd
  ansible.builtin.getent:
    database: passwd

# -----------------------------------------------------------------------------
# Ensure ~/.ssh exists
# -----------------------------------------------------------------------------

- name: Ensure ~/.ssh directory exists for users
  ansible.builtin.file:
    path: "{{ getent_passwd[item.name][4] }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in getent_passwd

# -----------------------------------------------------------------------------
# Deploy SSH client config
# -----------------------------------------------------------------------------

- name: Deploy SSH client config for users
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/ssh/config.j2"
    dest: "{{ getent_passwd[item.name][4] }}/.ssh/config"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0600"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in getent_passwd
  vars:
    ansible_template_src: "templates/ssh/config.j2"
