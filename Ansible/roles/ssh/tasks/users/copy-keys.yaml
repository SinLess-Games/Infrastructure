---
# =============================================================================
# SSH :: Users :: Install authorized_keys + (optionally) install identity keys
# -----------------------------------------------------------------------------
# Purpose:
# - Build authorized_keys for users from controller-generated materials
# - Use Jinja template for deterministic output
# - Optionally copy controller-generated identity keys into each user's ~/.ssh
#
# Inputs (expected):
# - ssh_role_users: list of user objects with at least { name: <username> }
# - ssh_output_base: controller path holding generated keys (default below)
# - ssh_key_type: ed25519|rsa|... (default: ed25519)
# - ssh_ca_enabled: true|false (default: false)
# - ssh_install_identity_keys: true|false (default: true)
# - ssh_identity_force: true|false (default: false)
# =============================================================================

# -----------------------------------------------------------------------------
# Defaults (safe fallbacks if role/play doesn't set them)
# -----------------------------------------------------------------------------

- name: Set SSH task defaults (non-destructive)
  ansible.builtin.set_fact:
    _ssh_output_base: "{{ ssh_output_base | default(playbook_dir ~ '/../../.outputs/ssh') }}"
    _ssh_key_type: "{{ ssh_key_type | default('ed25519') }}"
    _ssh_ca_enabled: "{{ ssh_ca_enabled | default(false) | bool }}"
    _ssh_install_identity_keys: "{{ ssh_install_identity_keys | default(true) | bool }}"
    _ssh_identity_force: "{{ ssh_identity_force | default(false) | bool }}"
  changed_when: false

# -----------------------------------------------------------------------------
# Resolve home directories from /etc/passwd (NSS-independent)
# -----------------------------------------------------------------------------

- name: Read user home from /etc/passwd for SSH users
  ansible.builtin.command: "awk -F: '$1==\"{{ item.name }}\" {print $6}' /etc/passwd"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: ssh__passwd_home_lookup
  changed_when: false
  failed_when: false
  timeout: 10
  ignore_errors: true

- name: Initialize SSH user home directory map
  ansible.builtin.set_fact:
    ssh__home_by_user: "{{ ssh__home_by_user | default({}) }}"
  changed_when: false

- name: Build SSH user home directory map from existing local users
  ansible.builtin.set_fact:
    ssh__home_by_user: "{{ ssh__home_by_user | default({}) | combine({ item.item.name: item.stdout }) }}"
  loop: "{{ ssh__passwd_home_lookup.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default('unknown') }}"
  when:
    - (item.rc | default(1)) == 0
    - (item.stdout | default('') | length) > 0
  changed_when: false

# -----------------------------------------------------------------------------
# Ensure ~/.ssh exists
# -----------------------------------------------------------------------------

- name: Ensure ~/.ssh directory exists for users
  ansible.builtin.file:
    path: "{{ ssh__home_by_user[item.name] }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in ssh__home_by_user
  become: true

# -----------------------------------------------------------------------------
# Validate controller-side key material exists (authorized_keys inputs)
# -----------------------------------------------------------------------------

- name: Stat per-user public keys on controller (no-follow)
  ansible.builtin.stat:
    path: "{{ _ssh_output_base }}/{{ item.name }}/id_{{ _ssh_key_type }}.pub"
    follow: false
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  run_once: true
  register: ssh__pubkey_stats
  changed_when: false

- name: Assert per-user public keys exist on controller
  ansible.builtin.assert:
    that:
      - item.stat.exists | default(false)
      - item.stat.isreg | default(false)
    fail_msg: "Missing public key on controller: {{ item.stat.path | default('unknown') }}"
  loop: "{{ ssh__pubkey_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default('unknown') }}"
  delegate_to: localhost
  run_once: true
  changed_when: false

# -----------------------------------------------------------------------------
# Collect authorized key material (controller-side) as delegated facts
# -----------------------------------------------------------------------------

- name: Initialize authorized_keys material map (controller, delegated facts)
  ansible.builtin.set_fact:
    ssh__authorized_keys_map: {}
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  changed_when: false

- name: Build authorized_keys material map (controller, delegated facts)
  ansible.builtin.set_fact:
    ssh__authorized_keys_map: >-
      {{
        hostvars['localhost'].ssh__authorized_keys_map
        | combine(
            {
              item.name: {
                'public_keys': (
                  lookup(
                    'ansible.builtin.fileglob',
                    _ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ _ssh_key_type ~ '.pub',
                    wantlist=True
                  ) | sort
                ),
                'certificates': (
                  (
                    lookup(
                      'ansible.builtin.fileglob',
                      _ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ _ssh_key_type ~ '-cert.pub',
                      wantlist=True
                    ) | sort
                  ) if (_ssh_ca_enabled | bool) else []
                ),
                'shared_keys': [],
                'shared_users': (item['shared-certs'] | default([]))
              }
            },
            recursive=True
          )
      }}
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  changed_when: false

- name: Expand shared_keys from shared_users (controller, delegated facts)
  ansible.builtin.set_fact:
    ssh__authorized_keys_map: >-
      {{
        hostvars['localhost'].ssh__authorized_keys_map
        | combine(
            {
              item.key: (
                item.value | combine(
                  {
                    'shared_keys': (
                      (
                        item.value.shared_users | default([])
                      )
                      | map('extract', hostvars['localhost'].ssh__authorized_keys_map)
                      | map(attribute='public_keys')
                      | list
                      | flatten
                      | unique
                      | sort
                    )
                  },
                  recursive=True
                )
              )
            },
            recursive=True
          )
      }}
  loop: "{{ (hostvars['localhost'].ssh__authorized_keys_map | default({})) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  changed_when: false

# -----------------------------------------------------------------------------
# Render authorized_keys using template
# -----------------------------------------------------------------------------

- name: Render authorized_keys for users
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/ssh/authorized_keys.j2"
    dest: "{{ ssh__home_by_user[item.name] }}/.ssh/authorized_keys"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0600"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.name in ssh__home_by_user
    - hostvars['localhost'].ssh__authorized_keys_map is defined
  become: true
  vars:
    authorized_key_paths: >-
      {{
        (
          (
            hostvars['localhost'].ssh__authorized_keys_map
            | default({})
          ).get(
            item.name,
            {}
          ).get(
            'public_keys',
            [_ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ _ssh_key_type ~ '.pub']
          )
          + (
            (
              hostvars['localhost'].ssh__authorized_keys_map
              | default({})
            ).get(
              item.name,
              {}
            ).get(
              'shared_keys',
              (
                item['shared-certs'] | default([])
                | map('regex_replace', '^(.*)$', _ssh_output_base ~ '/\\1/id_' ~ _ssh_key_type ~ '.pub')
                | list
              )
            )
          )
        )
        | unique
        | list
      }}

# -----------------------------------------------------------------------------
# Install per-user SSH identity keypair into ~/.ssh (optional)
# -----------------------------------------------------------------------------

- name: Stat per-user private keys on controller (no-follow)
  ansible.builtin.stat:
    path: "{{ _ssh_output_base }}/{{ item.name }}/id_{{ _ssh_key_type }}"
    follow: false
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  run_once: true
  register: ssh__privkey_stats
  changed_when: false
  when: _ssh_install_identity_keys | bool

- name: Assert per-user private keys exist on controller
  ansible.builtin.assert:
    that:
      - item.stat.exists | default(false)
      - item.stat.isreg | default(false)
    fail_msg: "Missing private key on controller: {{ item.stat.path | default('unknown') }}"
  loop: "{{ ssh__privkey_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default('unknown') }}"
  delegate_to: localhost
  run_once: true
  changed_when: false
  when: _ssh_install_identity_keys | bool

- name: Stat installed private keys in user homes
  ansible.builtin.stat:
    path: "{{ ssh__home_by_user[item.name] }}/.ssh/id_{{ _ssh_key_type }}"
    follow: false
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: ssh__installed_privkey_stats
  changed_when: false
  when:
    - _ssh_install_identity_keys | bool
    - item.name in ssh__home_by_user

- name: Stat installed public keys in user homes
  ansible.builtin.stat:
    path: "{{ ssh__home_by_user[item.name] }}/.ssh/id_{{ _ssh_key_type }}.pub"
    follow: false
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: ssh__installed_pubkey_stats
  changed_when: false
  when:
    - _ssh_install_identity_keys | bool
    - item.name in ssh__home_by_user

- name: Read installed public keys from user homes
  ansible.builtin.slurp:
    src: "{{ ssh__home_by_user[item.name] }}/.ssh/id_{{ _ssh_key_type }}.pub"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: ssh__installed_pubkey_slurp
  changed_when: false
  failed_when: false
  when:
    - _ssh_install_identity_keys | bool
    - item.name in ssh__home_by_user

- name: Derive public keys from installed private keys
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -y
      - -f
      - "{{ ssh__home_by_user[item.name] }}/.ssh/id_{{ _ssh_key_type }}"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: ssh__installed_privkey_public
  changed_when: false
  failed_when: false
  when:
    - _ssh_install_identity_keys | bool
    - item.name in ssh__home_by_user

- name: Initialize per-user identity refresh map
  ansible.builtin.set_fact:
    ssh__identity_refresh_map: {}
  changed_when: false
  when: _ssh_install_identity_keys | bool

- name: Determine whether installed user identity keys need refresh
  ansible.builtin.set_fact:
    ssh__identity_refresh_map: >-
      {{
        ssh__identity_refresh_map
        | combine(
            {
              item.name: (
                (_ssh_identity_force | bool)
                or not (
                  ssh__installed_privkey_stats.results
                  | default([])
                  | selectattr('item.name', 'equalto', item.name)
                  | map(attribute='stat.exists')
                  | list
                  | first
                  | default(false)
                )
                or not (
                  ssh__installed_pubkey_stats.results
                  | default([])
                  | selectattr('item.name', 'equalto', item.name)
                  | map(attribute='stat.exists')
                  | list
                  | first
                  | default(false)
                )
                or (
                  (
                    ssh__installed_privkey_public.results
                    | default([])
                    | selectattr('item.name', 'equalto', item.name)
                    | map(attribute='stdout')
                    | list
                    | first
                    | default('')
                    | trim
                  ) != (
                    lookup(
                      'ansible.builtin.file',
                      _ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ _ssh_key_type ~ '.pub'
                    )
                    | trim
                  )
                )
                or (
                  (
                    ssh__installed_pubkey_slurp.results
                    | default([])
                    | selectattr('item.name', 'equalto', item.name)
                    | map(attribute='content')
                    | list
                    | first
                    | default('')
                    | b64decode
                    | trim
                  ) != (
                    lookup(
                      'ansible.builtin.file',
                      _ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ _ssh_key_type ~ '.pub'
                    )
                    | trim
                  )
                )
              )
            },
            recursive=True
          )
      }}
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  when:
    - _ssh_install_identity_keys | bool
    - item.name in ssh__home_by_user

- name: Copy per-user private key to ~/.ssh
  ansible.builtin.copy:
    src: "{{ _ssh_output_base }}/{{ item.name }}/id_{{ _ssh_key_type }}"
    dest: "{{ ssh__home_by_user[item.name] }}/.ssh/id_{{ _ssh_key_type }}"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0600"
    force: "{{ ssh__identity_refresh_map.get(item.name, _ssh_identity_force | bool) }}"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ssh_install_identity_keys | bool
    - item.name in ssh__home_by_user
  become: true

- name: Copy per-user public key to ~/.ssh
  ansible.builtin.copy:
    src: "{{ _ssh_output_base }}/{{ item.name }}/id_{{ _ssh_key_type }}.pub"
    dest: "{{ ssh__home_by_user[item.name] }}/.ssh/id_{{ _ssh_key_type }}.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
    force: "{{ ssh__identity_refresh_map.get(item.name, _ssh_identity_force | bool) }}"
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - _ssh_install_identity_keys | bool
    - item.name in ssh__home_by_user
  become: true

- name: Stat per-user certificate on controller (no-follow)
  ansible.builtin.stat:
    path: "{{ _ssh_output_base }}/{{ item.name }}/id_{{ _ssh_key_type }}-cert.pub"
    follow: false
  loop: "{{ ssh_role_users }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  run_once: true
  register: ssh__cert_stats
  changed_when: false
  when:
    - _ssh_install_identity_keys | bool
    - _ssh_ca_enabled | bool

- name: Copy per-user certificate to ~/.ssh (if present)
  ansible.builtin.copy:
    src: "{{ _ssh_output_base }}/{{ item.item.name }}/id_{{ _ssh_key_type }}-cert.pub"
    dest: "{{ ssh__home_by_user[item.item.name] }}/.ssh/id_{{ _ssh_key_type }}-cert.pub"
    owner: "{{ item.item.name }}"
    group: "{{ item.item.name }}"
    mode: "0644"
    force: "{{ ssh__identity_refresh_map.get(item.item.name, _ssh_identity_force | bool) }}"
  loop: "{{ ssh__cert_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default('unknown') }}"
  when:
    - _ssh_install_identity_keys | bool
    - _ssh_ca_enabled | bool
    - (item.stat.exists | default(false)) | bool
    - item.item.name in ssh__home_by_user
  become: true
