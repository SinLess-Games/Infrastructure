# Ansible/roles/ssh/tasks/users/copy-known-hosts.yaml
---
# =============================================================================
# SSH :: Users :: Install known_hosts
# -----------------------------------------------------------------------------
# Purpose:
# - Deploy ~/.ssh/known_hosts for users
# - Use CA-based trust (@cert-authority)
# - Template is rendered on the controller
# =============================================================================

- name: Resolve home directories from passwd
  ansible.builtin.getent:
    database: passwd

# -----------------------------------------------------------------------------
# Read SSH CA public key (controller) — SINGLE CA: .outputs/ssh_ca
# -----------------------------------------------------------------------------

- name: Default SSH CA public key content (empty)
  ansible.builtin.set_fact:
    ssh_ca_pub: ""
  changed_when: false

- name: Determine CA public key path for known_hosts (controller)
  ansible.builtin.set_fact:
    ssh__known_hosts_ca_pub_path: >-
      {{
        ssh__ca_resolved_pub
          | default(ssh_ca_output_dir ~ '/ssh_ca.pub')
      }}
  when: ssh_ca_enabled | default(false) | bool
  changed_when: false

- name: Stat CA public key path (controller, no-follow)
  ansible.builtin.stat:
    path: "{{ ssh__known_hosts_ca_pub_path }}"
    follow: false
  when: ssh_ca_enabled | default(false) | bool
  delegate_to: localhost
  register: ssh__known_hosts_ca_pub_lstat
  failed_when: false
  changed_when: false

- name: Fail if CA public key path is a symlink (controller)
  ansible.builtin.fail:
    msg: >-
      SSH CA public key path "{{ ssh__known_hosts_ca_pub_path }}" is a symlink.
      Refusing to read it to avoid ELOOP ("Too many levels of symbolic links").
      Remove the symlink and keep a single real CA in {{ ssh_ca_output_dir }}.
  when:
    - ssh_ca_enabled | default(false) | bool
    - ssh__known_hosts_ca_pub_lstat.stat.exists | default(false) | bool
    - ssh__known_hosts_ca_pub_lstat.stat.islnk | default(false) | bool

- name: Fail if CA public key is missing (controller)
  ansible.builtin.fail:
    msg: >-
      SSH CA public key not found at "{{ ssh__known_hosts_ca_pub_path }}".
      Expected a single CA at: {{ ssh_ca_output_dir }}/ssh_ca.pub
  when:
    - ssh_ca_enabled | default(false) | bool
    - (ssh__known_hosts_ca_pub_lstat.stat.exists | default(false) | bool) == false

- name: Read SSH CA public key (controller)
  ansible.builtin.set_fact:
    ssh_ca_pub: "{{ lookup('file', ssh__known_hosts_ca_pub_path) }}"
  when:
    - ssh_ca_enabled | default(false) | bool
    - ssh__known_hosts_ca_pub_lstat.stat.exists | default(false) | bool
    - (ssh__known_hosts_ca_pub_lstat.stat.islnk | default(false) | bool) == false
  changed_when: false

# -----------------------------------------------------------------------------
# Ensure ~/.ssh exists
# -----------------------------------------------------------------------------

- name: Ensure ~/.ssh directory exists for users
  ansible.builtin.file:
    path: "{{ getent_passwd[item.name][4] }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in getent_passwd
  become: true

# -----------------------------------------------------------------------------
# Deploy known_hosts
# -----------------------------------------------------------------------------

- name: Deploy known_hosts for users
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/ssh/known_hosts.j2"
    dest: "{{ getent_passwd[item.name][4] }}/.ssh/known_hosts"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in getent_passwd
  become: true
  vars:
    ansible_template_src: "templates/ssh/known_hosts.j2"
    ssh_render_host_entries: false
