---
# =============================================================================
# Role: ssh
# Task: proxmox/sign-host-keys.yaml
#
# Purpose:
# - Sign the SSH host ed25519 key using the SSH Host CA
# - Install the resulting host certificate
# - Enable deterministic, CA-backed host identity
#
# Assumptions:
# - ssh_ca private key exists on the signing host
# - Host keys already exist (Proxmox default)
# - CA public key is already installed (TrustedUserCAKeys handled elsewhere)
# =============================================================================

# -----------------------------------------------------------------------------
# Variables (expected)
# -----------------------------------------------------------------------------
# ssh_host_ca_key_path: /etc/ssh/ca/ssh_ca
# ssh_host_cert_path: /etc/ssh/ssh_host_ed25519_key-cert.pub
# ssh_host_key_pub: /etc/ssh/ssh_host_ed25519_key.pub
# ssh_host_key_type: ed25519
# ssh_host_cert_validity: "+52w"
# ssh_host_cert_principals: [hostname, fqdn, *.domain]
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Assert host public key exists
# -----------------------------------------------------------------------------
- name: Assert SSH host public key exists
  ansible.builtin.stat:
    path: "{{ ssh_host_key_pub | default('/etc/ssh/ssh_host_ed25519_key.pub') }}"
  register: ssh_host_pubkey
  become: true

- name: Fail if SSH host public key is missing
  ansible.builtin.fail:
    msg: "SSH host public key not found: {{ ssh_host_key_pub }}"
  when: not ssh_host_pubkey.stat.exists

# -----------------------------------------------------------------------------
# Check if host certificate already exists
# -----------------------------------------------------------------------------
- name: Check if SSH host certificate already exists
  ansible.builtin.stat:
    path: "{{ ssh_host_cert_path | default('/etc/ssh/ssh_host_ed25519_key-cert.pub') }}"
  register: ssh_host_cert
  become: true

# -----------------------------------------------------------------------------
# Build host principals list
# -----------------------------------------------------------------------------
- name: Build SSH host certificate principals
  ansible.builtin.set_fact:
    ssh__host_cert_principals: >-
      {{
        (
          ssh_host_cert_principals
          | default([
              inventory_hostname,
              ansible_fqdn | default(inventory_hostname),
              inventory_hostname ~ '.local.sinlessgames.com',
              inventory_hostname ~ '.local.sinlessgamesllc.com'
          ])
        ) | unique
      }}
  changed_when: false

# -----------------------------------------------------------------------------
# Sign host key with SSH CA (only if cert does not exist)
# -----------------------------------------------------------------------------
- name: Sign SSH host key with CA
  ansible.builtin.command: >
    ssh-keygen
    -s {{ ssh_host_ca_key_path | default('/etc/ssh/ca/ssh_ca') }}
    -I host-{{ inventory_hostname }}
    -h
    -n {{ ssh__host_cert_principals | join(',') }}
    -V {{ ssh_host_cert_validity | default('+52w') }}
    {{ ssh_host_key_pub | default('/etc/ssh/ssh_host_ed25519_key.pub') }}
  args:
    creates: "{{ ssh_host_cert_path | default('/etc/ssh/ssh_host_ed25519_key-cert.pub') }}"
  become: true
  when: not ssh_host_cert.stat.exists

# -----------------------------------------------------------------------------
# Fix permissions on generated host certificate
# -----------------------------------------------------------------------------
- name: Ensure SSH host certificate permissions are correct
  ansible.builtin.file:
    path: "{{ ssh_host_cert_path | default('/etc/ssh/ssh_host_ed25519_key-cert.pub') }}"
    owner: root
    group: root
    mode: "0644"
  become: true

# -----------------------------------------------------------------------------
# Validate certificate
# -----------------------------------------------------------------------------
- name: Validate SSH host certificate
  ansible.builtin.command: >
    ssh-keygen -Lf {{ ssh_host_cert_path | default('/etc/ssh/ssh_host_ed25519_key-cert.pub') }}
  register: ssh_host_cert_info
  changed_when: false
  become: true

- name: Assert SSH host certificate is valid
  ansible.builtin.assert:
    that:
      - "'Principals:' in ssh_host_cert_info.stdout"
      - "'Valid:' in ssh_host_cert_info.stdout"
    fail_msg: "SSH host certificate validation failed"

# -----------------------------------------------------------------------------
# Notify sshd restart (handler expected)
# -----------------------------------------------------------------------------
- name: Notify sshd restart
  ansible.builtin.meta: flush_handlers
