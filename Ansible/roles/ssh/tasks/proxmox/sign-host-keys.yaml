---
# =============================================================================
# Role: ssh
# Task: proxmox/sign-host-keys.yaml
#
# Purpose:
# - Fetch the SSH host ed25519 public key from the node to the controller
# - Sign it on the controller using the SSH CA private key
# - Copy the resulting host certificate back to the node
# - Ensure root user SSH access works (Proxmox-compatible)
#
# SECURITY MODEL:
# - Host certificates ONLY contain host principals
# - User authentication is handled via authorized_keys (NOT host certs)
# - One CA, many hosts, deterministic trust
# =============================================================================

# -----------------------------------------------------------------------------
# Resolve controller paths (facts)
# -----------------------------------------------------------------------------
- name: Resolve controller outputs dir (controller facts)
  ansible.builtin.set_fact:
    ssh__controller_outputs_dir_effective: >-
      {{
        ssh.controller.outputs_dir
          | default(
              ssh_controller_outputs_dir
                | default(playbook_dir ~ "/../../.outputs", true),
              true
            )
      }}
  delegate_to: localhost
  changed_when: false

- name: Resolve controller SSH CA directory (controller facts)
  ansible.builtin.set_fact:
    ssh__controller_ssh_ca_dir_effective: >-
      {{
        ssh_ca_output_dir
          | default(ssh__controller_outputs_dir_effective ~ "/ssh_ca", true)
      }}
  delegate_to: localhost
  changed_when: false

- name: Resolve controller runtime dir + user (controller facts)
  ansible.builtin.set_fact:
    ssh__controller_runtime_dir: "{{ lookup('env', 'XDG_RUNTIME_DIR') | default('/tmp', true) }}"
    ssh__controller_user: "{{ lookup('env', 'USER') | default('ansible', true) }}"
  delegate_to: localhost
  changed_when: false

- name: Resolve controller host-certs base directory (controller facts)
  ansible.builtin.set_fact:
    ssh__controller_host_certs_dir_effective: >-
      {{
        ssh_controller_host_certs_dir
          | default(
              ssh__controller_runtime_dir ~ "/ansible-ssh-host-certs-" ~ ssh__controller_user,
              true
            )
      }}
  delegate_to: localhost
  changed_when: false

- name: Resolve controller staging directory for this host (controller facts)
  ansible.builtin.set_fact:
    ssh__controller_host_staging_dir: "{{ ssh__controller_host_certs_dir_effective }}/{{ inventory_hostname }}"
  delegate_to: localhost
  changed_when: false

- name: Resolve controller SSH CA private key path (controller facts)
  ansible.builtin.set_fact:
    ssh__controller_host_ca_private_key_path: >-
      {{
        ssh_host_ca_private_key_path
          | default(ssh__controller_ssh_ca_dir_effective ~ "/ssh_ca", true)
      }}
  delegate_to: localhost
  changed_when: false

# -----------------------------------------------------------------------------
# Resolve controller root public key (THIS WAS MISSING)
# -----------------------------------------------------------------------------
- name: Resolve controller root public key path
  ansible.builtin.set_fact:
    ssh_root_pubkey_path_on_controller: >-
      {{
        ssh_root_pubkey_path
          | default(
              ssh__controller_outputs_dir_effective ~ "/ssh/root/id_ed25519.pub",
              true
            )
      }}
  delegate_to: localhost
  changed_when: false

- name: Assert controller root public key exists
  ansible.builtin.stat:
    path: "{{ ssh_root_pubkey_path_on_controller }}"
    follow: false
  register: ssh__root_pubkey_stat
  delegate_to: localhost
  changed_when: false

- name: Fail if controller root public key is missing
  ansible.builtin.fail:
    msg: >-
      Root SSH public key not found on controller:
      {{ ssh_root_pubkey_path_on_controller }}
  when: not ssh__root_pubkey_stat.stat.exists
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Ensure controller staging directories exist
# -----------------------------------------------------------------------------
- name: Ensure controller host-certs base directory exists
  ansible.builtin.file:
    path: "{{ ssh__controller_host_certs_dir_effective }}"
    state: directory
    mode: "0700"
  delegate_to: localhost

- name: Ensure controller staging directory exists for this host
  ansible.builtin.file:
    path: "{{ ssh__controller_host_staging_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Validate CA private key (no symlinks)
# -----------------------------------------------------------------------------
- name: Stat SSH CA private key on controller (no-follow)
  ansible.builtin.stat:
    path: "{{ ssh__controller_host_ca_private_key_path }}"
    follow: false
  register: ssh__controller_ca_priv_lstat
  delegate_to: localhost
  changed_when: false

- name: Fail if SSH CA private key is a symlink
  ansible.builtin.fail:
    msg: "SSH CA private key must not be a symlink"
  when:
    - ssh__controller_ca_priv_lstat.stat.exists
    - ssh__controller_ca_priv_lstat.stat.islnk
  delegate_to: localhost

- name: Fail if SSH CA private key is missing
  ansible.builtin.fail:
    msg: "SSH CA private key not found: {{ ssh__controller_host_ca_private_key_path }}"
  when: not ssh__controller_ca_priv_lstat.stat.exists
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Resolve host key paths (node)
# -----------------------------------------------------------------------------
- name: Resolve host key and certificate paths
  ansible.builtin.set_fact:
    ssh__host_key_pub_path: "{{ ssh_host_key_pub | default('/etc/ssh/ssh_host_ed25519_key.pub') }}"
    ssh__host_cert_path: "{{ ssh_host_cert_path | default('/etc/ssh/ssh_host_ed25519_key-cert.pub') }}"
  changed_when: false

# -----------------------------------------------------------------------------
# Validate host public key exists
# -----------------------------------------------------------------------------
- name: Assert SSH host public key exists
  ansible.builtin.stat:
    path: "{{ ssh__host_key_pub_path }}"
  register: ssh_host_pubkey
  become: true

- name: Fail if SSH host public key is missing
  ansible.builtin.fail:
    msg: "SSH host public key not found: {{ ssh__host_key_pub_path }}"
  when: not ssh_host_pubkey.stat.exists

# -----------------------------------------------------------------------------
# Check if host certificate already exists
# -----------------------------------------------------------------------------
- name: Check if SSH host certificate already exists
  ansible.builtin.stat:
    path: "{{ ssh__host_cert_path }}"
  register: ssh_host_cert
  become: true

# -----------------------------------------------------------------------------
# Build host certificate principals (HOSTS ONLY)
# -----------------------------------------------------------------------------
- name: Build SSH host certificate principals
  ansible.builtin.set_fact:
    ssh__host_cert_principals: >-
      {{
        [
          inventory_hostname,
          ansible_fqdn | default(inventory_hostname, true),
          inventory_hostname ~ ".local",
          inventory_hostname ~ ".local.sinlessgames.com",
          inventory_hostname ~ ".local.sinlessgamesllc.com"
        ] | unique
      }}
  changed_when: false

# -----------------------------------------------------------------------------
# Fetch host public key
# -----------------------------------------------------------------------------
- name: Fetch SSH host public key to controller
  ansible.builtin.fetch:
    src: "{{ ssh__host_key_pub_path }}"
    dest: "{{ ssh__controller_host_staging_dir }}/ssh_host_ed25519_key.pub"
    flat: true
    validate_checksum: true
  when: not ssh_host_cert.stat.exists
  become: true

# -----------------------------------------------------------------------------
# Sign host key
# -----------------------------------------------------------------------------
- name: Sign SSH host key with CA (controller)
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -s
      - "{{ ssh__controller_host_ca_private_key_path }}"
      - -I
      - "host-{{ inventory_hostname }}"
      - -h
      - -n
      - "{{ ssh__host_cert_principals | join(',') }}"
      - -V
      - "{{ ssh_host_cert_validity | default('+52w') }}"
      - "{{ ssh__controller_host_staging_dir }}/ssh_host_ed25519_key.pub"
  args:
    creates: "{{ ssh__controller_host_staging_dir }}/ssh_host_ed25519_key-cert.pub"
  when: not ssh_host_cert.stat.exists
  delegate_to: localhost

# -----------------------------------------------------------------------------
# Install signed host certificate
# -----------------------------------------------------------------------------
- name: Install signed SSH host certificate on node
  ansible.builtin.copy:
    src: "{{ ssh__controller_host_staging_dir }}/ssh_host_ed25519_key-cert.pub"
    dest: "{{ ssh__host_cert_path }}"
    owner: root
    group: root
    mode: "0644"
  when: not ssh_host_cert.stat.exists
  become: true

# -----------------------------------------------------------------------------
# Validate certificate
# -----------------------------------------------------------------------------
- name: Validate SSH host certificate
  ansible.builtin.command: "ssh-keygen -Lf {{ ssh__host_cert_path }}"
  register: ssh_host_cert_info
  changed_when: false
  become: true

- name: Assert SSH host certificate is valid
  ansible.builtin.assert:
    that:
      - "'Principals:' in ssh_host_cert_info.stdout"
      - "'Valid:' in ssh_host_cert_info.stdout"
    fail_msg: "SSH host certificate validation failed"

# -----------------------------------------------------------------------------
# Ensure root user access (THIS FIXES YOUR SHELL ISSUE)
# -----------------------------------------------------------------------------
- name: Ensure root SSH authorized_keys is correct
  ansible.builtin.copy:
    src: "{{ ssh_root_pubkey_path_on_controller }}"
    dest: /root/.ssh/authorized_keys
    owner: root
    group: root
    mode: "0600"
  become: true

# -----------------------------------------------------------------------------
# Flush handlers
# -----------------------------------------------------------------------------
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
