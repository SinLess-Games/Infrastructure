---
# Ansible/roles/ssh/tasks/proxmox/configure-ssh.yaml

- name: Ensure sshd_config.d directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure sshd_config includes drop-in directory
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    insertafter: BOF
    regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/\*\.conf\s*$'
    line: 'Include /etc/ssh/sshd_config.d/*.conf'
    state: present
  become: true

- name: Deploy sshd configuration drop-in
  ansible.builtin.template:
    src: "{{ role_path }}/templates/ssh/sshd_config.j2"
    dest: /etc/ssh/sshd_config.d/50-ansible-ssh.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart sshd
  become: true

# This is the “manual fix” you did on pve-01
- name: Ensure principals files exist so cert auth cannot lock us out
  ansible.builtin.import_tasks: ensure-ssh-works.yaml

- name: Validate sshd configuration syntax
  ansible.builtin.command: sshd -t
  changed_when: false
  become: true

- name: Read effective sshd configuration
  ansible.builtin.command: sshd -T
  register: sshd_effective
  changed_when: false
  become: true

- name: Compute expected CA directives (lowercase to match sshd -T)
  ansible.builtin.set_fact:
    expected_trustedusercakeys: >-
      trustedusercakeys {{ (ssh.server.trusted_user_ca_keys | default('/etc/ssh/ca/ssh_ca.pub')) | lower }}
    expected_authorizedprincipalsfile: >-
      authorizedprincipalsfile {{ (ssh.server.authorized_principals_file | default('/etc/ssh/auth_principals/%u')) | lower }}

- name: Assert SSH CA trust and principals are active
  ansible.builtin.assert:
    that:
      - expected_trustedusercakeys in (sshd_effective.stdout | lower)
      - expected_authorizedprincipalsfile in (sshd_effective.stdout | lower)
    fail_msg: |
      SSH CA-based authentication is NOT active.
      Expected:
        - {{ expected_trustedusercakeys }}
        - {{ expected_authorizedprincipalsfile }}
      Got:
        {{ (sshd_effective.stdout_lines
            | select('match', '^(trustedusercakeys|authorizedprincipalsfile)\\s')
            | list) | to_nice_yaml }}
