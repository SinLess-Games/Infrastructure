---
# =============================================================================
# Copy SSH Keys and Certificates to Users
# =============================================================================

# -----------------------------------------------------------------------------
# Resolve home directories safely
# -----------------------------------------------------------------------------

- name: Resolve home directories from passwd
  ansible.builtin.getent:
    database: passwd

# -----------------------------------------------------------------------------
# Ensure ~/.ssh exists
# -----------------------------------------------------------------------------

- name: Ensure ~/.ssh directory exists for each user
  ansible.builtin.file:
    path: "{{ getent_passwd[item.name][4] }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name in getent_passwd

# -----------------------------------------------------------------------------
# Copy user keys
# -----------------------------------------------------------------------------

- name: Copy user's private SSH key
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}"
    dest: "{{ getent_passwd[item.name][4] }}/.ssh/id_{{ ssh_key_type }}"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "{{ ssh_key_mode_private }}"
    remote_src: true
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.name in getent_passwd
    - lookup('fileglob', ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type, wantlist=True) | length > 0

- name: Copy user's public SSH key
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}.pub"
    dest: "{{ getent_passwd[item.name][4] }}/.ssh/id_{{ ssh_key_type }}.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
    remote_src: true
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.name in getent_passwd
    - lookup('fileglob', ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type ~ '.pub', wantlist=True) | length > 0

- name: Copy user's SSH certificate
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}-cert.pub"
    dest: "{{ getent_passwd[item.name][4] }}/.ssh/id_{{ ssh_key_type }}-cert.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
    remote_src: true
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - ssh_ca_enabled | bool
    - item.name in getent_passwd
    - lookup('fileglob', ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type ~ '-cert.pub', wantlist=True) | length > 0

# -----------------------------------------------------------------------------
# Copy shared certificates (FIXED)
# -----------------------------------------------------------------------------

- name: Copy shared public keys
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.1 }}/id_{{ ssh_key_type }}.pub"
    dest: "{{ getent_passwd[item.0.name][4] }}/.ssh/shared_{{ item.1 }}_id_{{ ssh_key_type }}.pub"
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
    mode: "0644"
    remote_src: true
  loop: "{{ users | subelements('shared-certs', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} <- {{ item.1 }}"
  when:
    - item.0.name in getent_passwd
    - lookup('fileglob', ssh_output_base ~ '/' ~ item.1 ~ '/id_' ~ ssh_key_type ~ '.pub', wantlist=True) | length > 0

- name: Copy shared SSH certificates
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.1 }}/id_{{ ssh_key_type }}-cert.pub"
    dest: "{{ getent_passwd[item.0.name][4] }}/.ssh/shared_{{ item.1 }}_id_{{ ssh_key_type }}-cert.pub"
    owner: "{{ item.0.name }}"
    group: "{{ item.0.name }}"
    mode: "0644"
    remote_src: true
  loop: "{{ users | subelements('shared-certs', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} <- {{ item.1 }}"
  when:
    - ssh_ca_enabled | bool
    - item.0.name in getent_passwd
    - lookup('fileglob', ssh_output_base ~ '/' ~ item.1 ~ '/id_' ~ ssh_key_type ~ '-cert.pub', wantlist=True) | length > 0

# -----------------------------------------------------------------------------
# Build authorized_keys deterministically
# -----------------------------------------------------------------------------

- name: Build authorized_keys list
  ansible.builtin.set_fact:
    authorized_key_files: >-
      {{
        lookup('fileglob', ssh_output_base ~ '/' ~ item.0.name ~ '/id_' ~ ssh_key_type ~ '.pub', wantlist=True)
        +
        (
          lookup('fileglob', ssh_output_base ~ '/' ~ item.0.name ~ '/id_' ~ ssh_key_type ~ '-cert.pub', wantlist=True)
          if ssh_ca_enabled | bool else []
        )
        +
        lookup('fileglob', ssh_output_base ~ '/' ~ item.1 ~ '/id_' ~ ssh_key_type ~ '.pub', wantlist=True)
        +
        (
          lookup('fileglob', ssh_output_base ~ '/' ~ item.1 ~ '/id_' ~ ssh_key_type ~ '-cert.pub', wantlist=True)
          if ssh_ca_enabled | bool else []
        )
      }}
  loop: "{{ users | subelements('shared-certs', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"
  register: authorized_key_map

- name: Install authorized_keys
  ansible.builtin.authorized_key:
    user: "{{ item.0.item.0.name }}"
    state: present
    key: "{{ lookup('file', item.1) }}"
  loop: "{{ authorized_key_map.results | subelements('ansible_facts.authorized_key_files') }}"
  loop_control:
    label: "{{ item.0.item.0.name }}"
