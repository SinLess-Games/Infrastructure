---
# =============================================================================
# Copy SSH Keys and Certificates to Users (multi-key support)
# =============================================================================

- name: Ensure ~/.ssh directory exists for each user
  ansible.builtin.file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"

# -----------------------------------------------------------------------------
# Deploy user-specific SSH material
# -----------------------------------------------------------------------------

- name: Copy user's private SSH key
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}"
    dest: "/home/{{ item.name }}/.ssh/id_{{ ssh_key_type }}"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "{{ ssh_key_mode_private }}"
    remote_src: true
  when:
    - lookup(
        'fileglob',
        ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type,
        wantlist=True,
        errors='ignore'
      ) | length > 0
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Copy user's public SSH key
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}.pub"
    dest: "/home/{{ item.name }}/.ssh/id_{{ ssh_key_type }}.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "{{ ssh_key_mode_public }}"
    remote_src: true
  when:
    - lookup(
        'fileglob',
        ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type ~ '.pub',
        wantlist=True,
        errors='ignore'
      ) | length > 0
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Copy user's SSH certificate
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}-cert.pub"
    dest: "/home/{{ item.name }}/.ssh/id_{{ ssh_key_type }}-cert.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
    remote_src: true
  when:
    - ssh_ca_enabled | bool
    - lookup(
        'fileglob',
        ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type ~ '-cert.pub',
        wantlist=True,
        errors='ignore'
      ) | length > 0
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"

# -----------------------------------------------------------------------------
# Deploy shared certificates (e.g. root → sinless777)
# -----------------------------------------------------------------------------

- name: Copy shared root public key into user .ssh
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/root/id_{{ ssh_key_type }}.pub"
    dest: "/home/{{ item.name }}/.ssh/root_id_{{ ssh_key_type }}.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
    remote_src: true
  when:
    - "'shared-certs' in item"
    - "'root' in item['shared-certs']"
    - lookup(
        'fileglob',
        ssh_output_base ~ '/root/id_' ~ ssh_key_type ~ '.pub',
        wantlist=True,
        errors='ignore'
      ) | length > 0
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Copy shared root SSH certificate into user .ssh
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/root/id_{{ ssh_key_type }}-cert.pub"
    dest: "/home/{{ item.name }}/.ssh/root_id_{{ ssh_key_type }}-cert.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
    remote_src: true
  when:
    - ssh_ca_enabled | bool
    - "'shared-certs' in item"
    - "'root' in item['shared-certs']"
    - lookup(
        'fileglob',
        ssh_output_base ~ '/root/id_' ~ ssh_key_type ~ '-cert.pub',
        wantlist=True,
        errors='ignore'
      ) | length > 0
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"

# -----------------------------------------------------------------------------
# Build authorized_keys deterministically
# -----------------------------------------------------------------------------

- name: Build authorized_keys file list per user
  ansible.builtin.set_fact:
    authorized_key_files: >-
      {{
        lookup(
          'fileglob',
          ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type ~ '.pub',
          wantlist=True,
          errors='ignore'
        )
        +
        (
          lookup(
            'fileglob',
            ssh_output_base ~ '/' ~ item.name ~ '/id_' ~ ssh_key_type ~ '-cert.pub',
            wantlist=True,
            errors='ignore'
          ) if ssh_ca_enabled | bool else []
        )
        +
        (
          lookup(
            'fileglob',
            ssh_output_base ~ '/root/id_' ~ ssh_key_type ~ '.pub',
            wantlist=True,
            errors='ignore'
          ) if ('shared-certs' in item and 'root' in item['shared-certs']) else []
        )
        +
        (
          lookup(
            'fileglob',
            ssh_output_base ~ '/root/id_' ~ ssh_key_type ~ '-cert.pub',
            wantlist=True,
            errors='ignore'
          ) if (ssh_ca_enabled | bool and 'shared-certs' in item and 'root' in item['shared-certs']) else []
        )
      }}
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  register: authorized_key_map

- name: Install authorized_keys
  ansible.builtin.authorized_key:
    user: "{{ item.0.item.name }}"
    state: present
    key: "{{ lookup('file', item.1) }}"
  loop: "{{ authorized_key_map.results | subelements('ansible_facts.authorized_key_files') }}"
  loop_control:
    label: "{{ item.0.item.name }}"

