---
# =============================================================================
# Copy SSH Keys and Certificates to Users
# -----------------------------------------------------------------------------
# Copies locally-generated SSH keys and certificates to target hosts.
# Source files live on the Ansible controller.
# =============================================================================

- name: Ensure ~/.ssh directory exists for each user
  ansible.builtin.file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Copy private SSH key to user
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}"
    dest: "/home/{{ item.name }}/.ssh/id_{{ ssh_key_type }}"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "{{ ssh_key_mode_private }}"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost

- name: Copy public SSH key to user
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}.pub"
    dest: "/home/{{ item.name }}/.ssh/id_{{ ssh_key_type }}.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "{{ ssh_key_mode_public }}"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost

- name: Copy SSH certificate to user
  ansible.builtin.copy:
    src: "{{ ssh_output_base }}/{{ item.name }}/id_{{ ssh_key_type }}-cert.pub"
    dest: "/home/{{ item.name }}/.ssh/id_{{ ssh_key_type }}-cert.pub"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: ssh_ca_enabled | bool
  delegate_to: localhost
