---
# =============================================================================
# Configure SSH Daemon to Trust User CA
# =============================================================================

- name: Ensure SSH CA is enabled
  ansible.builtin.assert:
    that:
      - ssh_ca_enabled | bool
    fail_msg: "SSH CA configuration requested but ssh_ca_enabled is false"

# -----------------------------------------------------------------------------
# Resolve controller CA paths (SINGLE CA: .outputs/ssh_ca)
# -----------------------------------------------------------------------------

- name: Resolve controller SSH CA directory (canonical)
  ansible.builtin.set_fact:
    ssh_controller_ca_dir_effective: "{{ ssh_ca_output_dir }}"
    ssh_controller_ca_pub_path: "{{ ssh_ca_output_dir }}/ssh_ca.pub"
  changed_when: false

- name: Stat SSH CA public key on controller (no-follow)
  ansible.builtin.stat:
    path: "{{ ssh_controller_ca_pub_path }}"
    follow: false
  delegate_to: localhost
  register: ssh_ca_pub_stat
  changed_when: false

- name: Fail if SSH CA public key is missing on controller
  ansible.builtin.fail:
    msg: >-
      SSH User CA public key not found on controller:
      {{ ssh_controller_ca_pub_path }}
      Expected SINGLE CA location: {{ ssh_ca_output_dir }}
  when: not ssh_ca_pub_stat.stat.exists
  delegate_to: localhost

- name: Fail if SSH CA public key is a symlink (avoid ELOOP)
  ansible.builtin.fail:
    msg: >-
      SSH User CA public key is a symlink:
      {{ ssh_controller_ca_pub_path }}
      Refusing to follow symlinks to avoid ELOOP.
  when: ssh_ca_pub_stat.stat.islnk | default(false) | bool
  delegate_to: localhost

- name: Read SSH CA public key from controller
  ansible.builtin.slurp:
    src: "{{ ssh_controller_ca_pub_path }}"
  delegate_to: localhost
  register: ssh_ca_pub_slurp
  changed_when: false

# -----------------------------------------------------------------------------
# Install CA public key on target
# -----------------------------------------------------------------------------

- name: Ensure SSH CA directory exists
  ansible.builtin.file:
    path: /etc/ssh/ca
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install SSH User CA public key
  ansible.builtin.copy:
    content: "{{ ssh_ca_pub_slurp.content | b64decode }}"
    dest: "{{ ssh_trusted_user_ca_keys_path | default('/etc/ssh/ca/ssh_ca.pub') }}"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Ensure sshd runtime directory exists (required on some distros)
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure sshd_config.d directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure sshd_config includes drop-in directory
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    insertafter: BOF
    regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/\*\.conf\s*$'
    line: 'Include /etc/ssh/sshd_config.d/*.conf'
    state: present
  register: ssh__sshd_include_result
  become: true

- name: Deploy managed sshd configuration drop-in
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/ssh/sshd_config.j2"
    dest: /etc/ssh/sshd_config.d/50-ansible-ssh.conf
    owner: root
    group: root
    mode: "0644"
  register: ssh__sshd_dropin_result
  become: true
  vars:
    ansible_template_src: "templates/ssh/sshd_config.j2"

- name: Validate sshd configuration syntax
  ansible.builtin.command: sshd -t
  changed_when: false
  become: true

- name: Restart SSH service after sshd config changes
  ansible.builtin.service:
    name: "{{ 'sshd' if (ansible_facts.os_family | default('')) in ['RedHat', 'Rocky', 'AlmaLinux', 'Suse'] else 'ssh' }}"
    state: restarted
  when:
    - (ssh__sshd_include_result is changed) or (ssh__sshd_dropin_result is changed)
  become: true

- name: Read effective sshd configuration
  ansible.builtin.command: sshd -T
  register: sshd_effective
  changed_when: false
  become: true

- name: Compute expected CA directives
  ansible.builtin.set_fact:
    expected_trustedusercakeys: >-
      trustedusercakeys {{ (ssh.server.trusted_user_ca_keys | default('/etc/ssh/ca/ssh_ca.pub')) | lower }}
    expected_authorizedprincipalsfile: >-
      authorizedprincipalsfile {{ (ssh.server.authorized_principals_file | default('/etc/ssh/auth_principals/%u')) | lower }}
    expected_passwordauthentication: >-
      passwordauthentication {{ 'yes' if (ssh.server.password_authentication | default(false)) else 'no' }}
  changed_when: false

- name: Assert managed sshd configuration is active
  ansible.builtin.assert:
    that:
      - expected_trustedusercakeys in (sshd_effective.stdout | lower)
      - expected_authorizedprincipalsfile in (sshd_effective.stdout | lower)
      - expected_passwordauthentication in (sshd_effective.stdout | lower)
    fail_msg: |
      Managed SSH daemon configuration is not active.
      Expected:
        - {{ expected_trustedusercakeys }}
        - {{ expected_authorizedprincipalsfile }}
        - {{ expected_passwordauthentication }}
      Got:
        {{ (sshd_effective.stdout_lines
            | select('match', '^(trustedusercakeys|authorizedprincipalsfile|passwordauthentication)\\s')
            | list) | to_nice_yaml }}
