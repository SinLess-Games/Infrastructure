---
# =============================================================================
# Vault Deploy Role - Tasks
# =============================================================================
# Purpose:
#   - Render Terraform configuration for Vault cluster
#   - Execute Terraform via Taskfile
# =============================================================================

- name: Assert required Vault deployment variables
  ansible.builtin.assert:
    that:
      - vault_target_nodes | length >= 3
      - vault_ip_addresses | length == vault_node_count | int
      - vault_node_count | int >= 3
      - (vault_node_count | int) % 2 == 1
    fail_msg: "Vault deployment requires an odd node count >= 3, at least 3 target nodes, and IPs matching node count"

- name: Read Proxmox API token file for Terraform
  ansible.builtin.slurp:
    src: "{{ vault_repo_root }}/{{ vault_proxmox_api_token_file }}"
  register: vault_proxmox_token_file
  no_log: true

- name: Parse Proxmox API token values
  ansible.builtin.set_fact:
    vault_proxmox_token_text: "{{ vault_proxmox_token_file.content | b64decode | string }}"
  no_log: true

- name: Extract Proxmox API token ID and secret
  ansible.builtin.set_fact:
    vault_proxmox_api_token_id: >-
      {{ (vault_proxmox_token_text
        | regex_findall('(?m)^FULL_TOKENID=([^\n]+)'))
        | first | default('') }}
    vault_proxmox_api_token_secret: >-
      {{ (vault_proxmox_token_text
        | regex_findall('(?m)^TOKEN_SECRET=([^\n]+)'))
        | first | default('') }}
  no_log: true

- name: Assert Proxmox API token values were parsed
  ansible.builtin.assert:
    that:
      - vault_proxmox_api_token_id is not none
      - vault_proxmox_api_token_secret is not none
    fail_msg: "Failed to parse Proxmox API token ID/secret from token file"

- name: Ensure Terraform output directory exists
  ansible.builtin.file:
    path: "{{ vault_terraform_dir }}"
    state: directory

- name: Render Vault Terraform module configuration
  ansible.builtin.template:
    src: "vault-cluster.tf.j2"
    dest: "{{ vault_terraform_dir }}/vault-cluster.tf"
    mode: "0644"

- name: Initialize Terraform (Taskfile)
  ansible.builtin.command:
    cmd: "task terraform:init"
    chdir: "{{ vault_repo_root }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ vault_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ vault_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ vault_proxmox_tls_insecure | ternary('true', 'false') }}"

- name: Check if Vault VMs already exist
  ansible.builtin.command:
    cmd: "ssh-keyscan -H {{ item }} 2>/dev/null"
  loop: "{{ vault_ip_addresses }}"
  register: vault_vm_check
  failed_when: false
  changed_when: false

- name: Apply Terraform configuration (Taskfile)
  ansible.builtin.command:
    cmd: "task terraform:apply:auto"
    chdir: "{{ vault_repo_root }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ vault_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ vault_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ vault_proxmox_tls_insecure | ternary('true', 'false') }}"
    TF_VAR_force_create: "{{ (vault_vm_check.results | selectattr('rc', 'equalto', 0) | list | length == 0) | ternary('false', 'true') }}"
  register: terraform_result
  ignore_errors: true

- name: Skip terraform if VMs already exist
  ansible.builtin.meta: noop
  when: terraform_result is failed and 'already in use' in (terraform_result.stderr | default(''))

- name: Wait for Vault VMs to be accessible
  ansible.builtin.pause:
    seconds: 30

- name: Wait for cloud-init configuration to complete
  ansible.builtin.pause:
    seconds: 10
  tags:
    - vault-cloud-init
