---
# =============================================================================
# pgBackRest - Backup and Recovery
# =============================================================================

- name: Create pgBackRest directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"
  loop:
    - "/etc/pgbackrest"
    - "/var/log/pgbackrest"
    - "/var/lib/pgbackrest"

- name: Configure pgBackRest
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/pgbackrest.conf.j2"
    dest: "/etc/pgbackrest/pgbackrest.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  when: postgres_backups.enabled

- name: Initialize pgBackRest stanza
  ansible.builtin.command: "pgbackrest --stanza={{ postgres_backups.stanza }} stanza-create"
  become: true
  become_user: postgres
  run_once: true
  delegate_to: "{{ postgres_primary_host }}"
  when: postgres_backups.enabled
  register: pgbackrest_stanza
  changed_when: "'completed successfully' in pgbackrest_stanza.stdout"
  failed_when: false

- name: Create pgBackRest backup cron job
  ansible.builtin.cron:
    name: "pgBackRest incremental backup"
    minute: "0"
    hour: "4"
    job: "pgbackrest --stanza={{ postgres_backups.stanza }} --type=incr backup"
    user: postgres
  when: postgres_backups.enabled
