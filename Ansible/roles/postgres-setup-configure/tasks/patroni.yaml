---
# =============================================================================
# Patroni - PostgreSQL HA Orchestration
# =============================================================================

- name: Stop default PostgreSQL service (Patroni will manage it)
  ansible.builtin.service:
    name: postgresql
    state: stopped
    enabled: false

- name: Create Patroni configuration directory
  ansible.builtin.file:
    path: "{{ postgres_config_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Configure Patroni
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/patroni.yml.j2"
    dest: "{{ postgres_config_dir }}/patroni.yml"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart patroni

- name: Create Patroni systemd service
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/patroni.service.j2"
    dest: "/etc/systemd/system/patroni.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart patroni

- name: Enable and start Patroni
  ansible.builtin.service:
    name: patroni
    state: started
    enabled: true

- name: Check Patroni service state
  ansible.builtin.command: "systemctl is-active patroni"
  register: postgres_patroni_active
  changed_when: false
  failed_when: false

- name: Capture Patroni status when inactive
  ansible.builtin.command: "systemctl status patroni --no-pager"
  register: postgres_patroni_status
  changed_when: false
  failed_when: false
  when: postgres_patroni_active.stdout | default('') != 'active'

- name: Capture Patroni journal when inactive
  ansible.builtin.command: "journalctl -xeu patroni --no-pager -n 200"
  register: postgres_patroni_journal
  changed_when: false
  failed_when: false
  when: postgres_patroni_active.stdout | default('') != 'active'

- name: Fail if Patroni service is not active
  ansible.builtin.fail:
    msg: >-
      Patroni is not active on {{ inventory_hostname }}.
      systemctl status:
      {{ postgres_patroni_status.stdout | default('missing') }}
      journalctl:
      {{ postgres_patroni_journal.stdout | default('missing') }}
  when: postgres_patroni_active.stdout | default('') != 'active'

- name: Wait for Patroni API port
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ patroni.restapi_port }}"
    delay: 2
    timeout: 60
  register: postgres_patroni_port
  failed_when: false

- name: Capture Patroni journal when API port is down
  ansible.builtin.command: "journalctl -xeu patroni --no-pager -n 200"
  register: postgres_patroni_port_journal
  changed_when: false
  failed_when: false
  when: postgres_patroni_port is failed

- name: Fail when Patroni API port is not available
  ansible.builtin.fail:
    msg: >-
      Patroni API port is not available on {{ inventory_hostname }}.
      journalctl:
      {{ postgres_patroni_port_journal.stdout | default('missing') }}
  when: postgres_patroni_port is failed

- name: Wait for Patroni to be ready
  ansible.builtin.uri:
    url: "http://{{ postgres_patroni_node_ip }}:{{ patroni.restapi_port }}/health"
    method: GET
    status_code: 200
  register: patroni_health
  retries: 24
  delay: 5
  until: patroni_health.status == 200
  vars:
    postgres_patroni_node_ip: >-
      {{ postgres_nodes | selectattr('name', 'equalto', inventory_hostname) | map(attribute='ip') | first }}
