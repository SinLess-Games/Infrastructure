---
# =============================================================================
# etcd - Distributed Consensus for Patroni
# =============================================================================

- name: Create etcd system user
  ansible.builtin.user:
    name: etcd
    system: true
    create_home: false
    shell: /bin/false
  when: ansible_os_family == "Debian"

- name: Create etcd data directory
  ansible.builtin.file:
    path: "/var/lib/etcd/{{ postgres_cluster_name }}"
    state: directory
    owner: etcd
    group: etcd
    mode: "0700"

- name: Check for existing etcd data
  ansible.builtin.find:
    paths: "/var/lib/etcd/{{ postgres_cluster_name }}"
    file_type: any
    hidden: true
  register: postgres_etcd_data_find

- name: Set etcd cluster state
  ansible.builtin.set_fact:
    postgres_etcd_cluster_state: >-
      {{ 'existing' if (postgres_etcd_data_find.files | length > 0) else 'new' }}

- name: Configure etcd
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/etcd.conf.j2"
    dest: "/etc/default/etcd"
    owner: root
    group: root
    mode: "0644"
  notify: Restart etcd

- name: Create etcd systemd service
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/etcd.service.j2"
    dest: "/etc/systemd/system/etcd.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart etcd

- name: Reload systemd units for etcd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start etcd
  ansible.builtin.service:
    name: etcd
    state: started
    enabled: true

- name: Apply etcd configuration changes
  ansible.builtin.meta: flush_handlers

- name: Check etcd service state
  ansible.builtin.command: "systemctl is-active etcd"
  register: postgres_etcd_active
  changed_when: false
  failed_when: false

- name: Capture etcd status when inactive
  ansible.builtin.command: "systemctl status etcd --no-pager"
  register: postgres_etcd_status
  changed_when: false
  failed_when: false
  when: postgres_etcd_active.stdout | default('') != 'active'

- name: Capture etcd journal when inactive
  ansible.builtin.command: "journalctl -xeu etcd --no-pager -n 200"
  register: postgres_etcd_journal
  changed_when: false
  failed_when: false
  when: postgres_etcd_active.stdout | default('') != 'active'

- name: Fail if etcd service is not active
  ansible.builtin.fail:
    msg: >-
      etcd is not active on {{ inventory_hostname }}.
      systemctl status:
      {{ postgres_etcd_status.stdout | default('missing') }}
      journalctl:
      {{ postgres_etcd_journal.stdout | default('missing') }}
  when: postgres_etcd_active.stdout | default('') != 'active'

- name: Wait for etcd client port to be open
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ postgres_etcd_client_port }}"
    delay: 2
    timeout: 60

- name: Wait for etcd cluster to be ready
  ansible.builtin.command: "etcdctl --endpoints=http://{{ postgres_nodes | selectattr('name', 'equalto', inventory_hostname) | map(attribute='ip') | first }}:{{ postgres_etcd_client_port }} endpoint health"
  register: etcd_health
  retries: 12
  delay: 5
  until: etcd_health.rc == 0
  changed_when: false
