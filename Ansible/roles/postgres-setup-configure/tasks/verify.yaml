---
# =============================================================================
# Postgres Health Verification Tasks
# =============================================================================
# This task file verifies all components of the PostgreSQL HA cluster:
# - etcd cluster health and membership
# - Patroni cluster status and leader election
# - PostgreSQL connectivity (direct and via VIP)
# - HAProxy stats and backend health
# - Keepalived VIP assignment
# - pgBouncer connection pooling
# =============================================================================

- name: PostgreSQL HA Cluster Health Verification
  tags: ["verify", "health-check", "validation"]
  block:
    - name: Verification | Display verification start
      ansible.builtin.debug:
        msg: "Starting PostgreSQL HA cluster health verification for {{ inventory_hostname }}"

    # -----------------------------------------------------------------------------
    # etcd Cluster Verification
    # -----------------------------------------------------------------------------

    - name: Verification | Check etcd service status
      ansible.builtin.systemd:
        name: etcd
      register: etcd_service_status
      failed_when: etcd_service_status.status.ActiveState != "active"

    - name: Verification | Get etcd cluster member list
      ansible.builtin.command: etcdctl member list
      environment:
        ETCDCTL_API: "3"
        ETCDCTL_ENDPOINTS: "http://127.0.0.1:{{ postgres_etcd_client_port | default(2379) }}"
      register: etcd_members
      changed_when: false

    - name: Verification | Display etcd cluster members
      ansible.builtin.debug:
        msg: "{{ etcd_members.stdout_lines }}"

    - name: Verification | Check etcd endpoint health
      ansible.builtin.command: etcdctl endpoint health
      environment:
        ETCDCTL_API: "3"
        ETCDCTL_ENDPOINTS: "{% for node in postgres_nodes %}http://{{ node.ip }}:{{ postgres_etcd_client_port | default(2379) }}{% if not loop.last %},{% endif %}{% endfor %}"
      register: etcd_health
      changed_when: false
      failed_when: "'unhealthy' in etcd_health.stdout"

    - name: Verification | Display etcd health status
      ansible.builtin.debug:
        msg: "{{ etcd_health.stdout_lines }}"

    # -----------------------------------------------------------------------------
    # Patroni Cluster Verification
    # -----------------------------------------------------------------------------

    - name: Verification | Check Patroni service status
      ansible.builtin.systemd:
        name: patroni
      register: patroni_service_status
      failed_when: patroni_service_status.status.ActiveState != "active"

    - name: Verification | Get Patroni cluster status
      ansible.builtin.command: patronictl -c /etc/patroni/patroni.yml list {{ postgres_cluster_name }}
      register: patroni_status
      changed_when: false

    - name: Verification | Display Patroni cluster status
      ansible.builtin.debug:
        msg: "{{ patroni_status.stdout_lines }}"

    - name: Verification | Verify Patroni leader exists
      ansible.builtin.fail:
        msg: "No Patroni leader found in cluster!"
      when: "'Leader' not in patroni_status.stdout"

    - name: Verification | Check Patroni REST API
      ansible.builtin.uri:
        url: "http://{{ (postgres_nodes | selectattr('name', 'equalto', inventory_hostname) | first).ip }}:8008/health"
        method: GET
        status_code: 200
      register: patroni_api
      retries: 3
      delay: 5
      until: patroni_api.status == 200

    - name: Verification | Display Patroni API response
      ansible.builtin.debug:
        msg: "Patroni API health check: {{ patroni_api.json }}"

    # -----------------------------------------------------------------------------
    # PostgreSQL Connectivity Verification
    # -----------------------------------------------------------------------------

    - name: Verification | Test PostgreSQL local connection
      community.postgresql.postgresql_ping:
        db: postgres
        login_host: localhost
        login_user: postgres
      become: true
      become_user: postgres
      register: pg_local_ping

    - name: Verification | Display local PostgreSQL connectivity
      ansible.builtin.debug:
        msg: "PostgreSQL local connection: {{ 'SUCCESS' if (pg_local_ping.is_available | default(false)) else 'SKIPPED - Patroni manages connections' }}"

    - name: Verification | Test PostgreSQL VIP connection
      community.postgresql.postgresql_ping:
        db: postgres
        login_host: "{{ postgres_vip_ip }}"
        login_user: postgres
      become: true
      become_user: postgres
      register: pg_vip_ping
      when: inventory_hostname == (postgres_nodes | first).name
      ignore_errors: true

    - name: Verification | Display VIP PostgreSQL connectivity
      ansible.builtin.debug:
        msg: "PostgreSQL VIP connection ({{ postgres_vip_ip }}): {{ 'SUCCESS' if (pg_vip_ping.is_available | default(false)) else 'NOT TESTED' }}"
      when: inventory_hostname == (postgres_nodes | first).name

    # -----------------------------------------------------------------------------
    # HAProxy Verification
    # -----------------------------------------------------------------------------

    - name: Verification | Check HAProxy service status
      ansible.builtin.systemd:
        name: haproxy
      register: haproxy_service_status
      failed_when: haproxy_service_status.status.ActiveState != "active"

    - name: Verification | Get HAProxy stats
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ haproxy_stats_port | default(8404) }}/"
        method: GET
        return_content: true
      register: haproxy_stats
      changed_when: false
      ignore_errors: true

    - name: Verification | Display HAProxy backend status
      ansible.builtin.debug:
        msg: "HAProxy stats endpoint responding: {{ haproxy_stats.status == 200 }}"

    - name: Verification | Verify HAProxy backends are up
      ansible.builtin.fail:
        msg: "HAProxy has backends in DOWN state!"
      when: 
        - haproxy_stats.status == 200
        - "'DOWN' in haproxy_stats.content"
        - "'primary' in haproxy_stats.content or 'replica' in haproxy_stats.content"

    # -----------------------------------------------------------------------------
    # Keepalived Verification
    # -----------------------------------------------------------------------------

    - name: Verification | Check Keepalived service status
      ansible.builtin.systemd:
        name: keepalived
      register: keepalived_service_status
      failed_when: keepalived_service_status.status.ActiveState != "active"

    - name: Verification | Check VIP assignment
      ansible.builtin.command: ip -o -4 addr show
      register: vip_check
      changed_when: false
      delegate_to: "{{ (postgres_nodes | first).name }}"
      run_once: true

    - name: Verification | Display VIP status
      ansible.builtin.debug:
        msg: "VIP {{ postgres_vip_ip }} is {{ 'ASSIGNED' if postgres_vip_ip in vip_check.stdout else 'NOT ASSIGNED' }}"
      delegate_to: "{{ (postgres_nodes | first).name }}"
      run_once: true

    - name: Verification | Verify VIP is assigned
      ansible.builtin.fail:
        msg: "VIP {{ postgres_vip_ip }} is not assigned to primary node!"
      when: postgres_vip_ip not in vip_check.stdout
      delegate_to: "{{ (postgres_nodes | first).name }}"
      run_once: true

    # -----------------------------------------------------------------------------
    # pgBouncer Verification
    # -----------------------------------------------------------------------------

    - name: Verification | Check pgBouncer service status
      ansible.builtin.systemd:
        name: pgbouncer
      register: pgbouncer_service_status
      failed_when: pgbouncer_service_status.status.ActiveState != "active"

    - name: Verification | Test pgBouncer connection
      ansible.builtin.command: >
        psql -h localhost -p 6432 -U postgres -d postgres -c "SELECT version();"
      become: true
      become_user: postgres
      register: pgbouncer_test
      changed_when: false
      environment:
        PGPASSWORD: "{{ postgres_superuser_password | default('') }}"
      ignore_errors: true

    - name: Verification | Display pgBouncer connectivity
      ansible.builtin.debug:
        msg: "pgBouncer connection: {{ 'SUCCESS' if pgbouncer_test.rc == 0 else 'FAILED' }}"

    # -----------------------------------------------------------------------------
    # Firewall Verification
    # -----------------------------------------------------------------------------

    - name: Verification | Check UFW status
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false
      when: postgres_firewall_enabled

    - name: Verification | Display UFW status
      ansible.builtin.debug:
        msg: "{{ ufw_status.stdout_lines }}"
      when: postgres_firewall_enabled

    # -----------------------------------------------------------------------------
    # Final Summary
    # -----------------------------------------------------------------------------

    - name: Verification | Display success summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "PostgreSQL HA Cluster Health Check: PASSED"
          - "=========================================="
          - "Node: {{ inventory_hostname }}"
          - "etcd: {{ etcd_service_status.status.ActiveState }}"
          - "Patroni: {{ patroni_service_status.status.ActiveState }}"
          - "PostgreSQL: Available"
          - "HAProxy: {{ haproxy_service_status.status.ActiveState }}"
          - "Keepalived: {{ keepalived_service_status.status.ActiveState }}"
          - "pgBouncer: {{ pgbouncer_service_status.status.ActiveState }}"
          - "VIP {{ postgres_vip_ip }}: {{ 'Assigned to ' + (postgres_nodes | first).name if inventory_hostname == (postgres_nodes | first).name else 'Standby mode' }}"
          - "=========================================="
