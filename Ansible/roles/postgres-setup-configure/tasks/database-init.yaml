---
# =============================================================================
# Database Initialization
# =============================================================================

- name: Ensure Postgres data directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  loop:
    - "{{ postgres_data_dir }}"
    - "{{ postgres_config_dir }}"

- name: Set Postgres superuser password
  community.postgresql.postgresql_user:
    name: "{{ patroni.superuser.username }}"
    password: "{{ postgres_superuser_password }}"
    role_attr_flags: "SUPERUSER"
    login_unix_socket: "/var/run/postgresql"
  become: true
  become_user: postgres
  run_once: true
  delegate_to: "{{ postgres_primary_host }}"

- name: Ensure database name list is available
  ansible.builtin.set_fact:
    postgres_database_names_effective: "{{ postgres_database_names_effective | default(postgres_database_names) }}"
    postgres_app_users_effective: "{{ postgres_app_users | default([]) }}"
  run_once: true
  no_log: true

- name: Initialize application database list
  ansible.builtin.set_fact:
    postgres_app_databases_effective: "{{ postgres_app_databases | default([]) }}"
  run_once: true
  no_log: true

- name: Default application database list from names
  ansible.builtin.set_fact:
    postgres_app_databases_effective: >-
      {{
        postgres_app_databases_effective
        + [{'name': item, 'owner': patroni.superuser.username}]
      }}
  loop: "{{ postgres_database_names_effective }}"
  when: postgres_app_databases_effective | length == 0
  run_once: true
  no_log: true

- name: Create application users
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    role_attr_flags: "{{ (['LOGIN'] + (item.roles | default([]))) | unique | join(',') }}"
    login_unix_socket: "/var/run/postgresql"
  loop: "{{ postgres_app_users_effective }}"
  when: postgres_app_users_effective | length > 0
  become: true
  become_user: postgres
  run_once: true
  delegate_to: "{{ postgres_primary_host }}"
  no_log: true

- name: Create application databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    login_unix_socket: "/var/run/postgresql"
    owner: "{{ item.owner | default(patroni.superuser.username) }}"
  loop: "{{ postgres_app_databases_effective }}"
  when: postgres_db_provisioning_enabled
  become: true
  become_user: postgres
  run_once: true
  delegate_to: "{{ postgres_primary_host }}"
