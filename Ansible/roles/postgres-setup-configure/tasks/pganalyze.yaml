---
# =============================================================================
# pgAnalyze Monitoring
# =============================================================================

- name: Install pganalyze repository (official script)
  ansible.builtin.shell: "curl -fsSL https://packages.pganalyze.com/install.sh | bash"
  args:
    creates: "/etc/apt/sources.list.d/pganalyze.list"
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"

- name: Check for pganalyze apt source
  ansible.builtin.stat:
    path: "/etc/apt/sources.list.d/pganalyze.list"
  register: postgres_pganalyze_repo_stat
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"

- name: Discover pganalyze apt source file
  ansible.builtin.find:
    paths: "/etc/apt/sources.list.d"
    patterns: "*pganalyze*"
    file_type: file
  register: postgres_pganalyze_repo_find
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"

- name: Set pganalyze repo path
  ansible.builtin.set_fact:
    postgres_pganalyze_repo_path: >-
      {{ (postgres_pganalyze_repo_find.files | map(attribute='path') | list | first)
         | default('/etc/apt/sources.list.d/pganalyze.list') }}
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"

- name: Fail if pganalyze repo file is missing
  ansible.builtin.fail:
    msg: "pganalyze repo file not found under /etc/apt/sources.list.d after install script."
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
    - postgres_pganalyze_repo_find.files | length == 0

- name: Read pganalyze apt source
  ansible.builtin.slurp:
    src: "{{ postgres_pganalyze_repo_path }}"
  register: postgres_pganalyze_repo_raw
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
    - postgres_pganalyze_repo_find.files | length > 0

- name: Pin pganalyze repo to bookworm
  ansible.builtin.copy:
    dest: "{{ postgres_pganalyze_repo_path }}"
    content: "{{ (postgres_pganalyze_repo_raw.content | b64decode | string).replace('trixie', 'bookworm') }}"
    owner: root
    group: root
    mode: "0644"
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
    - postgres_pganalyze_repo_find.files | length > 0

- name: Refresh apt cache after adding pganalyze repo
  ansible.builtin.apt:
    update_cache: true
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
  register: postgres_pganalyze_apt_update
  ignore_errors: true

- name: Install pganalyze collector
  ansible.builtin.apt:
    name: "pganalyze-collector"
    state: present
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
  register: postgres_pganalyze_install
  ignore_errors: true

- name: Refresh apt cache after pganalyze repo pin
  ansible.builtin.apt:
    update_cache: true
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
    - postgres_pganalyze_repo_find.files | length > 0

- name: Retry pganalyze collector install after repo pin
  ansible.builtin.apt:
    name: "pganalyze-collector"
    state: present
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
    - postgres_pganalyze_repo_find.files | length > 0
  register: postgres_pganalyze_install_retry
  ignore_errors: true

- name: Capture pganalyze package status
  ansible.builtin.command: "apt-cache policy pganalyze-collector"
  register: postgres_pganalyze_policy
  changed_when: false
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
    - postgres_pganalyze_install is failed

- name: Check if pganalyze collector is installed
  ansible.builtin.command: "dpkg-query -W -f='${Status}' pganalyze-collector"
  register: postgres_pganalyze_dpkg
  changed_when: false
  failed_when: false
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"

- name: Set pganalyze installed flag
  ansible.builtin.set_fact:
    postgres_pganalyze_installed: "{{ 'install ok installed' in (postgres_pganalyze_dpkg.stdout | default('')) }}"
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"

- name: Fail when pganalyze collector is unavailable
  ansible.builtin.fail:
    msg: "pganalyze-collector not available on {{ inventory_hostname }}. apt-cache output: {{ postgres_pganalyze_policy.stdout | default('missing') }}"
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "apt"
    - not postgres_pganalyze_installed

- name: Configure pganalyze collector
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/postgres/pganalyze-collector.conf.j2"
    dest: "{{ postgres_pganalyze_config_path }}"
    mode: "0640"
  when: postgres_pganalyze_enabled
  notify: Restart pganalyze collector service

- name: Install pganalyze container dependencies
  ansible.builtin.apt:
    name: "{{ postgres_pganalyze_container_packages }}"
    state: present
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "container"

- name: Ensure Docker is running
  ansible.builtin.service:
    name: "docker"
    state: started
    enabled: true
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "container"

- name: Run pganalyze collector container
  community.docker.docker_container:
    name: "{{ postgres_pganalyze_container_name }}"
    image: "{{ postgres_pganalyze_container_image }}"
    state: started
    restart_policy: always
    volumes:
      - "{{ postgres_pganalyze_config_path }}:/etc/pganalyze-collector.conf:ro"
  when:
    - postgres_pganalyze_enabled
    - postgres_pganalyze_install_method == "container"
