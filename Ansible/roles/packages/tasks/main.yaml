---
# =============================================================================
# packages — main
# =============================================================================

- name: Validate package configuration
  ansible.builtin.import_tasks: validate.yaml

- name: Install packages
  ansible.builtin.import_tasks: install.yaml

- name: Install Homebrew (Linuxbrew)
  ansible.builtin.import_tasks: install-homebrew.yaml
  when: packages_install_homebrew | default(false)

- name: Install Homebrew packages
  ansible.builtin.import_tasks: install-brew-packages.yaml
  when:
    - packages_install_homebrew | default(false)
    - (packages_role_brew_packages | default([])) | length > 0
