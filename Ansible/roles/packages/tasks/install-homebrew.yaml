---
# =============================================================================
# packages — install-homebrew
# -----------------------------------------------------------------------------
# Installs Homebrew (Linuxbrew) if enabled and not already present
#
# Design goals:
# - Safe (no reinstallation)
# - Idempotent
# - Non-interactive
# - Works under sudo
# =============================================================================

- name: Check if Homebrew is already installed
  become: false
  ansible.builtin.command: "{{ packages_homebrew_bin }} --version"
  register: brew_check
  changed_when: false
  failed_when: false

- name: Install Homebrew (Linuxbrew)
  become: false
  ansible.builtin.shell: |
    NONINTERACTIVE=1 \
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    creates: "{{ packages_homebrew_bin }}"
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    USER: "{{ packages_homebrew_user }}"
  when:
    - brew_check.rc != 0
    - ansible_system == "Linux"

- name: Ensure Homebrew is available system-wide
  ansible.builtin.copy:
    dest: /etc/profile.d/homebrew.sh
    mode: "0644"
    content: |
      # Homebrew (Linuxbrew)
      if [ -d "{{ packages_homebrew_prefix }}" ]; then
        export HOMEBREW_PREFIX="{{ packages_homebrew_prefix }}"
        export HOMEBREW_CELLAR="{{ packages_homebrew_prefix }}/Cellar"
        export HOMEBREW_REPOSITORY="{{ packages_homebrew_prefix }}/Homebrew"
        export PATH="{{ packages_homebrew_prefix }}/bin:{{ packages_homebrew_prefix }}/sbin:$PATH"
        export MANPATH="{{ packages_homebrew_prefix }}/share/man:$MANPATH"
        export INFOPATH="{{ packages_homebrew_prefix }}/share/info:$INFOPATH"
      fi
  when:
    - ansible_system == "Linux"
