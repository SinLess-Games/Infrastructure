---
# =============================================================================
# packages — install
# =============================================================================

- name: Build flattened package list
  ansible.builtin.set_fact:
    packages__resolved_apt_packages: >-
      {{
        packages_role_groups
        | map('extract', packages_role_catalog)
        | flatten
        | unique
      }}

- name: Show packages to be installed (debug)
  ansible.builtin.debug:
    var: packages__resolved_apt_packages
  when: ansible_verbosity | int >= 2

- name: Install APT packages
  ansible.builtin.apt:
    name: "{{ packages__resolved_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: (packages__resolved_apt_packages | length) > 0
