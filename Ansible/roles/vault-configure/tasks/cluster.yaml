---
# Setup Raft cluster formation
# Location: Ansible/roles/vault-configure/tasks/cluster.yaml

- name: "Setup Raft cluster"
  block:
    - name: "Get Vault unseal data from first node"
      block:
        - name: "Check if root token file exists"
          stat:
            path: "{{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}"
          register: root_token_stat
          delegate_to: localhost
          become: false
          run_once: true

        - name: "Read root token from first node"
          slurp:
            src: "{{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}"
          register: vault_root_token_file
          delegate_to: localhost
          become: false
          run_once: true
          when: root_token_stat.stat.exists

        - name: "Set root token fact"
          set_fact:
            vault_root_token_data: "{{ vault_root_token_file.content | b64decode | from_json }}"
          run_once: true
          no_log: true
          when: root_token_stat.stat.exists

      when: vault_initialize | bool

    - name: "Check if leader is initialized and unsealed"
      shell: |
        export VAULT_ADDR="https://{{ hostvars[groups['vault'][0]]['ansible_host'] }}:8200"
        export VAULT_SKIP_VERIFY="true"
        {{ vault_bin_dir }}/vault status -format=json
      environment:
        VAULT_SKIP_VERIFY: "true"
      register: vault_leader_init_status
      delegate_to: "{{ groups['vault'][0] }}"
      run_once: true
      changed_when: false
      failed_when: false
      when: vault_initialize | bool

    - name: "Set retry_join configuration for followers"
      set_fact:
        vault_raft_retry_join:
          - leader_api_addr: "https://{{ hostvars[groups['vault'][0]]['ansible_host'] }}:8200"
            leader_ca_cert_file: "/etc/vault/tls/ca-bundle.pem"
      when: inventory_hostname != groups['vault'][0]

    - name: "Re-template Vault config with retry_join for followers"
      template:
        src: "{{ playbook_dir }}/../templates/vault/vault.hcl.j2"
        dest: "/etc/vault/vault.hcl"
        owner: vault
        group: vault
        mode: "0600"
      when: inventory_hostname != groups['vault'][0]
      notify: "restart vault"

    - name: "Flush handlers to restart Vault with retry_join config"
      meta: flush_handlers

    - name: "Wait for followers to join cluster via retry_join"
      pause:
        seconds: 30
      when: inventory_hostname != groups['vault'][0]

    - name: "Wait for all followers to complete join process"
      pause:
        seconds: 15
      run_once: true

    - name: "Check Raft membership"
      shell: |
        export VAULT_ADDR="https://{{ ansible_host | default(inventory_hostname) }}:8200"
        export VAULT_SKIP_VERIFY="true"
        {{ vault_bin_dir }}/vault operator raft list-peers -format=json 2>&1
      environment:
        VAULT_SKIP_VERIFY: "true"
      register: raft_member_check
      changed_when: false
      failed_when: false

    - name: "Check Vault listeners on each node"
      command: "ss -lntp 'sport = :8200 or sport = :8201'"
      register: vault_listener_ports
      changed_when: false
      failed_when: false

    - name: "Show Vault listener status"
      debug:
        msg: "{{ inventory_hostname }} listeners:\n{{ vault_listener_ports.stdout | default('no listeners') }}"
      when: vault_listener_ports is defined

    - name: "Check leader connectivity to follower API"
      uri:
        url: "https://{{ ansible_host | default(inventory_hostname) }}:8200/v1/sys/health"
        validate_certs: false
        status_code:
          - 200
          - 429
          - 472
          - 473
          - 501
          - 503
      register: vault_health_from_leader
      delegate_to: "{{ groups['vault'][0] }}"
      changed_when: false
      failed_when: false
      when: inventory_hostname != groups['vault'][0]

    - name: "Show leader-to-follower API reachability"
      debug:
        msg: "Leader -> {{ inventory_hostname }} health: status={{ vault_health_from_leader.status | default('n/a') }} error={{ vault_health_from_leader.msg | default('none') }}"
      when: inventory_hostname != groups['vault'][0]

    - name: "Join Raft cluster via retry_join configuration"
      block:
        - name: "Wait additional time to ensure initialization and join completes"
          pause:
            seconds: 15
          run_once: true

        - name: "Check Raft membership to verify retry_join worked"
          shell: |
            export VAULT_ADDR="https://{{ ansible_host | default(inventory_hostname) }}:8200"
            export VAULT_SKIP_VERIFY="true"
            {{ vault_bin_dir }}/vault status -format=json 2>&1 | jq '{initialized, sealed, ha_enabled}'
          environment:
            VAULT_SKIP_VERIFY: "true"
          register: follower_join_status
          changed_when: false
          failed_when: false
          retries: 5
          delay: 3
          until: (follower_join_status.stdout | from_json).initialized | default(false)
          when: inventory_hostname != groups['vault'][0]

        - name: "Display retry_join status"
          debug:
            msg: "{{ inventory_hostname }} status: {{ follower_join_status.stdout | from_json }}"
          when: 
            - inventory_hostname != groups['vault'][0]
            - follower_join_status.stdout is defined
            - follower_join_status.stdout is defined

    - name: "Wait for cluster to form"
      pause:
        seconds: 5

    - name: "Verify cluster formation"
      shell: |
        export VAULT_ADDR="https://{{ ansible_host | default(inventory_hostname) }}:8200"
        export VAULT_SKIP_VERIFY="true"
        {{ vault_bin_dir }}/vault operator raft list-peers || echo "Vault not yet initialized"
      environment:
        VAULT_SKIP_VERIFY: "true"
      register: raft_peers
      changed_when: false
      failed_when: false

    - name: "Display Raft cluster members"
      debug:
        msg: "{{ raft_peers.stdout_lines }}"
      when: raft_peers.stdout_lines is defined

  tags:
    - "vault"
    - "vault-raft"
