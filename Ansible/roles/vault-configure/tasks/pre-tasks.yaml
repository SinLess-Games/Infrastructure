---
# Pre-configuration validation and setup
# Location: Ansible/roles/vault-configure/tasks/pre-tasks.yaml

- name: "Include variables from group_vars"
  include_vars:
    dir: "{{ playbook_dir }}/../group_vars/vault"
    extensions: ["yaml", "yml"]
  tags:
    - "vault"
    - "vault-configure"

- name: "Pre-configuration validation"
  block:
    - name: "Validate Vault version format"
      assert:
        that:
          - vault_version is defined
          - vault_version | length > 0
        fail_msg: "vault_version must be defined"

    - name: "Create output directory for unseal keys"
      file:
        path: "{{ vault_unseal_keys_output_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      run_once: true
  tags:
    - "vault"
    - "vault-configure"
