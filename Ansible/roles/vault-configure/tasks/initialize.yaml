---
# Initialize and unseal Vault
# Location: Ansible/roles/vault-configure/tasks/initialize.yaml

- name: "Initialize Vault"
  block:
    - name: "Check if Vault is already initialized"
      shell: |
        export VAULT_ADDR="https://{{ ansible_host | default(inventory_hostname) }}:8200"
        export VAULT_SKIP_VERIFY="{{ vault_skip_verify }}"
        {{ vault_bin_dir }}/vault status -format=json | jq -r '.initialized'
      environment:
        VAULT_SKIP_VERIFY: "true"
      register: vault_initialized
      changed_when: false
      failed_when: false

    - name: "Initialize Vault cluster"
      block:
        - name: "Check if init.json already exists"
          stat:
            path: "{{ vault_home_dir }}/init.json"
          register: init_file_stat

        - name: "Initialize Vault"
          shell: |
            export VAULT_ADDR="https://{{ ansible_host | default(inventory_hostname) }}:8200"
            export VAULT_SKIP_VERIFY="true"
            {{ vault_bin_dir }}/vault operator init \
              -key-shares={{ vault_key_shares }} \
              -key-threshold={{ vault_key_threshold }} \
              -format=json > {{ vault_home_dir }}/init.json
          changed_when: true
          when: not init_file_stat.stat.exists

        - name: "Read initialization response"
          slurp:
            src: "{{ vault_home_dir }}/init.json"
          register: vault_init_response

        - name: "Debug initialization response"
          debug:
            msg: "Init response content: {{ vault_init_response.content | b64decode }}"
          when: vault_init_response.content is defined

        - name: "Parse and save unseal keys"
          block:
            - name: "Set unseal keys fact"
              set_fact:
                vault_unseal_data: "{{ vault_init_response.content | b64decode | from_json }}"

            - name: "Create unseal keys output directory (localhost)"
              file:
                path: "{{ vault_unseal_keys_output_dir }}"
                state: directory
                mode: "0700"
              delegate_to: localhost
              become: false
              run_once: true

            - name: "Save unseal keys to file"
              copy:
                content: "{{ vault_unseal_data | to_nice_json }}"
                dest: "{{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}"
                mode: "0600"
              delegate_to: localhost
              become: false
              run_once: true

            - name: "Save root token securely"
              copy:
                content: |
                  {
                    "root_token": "{{ vault_unseal_data.root_token }}",
                    "unseal_keys_b64": {{ vault_unseal_data.unseal_keys_b64 | to_json }},
                    "unseal_keys_hex": {{ vault_unseal_data.unseal_keys_hex | to_json }}
                  }
                dest: "{{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}"
                mode: "0600"
              delegate_to: localhost
              become: false
              run_once: true
              no_log: true

            - name: "Display unseal key information"
              debug:
                msg: |
                  Vault has been initialized!
                  Unseal Keys Count: {{ vault_unseal_data.unseal_keys_b64 | length }}
                  Key Threshold: {{ vault_key_threshold }}
                  Root Token: (saved to {{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }})
                  Unseal Keys: (saved to {{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }})

          when: vault_init_response.content is defined and (vault_init_response.content | length > 0)

      when: vault_initialized.stdout != 'true'

  when: vault_initialize | bool
  run_once: true
  tags:
    - "vault"
    - "vault-init"

# ========================================================================
# UNSEAL VAULT
# ========================================================================

- name: "Unseal Vault"
  block:
    - name: "Check if Vault is sealed"
      shell: |
        export VAULT_ADDR="https://{{ ansible_host | default(inventory_hostname) }}:8200"
        export VAULT_SKIP_VERIFY="true"
        {{ vault_bin_dir }}/vault status -format=json | jq -r '.sealed'
      environment:
        VAULT_SKIP_VERIFY: "true"
      register: vault_sealed_status
      changed_when: false

    - name: "Read unseal keys"
      slurp:
        src: "{{ vault_unseal_keys_output_dir }}/{{ vault_unseal_keys_file }}"
      register: vault_keys_file
      delegate_to: localhost
      become: false
      when: vault_sealed_status.stdout == 'true'

    - name: "Unseal Vault with keys"
      block:
        - name: "Set unseal keys fact"
          set_fact:
            vault_unseal_keys: "{{ vault_keys_file.content | b64decode | from_json }}"

        - name: "Unseal Vault"
          shell: |
            export VAULT_ADDR="https://{{ ansible_host | default(inventory_hostname) }}:8200"
            export VAULT_SKIP_VERIFY="true"
            {% for key in vault_unseal_keys.unseal_keys_b64[:vault_key_threshold] %}
            {{ vault_bin_dir }}/vault operator unseal "{{ key }}" || true
            {% endfor %}
          environment:
            VAULT_SKIP_VERIFY: "true"
          changed_when: true
          no_log: true

      when: vault_sealed_status.stdout == 'true'

  tags:
    - "vault"
    - "vault-unseal"
