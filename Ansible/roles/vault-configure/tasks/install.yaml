---
# Vault binary installation
# Location: Ansible/roles/vault-configure/tasks/install.yaml

- name: "Install Vault from binary"
  block:
    - name: "Create temporary directory for download"
      tempfile:
        state: directory
        suffix: "_vault"
      register: vault_temp_dir

    - name: "Download Vault binary"
      get_url:
        url: "{{ vault_download_url }}"
        dest: "{{ vault_temp_dir.path }}/vault_{{ vault_version }}_linux_amd64.zip"
        mode: "0600"
      environment:
        - PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      register: vault_download

    - name: "Download checksums"
      get_url:
        url: "{{ vault_checksum_url }}"
        dest: "{{ vault_temp_dir.path }}/SHA256SUMS"
        mode: "0600"
      when: vault_verify_checksum | bool

    - name: "Verify checksum"
      shell: |
        cd {{ vault_temp_dir.path }}
        grep -i "vault_{{ vault_version }}_linux_amd64.zip" SHA256SUMS | sha256sum -c -
      when: vault_verify_checksum | bool
      changed_when: false

    - name: "Extract Vault binary"
      unarchive:
        src: "{{ vault_temp_dir.path }}/vault_{{ vault_version }}_linux_amd64.zip"
        dest: "{{ vault_temp_dir.path }}"
        remote_src: true

    - name: "Install Vault binary to /usr/local/bin"
      copy:
        src: "{{ vault_temp_dir.path }}/vault"
        dest: "{{ vault_bin_dir }}/vault"
        mode: "0755"
        remote_src: true
      become: true

    - name: "Enable mlock capability for Vault binary"
      capabilities:
        path: "{{ vault_bin_dir }}/vault"
        capability: "cap_ipc_lock=ep"
        state: present
      become: true

    - name: "Verify Vault installation"
      command: "{{ vault_bin_dir }}/vault version"
      changed_when: false
      register: vault_version_check

    - name: "Display Vault version"
      debug:
        var: vault_version_check.stdout

  always:
    - name: "Clean up temporary directory"
      file:
        path: "{{ vault_temp_dir.path }}"
        state: absent
      when: vault_temp_dir is defined

  tags:
    - "vault"
    - "vault-install"
