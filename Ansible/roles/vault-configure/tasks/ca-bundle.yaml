---
# Build CA bundle from all Vault node certificates
# Location: Ansible/roles/vault-configure/tasks/ca-bundle.yaml

- name: "Fetch certificate from each Vault node"
  fetch:
    src: "{{ vault_tls_cert_file }}"
    dest: "/tmp/vault-certs/{{ inventory_hostname }}.crt"
    flat: yes
  tags:
    - "vault"
    - "vault-tls"
    - "vault-ca-bundle"

- name: "Assemble CA bundle on localhost"
  assemble:
    src: "/tmp/vault-certs/"
    dest: "/tmp/vault-ca-bundle.pem"
  delegate_to: localhost
  run_once: true
  tags:
    - "vault"
    - "vault-tls"
    - "vault-ca-bundle"

- name: "Distribute CA bundle to all Vault nodes"
  copy:
    src: "/tmp/vault-ca-bundle.pem"
    dest: "{{ vault_ca_bundle_file | default('/etc/vault/tls/ca-bundle.pem') }}"
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: "0644"
  notify: "Restart vault service"
  tags:
    - "vault"
    - "vault-tls"
    - "vault-ca-bundle"

- name: "Clean up temp directory"
  file:
    path: "/tmp/vault-certs/"
    state: absent
  delegate_to: localhost
  run_once: true
  tags:
    - "vault"
    - "vault-tls"
    - "vault-ca-bundle"

- name: "Verify CA bundle exists"
  stat:
    path: "{{ vault_ca_bundle_file | default('/etc/vault/tls/ca-bundle.pem') }}"
  register: ca_bundle_stat
  failed_when: not ca_bundle_stat.stat.exists
  tags:
    - "vault"
    - "vault-tls"
    - "vault-ca-bundle"
