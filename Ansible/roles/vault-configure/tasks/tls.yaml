---
# Configure TLS certificates
# Location: Ansible/roles/vault-configure/tasks/tls.yaml

- name: "Configure TLS Certificates"
  block:
    - name: "Check if TLS certificates exist"
      stat:
        path: "{{ vault_tls_cert_file }}"
      register: vault_cert_stat

    - name: "Generate self-signed certificates if not present"
      block:
        - name: "Generate private key"
          openssl_privatekey:
            path: "{{ vault_tls_key_file }}"
            size: 4096
            owner: "{{ vault_user }}"
            group: "{{ vault_group }}"
            mode: "0600"

        - name: "Generate CSR"
          openssl_csr:
            path: "{{ vault_home_dir }}/vault.csr"
            privatekey_path: "{{ vault_tls_key_file }}"
            common_name: "{{ inventory_hostname }}"
            subject_alt_name:
              - "DNS:{{ inventory_hostname }}"
              - "DNS:vault.local"
              - "IP:{{ ansible_host | default(inventory_hostname) }}"
            owner: "{{ vault_user }}"
            group: "{{ vault_group }}"

        - name: "Generate self-signed certificate"
          openssl_certificate:
            path: "{{ vault_tls_cert_file }}"
            privatekey_path: "{{ vault_tls_key_file }}"
            csr_path: "{{ vault_home_dir }}/vault.csr"
            provider: "selfsigned"
            selfsigned_digest: "sha256"
            selfsigned_version: 3
            selfsigned_not_before: "+0s"
            selfsigned_not_after: "+365d"
            owner: "{{ vault_user }}"
            group: "{{ vault_group }}"
            mode: "0644"

        - name: "Clean up CSR"
          file:
            path: "{{ vault_home_dir }}/vault.csr"
            state: absent

      when: not vault_cert_stat.stat.exists

    - name: "Set correct permissions on TLS files"
      file:
        path: "{{ item }}"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0600"
      loop:
        - "{{ vault_tls_key_file }}"
        - "{{ vault_tls_cert_file }}"

  tags:
    - "vault"
    - "vault-tls"
    - "vault-certs"
