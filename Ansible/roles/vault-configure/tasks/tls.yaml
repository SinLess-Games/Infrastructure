---
# Configure TLS certificates
# Location: Ansible/roles/vault-configure/tasks/tls.yaml

- name: "Configure TLS Certificates"
  block:
    - name: "Check if TLS certificates exist"
      stat:
        path: "{{ vault_tls_cert_file }}"
      register: vault_cert_stat

    - name: "Check if Vault CA certificate exists (leader only)"
      stat:
        path: "{{ vault_tls_ca_cert_file | default('/etc/vault/tls/ca.crt') }}"
      register: vault_ca_stat
      when: inventory_hostname == groups['vault'][0]

    - name: "Generate CA private key (leader only)"
      openssl_privatekey:
        path: "{{ vault_tls_ca_key_file | default('/etc/vault/tls/ca.key') }}"
        size: 4096
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0600"
      when:
        - inventory_hostname == groups['vault'][0]
        - not vault_ca_stat.stat.exists or (vault_ca_stat.stat.size | default(0)) == 0

    - name: "Generate CA CSR (leader only)"
      openssl_csr:
        path: "{{ vault_home_dir }}/vault-ca.csr"
        privatekey_path: "{{ vault_tls_ca_key_file | default('/etc/vault/tls/ca.key') }}"
        common_name: "Vault-CA-{{ inventory_hostname }}"
        basic_constraints:
          - "CA:TRUE"
        key_usage:
          - keyCertSign
          - cRLSign
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
      when:
        - inventory_hostname == groups['vault'][0]
        - not vault_ca_stat.stat.exists or (vault_ca_stat.stat.size | default(0)) == 0

    - name: "Generate CA certificate (leader only)"
      openssl_certificate:
        path: "{{ vault_tls_ca_cert_file | default('/etc/vault/tls/ca.crt') }}"
        privatekey_path: "{{ vault_tls_ca_key_file | default('/etc/vault/tls/ca.key') }}"
        csr_path: "{{ vault_home_dir }}/vault-ca.csr"
        provider: "selfsigned"
        selfsigned_digest: "sha256"
        selfsigned_version: 3
        selfsigned_not_before: "+0s"
        selfsigned_not_after: "+3650d"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0644"
      when:
        - inventory_hostname == groups['vault'][0]
        - not vault_ca_stat.stat.exists or (vault_ca_stat.stat.size | default(0)) == 0

    - name: "Clean up CA CSR (leader only)"
      file:
        path: "{{ vault_home_dir }}/vault-ca.csr"
        state: absent
      when:
        - inventory_hostname == groups['vault'][0]
        - not vault_ca_stat.stat.exists or (vault_ca_stat.stat.size | default(0)) == 0

    - name: "Read shared CA cert from leader"
      slurp:
        src: "{{ vault_tls_ca_cert_file | default('/etc/vault/tls/ca.crt') }}"
      register: vault_ca_cert_slurp
      delegate_to: "{{ groups['vault'][0] }}"
      run_once: true

    - name: "Read shared CA key from leader"
      slurp:
        src: "{{ vault_tls_ca_key_file | default('/etc/vault/tls/ca.key') }}"
      register: vault_ca_key_slurp
      delegate_to: "{{ groups['vault'][0] }}"
      run_once: true
      no_log: true

    - name: "Cache shared CA content on leader"
      set_fact:
        vault_shared_ca_cert: "{{ vault_ca_cert_slurp.content | b64decode }}"
        vault_shared_ca_key: "{{ vault_ca_key_slurp.content | b64decode }}"
      delegate_to: "{{ groups['vault'][0] }}"
      delegate_facts: true
      run_once: true
      no_log: true

    - name: "Distribute shared Vault CA cert to all nodes"
      copy:
        content: "{{ hostvars[groups['vault'][0]].vault_shared_ca_cert }}"
        dest: "{{ vault_tls_ca_cert_file | default('/etc/vault/tls/ca.crt') }}"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0644"
      when: hostvars[groups['vault'][0]].vault_shared_ca_cert is defined
      notify: "restart vault"

    - name: "Distribute shared Vault CA key to all nodes"
      copy:
        content: "{{ hostvars[groups['vault'][0]].vault_shared_ca_key }}"
        dest: "{{ vault_tls_ca_key_file | default('/etc/vault/tls/ca.key') }}"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0600"
      when: hostvars[groups['vault'][0]].vault_shared_ca_key is defined
      no_log: true
      notify: "restart vault"

    - name: "Read current Vault certificate info"
      openssl_certificate_info:
        path: "{{ vault_tls_cert_file }}"
      register: vault_cert_info
      when: vault_cert_stat.stat.exists

    - name: "Read shared CA certificate info"
      openssl_certificate_info:
        path: "{{ vault_tls_ca_cert_file | default('/etc/vault/tls/ca.crt') }}"
      register: vault_ca_cert_info

    - name: "Set cert regeneration flag"
      set_fact:
        vault_cert_needs_regen: >-
          {{ (not vault_cert_stat.stat.exists)
             or (vault_cert_info.issuer is defined and vault_cert_info.subject is defined and vault_cert_info.issuer == vault_cert_info.subject)
             or (vault_ca_cert_info.subject is defined and vault_cert_info.issuer is defined and vault_cert_info.issuer != vault_ca_cert_info.subject) }}

    - name: "Generate private key"
      openssl_privatekey:
        path: "{{ vault_tls_key_file }}"
        size: 4096
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0600"
      when: vault_cert_needs_regen | default(true)

    - name: "Generate CSR"
      openssl_csr:
        path: "{{ vault_home_dir }}/vault.csr"
        privatekey_path: "{{ vault_tls_key_file }}"
        common_name: "{{ inventory_hostname }}"
        subject_alt_name:
          - "DNS:{{ inventory_hostname }}"
          - "DNS:vault.local"
          - "DNS:{{ vault_cluster_hostname }}"
          - "IP:{{ ansible_host | default(inventory_hostname) }}"
          - "IP:{{ vault_keepalived_virtual_ip }}"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
      when: vault_cert_needs_regen | default(true)

    - name: "Generate Vault certificate signed by local CA"
      community.crypto.x509_certificate:
        path: "{{ vault_tls_cert_file }}"
        csr_path: "{{ vault_home_dir }}/vault.csr"
        provider: "ownca"
        ownca_path: "{{ vault_tls_ca_cert_file | default('/etc/vault/tls/ca.crt') }}"
        ownca_privatekey_path: "{{ vault_tls_ca_key_file | default('/etc/vault/tls/ca.key') }}"
        ownca_digest: "sha256"
        ownca_not_before: "+0s"
        ownca_not_after: "+365d"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "0644"
      when: vault_cert_needs_regen | default(true)
      notify: "restart vault"

    - name: "Clean up CSR"
      file:
        path: "{{ vault_home_dir }}/vault.csr"
        state: absent
      when: vault_cert_needs_regen | default(true)

    - name: "Set correct permissions on TLS files"
      file:
        path: "{{ item.path }}"
        owner: "{{ vault_user }}"
        group: "{{ vault_group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ vault_tls_key_file }}", mode: "0600" }
        - { path: "{{ vault_tls_cert_file }}", mode: "0644" }
        - { path: "{{ vault_tls_ca_key_file | default('/etc/vault/tls/ca.key') }}", mode: "0600" }
        - { path: "{{ vault_tls_ca_cert_file | default('/etc/vault/tls/ca.crt') }}", mode: "0644" }

  tags:
    - "vault"
    - "vault-tls"
    - "vault-certs"
