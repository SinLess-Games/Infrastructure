---
# Manage Vault systemd service
# Location: Ansible/roles/vault-configure/tasks/service.yaml

- name: "Enable and start Vault service"
  block:
    - name: "Start Vault service"
      systemd:
        name: vault
        state: started
        enabled: true
        daemon_reload: true
  rescue:
    - name: "Collect Vault service status"
      command: systemctl status vault --no-pager
      register: vault_service_status
      changed_when: false
      failed_when: false

    - name: "Collect Vault journal logs"
      command: journalctl -xeu vault.service --no-pager -n 200
      register: vault_service_journal
      changed_when: false
      failed_when: false

    - name: "Show Vault service diagnostics"
      debug:
        msg: |
          vault.service status:
          {{ vault_service_status.stdout | default('') }}

          vault.service journal (last 200 lines):
          {{ vault_service_journal.stdout | default('') }}

    - name: "Fail Vault service start"
      fail:
        msg: "Vault service failed to start. See diagnostics above."
  tags:
    - "vault"
    - "vault-service"

- name: "Wait for Vault to be ready"
  block:
    - name: "Check Vault health endpoint"
      uri:
        url: "https://{{ ansible_host | default(inventory_hostname) }}:8200/v1/sys/health"
        method: GET
        validate_certs: false
        status_code: [200, 429, 472, 473, 501, 503]
      register: vault_health
      until: vault_health.status in [200, 429, 472, 473, 501, 503]
      retries: 30
      delay: 2
  rescue:
    - name: "Collect Vault service status (post-start)"
      command: systemctl status vault --no-pager
      register: vault_service_status_post
      changed_when: false
      failed_when: false

    - name: "Collect Vault journal logs (post-start)"
      command: journalctl -xeu vault.service --no-pager -n 200
      register: vault_service_journal_post
      changed_when: false
      failed_when: false

    - name: "Show Vault readiness diagnostics"
      debug:
        msg: |
          vault.service status:
          {{ vault_service_status_post.stdout | default('') }}

          vault.service journal (last 200 lines):
          {{ vault_service_journal_post.stdout | default('') }}

    - name: "Fail Vault readiness check"
      fail:
        msg: "Vault health endpoint not reachable. See diagnostics above."
  tags:
    - "vault"
    - "vault-service"
