---
# Default variables for vault-configure role

vault_version: "1.16.0"
vault_user: "vault"
vault_group: "vault"
vault_home_dir: "/etc/vault"
vault_data_dir: "/opt/vault/data"
vault_logs_dir: "/var/log/vault"
vault_bin_dir: "/usr/local/bin"

# Install from binary or package
vault_install_method: "binary"  # 'binary' or 'package'
vault_download_url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
vault_checksum_url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_SHA256SUMS"
vault_verify_checksum: true

# Listener Configuration
vault_listener_address: "0.0.0.0:8200"
vault_tls_disable: false
vault_tls_cert_file: "/etc/vault/tls/vault.crt"
vault_tls_key_file: "/etc/vault/tls/vault.key"

# Cluster Configuration
vault_cluster_name: "vault-cluster"
vault_api_addr: "https://{{ ansible_host | default(inventory_hostname) }}:8200"
vault_cluster_addr: "https://{{ ansible_host | default(inventory_hostname) }}:8201"

# Storage Path
vault_storage_path: "/opt/vault/data"

# Raft Retry Join
vault_raft_retry_join: []

# Audit Logging
vault_audit_file_enabled: true
vault_audit_file_path: "/var/log/vault/audit.log"
vault_audit_log_raw: false
vault_audit_file_mode: "0640"
vault_audit_syslog_enabled: false

# Logging level
vault_log_level: "info"

# Plugin directory
vault_plugin_directory: "/opt/vault/plugins"

# Seal type - can be 'shamir', 'transit', 'awskms', or 'azurekeyvault'
vault_seal_type: "shamir"

# UI
vault_ui_enabled: true

# Systemd service
vault_systemd_restart: "always"
vault_systemd_restart_sec: 5
vault_systemd_file_limit: 65536

# HA/Keepalived Configuration
vault_ha_enabled: false
vault_keepalived_enabled: false
vault_haproxy_enabled: false
vault_keepalived_priority: 100
vault_keepalived_interface: "eth0"
vault_keepalived_virtual_ip: ""
vault_keepalived_vrid: 51

# HAProxy settings
vault_haproxy_stats_enabled: true
vault_haproxy_stats_port: 8404

# Unseal keys backup
vault_unseal_keys_output_dir: "{{ playbook_dir }}/../../.outputs/vault"
vault_unseal_keys_file: "unseal-keys.json"
vault_unseal_keys_backup: true

# Initialize vault (only on first node)
vault_initialize: false
vault_key_shares: 5
vault_key_threshold: 3

# Skip cert validation for initial setup (should be false for production)
vault_skip_verify: false
