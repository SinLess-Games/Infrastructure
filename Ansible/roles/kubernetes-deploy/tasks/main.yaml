---
# =============================================================================
# Kubernetes Deployment Role - Main Tasks
# =============================================================================
# Purpose:
#   - Validate Kubernetes deployment prerequisites
#   - Fetch Kubernetes secrets from Vault
#   - Deploy Terraform modules for master and worker nodes
#   - Execute Terraform to provision VMs
#   - Wait for VMs to boot and become accessible
#   - Configure VMs with SSH keys and basic settings
# =============================================================================

- name: Display Kubernetes deployment information
  ansible.builtin.debug:
    msg: |
      =========================================
      Kubernetes Deployment Configuration
      =========================================
      Cluster Name: {{ kubernetes_deploy_cluster_name }}
      Environment: {{ kubernetes_deploy_environment }}
      RKE2 Version: {{ kubernetes_deploy_rke2_version }}
      
      Control Plane Nodes:
        Count: {{ kubernetes_deploy_master_count }}
        Target Nodes: {{ kubernetes_deploy_master_target_nodes | join(', ') }}
        IPs: {{ kubernetes_deploy_master_ip_addresses | join(', ') }}
        Resources: {{ kubernetes_deploy_master_cpu_cores }}vCPU, {{ (kubernetes_deploy_master_memory_mb | int) / 1024 | round(1) }}GB RAM
        Template: {{ kubernetes_deploy_master_clone_template }}
        Storage: {{ kubernetes_deploy_network_vlan_id }} VLAN
      
      Worker Nodes:
        Count: {{ kubernetes_deploy_worker_count }}
        Target Nodes: {{ kubernetes_deploy_worker_target_nodes | join(', ') }}
        IPs: {{ kubernetes_deploy_worker_ip_addresses | join(', ') }}
        Resources: {{ kubernetes_deploy_worker_cpu_cores }}vCPU, {{ (kubernetes_deploy_worker_memory_mb | int) / 1024 | round(1) }}GB RAM
        Template: {{ kubernetes_deploy_worker_clone_template }}
      
      Network:
        Bridge: {{ kubernetes_deploy_network_bridge }}
        VLAN: {{ kubernetes_deploy_network_vlan_id }}
        Gateway: {{ kubernetes_deploy_master_gateway }}
      
      Kubernetes Network:
        Pod CIDR: {{ kubernetes_deploy_cluster_cidr }}
        Service CIDR: {{ kubernetes_deploy_service_cidr }}
      =========================================

- name: Validate Kubernetes deployment prerequisites
  ansible.builtin.assert:
    that:
      - kubernetes_deploy_master_count | int >= 1
      - kubernetes_deploy_master_ip_addresses | length == kubernetes_deploy_master_count | int
      - kubernetes_deploy_worker_count | int >= 1
      - kubernetes_deploy_worker_ip_addresses | length == kubernetes_deploy_worker_count | int
      - kubernetes_deploy_master_target_nodes | length >= 1
      - kubernetes_deploy_worker_target_nodes | length >= 1
      - kubernetes_deploy_vault_addr is defined and kubernetes_deploy_vault_addr | length > 0
      - kubernetes_deploy_rke2_server_token is defined and kubernetes_deploy_rke2_server_token | length > 0
    fail_msg: |
      Kubernetes deployment validation failed:
      - Master count must be >= 1
      - Master IP count must match master node count
      - Worker count must be >= 1  
      - Worker IP count must match worker node count
      - At least 1 target Proxmox node required for masters and workers
      - Vault address must be configured
      - RKE2 server token must be available from Vault

- name: Verify Proxmox API token file exists
  ansible.builtin.stat:
    path: "{{ kubernetes_deploy_repo_root }}/{{ kubernetes_deploy_proxmox_api_token_file }}"
  register: proxmox_token_file_stat
  failed_when: not proxmox_token_file_stat.stat.exists

- name: Read Proxmox API token file for Terraform
  ansible.builtin.slurp:
    src: "{{ kubernetes_deploy_repo_root }}/{{ kubernetes_deploy_proxmox_api_token_file }}"
  register: kubernetes_proxmox_token_file
  no_log: true

- name: Parse Proxmox API token values
  ansible.builtin.set_fact:
    kubernetes_proxmox_token_text: "{{ kubernetes_proxmox_token_file.content | b64decode | string }}"
  no_log: true

- name: Extract Proxmox API token ID and secret
  ansible.builtin.set_fact:
    kubernetes_proxmox_api_token_id: >-
      {{ (kubernetes_proxmox_token_text
        | regex_findall('(?m)^FULL_TOKENID=([^\n]+)'))
        | first | default('') }}
    kubernetes_proxmox_api_token_secret: >-
      {{ (kubernetes_proxmox_token_text
        | regex_findall('(?m)^TOKEN_SECRET=([^\n]+)'))
        | first | default('') }}
  no_log: true

- name: Verify Proxmox API credentials were parsed
  ansible.builtin.assert:
    that:
      - kubernetes_proxmox_api_token_id is not none
      - kubernetes_proxmox_api_token_id | length > 0
      - kubernetes_proxmox_api_token_secret is not none
      - kubernetes_proxmox_api_token_secret | length > 0
    fail_msg: "Failed to parse Proxmox API token ID or secret from token file"

- name: Ensure Terraform module variables directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_deploy_terraform_dir }}"
    state: directory
    mode: "0755"

- name: Generate Kubernetes cluster Terraform configuration (k8s-dev-cluster.tf)
  ansible.builtin.template:
    src: k8s-dev-cluster.tf.j2
    dest: "{{ kubernetes_deploy_terraform_dir }}/k8s-dev-cluster.tf"
    mode: "0644"

# DISABLED: terraform.tfvars.kubernetes-deploy generation
# Using main.auto.tfvars instead

# DISABLED: terraform.tfvars.kubernetes-worker generation
# Using main.auto.tfvars instead

- name: Create cloud-init snippets for master nodes on all Proxmox nodes
  ansible.builtin.shell:
    cmd: |
      mkdir -p /var/lib/vz/snippets
      cat > "/var/lib/vz/snippets/k8s-{{ kubernetes_deploy_environment }}-cp-{{ '%02d' | format(item[1] + 1) }}-cloud-init.yaml" << 'EOF'
      #cloud-config
      version: 2
      # RKE2 Control Plane Node - Cloud-Init Configuration
      
      # Package management
      package_update: true
      package_upgrade: false
      packages:
        - qemu-guest-agent
        - curl
        - wget
        - net-tools
        - vim
        - htop
      
      # Hostname configuration
      hostname: k8s-{{ kubernetes_deploy_environment }}-cp-{{ '%02d' | format(item[1] + 1) }}
      fqdn: k8s-{{ kubernetes_deploy_environment }}-cp-{{ '%02d' | format(item[1] + 1) }}.{{ kubernetes_deploy_environment }}.sinlessgames.local
      
      # System configuration
      locale: en_US.UTF-8
      timezone: UTC
      
      # OS level systemd-networkd management (if needed)
      write_files:
        - path: /etc/qemu-ga/client.conf
          content: |
            [general]
            logfile = /var/log/qemu-ga/client.log
      
      # Services
      runcmd:
        - systemctl enable qemu-guest-agent
        - systemctl start qemu-guest-agent
        - systemctl enable systemd-networkd
        - systemctl start systemd-networkd
        - echo "Cloud-init completed at $(date)" > /var/log/cloud-init-complete.log
      
      # Final message
      final_message: "Cloud-init has completed for k8s-{{ kubernetes_deploy_environment }}-cp-{{ '%02d' | format(item[1] + 1) }} at $TIMESTAMP"
      EOF
      chmod 644 "/var/lib/vz/snippets/k8s-{{ kubernetes_deploy_environment }}-cp-{{ '%02d' | format(item[1] + 1) }}-cloud-init.yaml"
  loop: "{{ kubernetes_deploy_master_target_nodes | unique | list | product(range(0, kubernetes_deploy_master_count | int)) | list }}"
  delegate_to: "{{ item[0] }}"
  register: master_cloud_init_creation

- name: Create cloud-init snippets for worker nodes on all Proxmox nodes
  ansible.builtin.shell:
    cmd: |
      mkdir -p /var/lib/vz/snippets
      cat > "/var/lib/vz/snippets/k8s-{{ kubernetes_deploy_environment }}-wk-{{ '%02d' | format(item[1] + 1) }}-cloud-init.yaml" << 'EOF'
      #cloud-config
      version: 2
      # RKE2 Worker Node - Cloud-Init Configuration
      
      # Package management
      package_update: true
      package_upgrade: false
      packages:
        - qemu-guest-agent
        - curl
        - wget
        - net-tools
        - vim
        - htop
      
      # Hostname configuration
      hostname: k8s-{{ kubernetes_deploy_environment }}-wk-{{ '%02d' | format(item[1] + 1) }}
      fqdn: k8s-{{ kubernetes_deploy_environment }}-wk-{{ '%02d' | format(item[1] + 1) }}.{{ kubernetes_deploy_environment }}.sinlessgames.local
      
      # System configuration
      locale: en_US.UTF-8
      timezone: UTC
      
      # OS level systemd-networkd management (if needed)
      write_files:
        - path: /etc/qemu-ga/client.conf
          content: |
            [general]
            logfile = /var/log/qemu-ga/client.log
      
      # Services
      runcmd:
        - systemctl enable qemu-guest-agent
        - systemctl start qemu-guest-agent
        - systemctl enable systemd-networkd
        - systemctl start systemd-networkd
        - echo "Cloud-init completed at $(date)" > /var/log/cloud-init-complete.log
      
      # Final message
      final_message: "Cloud-init has completed for k8s-{{ kubernetes_deploy_environment }}-wk-{{ '%02d' | format(item[1] + 1) }} at $TIMESTAMP"
      EOF
      chmod 644 "/var/lib/vz/snippets/k8s-{{ kubernetes_deploy_environment }}-wk-{{ '%02d' | format(item[1] + 1) }}-cloud-init.yaml"
  loop: "{{ kubernetes_deploy_worker_target_nodes | unique | list | product(range(0, kubernetes_deploy_worker_count | int)) | list }}"
  delegate_to: "{{ item[0] }}"
  register: worker_cloud_init_creation

- name: Initialize Terraform for Kubernetes deployment
  ansible.builtin.shell:
    cmd: |
      terraform init \
        -input=false \
        -reconfigure
  args:
    chdir: "{{ kubernetes_deploy_terraform_dir }}"
  environment:
    TF_IN_AUTOMATION: "1"
  register: terraform_init
  changed_when: "'Terraform has been successfully configured' in terraform_init.stdout or 'Already initialized' in terraform_init.stdout"
  retries: 3
  delay: 5

- name: Plan Terraform deployment for Kubernetes cluster (k8s-dev-cluster.tf)
  ansible.builtin.shell:
    cmd: |
      terraform plan \
        -input=false \
        -target=module.kubernetes_master \
        -target=module.kubernetes_worker
  args:
    chdir: "{{ kubernetes_deploy_terraform_dir }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ kubernetes_deploy_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ kubernetes_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ kubernetes_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ kubernetes_deploy_proxmox_tls_insecure | ternary('true', 'false') }}"
  register: terraform_plan
  changed_when: false

- name: Apply Terraform configuration for Kubernetes cluster
  ansible.builtin.shell:
    cmd: |
      terraform apply \
        -auto-approve \
        -input=false \
        -target=module.kubernetes_master \
        -target=module.kubernetes_worker
  args:
    chdir: "{{ kubernetes_deploy_terraform_dir }}"
  environment:
    TF_IN_AUTOMATION: "1"
    TF_VAR_proxmox_api_url: "{{ kubernetes_deploy_proxmox_api_url }}"
    TF_VAR_proxmox_api_token_id: "{{ kubernetes_proxmox_api_token_id }}"
    TF_VAR_proxmox_api_token_secret: "{{ kubernetes_proxmox_api_token_secret }}"
    TF_VAR_proxmox_tls_insecure: "{{ kubernetes_deploy_proxmox_tls_insecure | ternary('true', 'false') }}"
  register: terraform_apply
  changed_when: "terraform_apply.stdout is defined and 'Apply complete' in terraform_apply.stdout"

- name: Wait for Kubernetes cluster deployment to complete
  ansible.builtin.pause:
    seconds: 45
  when: terraform_apply.changed

- name: Wait for SSH connectivity on master nodes
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: 22
    delay: 10
    timeout: "{{ kubernetes_wait_for_ssh_timeout | default(600) }}"
    state: present
  loop: "{{ kubernetes_deploy_master_ip_addresses }}"
  register: master_ssh_check

- name: Wait for SSH connectivity on worker nodes
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: 22
    delay: 10
    timeout: "{{ kubernetes_wait_for_ssh_timeout | default(600) }}"
    state: present
  loop: "{{ kubernetes_deploy_worker_ip_addresses }}"
  register: worker_ssh_check

- name: Display Kubernetes cluster deployment summary
  ansible.builtin.debug:
    msg: |
      =========================================
      Kubernetes VMs Successfully Deployed!
      =========================================
      
      Master Control Plane Nodes:
      {% for ip in kubernetes_deploy_master_ip_addresses %}
        - {{ ip }} (SSH ready: {{ master_ssh_check.results[loop.index0].state }})
      {% endfor %}
      
      Worker Nodes:
      {% for ip in kubernetes_deploy_worker_ip_addresses %}
        - {{ ip }} (SSH ready: {{ worker_ssh_check.results[loop.index0].state }})
      {% endfor %}
      
      Kubernetes Configuration:
        Cluster Name: {{ kubernetes_deploy_cluster_name }}
        RKE2 Version: {{ kubernetes_deploy_rke2_version }}
        Pod CIDR: {{ kubernetes_deploy_cluster_cidr }}
        Service CIDR: {{ kubernetes_deploy_service_cidr }}
      
      Next Steps:
        1. Configure hostname and network on all nodes
        2. Install RKE2 on master node (bootstrap)
        3. Install RKE2 agents on worker nodes (join)
        4. Install NetworkPolicy CNI (Cilium or Calico)
        5. Deploy Kubernetes add-ons (ingress, storage, etc.)
      
      SSH Access:
        ssh -i ~/.ssh/id_ed25519 debian@<node-ip>
      
      =========================================
  when: master_ssh_check is succeeded and worker_ssh_check is succeeded

