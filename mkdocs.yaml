# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
# ==============================================================================
# SinLess Games Infrastructure Docs
# ==============================================================================
#
# This MkDocs configuration is designed for a production documentation site served
# from the Docker/Nginx setup in Docs/Dockerfile.
#
# Goals:
#   - Full-text search
#   - Mermaid diagrams
#   - Markdown tables
#   - Embedded images, SVGs, and PDFs
#   - Copyable code blocks
#   - Admonitions/callouts
#   - Tabs
#   - Task lists
#   - GitHub edit/view links
#   - Last-updated metadata
#   - Build minification
#   - Safe handling of internal docs build files
#
# Build command used by Docs/Dockerfile:
#   mkdocs build --clean --strict
#
# ==============================================================================


# ------------------------------------------------------------------------------
# Core site metadata
# ------------------------------------------------------------------------------
site_name: SinLess Games Infrastructure Docs
site_description: Architecture, operations, and platform documentation for the Infrastructure repository.
site_author: SinLess Games LLC

# Public canonical URL for the documentation site.
# This is used for generated sitemap.xml, canonical links, and social metadata.
site_url: https://docs.sinlessgames.com

# Repository metadata.
# Material uses these values for the repository link, edit links, and view links.
repo_url: https://github.com/Sinless777/Infrastructure
repo_name: Sinless777/Infrastructure

# The docs live in the Docs/ directory instead of MkDocs' default docs/.
docs_dir: Docs

# The static output directory created by mkdocs build.
# Docs/Dockerfile copies this folder into the Nginx runtime image.
site_dir: site

# Use clean URLs like /Architecture/ instead of /Architecture/index.html.
# Your Nginx config must support directory-style URLs with try_files $uri $uri/.
use_directory_urls: true

# Treat MkDocs warnings as build failures.
# This mirrors the Dockerfile's mkdocs build --strict flag and helps catch broken
# links, bad nav paths, missing files, and invalid config during local builds too.
strict: true

# Files inside Docs/ that should NOT be published into the generated site.
#
# Because docs_dir is Docs/, MkDocs would otherwise copy unknown/static files into
# the public site. These files are build/runtime implementation details, not docs.
exclude_docs: |
  Dockerfile
  nginx.conf
  requirements.txt


# ------------------------------------------------------------------------------
# Theme
# ------------------------------------------------------------------------------
theme:
  name: material
  language: en

  # Uses your existing rack diagram SVG as both logo and favicon.
  # These paths are relative to Docs/.
  favicon: Network/Rack-Diagram.svg
  logo: Network/Rack-Diagram.svg

  # Avoid external font loading. This keeps the site more self-contained and
  # friendlier for private/internal infrastructure documentation.
  font: false

  icon:
    repo: fontawesome/brands/github

  # Light/dark mode palettes.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  # Material feature flags.
  features:
    # Navigation / layout
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer

    # Table of contents behavior
    - toc.follow

    # Search UX
    - search.highlight
    - search.share
    - search.suggest

    # Code block UX
    - content.code.copy
    - content.code.select
    - content.code.annotate

    # Page action buttons
    - content.action.edit
    - content.action.view

    # Keeps tab selections synchronized across pages.
    - content.tabs.link

# GitHub edit/view links should point at the Docs/ folder on main.
edit_uri: edit/main/Docs/


# ------------------------------------------------------------------------------
# Plugins
# ------------------------------------------------------------------------------
plugins:
  # Full-text search.
  #
  # Important:
  #   If a plugins: list exists, search must be explicitly included.
  - search:
      lang: en
      separator: '[\s\-\.]+'

  # Click-to-zoom image lightbox for embedded PNG/SVG screenshots and diagrams.
  #
  # Usage in Markdown:
  #   ![Rack diagram](Network/Rack-Diagram.svg)
  #
  # Add the "skip-lightbox" class when you do not want lightbox behavior:
  #   ![Logo](Network/Rack-Diagram.svg){ .skip-lightbox }
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
      skip_classes:
        - skip-lightbox

  # Shows page last-updated information using Git history when available.
  #
  # Docker note:
  #   Your current Docs/Dockerfile does not copy .git into the build image.
  #   fallback_to_build_date keeps the Docker build from failing when Git metadata
  #   is unavailable.
  - git-revision-date-localized:
      type: timeago
      timezone: America/Boise
      locale: en
      enable_creation_date: true
      fallback_to_build_date: true

  # Lets you move/rename pages without breaking old links.
  #
  # Add redirects like this when needed:
  #
  # redirect_maps:
  #   old-page.md: new-page.md
  #   old-folder/old-name.md: new-folder/new-name.md
  - redirects:
      redirect_maps: {}

  # Allows reusable variables/macros in Markdown.
  #
  # Example:
  #   {{ config.extra.project.name }}
  #
  # Variables are defined under extra: below.
  - macros:
      on_error_fail: true
      on_undefined: strict

  # Allows including reusable Markdown fragments.
  #
  # Example:
  #   {% include-markdown "Resources/chaos-engineering.md" %}
  - include-markdown

  # Minifies generated HTML/CSS/JS during production builds.
  #
  # This reduces final image/site size without changing the source Markdown.
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true


# ------------------------------------------------------------------------------
# Markdown extensions
# ------------------------------------------------------------------------------
markdown_extensions:
  # Built-in Python Markdown extensions.
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - sane_lists
  - tables

  # Table of contents.
  #
  # permalink: true adds anchor links to headings.
  # toc_depth controls how deep the right-side page TOC goes.
  - toc:
      permalink: true
      toc_depth: 2-4
      title: On this page

  # Better emphasis handling.
  - pymdownx.betterem:
      smart_enable: all

  # Adds insert/delete/superscript/subscript style helpers.
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

  # Collapsible sections.
  #
  # Example:
  #   ??? note "Expandable note"
  #       Hidden content here.
  - pymdownx.details

  # Emoji and Material icons.
  #
  # Example:
  #   :material-kubernetes:
  #   :fontawesome-brands-github:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Syntax highlighting for code blocks.
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true

  # Inline code highlighting.
  #
  # Example:
  #   The command is `#!bash kubectl get pods`.
  - pymdownx.inlinehilite

  # Keyboard key styling.
  #
  # Example:
  #   Press ++ctrl+c++ to stop the process.
  - pymdownx.keys

  # Auto-links GitHub issues, PRs, commits, and raw URLs.
  #
  # Example:
  #   #123
  #   GH-123
  #   https://github.com/Sinless777/Infrastructure
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: Sinless777
      repo: Infrastructure

  # Useful symbols like arrows, fractions, copyright, etc.
  - pymdownx.smartsymbols

  # Reusable snippets.
  #
  # Example:
  #   --8<-- "Resources/chaos-engineering.md"
  #
  # Paths are relative to the repository root here.
  - pymdownx.snippets:
      base_path:
        - Docs
      check_paths: true

  # Advanced fenced code blocks.
  #
  # This is required for Mermaid diagrams.
  #
  # Example:
  #   ```mermaid
  #   graph TD
  #     A[User] --> B[Docs Site]
  #   ```
  - pymdownx.superfences:
      preserve_tabs: true
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Content tabs.
  #
  # Example:
  #   === "kubectl"
  #       ```bash
  #       kubectl get nodes
  #       ```
  #
  #   === "helm"
  #       ```bash
  #       helm list -A
  #       ```
  - pymdownx.tabbed:
      alternate_style: true

  # GitHub-style task lists.
  #
  # Example:
  #   - [x] Build docs image
  #   - [ ] Deploy docs site
  - pymdownx.tasklist:
      custom_checkbox: true


# ------------------------------------------------------------------------------
# Extra site metadata and template variables
# ------------------------------------------------------------------------------
extra:
  generator: false

  project:
    name: Infrastructure
    owner: SinLess Games LLC
    repository: Sinless777/Infrastructure
    production_domain: docs.sinlessgames.com
    local_domain: local.sinlessgamesllc.com

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sinless777/Infrastructure
      name: Infrastructure repository on GitHub


# ------------------------------------------------------------------------------
# Extra CSS
# ------------------------------------------------------------------------------
extra_css:
  - assets/stylesheets/extra.css


# ------------------------------------------------------------------------------
# Copyright footer
# ------------------------------------------------------------------------------
copyright: Copyright &copy; SinLess Games LLC


# ------------------------------------------------------------------------------
# Navigation
# ------------------------------------------------------------------------------
#
# Keep this list explicit.
#
# Why:
#   - mkdocs build --strict fails when pages are missing or paths are wrong.
#   - Explicit nav keeps the docs predictable.
#   - It prevents random Markdown files from appearing in unexpected places.
#
# Paths are relative to Docs/.
# ------------------------------------------------------------------------------
