server {
  listen 8080 default_server;
  listen [::]:8080 default_server;

  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;
  autoindex off;
  server_tokens off;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/markdown
    text/xml
    application/xml
    application/json
    application/javascript
    application/rss+xml
    image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ~ /\.(?!well-known/) {
    deny all;
    access_log off;
    log_not_found off;
  }

  location = /404.html {
    internal;

    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  error_page 404 /404.html;

  # MkDocs HTML, search index, sitemap, and metadata should not be cached hard.
  location ~* \.(?:html|json|xml)$ {
    try_files $uri =404;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  # MkDocs generated assets. These are usually hashed, so they can cache longer.
  location ~* \.(?:css|js|mjs|woff|woff2|ttf|eot)$ {
    try_files $uri =404;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  # Files you specifically expect to serve from the docs site.
  location ~* \.(?:md|md5|svg|png|pdf)$ {
    try_files $uri =404;

    types {
      text/markdown md markdown;
      text/plain md5;
      image/svg+xml svg svgz;
      image/png png;
      application/pdf pdf;
    }

    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  # MkDocs is a static site, not a SPA.
  # Do not fallback missing files to /index.html because it hides broken links/assets.
  location / {
    try_files $uri $uri/ $uri.html =404;
  }
}