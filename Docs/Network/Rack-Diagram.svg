<svg width="520" height="1800" viewBox="0 0 520 1800" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="520" height="1800" fill="#fafafa" />

  <!-- Title -->
  <text x="260" y="40" font-size="26" font-family="Arial" text-anchor="middle" fill="#222">
    24U Rack Diagram (Front View)
  </text>

  <!-- Function to draw rack units -->
  <!-- Each U = 65px height -->

  <!-- RACK FRAME -->
  <rect x="60" y="70" width="400" height="1660" fill="none" stroke="#333" stroke-width="3"/>

  <!-- U labels -->
  <!-- We generate labels down the left side -->
  <g font-family="Arial" font-size="14" fill="#333">
    <!-- Loop manually: y = 70 + (n * 65) -->
    <!-- U24 at top down to U1 at bottom -->
    <text x="20" y="105">U24</text>
    <text x="20" y="170">U23</text>
    <text x="20" y="235">U22</text>
    <text x="20" y="300">U21</text>
    <text x="20" y="365">U20</text>
    <text x="20" y="430">U19</text>
    <text x="20" y="495">U18</text>
    <text x="20" y="560">U17</text>
    <text x="20" y="625">U16</text>
    <text x="20" y="690">U15</text>
    <text x="20" y="755">U14</text>
    <text x="20" y="820">U13</text>
    <text x="20" y="885">U12</text>
    <text x="20" y="950">U11</text>
    <text x="20" y="1015">U10</text>
    <text x="20" y="1080">U9</text>
    <text x="20" y="1145">U8</text>
    <text x="20" y="1210">U7</text>
    <text x="20" y="1275">U6</text>
    <text x="20" y="1340">U5</text>
    <text x="20" y="1405">U4</text>
    <text x="20" y="1470">U3</text>
    <text x="20" y="1535">U2</text>
    <text x="20" y="1600">U1</text>
  </g>

  <!-- EQUIPMENT BLOCKS -->
  <!-- Block generator: each U is 65px tall -->

  <!-- U24 - PDU -->
  <rect x="60" y="75" width="400" height="60" fill="#dcdcdc" stroke="#333"/>
  <text x="260" y="110" font-size="18" font-family="Arial" text-anchor="middle">PDU (1U)</text>

  <!-- U23 - USG Pro 4 -->
  <rect x="60" y="140" width="400" height="60" fill="#c8e1ff" stroke="#333"/>
  <text x="260" y="175" font-size="18" font-family="Arial" text-anchor="middle">USG Pro 4 (1U)</text>

  <!-- U22 - Aggregation Switch -->
  <rect x="60" y="205" width="400" height="60" fill="#ffe9c4" stroke="#333"/>
  <text x="260" y="240" font-size="18" font-family="Arial" text-anchor="middle">8-Port SFP+ Aggregation (1U)</text>

  <!-- U21 - Switch 1 -->
  <rect x="60" y="270" width="400" height="60" fill="#c4ffd4" stroke="#333"/>
  <text x="260" y="305" font-size="18" font-family="Arial" text-anchor="middle">24-Port Switch 1 (Core) (1U)</text>

  <!-- U20 + U19 Patch Panel (2U) -->
  <rect x="60" y="335" width="400" height="130" fill="#e5d4ff" stroke="#333"/>
  <text x="260" y="400" font-size="18" font-family="Arial" text-anchor="middle">Patch Panel 48-Port (2U)</text>

  <!-- U18 - Switch 2 -->
  <rect x="60" y="470" width="400" height="60" fill="#c4ffd4" stroke="#333"/>
  <text x="260" y="505" font-size="18" font-family="Arial" text-anchor="middle">24-Port Switch 2 (1U)</text>

  <!-- U17-16 R710 Node 1 pve-01 -->
  <rect x="60" y="535" width="400" height="130" fill="#ffd1d1" stroke="#333"/>
  <text x="260" y="600" font-size="18" font-family="Arial" text-anchor="middle">Dell R710 Node 1 (pve-01) (2U)</text>

  <!-- U15-14 R710 Node 2 pve-02 -->
  <rect x="60" y="670" width="400" height="130" fill="#ffd1d1" stroke="#333"/>
  <text x="260" y="735" font-size="18" font-family="Arial" text-anchor="middle">Dell R710 Node 2 (pve-02) (2U)</text>

  <!-- Remaining Us as empty space -->
  <g font-size="18" font-family="Arial" fill="#666" text-anchor="middle">
    <rect x="60" y="805" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="842">Empty (U13)</text>

    <rect x="60" y="870" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="907">Empty (U12)</text>

    <rect x="60" y="935" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="972">Empty (U11)</text>

    <rect x="60" y="1000" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1037">Empty (U10)</text>

    <rect x="60" y="1065" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1102">Empty (U9)</text>

    <rect x="60" y="1130" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1167">Empty (U8)</text>

    <rect x="60" y="1195" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1232">Empty (U7)</text>

    <rect x="60" y="1260" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1297">Empty (U6)</text>

    <rect x="60" y="1325" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1362">Empty (U5)</text>

    <rect x="60" y="1390" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1427">Empty (U4)</text>

    <rect x="60" y="1455" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1492">Empty (U3)</text>

    <rect x="60" y="1520" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1557">Empty (U2)</text>

    <rect x="60" y="1585" width="400" height="60" fill="#f7f7f7" stroke="#ccc"/>
    <text x="260" y="1622">Empty (U1)</text>
  </g>

</svg>
