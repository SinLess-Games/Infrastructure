site_name: SinLess Games Infrastructure Docs
site_description: Architecture, operations, and platform documentation for the Infrastructure repository.
site_url: https://docs.sinlessgames.com
repo_url: https://github.com/Sinless777/Infrastructure
repo_name: Sinless777/Infrastructure
docs_dir: Docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  favicon: Network/Rack-Diagram.svg
  logo: Network/Rack-Diagram.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - content.action.edit
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sinless777/Infrastructure

extra_css:
  - assets/stylesheets/extra.css

