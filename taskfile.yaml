version: '3'

includes:
  ansible:
    taskfile: .taskfiles/Ansible/Taskfile.yaml
    aliases:
      - ans
  packer:
    taskfile: .taskfiles/Packer/Taskfile.yaml
    # optional: false  # fail if missing
  terraform:
    taskfile: .taskfiles/Terraform/Taskfile.yaml
    aliases:
      - tf
  pxe:
    taskfile: .taskfiles/PXE/Taskfile.yaml
    aliases:
      - pxe
  vault:
    taskfile: .taskfiles/vault/Taskfile.yaml
    aliases:
      - vault
      - vlt
      - v

tasks:
  init:
    desc: "Bootstrap Ansible environment (Python venv + deps + Galaxy content)"
    cmds:
      - task ansible:init

  default:
    desc: "List all available tasks"
    cmds:
      - task --list
