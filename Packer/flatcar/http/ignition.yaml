# Packer/flatcar/http/ignition.yaml
variant: flatcar
version: 1.0.0

passwd:
  users:
    - name: core
      ssh_authorized_keys:
        - "ssh-rsa YOUR_PUBLIC_SSH_KEY_HERE"
      # If you need a hashed password instead of SSH keys:
      # password_hash: "$6$…your-hash-here…"

storage:
  files:
    - path: /etc/hostname
      filesystem: root
      mode: 0644
      contents:
        inline: flatcar-vm   # Change to your desired hostname

systemd:
  units:
    - name: enable-sshd.service
      enable: true
      contents: |
        [Unit]
        Description=Enable sshd on boot
        [Service]
        ExecStart=/usr/bin/systemctl enable sshd.service
        ExecStartPost=/usr/bin/systemctl start sshd.service
        [Install]
        WantedBy=multi-user.target

networkd:
  units:
    - name: 00-eth0.network
      contents: |
        [Match]
        Name=eth0
        [Network]
        DHCP=yes
        # For static IP instead, comment out DHCP and set:
        # Address=192.168.1.100/24
        # Gateway=192.168.1.1
        # DNS=8.8.8.8
