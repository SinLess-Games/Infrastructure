# PXE DHCP VLAN inventory
#
# Notes / conventions:
# - Keep range_start / range_end as single IP strings (NOT lists).
# - Use a consistent domain. Your profile said: local.sinlessgamesllc.com
#   (your original file had local.sinlessgames.com). I’ve normalized to the LLC domain.
# - If the PXE server is not L3-present on each VLAN, configure DHCP relay (IP helper) on the gateway.
# - dnsmasq will typically bind on specific interfaces. If you want that driven from inventory,
#   add an "interface" field per VLAN (ex: "br0.10"). Leaving it out keeps inventory portable.
#
# Optional future fields you can add later (and I can wire into render scripts):
# - pxe_boot: { tftp: 10.10.x.y, http: http://pxe.local.../ipxe/menu.ipxe }
# - ntp_servers: [...]
# - dhcp_options: { option_150: ..., option_66: ..., option_67: ... }

schema: v1
defaults:
  lease: 12h
  domain: local.sinlessgames.com
  dns_servers:
    - 10.10.10.1

vlans:
  - name: mgmt
    vlan_id: 10
    subnet: 10.10.10.0/24
    gateway: 10.10.10.1
    dhcp_range:
      start: 10.10.10.50
      end: 10.10.10.200
    dns_servers:
      - 10.10.10.1

  - name: dev
    vlan_id: 20
    subnet: 10.10.20.0/24
    gateway: 10.10.20.1
    dhcp_range:
      start: 10.10.20.50
      end: 10.10.20.200
    dns_servers:
      - 10.10.20.1

  - name: staging
    vlan_id: 30
    subnet: 10.10.30.0/24
    gateway: 10.10.30.1
    dhcp_range:
      start: 10.10.30.50
      end: 10.10.30.200
    dns_servers:
      - 10.10.30.1

  - name: prod
    vlan_id: 40
    subnet: 10.10.40.0/24
    gateway: 10.10.40.1
    dhcp_range:
      start: 10.10.40.50
      end: 10.10.40.200
    dns_servers:
      - 10.10.40.1

  - name: storage
    vlan_id: 50
    subnet: 10.10.50.0/24
    gateway: 10.10.50.1
    dhcp_range:
      start: 10.10.50.50
      end: 10.10.50.200
    dns_servers:
      - 10.10.50.1
