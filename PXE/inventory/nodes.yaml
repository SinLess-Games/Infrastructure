# PXE node inventory
#
# Design goals:
# - Deterministic installs by MAC → fixed IP + hostname
# - Keep this file “render-friendly” (consistent keys, predictable types)
# - No profiles (per your request)
#
# Notes:
# - vlan must match an entry in PXE/inventory/vlans.yaml (name field)
# - dns should be a list (even if single entry)
# - If you later want multiple NIC support, add:
#     macs: [ "aa:bb:cc:dd:ee:ff", "..." ]
#   and keep "mac" for the primary PXE NIC, or swap to "macs" entirely.

schema: v1
defaults:
  vlan: mgmt
  gateway: 10.10.10.1
  dns:
    - 10.10.10.1
  domain: local.sinlessgames.com

nodes:
