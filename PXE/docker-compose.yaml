services:
  netbootxyz:
    image: ghcr.io/netbootxyz/netbootxyz:latest
    container_name: netbootxyz
    restart: unless-stopped

    environment:
      - TZ=America/Boise
      - PUID=1000
      - PGID=1000
      - MENU_VERSION=2.0.89
      - NGINX_PORT=80
      - WEB_APP_PORT=3000
      - TFTPD_OPTS=--tftp-single-port

    ports:
      - "3000:3000"       # web configuration interface
      - "67:67/udp"       # DHCP
      - "69:69/udp"       # TFTP
      - "80:80"           # local assets web (nginx)

    volumes:
      - ./config:/config
      - ./assets:/assets