### PXE/assets/auto-install/preseed/pve-03.cfg
### Debian 12 (bookworm) unattended install + late install Proxmox VE (pve-03)
###
### Replace these placeholders with real SHA-512 hashes:
###   __ROOT_PASSWORD_HASH__
###   __USER_PASSWORD_HASH__
### Generate with:  openssl passwd -6

### ---------- Localization ----------
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false

### ---------- Time ----------
d-i clock-setup/utc boolean true
d-i time/zone string America/Boise
d-i clock-setup/ntp boolean true

### ---------- Network ----------
# Skip network configuration questions if DHCP works
d-i netcfg/choose_interface select auto
d-i netcfg/get_ipaddress string 10.10.10.17
d-i netcfg/get_netmask string 255.255.255.0
d-i netcfg/get_gateway string 10.10.10.1
d-i netcfg/get_nameservers string 10.10.10.12
d-i netcfg/get_hostname string pve-03
d-i netcfg/get_domain string local.sinlessgamesllc.com
d-i netcfg/wireless_wep string

### ---------- Mirror / APT ----------
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

d-i apt-setup/contrib boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/services-select multiselect security, updates

### ---------- Users / Passwords ----------
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password $6$RSG3cQU7P9/cJpmS$L8iLL8hY/OvOCL3iQyv.BrAFSz7YWZEqRGp7mc6JYnoIF7sh30xywxf1G9BHTitcs3dDOO2ttiGY.gCXEvaCX1

d-i passwd/make-user boolean true
d-i passwd/user-fullname string Sinless Admin
d-i passwd/username string sinless777
d-i passwd/user-password-crypted password $6$RSG3cQU7P9/cJpmS$L8iLL8hY/OvOCL3iQyv.BrAFSz7YWZEqRGp7mc6JYnoIF7sh30xywxf1G9BHTitcs3dDOO2ttiGY.gCXEvaCX1
d-i user-setup/allow-password-weak boolean true

### ---------- Partitioning (auto, LVM) ----------
# Auto-pick the first disk detected (avoids hardcoding sda/vda/nvme0n1).
d-i partman/early_command string \
  DISK="$(list-devices disk | head -n1)"; \
  echo "partman-auto/disk string $DISK" | debconf-set-selections; \
  echo "grub-installer/bootdev string $DISK" | debconf-set-selections

d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### ---------- Base install ----------
d-i base-installer/install-recommends boolean false
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo curl wget gnupg ca-certificates vim qemu-guest-agent

popularity-contest popularity-contest/participate boolean false

### ---------- GRUB / Reboot ----------
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean false

### ---------- Late command: install Proxmox VE on top of Debian ----------
d-i preseed/late_command string \
  in-target /bin/sh -c "set -eux; \
    echo 'postfix postfix/main_mailer_type select Local only' | debconf-set-selections; \
    echo 'postfix postfix/mailname string pve-03.local.sinlessgamesllc.com' | debconf-set-selections; \
    echo 'deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription' > /etc/apt/sources.list.d/pve-install-repo.list; \
    wget -qO /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg; \
    apt-get update; \
    DEBIAN_FRONTEND=noninteractive apt-get -y full-upgrade; \
    DEBIAN_FRONTEND=noninteractive apt-get -y install proxmox-ve postfix open-iscsi chrony; \
    DEBIAN_FRONTEND=noninteractive apt-get -y remove os-prober || true; \
    update-grub; \
    usermod -aG sudo sinless777; \
  "
