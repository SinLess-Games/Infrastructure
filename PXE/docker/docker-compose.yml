services:
  dnsmasq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pxe-dnsmasq
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    init: true

    volumes:
      - ./dnsmasq:/etc/dnsmasq.d:ro
      - ./tftp:/tftp:ro
      - ./state/dnsmasq:/var/lib/misc:rw

    # Keep args minimal; config controls behavior.
    command:
      - "--conf-file=/etc/dnsmasq.d/dnsmasq.conf"
      - "--dhcp-leasefile=/var/lib/misc/dnsmasq.leases"

    healthcheck:
      test: ["CMD-SHELL", "dnsmasq --test --conf-file=/etc/dnsmasq.d/dnsmasq.conf >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    container_name: pxe-nginx
    network_mode: host
    restart: unless-stopped
    init: true

    # Bypass /docker-entrypoint.d scripts (they try to modify default.conf)
    entrypoint: ["nginx", "-g", "daemon off;"]

    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

    volumes:
      - ./http/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./http/www:/usr/share/nginx/html:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ipxe/menu.ipxe >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
