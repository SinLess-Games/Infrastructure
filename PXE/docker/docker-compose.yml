services:
  nginx:
    image: nginx:1.27-alpine
    container_name: pxe-nginx
    network_mode: host
    restart: unless-stopped
    init: true
    entrypoint: ["nginx", "-g", "daemon off;"]
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    volumes:
      - ./http/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./http/www:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ipxe/menu.ipxe >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  tftp:
    build:
      context: ./tftp-image
      dockerfile: Dockerfile
    container_name: pxe-tftp
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./tftp:/srv/tftp:ro
