# Debian 12 (bookworm) preseed for pve-05

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i time/zone string America/Boise

# Network (DHCP; deterministic by MAC at PXE layer)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string pve-05
d-i netcfg/get_domain string local.sinlessgames.com

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Users: root only (provision with SSH key)
d-i passwd/root-login boolean true
d-i passwd/make-user boolean false
d-i passwd/root-password-crypted password *

# Partitioning: stable GPT layout compatible with BIOS+UEFI:
# - 1 MiB BIOS boot partition (for legacy BIOS on GPT)
# - 512 MiB EFI System Partition
# - /boot ext4
# - / ext4
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
d-i partman-auto/expert_recipe string                         \
      boot-root ::                                            \
              1 1 1 free                                     \
                      $primary{ }                             \
                      method{ biosgrub }                      \
              .                                               \
              512 512 512 fat32                               \
                      $primary{ } $bootable{ }                \
                      method{ efi } format{ }                 \
                      mountpoint{ /boot/efi }                 \
              .                                               \
              1024 1024 1024 ext4                             \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /boot }                     \
              .                                               \
              20000 50000 -1 ext4                             \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .


d-i partman-auto/choose_recipe select boot-root
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Packages
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string curl wget ca-certificates gnupg cloud-init qemu-guest-agent

# Grub
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

# Late command: seed NoCloud, set SSH key, and install Proxmox prerequisites; actual "bootstrap later" is minimal.
# NOTE: cloud-init is installed via pkgsel/include above.
d-i preseed/late_command string \
  in-target mkdir -p /var/lib/cloud/seed/nocloud-net ; \
  in-target /bin/sh -lc "wget -qO /var/lib/cloud/seed/nocloud-net/meta-data http://local.sinlessgames.com/seed/pve-05/meta-data && wget -qO /var/lib/cloud/seed/nocloud-net/user-data http://local.sinlessgames.com/seed/pve-05/user-data" ; \
  in-target chmod 600 /var/lib/cloud/seed/nocloud-net/user-data ; \
  in-target systemctl enable cloud-init || true ; \
  in-target systemctl enable qemu-guest-agent || true

# Finish
d-i finish-install/reboot_in_progress note