# DHCP Configuration for PXE environment
# This provides DHCP leases for PXE boot clients

# Enable DHCP on eth0
dhcp-range=10.10.10.100,10.10.10.200,255.255.255.0,12h

# DHCP options
dhcp-option=option:router,10.10.10.1
dhcp-option=option:dns-server,10.10.10.12
dhcp-option=option:time-offset,0

# PXE boot options
dhcp-boot=netboot.xyz-snponly.efi,,10.10.10.10
dhcp-match=set:bios,client-arch,0
dhcp-boot=tag:bios,netboot.xyz-undionly.kpxe,,10.10.10.10

# Set TFTP server
dhcp-option=66,10.10.10.10

# Log all DHCP interactions
log-dhcp
