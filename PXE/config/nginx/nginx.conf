# PXE/config/nginx/nginx.conf

user  nbxyz;
worker_processes  auto;

pid /run/nginx.pid;

# If your image ships dynamic modules, keep this
include /etc/nginx/modules/*.conf;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    ##
    # Basics
    ##
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout       65;
    keepalive_requests      1000;

    server_tokens   off;

    # iPXE / HTTP boot can be sensitive to buffering/odd caching.
    # Keep it simple and deterministic.
    charset utf-8;

    ##
    # Logging
    # NOTE: log_format is NOT allowed inside server{} in site-confs.
    # Define formats here (http{} context) and reference in site configs.
    ##
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log  /config/log/nginx/access.log  main;
    error_log   /config/log/nginx/error.log   notice;

    ##
    # Limits / Timeouts
    ##
    client_max_body_size        0;
    client_body_timeout         30s;
    client_header_timeout       30s;
    send_timeout                30s;

    # Large images (ISOs, initrds) may take time on PXE networks
    proxy_read_timeout          300s;
    proxy_connect_timeout       60s;
    proxy_send_timeout          300s;

    ##
    # Gzip
    # Keep enabled, but do NOT gzip boot-critical binaries.
    ##
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 3;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    ##
    # File caching behavior
    # iPXE scripts/configs should not be cached while iterating.
    ##
    open_file_cache off;

    ##
    # Include virtual hosts
    ##
    include /config/nginx/site-confs/*;
}

daemon off;
