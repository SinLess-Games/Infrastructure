version: '3'

tasks:
  up:
    desc: Start PXE stack (dnsmasq + nginx)
    cmds:
      - bash -lc 'docker compose -f PXE/docker-compose.yaml up -d'

  down:
    desc: Stop PXE stack
    cmds:
      - bash -lc 'docker compose -f PXE/docker-compose.yaml down'

  logs:
    desc: Tail PXE service logs
    cmds:
      - bash -lc 'docker compose -f PXE/docker-compose.yaml logs -f --tail=200'
