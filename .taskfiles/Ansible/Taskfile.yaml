version: '3'

vars:
  ANSIBLE_DIR: "Ansible"
  VENV_DIR: "{{.ANSIBLE_DIR}}/.venv"
  VENV_PYTHON: "{{.VENV_DIR}}/bin/python"
  VENV_PIP: "{{.VENV_DIR}}/bin/pip"
  VENV_ANSIBLE_GALAXY: "{{.VENV_DIR}}/bin/ansible-galaxy"
  REQUIREMENTS_FILE: "{{.ANSIBLE_DIR}}/requirements.txt"
  GALAXY_REQUIREMENTS_FILE: "{{.ANSIBLE_DIR}}/requirements.yaml"
  PYTHON_BIN: '{{default "python3" .PYTHON_BIN}}'

tasks:

  default:
    desc: "Show available Ansible tasks"
    cmds:
      - task --list

  create-venv:
    desc: "Create Python virtual environment for Ansible tooling (no-op if it exists)"
    cmds:
      - |
        set -e
        if [ ! -d "{{.VENV_DIR}}" ]; then
          {{.PYTHON_BIN}} -m venv "{{.VENV_DIR}}"
        fi

  install-python-deps:
    desc: "Install Python requirements for Ansible into the venv"
    deps: [create-venv]
    cmds:
      - |
        set -e
        {{.VENV_PIP}} install --no-user --upgrade pip setuptools wheel
        {{.VENV_PIP}} install --no-user --upgrade -r "{{.REQUIREMENTS_FILE}}"

  install-galaxy-content:
    desc: "Install Ansible collections and roles from requirements.yaml"
    deps: [install-python-deps]
    cmds:
      - |
        set -e
        {{.VENV_ANSIBLE_GALAXY}} collection install -r "{{.GALAXY_REQUIREMENTS_FILE}}" --collections-path Ansible/.collections/ansible_collections
        {{.VENV_ANSIBLE_GALAXY}} role install -r "{{.GALAXY_REQUIREMENTS_FILE}}" --roles-path Ansible/.collections/roles

  init:
    desc: "Prepare full Ansible environment (venv, Python deps, Galaxy content)"
    cmds:
      - task: install-galaxy-content

  # =============================================================================
  # Playbook Tasks
  # -----------------------------------------------------------------------------
  # Tasks to run specific Ansible playbooks.
  # =============================================================================

  configure-localhost:
    desc: "Configure the local Ansible control node (localhost)"
    deps: [init]
    cmds:
      - |
        set -e
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/configure-localhost.yaml \
          --ask-pass {{.CLI_ARGS}}

  fix-apt-lock-dns:
    desc: "Resolve apt lock and update packages on dns hosts"
    deps: [init]
    cmds:
      - |
        set -e
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/fix-apt-lock.yaml \
          --ask-pass {{.CLI_ARGS}}
  
  configure-proxmox:
    desc: "Configure the proxmox nodes"
    deps: [init]
    cmds:
      - |
        set -e
        if [ -f .env ]; then
          set -a
          . ./.env
          set +a
        fi
        OVERLAY_INVENTORY="$(mktemp --suffix=.yml)"
        cleanup() {
          rm -f "$OVERLAY_INVENTORY"
        }
        trap cleanup EXIT
        yaml_quote() {
          printf "%s" "$1" | sed "s/'/'\"'\"'/g; 1s/^/'/; \$s/\$/'/"
        }
        {
          echo "---"
          echo "proxmox:"
          echo "  vars:"
          if [ -n "${PROXMOX_SSH_PASSWORD:-}" ]; then
            printf "    ansible_password: %s\n" "$(yaml_quote "$PROXMOX_SSH_PASSWORD")"
            printf "    ansible_ssh_pass: %s\n" "$(yaml_quote "$PROXMOX_SSH_PASSWORD")"
          fi
          echo "  children:"
          echo "    pve_nodes:"
          echo "      hosts:"
          for node in 01 02 03 04 05; do
            eval "NODE_PASSWORD=\${PROXMOX_SSH_PASSWORD_PVE_${node}:-}"
            if [ -n "${NODE_PASSWORD:-}" ]; then
              echo "        pve-${node}:"
              printf "          ansible_password: %s\n" "$(yaml_quote "$NODE_PASSWORD")"
              printf "          ansible_ssh_pass: %s\n" "$(yaml_quote "$NODE_PASSWORD")"
            fi
          done
        } > "$OVERLAY_INVENTORY"
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          -i "$OVERLAY_INVENTORY" \
          {{.ANSIBLE_DIR}}/playbooks/configure-proxmox.yaml \
          ${PROXMOX_CLUSTER_JOIN_PASSWORD:+-e proxmox_cluster_join_password="$PROXMOX_CLUSTER_JOIN_PASSWORD"} \
          {{.CLI_ARGS}}

  setup-technitium:
    desc: "Setup Technitium DNS Server"
    deps: [init]
    cmds:
      - |
        set -e
        {{.VENV_DIR}}/bin/ansible-playbook "{{.ANSIBLE_DIR}}/playbooks/setup-technitium.yaml" {{.CLI_ARGS}}

  check-fix-dns:
    desc: "Check and fix DNS resolution on VMs"
    deps: [init]
    cmds:
      - |
        set -e
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/check-fix-dns.yaml \
          {{.CLI_ARGS}}

  setup-proxmox-permissions:
    desc: "Configure Proxmox permissions (users, groups, roles, ACLs)"
    deps: [init]
    cmds:
      - |
        set -e
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/setup-proxmox-nodes.yaml \
          --tags permissions \
          --vault-password-file .vault-password {{.CLI_ARGS}}
  
  deploy-vault:
    desc: "Deploy Vault cluster using Terraform via Ansible role"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-vault.yaml \
          {{.CLI_ARGS}}

  uninstall-vault:
    desc: "Uninstall Vault from all nodes (removes binaries, config, and data)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/uninstall-vault.yaml \
          {{.CLI_ARGS}}

  deploy-technitium:
    desc: "Deploy Technitium DNS cluster using Terraform via Ansible role"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-technitium.yaml \
          {{.CLI_ARGS}}

  deploy-postgres:
    desc: "Deploy PostgreSQL HA cluster using Terraform via Ansible role"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-postgres.yaml \
          {{.CLI_ARGS}}

  deploy-minio:
    desc: "Deploy MinIO S3-compatible object storage cluster"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-minio.yaml \
          {{.CLI_ARGS}}
  # =============================================================================
  # Kubernetes Deployment Tasks
  # =============================================================================

  k8s:dev:
    desc: "Deploy Kubernetes dev cluster (Terraform + RKE2 + core addons + Flux bootstrap)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-kubernetes-dev.yaml \
          {{.CLI_ARGS}}
        test -f .outputs/kubernetes/dev/kubeconfig
        echo "Saved kubeconfig: .outputs/kubernetes/dev/kubeconfig"

  k8s:dev:plan:
    desc: "Show Terraform plan for dev cluster (no apply)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-kubernetes-dev.yaml \
          -e kubernetes_plan_only=true \
          {{.CLI_ARGS}}

  k8s:dev:destroy:
    desc: "Destroy dev cluster VMs (Terraform destroy only, no cluster ops)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-kubernetes-dev.yaml \
          -e kubernetes_destroy=true \
          {{.CLI_ARGS}}

  k8s:dev:kubeconfig:
    desc: "Print kubeconfig path for dev cluster"
    cmds:
      - echo ".outputs/kubernetes/dev/kubeconfig"

  k8s:dev:status:
    desc: "Check dev cluster status (requires kubeconfig)"
    deps: [init]
    cmds:
      - |
        set -e
        export KUBECONFIG=$$(pwd)/.outputs/kubernetes/dev/kubeconfig
        if ! [ -f "$$KUBECONFIG" ]; then
          echo "Kubeconfig not found. Deploy cluster first with: task ansible:k8s:dev"
          exit 1
        fi
        echo "=== Cluster Nodes ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== Cilium Status ==="
        kubectl -n kube-system get pods -l k8s-app=cilium
        echo ""
        echo "=== Ingress Controllers ==="
        kubectl -n ingress-nginx get pods

  k8s:staging:
    desc: "Deploy Kubernetes staging cluster (Terraform + RKE2 + core addons + Flux bootstrap)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-kubernetes-staging.yaml \
          {{.CLI_ARGS}}
        test -f .outputs/kubernetes/staging/kubeconfig
        echo "Saved kubeconfig: .outputs/kubernetes/staging/kubeconfig"

  k8s:staging:plan:
    desc: "Show Terraform plan for staging cluster (no apply)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-kubernetes-staging.yaml \
          -e kubernetes_plan_only=true \
          {{.CLI_ARGS}}

  k8s:staging:destroy:
    desc: "Destroy staging cluster VMs (Terraform destroy only, no cluster ops)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-kubernetes-staging.yaml \
          -e kubernetes_destroy=true \
          {{.CLI_ARGS}}

  k8s:staging:kubeconfig:
    desc: "Print kubeconfig path for staging cluster"
    cmds:
      - echo ".outputs/kubernetes/staging/kubeconfig"

  k8s:staging:status:
    desc: "Check staging cluster status (requires kubeconfig)"
    deps: [init]
    cmds:
      - |
        set -e
        export KUBECONFIG=$$(pwd)/.outputs/kubernetes/staging/kubeconfig
        if ! [ -f "$$KUBECONFIG" ]; then
          echo "Kubeconfig not found. Deploy cluster first with: task ansible:k8s:staging"
          exit 1
        fi
        echo "=== Cluster Nodes ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== Cilium Status ==="
        kubectl -n kube-system get pods -l k8s-app=cilium
        echo ""
        echo "=== Ingress Controllers ==="
        kubectl -n ingress-nginx get pods
  
  k8s:prod:
    desc: "Deploy Kubernetes production cluster (Terraform + RKE2 + core addons + Flux bootstrap)"
    deps: [init]
    cmds:
      - |
        set -e
        export ANSIBLE_CONFIG={{.ANSIBLE_DIR}}/ansible.cfg
        {{.VENV_DIR}}/bin/ansible-playbook \
          -i {{.ANSIBLE_DIR}}/inventory \
          {{.ANSIBLE_DIR}}/playbooks/deploy-kubernetes-prod.yaml \
          {{.CLI_ARGS}}
        test -f .outputs/kubernetes/prod/kubeconfig
        echo "Saved kubeconfig: .outputs/kubernetes/prod/kubeconfig"
  
  k8s:prod:kubeconfig:
    desc: "Print kubeconfig path for production cluster"
    cmds:
      - echo ".outputs/kubernetes/prod/kubeconfig"

  k8s:prod:status:
    desc: "Check production cluster status (requires kubeconfig)"
    deps: [init]
    cmds:
      - |
        set -e
        export KUBECONFIG=$$(pwd)/.outputs/kubernetes/prod/kubeconfig
        if ! [ -f "$$KUBECONFIG" ]; then
          echo "Kubeconfig not found. Deploy cluster first with: task ansible:k8s:prod"
          exit 1
        fi
        echo "=== Cluster Nodes ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== Cilium Status ==="
        kubectl -n kube-system get pods -l k8s-app=cilium
        echo ""
        echo "=== Ingress Controllers ==="
        kubectl -n ingress-nginx get pods
  
  
